  # =========================================================================
  # v8.0.0 (ADR-0137, math §48) — F5 eigenbasis-rotation separability for
  # constant off-diagonal anisotropic diffusion. Additive sibling to §32
  # AnisotropicShiftChernoffND; reuses its per-axis 1D shift as the inner kernel.
  # =========================================================================
  - name: EigenrotatedAnisotropicChernoff
    location: "crates/semiflow-core/src/anisotropic_eigenrotated.rs"
    status: "WITHDRAWN — NOT SHIPPED in v8.0.0 (ADR-0137 DEMOTED, review finding C2). Engineer removes per ADR-0137 removal spec."
    doc: |
      WITHDRAWN (2026-06-07, review finding C2 — false performance claim). This
      type is NOT part of the v8.0.0 shipped surface; an engineer removes the
      Rust file per the ADR-0137 removal spec. Tombstone retained for audit.

      WHY WITHDRAWN: the shipped implementation did NOT deliver the headline `D·q`
      node reduction. It looped the full `q^D` tensor quadrature (`n_quad = q.pow(D)`)
      and back-rotated EACH node point-wise through `Q`, then sampled via the
      `2^D`-corner multilinear `GridFnND::sample` — making it MORE expensive than
      the §32 `AnisotropicShiftChernoffND` sibling (which already handles off-diagonal
      `A` correctly via Cholesky `A=LLᵀ`, no resample). Results were numerically
      correct, but `125×` / `D·q` was FALSE.

      WHY THE TRUE D·q IS BLOCKED: the genuine separable algorithm must resample the
      whole grid into an eigen-aligned grid (eq. 48.4 `R_Qᵀ`), an `O(N·2^D)`
      multilinear sweep that is NOT an isometry — it injects an `O(dx²)` per-step
      interpolation floor. Theorem 48.1's "ZERO rotation error" is a CONTINUOUS-operator
      identity (`e^{τA}=Qe^{τΛ}Qᵀ`); the discrete tensor grid cannot honor it. The D·q
      node-count win survives only at this new accuracy cost — a real-but-bounded
      speedup, NOT the exact free 125× that was specced. Per the v8.0.0 "no crutches,
      strong result" directive, a dominated + overclaimed kernel is withdrawn rather
      than shipped. §32 (+ §32.8 ζ² order-2 lift) covers correctness today.

      The continuous-operator spectral theory (math §48.2-§48.4) and its `T_EIGENBASIS`
      sympy oracle remain valid as the foundation for a FUTURE genuine D·q kernel
      (DEFERRED, with the resample-floor caveat recorded).

      **SIBLING** to §32 AnisotropicShiftChernoffND<F,D> (NO REPLACEMENT; the
      §32 kernel is preserved verbatim and remains the variable-`A` path). DISTINCT
      from §44 Smolyak (sparse tensor in a FIXED frame, ADR-0123) and from the
      §32.8 ζ² correction (applied after quadrature in the ORIGINAL frame).

      Reuses in-crate primitives from shift_nd.rs: `SquareMatrix<F, D>` (DxD
      matrix + mat_vec), the per-axis Gauss-Hermite nodes/weights, GridND/GridFnND
      (rotate-in/out via GridFnND::sample at rotated coordinates). Adds ONE new
      primitive: a cyclic Jacobi symmetric-eigensolver (~40 LoC, no_std, no dep).

      Generic over `F: SemiflowFloat = f64` (ADR-0025) and `const D: usize`.
      NOT exposed in FFI/PyO3/WASM bindings in v8.0.0 (Rust-only MINOR; per the
      ADR-0076 bindings-additive policy this is deferred to a later bindings wave).
    derive: []
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        bound: "const usize"
    fields:
      - name: q_rot
        type: "SquareMatrix<F, D>"
        doc: "Orthogonal eigenvector matrix Q (QᵀAQ = Λ), computed once at construction via Jacobi."
      - name: lambdas
        type: "[F; D]"
        doc: "Eigenvalues λ_i > 0 (the diagonal of Λ); the per-axis scalar diffusions."
      - name: b_rot
        type: "[F; D]"
        doc: "Rotated constant drift Qᵀb (zero unless a constant drift is supplied)."
      - name: c_const
        type: "F"
        doc: "Constant reaction coefficient (rotation-invariant; default zero)."
      - name: quadrature
        type: "GaussHermiteTensor<F, 1>"
        doc: "Per-axis 1D Gauss-Hermite rule (q nodes), reused D times along the eigen-axes."
      - name: grid
        type: "GridND<F, D>"
        doc: "Standard-axis reference grid geometry (rotate-in/out target frame)."
    constructors:
      - name: new
        signature: |
          pub fn new(
              a_const: SquareMatrix<F, D>,
              b_const: Option<[F; D]>,
              c_const: F,
              grid: GridND<F, D>,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Validates and pre-computes ONCE (math §48.2):
            - D >= 1 and grid.len() >= q (per-axis node minimum; q=5).
            - a_const symmetric (a_ij == a_ji to tolerance) — else DomainViolation.
            - Jacobi eigensolve a_const = QΛQᵀ; assert all λ_i > 0 (SPD) — else
              DomainViolation "tensor not SPD".
            - Store Q, λ_i, Qᵀb (or zero), c_const, the 1D GH rule, and grid.
          NOTE: `a_const` is a CONSTANT tensor (no closure) — this is the
          constant-A scope of §48.5 made explicit in the type signature.
        errors:
          - "DomainViolation if D == 0"
          - "DomainViolation if grid too small (grid.len() < q)"
          - "DomainViolation if a_const not symmetric"
          - "DomainViolation if a_const not SPD (any eigenvalue <= 0)"
          - "DomainViolation if Jacobi fails to converge in the iteration cap"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = GridFnND<F, D>` (reuses §32 state type; no new wrapper).
          `apply_into` (math §48.3 eq 48.4): for each standard-frame grid point
            x_k, sample the eigen-coordinate per-axis additive product
            [∏_i S_i(λ_i, τ)] evaluated at y = Qᵀ x_k, then write back. The inner
            per-axis shift along eigen-axis i draws q 1D Gauss-Hermite nodes
            scaled by 2√(τλ_i); the D axes are applied as the commuting product
            (zero BCH residue, math §48.2). Rotate-in/out is GridFnND::sample at
            Q·(eigen-coordinate) — multilinear interp in the standard frame.
          `order()` returns the inner per-axis order (2 with the §32.8 ζ²
            per-axis correction; 1 for the bare frozen shift) — inherited EXACTLY
            per Theorem 48.1.
          `growth()` returns Growth { multiplier: 1.5, omega: 0 } (mirrors §32).

  - name: MeasureState
    location: "crates/semiflow-core/src/adjoint_fp.rs"
    doc: |
      v8.0.0 Phase-4 C2 (ADR-0107 AMENDMENT 1, math §38). State for adjoint
      Fokker-Planck Chernoff approximation on the dual space M(ℝ^D) (signed
      Borel measures of bounded variation) under the vague (weak-*) topology
      σ(M, C_b).

      SPARSE representation: a finite weighted-Dirac sum + an OPTIONAL
      Gaussian-smoothed-density background. Per Lemma A.1 (§38.3) each
      `apply_into` step pushes EACH Dirac to 4 new Diracs at translated
      positions (x+h, x−h, x+k, x) with weights (1/4, 1/4, 1/2, τc),
      h = 2√(aτ), k = 2bτ. The Dirac count grows 4^n in the worst case; the
      Gaussian-smoothed background + weighted-Voronoi clustering (Bossy 2005)
      controls growth in long-time iteration (spec §6). For the
      characteristic-function gate setting the Diracs FOLD analytically
      (⟨cos(ξx), Σ wᵢ δ_{xᵢ}⟩ = Σ wᵢ cos(ξ xᵢ)) → O(n_diracs) cost, no reduction.

      Implements `State<F>` (the project state trait) so it rides the standard
      evolve_into ping-pong. Errors-as-values: constructors return
      Result<…, SemiflowError> on malformed input (NaN weight, non-SPD
      covariance). Zero new deps — `Vec<F>` from the existing alloc budget.
    derive:
      - Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: diracs
        type: "Vec<([F; D], F)>"
        visibility: "priv"
        doc: "Dirac component: (position, signed weight) pairs."
      - name: gaussians
        type: "Vec<GaussianComponent<F, D>>"
        visibility: "priv"
        doc: "Optional Gaussian-smoothed background for Dirac-count reduction."
    methods:
      - name: dirac
        signature: "pub fn dirac(position: [F; D], weight: F) -> Self"
        doc: "Construct a single Dirac at the given point with the given weight."
      - name: gaussian
        signature: "pub fn gaussian(mean: [F; D], variance: [[F; D]; D], weight: F) -> Result<Self, SemiflowError>"
        doc: "Construct a Gaussian-smoothed measure; errors on non-SPD covariance."
      - name: total_variation
        signature: "pub fn total_variation(&self) -> F"
        doc: "‖ρ‖_TV = Σ|dirac_w| + Σ|gaussian_w| (Theorem A.2 rate modulator)."
      - name: second_moment
        signature: "pub fn second_moment(&self) -> F"
        doc: "⟨x², ρ⟩ — tightness monitor (Lemma A.3)."
      - name: pair
        signature: "pub fn pair<G: Fn(&[F; D]) -> F>(&self, f: G) -> F"
        doc: "Dual pairing ⟨f, ρ⟩ for a test function f ∈ C_b."

  - name: Adjointable
    kind: "trait"
    location: "crates/semiflow-core/src/adjoint_fp.rs"
    doc: |
      v8.0.0 Phase-4 C2 (ADR-0107 AMENDMENT 1, math §38.2/§38.3). Super-trait
      of `ChernoffFunction<F>`: a forward Chernoff function admits an adjoint on
      M(ℝ^D) via the dual-pairing identity ⟨f, S*(t)ρ⟩ := ⟨S(t)f, ρ⟩ (§38.2).

      COMPOSITIONAL: a blanket default impl derives `apply_adjoint_into` from
      the Galkin-Remizov 2025 Theorem 4 form (Lemma A.1 — 4-Dirac pushforward,
      constant-coefficient; structurally identical with x-dependent
      pushforward distances h(x)=2√(a(x)τ), k(x)=2b(x)τ in the
      variable-coefficient case). Per-backend overrides are allowed for
      performance (e.g. closed-form manifold exp_x pushforward), but are NOT
      required for v8.0.0 first ship.
    supertraits:
      - "ChernoffFunction<F>"
    generic_params:
      - name: F
        bound: "SemiflowFloat"
      - name: D
        kind: "const usize"
    methods:
      - name: apply_adjoint_into
        signature: "fn apply_adjoint_into(&self, tau: F, src: &MeasureState<F, D>, dst: &mut MeasureState<F, D>) -> Result<(), SemiflowError>"
        doc: |
          Push-forward one Chernoff step on the measure side (Lemma A.1). Errors
          as values: returns SemiflowError on tau < 0 (same guard as the forward
          kernel's value-component compare).

  - name: AdjointFokkerPlanckChernoff
    location: "crates/semiflow-core/src/adjoint_fp.rs"
    doc: |
      v8.0.0 Phase-4 C2 HEADLINE (ADR-0107 AMENDMENT 1, math §38.9). Adjoint
      Fokker-Planck Chernoff approximation on M(ℝ^D). Generic over the forward
      Chernoff function `C: Adjointable<F, D>`. Per Theorem A.2 (§38.4) the
      adjoint rate is IDENTICAL to the forward Theorem 3 rate modulated by
      ‖ρ‖_TV, so this wrapper is COMPOSITIONAL — ANY forward kernel
      (DiffusionChernoff, Diffusion4thChernoff, manifold/Hörmander backends)
      auto-lifts to its weak-* dual with no per-backend re-derivation. High
      architectural leverage from a 520-LoC sympy proof.

      `order()` INHERITS from the forward kernel (Theorem A.2 identical rate).
      `type S = MeasureState<F, D>`. NOT to be confused with the shipped
      `AdjointChernoff` (§15, ADR-0114): that is the dual semigroup
      exp(τAᵀ) on the SAME L²/C_b function space (backward Cauchy problem);
      §38 is the dual on the MEASURE space M(ℝ^D) — a different object with a
      MeasureState rather than a GridFn.

      Synergy: feeds the F1 differentiable-Chernoff adjoint/gradient story —
      a measure-side adjoint complements the function-side Dual<F> forward-mode
      AD for sensitivity workflows (sensitivity of an observable ⟨f, ρ_T⟩ to
      initial-measure perturbations rides the adjoint flow).
    derive:
      - Clone
    generic_params:
      - name: C
        bound: "Adjointable<F, D>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: forward
        type: C
        visibility: "priv"
        doc: "The forward Chernoff function being dualised."
    implements:
      - "ChernoffFunction<F> (type S = MeasureState<F, D>; order() inherits forward)"
    methods:
      - name: new
        signature: "pub fn new(forward: C) -> Self"
        doc: "Wrap a forward Adjointable Chernoff function into its weak-* dual."


# ---------------------------------------------------------------------------
# 5. v8.2.0 C-9 — Wentzell Boundary Conditions.
# ---------------------------------------------------------------------------
wentzell_traits:
  - name: WentzellRegion
    kind: trait
    module: wentzell
    introduced_in: v8.2.0
    authority: ADR-0151
    doc: |
      Sub-trait of RobinRegion<F> adding time-dependent boundary scaling γ(t) ≥ 0
      (sampled at the left endpoint, Howland §23 freeze) and boundary reaction c ≥ 0.
      Default impl for gamma_at returns the static β from robin_coeffs() (autonomous use).
      Required by DynamicWentzellChernoff.
    shape: |
      pub trait WentzellRegion<F: SemiflowFloat>: RobinRegion<F> {
          fn gamma_at(&self, t: F) -> F;   // default: self.robin_coeffs().1
          fn reaction(&self) -> F;
      }
    bounds:
      - "F: SemiflowFloat"
      - "Self: RobinRegion<F>"

wentzell_structs:
  - name: HalfSpaceWentzell
    kind: struct
    module: wentzell
    introduced_in: v8.2.0
    authority: ADR-0151
    doc: |
      Half-space Wentzell region: wraps HalfSpaceRegion<F, D> with fn(F)->F gamma
      pointer (no captures, ADR-0134 fn-ptr discipline) and scalar c ≥ 0.
      Implements WentzellRegion<F>, RobinRegion<F>, ReflectingRegion<F>.
      Construction validates c ≥ 0, c finite, ‖normal‖₂ = 1.
      robin_coeffs() returns (c, γ(F::zero())) for autonomous fall-back.
    shape: |
      pub struct HalfSpaceWentzell<F: SemiflowFloat = f64, const D: usize = 1> {
          pub half_space: HalfSpaceRegion<F, D>,
          pub gamma: fn(F) -> F,
          pub c: F,
      }
      impl<F: SemiflowFloat, const D: usize> HalfSpaceWentzell<F, D> {
          pub fn new(origin: [F; D], normal: [F; D], gamma: fn(F) -> F, c: F)
              -> Result<Self, SemiflowError>;
      }
    bounds:
      - "F: SemiflowFloat"

  - name: DynamicWentzellChernoff
    kind: struct
    module: wentzell
    introduced_in: v8.2.0
    authority: ADR-0151
    doc: |
      Chernoff wrapper for dynamic Wentzell/Robin BCs via implicit Cayley boundary step.
      Per step: (a) bulk DiffusionChernoff step, then (b) 2×2 Cayley sub-step on the
      near-boundary coupled block C_∂(γ(t), c, a₀, dx). Order = 1 (Lie split commutator
      nonzero; matches static Robin ADR-0098 and Altmann–Verfürth Lie splitting).
      Stability: A-stable (unconditional, ρ(K_CN) ≤ 1; ADR-0146 GO verdict).
      Implements ChernoffFunction<f64> (autonomous via apply_at(0,τ,…)) and
      TimedChernoffFunction<f64> (time-dependent γ(t) via apply_at).
      HowlandLift<DynamicWentzellChernoff<…>> handles the nonautonomous case.
    shape: |
      pub struct DynamicWentzellChernoff<C, R, F = f64>
      where
          C: ChernoffFunction<F, S = GridFn1D<F>>,
          R: WentzellRegion<F>,
          F: SemiflowFloat,
      {
          pub inner: C,
          pub region: R,
      }
      impl<C, R, F> DynamicWentzellChernoff<C, R, F> {
          pub fn new(inner: C, region: R) -> Result<Self, SemiflowError>;
      }
      // Concrete monomorphic impls (f64):
      impl ChernoffFunction<f64>
          for DynamicWentzellChernoff<DiffusionChernoff<f64>, HalfSpaceWentzell<f64,1>, f64>
      { type S = GridFn1D<f64>; order() -> u32 { 1 } }
      impl TimedChernoffFunction<f64>
          for DynamicWentzellChernoff<DiffusionChernoff<f64>, HalfSpaceWentzell<f64,1>, f64>
      { fn apply_at(t, tau, src, dst, scratch) -> Result<(), SemiflowError>; }
    bounds:
      - "C: ChernoffFunction<F, S = GridFn1D<F>>"
      - "R: WentzellRegion<F>"
      - "F: SemiflowFloat"
    order: 1
    stability: "A-stable (Cayley ρ ≤ 1 unconditionally)"
    weak_cfl: "τ ≤ c·h (accuracy requirement for Lie splitting, NOT stability)"
    gates:
      - G_WENTZELL_STABLE
      - G_WENTZELL_ORDER
      - T_WENTZELL




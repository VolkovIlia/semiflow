        signature: |
          pub fn new(
              inner: Diffusion4thChernoff<F>,
              a_kth_bound: Option<F>,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Validates at construction (per math §27.6):
            - inner.order() >= 2 (sanity).
            - inner.in_subspace::<2>(canonical_test_state) returns true.
            - If a_kth_bound is Some(c): c.is_finite() && c >= F::zero().

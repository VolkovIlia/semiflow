# NEW additive (riding on the v3.0 trait family established by ADR-0074;
# no further BREAKING changes within v4.0 itself beyond the v2_compat removal):
#   - `SemiflowComplex<C>` trait (ADR-0079, math §30.2): NEW open-extensibility
#     trait class for complex-arithmetic abstractions paralleling SemiflowFloat<F>.
#     Required associated type: `type Real: SemiflowFloat`. Required methods:
#     `re(self) -> Self::Real`, `im(self) -> Self::Real`, `abs(self) -> Self::Real`,
#     `conj(self) -> Self`, `from_real(r: Self::Real) -> Self`,
#     `from_parts(re, im) -> Self`, `from_polar(r, theta) -> Self`,
#     `exp(self) -> Self`, `sqrt(self) -> Self`. Required core::ops impls:
#     Mul + Add + Sub + Div + Neg (bounded via supertrait
#     `core::ops::{Add, Sub, Mul, Div, Neg, AddAssign, SubAssign, MulAssign,
#     DivAssign}<Output = Self>` + Copy + Send + Sync + 'static). Reference
#     impls shipped at v4.0: `num_complex::Complex<f64>` and
#     `num_complex::Complex<f32>` (the `num-complex` dep promoted from
#     "reserved" to "direct" in v4.0 — total semiflow-core deps becomes 3 / 3
#     cap met). Location: crates/semiflow-core/src/complex.rs (NEW module,
#     ~250 LoC target, default 500-LoC cap, NO Override expansion).
#   - `PointEval<F: SemiflowFloat>` first-class trait (ADR-0080, math §31.2):
#     NEW super-trait of ChernoffFunction<F> promoting the v3.0 STUB
#     `PointEval` trait (which returned `Unsupported` from every method) to a
#     first-class trait with bound-stack iterative pointwise evaluation.
#     Required method:
#       fn eval_at(&self, tau: F, src: &Self::S, x: &[F], n_steps: u32)
#           -> Result<F, SemiflowError>;
#     Algorithm: per math §31.2 Algorithm 31.1 (bound-stack iterative; O(n · q)
#     compute, O(q) storage). NO default impl — backends provide kernel-specific
#     O(n) implementations exploiting the Markov property of the kernel
#     representation K(x, y; τ). v4.0 ships FIVE opt-in PointEval impls:
#       `impl PointEval<F> for DiffusionChernoff<F>`         (Backend A, math §31.2)
#       `impl PointEval<F> for ShiftChernoff1D<F>`           (Backend B)
#       `impl PointEval<F> for ManifoldChernoff<M, F>`       (Backend C)
#       `impl PointEval<F> for HypoellipticChernoff<F, D, M>` (Backend D)
#       `impl PointEval<F> for AnisotropicShiftChernoffND<F, D>` (Backend E)
#     Location: crates/semiflow-core/src/point_eval.rs (NEW module, ~350 LoC
#     target, default 500-LoC cap; the per-backend impls live in this single
#     file — same suckless co-location rationale as ADR-0073 approximation.rs).
#   - `SchrödingerChernoffComplex<C: SemiflowComplex>` struct (ADR-0079, math
#     §30.3): NEW kernel realising the Schrödinger Option B representation per
#     math §30.3 algorithm. SIBLING to the v2.2 real-pair SchrödingerChernoff<F>
#     (ADR-0057 Option A; PRESERVED verbatim through v4.x). Fields:
#     grid: Grid1D<C::Real>; v_fn: Box<dyn Fn(C::Real) -> C::Real>. Constructor
#     takes (grid, v_fn). Implements ChernoffFunction<C::Real> via per-step
#     palindromic Strang + complex Cayley map (math §30.3); type Self::S =
#     GridFn1D<C>; order = 2 (Strang); growth returns Growth { multiplier: 1,
#     omega: 0 } — unitary semigroup. Also opts in to
#     ApproximationSubspace<2, C::Real> (the SEVENTH v3.x opt-in). Location:
#     crates/semiflow-core/src/schrodinger_complex.rs (NEW module, ~400 LoC
#     target, default 500-LoC cap, NO Override expansion).
#   - `AnisotropicShiftChernoffND<F: SemiflowFloat, const D: usize>` struct
#     (ADR-0081, math §32.3): NEW d-dimensional anisotropic shift kernel per
#     Remizov 2025 Vladikavkaz Theorem 3 cousin formula. Fields: a_ij: Box<dyn
#     Fn(&[F; D], &mut SquareMatrix<F, D>)>; b_i: Box<dyn Fn(&[F; D], &mut
#     [F; D])>; c: Box<dyn Fn(&[F; D]) -> F>; grid: GridND<F, D>; quadrature:
#     GaussHermiteTensor<F, D>. Constructor takes (a_ij, b_i, c, grid) +
#     validates SPD a_ij at grid centre + computes Cholesky factors at each
#     grid point. Implements ChernoffFunction<F> + ApproximationSubspace<2, F>
#     (the FIFTH v3.x opt-in after the v3.0 trio + v3.1 HypoellipticChernoff).
#     ALSO opts in to PointEval<F> (Backend E). Gated for D ∈ {2, 3, 4, 5} by
#     G_DDIM; D ≥ 6 compiles but is NOT gated. Location:
#     crates/semiflow-core/src/shift_nd.rs (NEW module, ~600 LoC target — likely
#     above default 500-LoC cap due to per-D closed-form Gaussian-Cholesky
#     specialisations; constitution v1.8.0 Override #1 Cohort 7 carve-out
#     candidate — see constitution amendment below).
#   - `MatrixDiffusionChernoff<F: SemiflowFloat, const M: usize>` struct
#     (ADR-0082, math §33.3): NEW coupled-component matrix-valued kernel.
#     Fields: a_ij_field: Box<dyn Fn(F, &mut SquareMatrix<F, M>)>; b_ij_field
#     (skew-symmetric drift); c_ij_field: Box<dyn Fn(F, &mut SquareMatrix<F,
#     M>)>; grid: Grid1D<F>; c_norm_bound: Option<F>. Constructor takes
#     (a_ij_field, b_ij_field, c_ij_field, grid). Implements ChernoffFunction<F>
#     with Self::S = MatrixGridFn1D<F, M> (NEW state type per math §33.2); order
#     = 2; growth returns Growth bounded by ‖exp(τ·C)‖ ≤ exp(τ·c_norm_bound).
#     ALSO opts in to ApproximationSubspace<2, F> (the SIXTH v3.x opt-in).
#     Gated for M ∈ {1, 2, 3, 4} by G_MATRIX; M = 1 reduces to v0.3.0 scalar

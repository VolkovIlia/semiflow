  - name: Diffusion4thZeta4Chernoff
    location: "crates/semiflow-core/src/diffusion4_zeta4.rs"
    doc: |
      v3.0 (ADR-0075, math §27.6). Order-4 temporal lift of the v0.6.0
      Diffusion4thChernoff<F> via Galkin-Remizov 2025 *IJM* Theorem 3.1 k=2
      tangent correction (math §27.2). The wrapper realises
        F_ζ⁴(τ) f := F(τ) f + τ² · P_2[A] f                      (27.1)
      where `F(τ)` is the v0.6.0 inner Chernoff function (order-2 temporal)
      and `P_2[A]` is the 6-monomial operator polynomial uniquely determined
      by the τ²-leading-order cancellation requirement (math §27.3; closed-form
      shipped as the const-array P_2_MONOMIALS_K6_DIFFUSION).

      **SIBLING** to v0.6.0 Diffusion4thChernoff<F> (NO REPLACEMENT; the v0.6.0
      kernel is preserved verbatim and continues to underwrite the v2.x
      compatibility shim of ADR-0074).

      Generic over `F: SemiflowFloat = f64` per ADR-0025.

      **Caller obligations** (math §27.4):
        - `f ∈ D(A^6)` — verified via `kernel.in_subspace::<6>(f)` (the K=6
          witness from ApproximationSubspace<6, F> opt-in impl below).
        - `a ∈ C^6_b` — caller-asserted via construction field
          `a_kth_bound: Option<F>`. None opts out (hot-loop convenience);
          Some(c) asserts ‖a^(k)‖_∞ ≤ c for k ≤ 6.

      **Composition**: Diffusion4thZeta4Chernoff is composable with the
      v2.6/v2.7/v2.8 wrappers — `LaplaceChernoffResolvent<Diffusion4thZeta4Chernoff<f64>>`
      and `KillingChernoff<Diffusion4thZeta4Chernoff<f64>, BoxRegion<f64, 1>>`
      and `ReflectedHeatChernoff<Diffusion4thZeta4Chernoff<f64>, HalfSpaceRegion<f64, 1>>`
      will all compile (all wrappers are generic over any `ChernoffFunction<F>`).
      The composition with `HowlandLift` (v2.7 ADR-0070) is BLOCKED — the
      time-dependent ζ⁴ is open math (Galkin-Remizov §3.1 covers autonomous
      only). Defer to v3.1+.

      Per-call cost: ~3× v0.6.0 baseline (1 inner.apply_into + 1 jet_6 + 6 axpy).
      No L-gate in v3.0; defer L_ZETA4_PTICK to v3.1+ if HFT use case crystallises.

      NOT exposed in v3 bindings (FFI/PyO3/WASM per ADR-0076 §"Out of scope");
      the K=6 witness ABI is Rust-only in v3.0.

    location: "crates/semiflow-core/src/chernoff.rs"
    doc: |
      v3.0 (ADR-0074, math.md §none [pure surface cleanup]). Typed return for
      `ChernoffFunction<F>::growth`. Fields `multiplier: F` (the M in
      `||F(τ)|| <= M · exp(ω · τ)`) and `omega: F` (the ω). Generic over
      `F: SemiflowFloat = f64` per ADR-0025 (v3.0 fix for the v2.x latent
      Generic-over-F bug — the v2.x tuple was always (f64, f64) regardless
      of F).

      Replaces the v2.x `(f64, f64)` tuple return of `ChernoffFunction::growth`.
      v2.x callers using `.0` / `.1` field access MUST migrate to
      `.multiplier` / `.omega` (no shim possible across the type change —
      documented in docs/migration/v2-to-v3.md §3).
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: multiplier
        type: "F"
        doc: "Norm-bound coefficient M ≥ 1 in ||F(τ)|| <= M · exp(ω · τ)."
      - name: omega
        type: "F"
        doc: "Exponential rate ω in the growth bound. May be negative (contractive)."
    constructors:
      - name: new
        signature: "pub fn new(multiplier: F, omega: F) -> Self"
        semantics: "Idiomatic constructor: `Growth { multiplier, omega }`."
        preconditions: []
        errors: []

  # =========================================================================
  # v3.0 (ADR-0074) — Evolver<C, F> RENAMED from ChernoffSemigroup<C>.
  # The v2.x name is preserved in `mod v2_compat` as a deprecated type alias
  # for 12 months; HARD REMOVED at v4.0.
  # =========================================================================
  - name: Evolver
    location: "crates/semiflow-core/src/chernoff.rs"
    doc: |
      v3.0 (ADR-0074, math.md §none [pure rename]). Iterates a Chernoff function
      `C` exactly `n` times with step `τ = t / n`, producing the Chernoff
      approximant `(F(t/n))^n g` of `exp(tA) g`.

      **RENAMED** from v0.1.0's `ChernoffSemigroup<C>`. The v2.x name is
      mathematically inaccurate (the n-step Chernoff iterate is an APPROXIMANT,
      not itself a semigroup — composition doesn't satisfy the semigroup law);
      the v3.0 `Evolver` name aligns with v2.6 `KillingChernoff<C, R, F>` /
      v2.7 `HowlandLift<C, F>` / v2.7 `LaplaceChernoffResolvent<C, F>` /
      v2.8 `ReflectedHeatChernoff<C, R, F>` / v2.8 `ManifoldChernoff<M, F>` —
      single-noun wrapper parameterised over inner kernel + float.

      v2.x type alias `pub type ChernoffSemigroup<C> = Evolver<C, f64>` lives
      in `mod v2_compat` with `#[deprecated]` for the 12-month transition.
      HARD REMOVED at v4.0.
    derive: []
    generic_params:
      - name: C
        bound: "ChernoffFunction<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: func
        type: "C"
        doc: "The Chernoff function to iterate."
      - name: n
        type: "usize"
        doc: "Number of iterations. Invariant: n >= 1."
      - name: _phantom_f
        type: "core::marker::PhantomData<F>"
        doc: "Phantom marker for F generic parameter (no runtime cost)."
    constructors:
      - name: new
        signature: "pub fn new(func: C, n: usize) -> Result<Self, SemiflowError>"
        semantics: "Returns DomainViolation if n == 0."
        errors:
          - "DomainViolation if n == 0"
    methods:
      - name: evolve
        signature: "pub fn evolve(&self, t: F, f: &C::S) -> Result<C::S, SemiflowError> where C::S: Clone"
        semantics: |
          v3.0 allocating convenience method (where C::S: Clone). Computes
          `(F(t/n))^n f`. τ = t/n. Calls self.func.apply_into(τ, ...) exactly
          n times, threading state forward. For zero-alloc use `evolve_into`
          (v3.0 NEW method below). The Clone bound is per-call (consumer site),
          not on the trait — v2.x callers compile unchanged.
        preconditions:
          - "t is finite and >= 0.0"
          - "f.norm_sup() is finite"
        postconditions:
          - "Single output state with same shape as f"
          - "On t == 0 returns a clone of f"
        errors:
          - "DomainViolation if t < 0 or t is NaN/Inf"
          - "any error returned by self.func.apply_into propagates"

      - name: evolve_into
        signature: |
          pub fn evolve_into(
              &self,
              t: F,
              src: &C::S,
              dst: &mut C::S,
              scratch: &mut ScratchPool<F>,
          ) -> Result<(), SemiflowError>
        semantics: |
          v3.0 NEW zero-alloc method per ADR-0074. Computes `(F(t/n))^n src`
          and writes into pre-allocated `dst`. Calls self.func.apply_into(τ, ...)
          exactly n times with scratch-pool ping-pong (the apply_into ABI per
          ADR-0041). No allocation in the call path; suitable for HFT hot loops.
        preconditions:
          - "t is finite and >= 0.0"
          - "src.norm_sup() is finite"
          - "src and dst have identical structural shape"
        postconditions:
          - "dst contains (F(t/n))^n src"
          - "no allocation in the call path"
        errors:
          - "DomainViolation if t < 0 or t is NaN/Inf"
          - "any error returned by self.func.apply_into propagates"

  # =========================================================================
  # v3.0 (ADR-0073) — ApproximationSubspace<const K: usize, F> super-trait.
  # Opt-in marker super-trait of ChernoffFunction<F>. NO default-bridged impl
  # (unlike v2.7 TimedChernoffFunction); impls MUST explicitly opt in.
  # =========================================================================
  - name: ApproximationSubspace
    shape: trait
    super_trait: "ChernoffFunction<F>"
    location: "crates/semiflow-core/src/approximation.rs"
    doc: |
      v3.0 (ADR-0073, math §26.3). Opt-in marker super-trait of `ChernoffFunction<F>`
      that codifies the order-K Chernoff tangency witness (Galkin-Remizov 2025
      *IJM* Theorem 3.1; math §26.2). The same Chernoff function CAN implement
      `ApproximationSubspace<K, F>` for multiple K values (Example 4.2 multi-K
      co-witness construction); the const-generic `K` on the trait (not on the
      type) gives compile-time order verification + per-K specialisation.

      **Opt-in pattern, NO default-bridged impl** (unlike v2.7 `TimedChernoffFunction<F>`
      which ships a default `apply_at` bridging to `apply_into` — that pattern is
      mathematically honest for autonomous Chernoff functions; the analog for
      ApproximationSubspace would be `default in_subspace(_, _) { false }` which
      is a silent-false-witness footgun). Impls MUST explicitly write the
      `in_subspace` / `jet` bodies. v3.0 ships 3 opt-in impls (see below).

      Generic over (const `K: usize`, `F: SemiflowFloat = f64`) per ADR-0025.

      **Reference impls in v3.0** (math §26.4):
        - `impl<F> ApproximationSubspace<2, F> for DiffusionChernoff<F>`
          (v0.3.0 ζ-A diffusion; in_subspace checks ≥5 grid points; jet via
          5-point central-difference iterations of `∂_x(a(x) ∂_x ·)`).
        - `impl<F> ApproximationSubspace<4, F> for Diffusion4thChernoff<F>`
          (v0.6.0 4th-order; in_subspace checks ≥9 grid points + caller-asserted
          `a_kth_bound: Option<F>` is Some).
        - `impl<F> ApproximationSubspace<6, F> for TruncatedExp4thDiffusionChernoff<F>`
          (v0.6.0 K=4 power-series; the WITNESS for the v3.0 ζ⁴ correction —
          ADR-0075 consumes this at construction time).

      Other v2.x kernels (Strang2D, Magnus6, Schrödinger, ManifoldChernoff, etc.)
      MAY opt in at v3.1+ as concrete use cases emerge. Trait is open-extensibility.

      **NOT a sub/super-trait of TimedChernoffFunction<F>** (v2.7 ADR-0070); the
      two are independent super-traits of ChernoffFunction<F>. A type CAN
      implement both (HowlandLift<C, F> at v3.1+ as the time-axis K-jet is worked out).

      **NOT exposed in v3 bindings** (FFI/PyO3/WASM per ADR-0076); the binding
      ABIs lack const-generic-K support. Rust-only API in v3.0; v3.1+ may add
      hardcoded K=2/4/6 binding exposure.
    sized: true
    object_safe: false
    generic_params:
      - name: K
        kind: "const usize"
        doc: "Order of the approximation subspace (the K in D(A^K))."
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    methods:
      - name: in_subspace
        signature: "fn in_subspace(&self, f: &Self::S) -> bool"
        semantics: |
          v3.0 (ADR-0073, math §26.3). Returns `true` iff `f` lies in the order-K
          approximation subspace 𝒟_K ⊂ D(A^K) (per Galkin-Remizov 2025 Theorem 3.1
          tangency definition; math §26.2). When `true`, the order-K Chernoff
          convergence rate (26.2) is guaranteed on `f` (subject to the kernel's
          own constructions being valid).

          Implementors MUST validate ALL preconditions of (26.1) for their
          specific kernel + state-type pair. Typical validation:
            - f has sufficient grid resolution (≥ stencil width × K)
            - kernel parameters satisfy smoothness requirements (e.g., a ∈ C^K_b
              for variable-coefficient diffusion — caller-asserted via construction
              field like a_kth_bound: Option<F>)

          The convenience helper `assert_in_subspace::<K>(self, f)` wraps the
          bool return into a `Result<(), SemiflowError>` (returns
          `DomainViolation { reason: "f ∉ D(A^K)" }` on false).
        preconditions: []
        postconditions:
          - "true if and only if the order-K convergence guarantee (26.2) holds for f"
          - "if true: subsequent self.jet(f, &mut out) MUST succeed (no DomainViolation)"

      - name: jet
        signature: |
          fn jet(
              &self,
              f: &Self::S,
              out: &mut [Self::S],
          ) -> Result<(), SemiflowError>
        semantics: |
          v3.0 (ADR-0073, math §26.3). K-jet operator: writes
          `[A^0 f, A^1 f, A² f, ..., A^K f]` into `out`. `out` MUST have length
          K + 1; `out[0] = f` (identity); `out[K] = A^K f`. The iteration uses
          the implementor's discrete approximation of the operator A; typical
          impl reuses the kernel's stencil for both `apply_into` and `jet`
          (per-impl specialisation matters for performance — the K-jet is the
          hot path inside the ζ⁴ correction per ADR-0075 §27.4).

          Zero-allocation: writes into pre-allocated `out` slice; the K+1
          buffers are caller-managed (typical: borrow from ScratchPool<F>).
          Allocating callers can use the standalone helper
          `let mut jet = vec![f.zeroed_like(); K+1]; chernoff.jet(f, &mut jet)?;`.
        preconditions:
          - "out.len() == K + 1"
          - "each out[i] has identical structural shape to f"
          - "self.in_subspace(f) returned true (caller pre-checked)"
        postconditions:
          - "out[0] is structurally equal to f (identity)"
          - "out[k] is the discrete A^k f for k ∈ 0..=K"
          - "no allocation in the trait method"
        errors:
          - "DomainViolation if out.len() != K + 1"
          - "DomainViolation if any out[i] structural shape mismatches f"
          - "any error from the implementor's iterated discrete operator"


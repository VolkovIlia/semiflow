# semiflow-core — Trait IDL (v0.1.0 + v0.2.0 additions, see ADR-0006)
# JSON-Schema flavored YAML describing the public Rust trait/struct surface.
# Codegen target: `cargo xtask gen-stubs` (DevOps writes the xtask in Stage 5).
# Authoritative for the Engineer (Stage 6). Implementation MUST conform.
#
# Conventions:
#   - All scalars are f64 (R2 / ADR-0004). No generic `Float`.
#   - All collections are alloc::vec::Vec (R1 / ADR-0003). no_std + alloc.
#   - All fallible operations return `Result<T, SemiflowError>` (errors-as-values).
#   - Functions are <= 50 lines, files <= 500 lines (G10 / suckless).
#   - "shape" describes the Rust language form; "doc" is the docstring Engineer
#     copies into rustdoc verbatim (with KaTeX preserved).
#
# v0.2.0 additions (ADR-0006, operator splitting L = A + B):
#   - struct DiffusionChernoff (5-point order-2 Chernoff for A = a(x)·∂²)
#   - struct DriftReactionChernoff (exact characteristics for B = b(x)·∂ + c(x))
#   - struct StrangSplit<D: ChernoffFunction, R: ChernoffFunction>
#       (Strang composition Φ(τ) = D(τ/2) ∘ R(τ) ∘ D(τ/2))
#   ShiftChernoff1D and the ChernoffFunction trait are UNCHANGED — v0.1.0
#   callers compile unchanged on v0.2.0. All new types are purely additive.
#
# v0.6.1 schema bump (PATCH 0.4.0 → 0.4.1, semantic clarification only):
#   Diffusion4thChernoff::order() and TruncatedExp4thDiffusionChernoff::order()
#   docstrings updated to state explicitly that the returned τ-axis
#   Chernoff consistency order is `2` (matching math.md §11.1.bis); the
#   spatial dx-axis 4th-order accuracy is independent and is verified by
#   the G3⁴ / G3⁴-2D convergence-slope gates in `properties.yaml`, NOT
#   by `order()`. No YAML key shape changes — additive prose only.
#   Cross-ref: `docs/audit-findings-v0_6_0.md` D1.
#
# v0.8.0 Block B schema bump (PATCH 0.5.0 → 0.5.1, cross-reference only):
#   `Strang2D` (canonical home: `semiflow-core.tensor.yaml`, schema
#   bumped 0.7.0 → 0.7.1) gains a `parallel` opt-in feature flag,
#   thread-safety clauses, and a bit-equality contract for the
#   multi-threaded `apply` path. NO public type/trait surface changes
#   in this file — the umbrella version bump is purely informational
#   so consumers reading `traits.yaml` first are pointed at the new
#   tensor.yaml content. Cross-ref: ADR-0018, tensor.yaml Strang2D
#   feature_flags / thread_safety / parallel_correctness blocks,
#   properties.yaml gate STRANG2D_PARALLEL_BIT_EQUAL.


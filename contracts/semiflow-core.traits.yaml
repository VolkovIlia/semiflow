#     matrix exponential (Higham 2008 §10) but is NOT gated. Location:
#     crates/semiflow-core/src/matrix_system.rs (NEW module, ~450 LoC target,
#     default 500-LoC cap, NO Override expansion).
#   - `MatrixGridFn1D<F: SemiflowFloat, const M: usize>` struct (ADR-0082, math
#     §33.2): NEW state type for matrix-valued coupled-component grid functions.

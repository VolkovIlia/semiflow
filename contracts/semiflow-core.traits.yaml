# ---------------------------------------------------------------------------
# 3b. v0.2.0 operator-splitting types (ADR-0006).
#     Decomposition: L f = A f + B f
#       A f = a(x) f''(x)            (diffusion)
#       B f = b(x) f'(x) + c(x) f(x) (drift + reaction)
#     Strang composition: Φ(τ) = D(τ/2) ∘ R(τ) ∘ D(τ/2).
# ---------------------------------------------------------------------------
  - name: DiffusionChernoff
    shape: struct
    doc: |
      Chernoff function for the pure-diffusion operator `A f = a(x) f''(x)`.

      v0.3.0 (ADR-0008, option ζ — API BREAK; supersedes the rejected
      Amendment 6 formula α and the also-superseded Amendment 6.1 formula β):
      **inner-Strang divergence-form + explicit τ²-correction** formula.
      The struct now carries THREE caller-supplied closures
      `(a, a_prime, a_double_prime)`. The formula is **ζ-A**:

        D_ζ(τ) f(x) := D_γ(τ) f(x) + correction(τ; x, f)

      where γ-A baseline (preserved from §9.2.3.A):

        D_γ(τ)      := S(τ/2) ∘ K(τ; a) ∘ S(τ/2)
        S(s) g(x)   := g(x + s · a'(x))             // pure-drift exponential
        K(τ; a) g(x) := w₀·g(x)
                     + w₁·[g(x + h₀) + g(x − h₀)]
                     + w₂·[g(x + H₀) + g(x − H₀)]
        h₀(x)       := 2·sqrt(a(x)·τ)
        H₀(x)       := 2·sqrt(3·a(x)·τ)
        w₀ = 7/12, w₁ = 3/16, w₂ = 1/48              // unchanged from v0.2.0

      and ζ-A τ²-correction (NEW in v0.3.0):

        correction(τ; x, f) := τ² · [ a(x)·a'(x)·f'''(x)
                                    + (a(x)·a''(x)/2)·f''(x)
                                    + (a'(x)·a''(x)/4)·f'(x) ]

      Numerical f', f'', f''' computed via 5-point central FD on
      `f.sample(x ± Δ)` and `f.sample(x ± 2Δ)` with stencil step
      `Δ = max(2·dx, √τ)` (super-grid for floating-point cancellation
      control, sub-√τ for τ-residual control; see math.md §9.2.3.B).

      **Mathematical interpretation** (math.md §9.1.1 / §9.2.3): D(τ)
      is the Chernoff function for the **divergence-form self-adjoint
      generator** `A_self f := ∂_x(a(x)·∂_x f) = a·f'' + a'·f'`. The
      residual drift `−a'·∂` is absorbed into `R` via caller-composed
      `b_total := b − a'`. Strang composition `Φ(τ) = D(τ/2) ∘ R(τ) ∘ D(τ/2)`
      then targets the full `L = a·∂² + b·∂ + c`.

      **Sympy verification** (`.dev-docs/verification/scripts/verify_v0_3_0_zeta.py`,
      reproducible, exit 0 on success — ALL FOUR GATES):
        - **Z_τ⁰** identity at τ=0: `D_ζ(0)f|0 = f₀` ✓ (deficit zero exact).
        - **Z_τ¹** Chernoff consistency: `D_ζ'(0) f = a₀·f₂ + a₁·f₁ = A_self f`
          algebraically zero deficit. ✓ NORMATIVE.
        - **Z_τ²** mathematical τ²-deficit cancellation (NEW, NORMATIVE):
          the full τ² coefficient of `D_ζ(τ)f − e^{τ A_self}f` is
          **identically zero** in the polynomial ring of
          (f₀,…,f₆, a₀,…,a₃) — algebraic statement only; implementation
          global rate for variable `a` stays at O(τ¹) per Amendment 2
          (FD ceiling on `f',f'',f'''`). ✓
        - **Z_const-a** constant-`a` regression: when `a' ≡ 0 ∧ a'' ≡ 0`,
          correction is identically zero AND `S(s) = id`, so
          `D_ζ = K = D_v022` exactly (algebraic identity). Bit-equal
          to v0.2.2 for `α = 0.5` production gates G1-G4. ✓ NORMATIVE.

      **Order claim** (revised — Amendment 2, 2026-04-30, honest):
        - **Constant** `a`: LOCAL O(τ³) exact / GLOBAL O(τ²) via Strang
          (bit-equal v0.2.2 — correction polynomial vanishes identically,
          γ-A reduces to v0.2.2 K-only; sympy gate Z_const-a + γ=0 sub-test
          empirical slope -2).
        - **Variable** `a ∈ C³(ℝ)`:
            * Mathematical:    local O(τ³) (sympy gates Z_τ⁰/Z_τ¹/Z_τ²
                               all pass; analytic-sample sub-test gives
                               clean per-τ-halving ratio of 8 = cubic).
            * Implementation:  global O(τ¹) — FD discretization ceiling.
                               Cubic-spline `f.sample()` at off-grid
                               positions plus 5-point central FD for
                               `f', f'', f'''` with stencil step
                               `Δ = max(2·dx, √τ)` produces per-step
                               sup-norm error of `O(τ²)`, accumulating
                               over `n = T/τ` steps to global `O(τ¹)`
                               (same rate as v0.2.2 for variable
                               coefficients). Verified empirically with
                               γ=0.1 Liouville oracle (slope ≈ -1).
        - **Variable a, b, c (full PDE)**: mathematical local O(τ²)
          (limited by R); implementation global O(τ¹) (limited by D
          variable-a FD ceiling).

      **v0.3.0 vs. v0.2.2 in the variable-`a` regime**: ζ-A converges
      to the **correct** semigroup `e^{TL}f` (the divergence-form
      `A_self` is well-defined for variable `a` and the residual drift
      is correctly absorbed into R), where v0.2.2 (central-only `a` with
      no a' input) silently degraded to an undefined limit operator.
      The asymptotic global rate for variable `a` is unchanged from
      v0.2.2 (both `O(τ¹)`); ζ-A's win is the **correct generator**,
      a **~1000× tighter constant** in the per-step error envelope
      (factor-10⁻³ reduction at production grids), and a
      **forward-compatible 5-arg API** that v0.4.0 TruncatedExp (option ε)
      reuses verbatim to break the FD ceiling and deliver TRUE global
      `O(τ²)` for variable `a`. See ADR-0008 Amendment 2 + math.md
      §9.2.3.B "Order claim (revised, honest)" for the full
      reconciliation and the H1 (FD discretization noise) verdict.

      **API change vs. v0.2.2** (BREAKING):
        - struct: 3 fields → 5 fields (adds `a_prime`, `a_double_prime`).
        - `new`: 3 args → 5 args.
        - Caller MUST pre-compose `b_total = b − a'` before constructing
          `DriftReactionChernoff` for the Strang composition (no
          `with_a_prime_compensation` helper in v0.3.0; deferred to v0.4.0+
          when heap-allocated closures become available under `alloc`).
        - Migration for constant-`a` callers: insert `|_| 0.0_f64` as
          BOTH the second AND the third argument. Bit-equal output
          guaranteed (Z_const-a).

      `a`, `a_prime`, and `a_double_prime` are caller-provided closures
      stored as `fn` pointers (no_std-friendly; no Box<dyn Fn>). Caller
      MUST guarantee `a(x) ≥ a_0 > 0` pointwise (Theorem 6 hypothesis)
      and `a_prime(x)`, `a_double_prime(x)` finite. The properties
      `diffusion_chernoff_a_prime_consistency` (50 cases, 1% tolerance)
      and `diffusion_chernoff_a_double_prime_consistency` (50 cases,
      1% tolerance) softly verify caller-correctness — they are
      caller-correctness checks, NOT runtime contracts.
      `a ∈ C³(ℝ)` with bounded derivatives through order 4 is required
      for ζ-A's O(τ³) local consistency.

      `Clone + Copy` are implementable: struct contains only three `fn`
      pointers + f64 + Grid1D (Grid1D itself has Clone + Copy via its
      primitive fields; no heap, no allocation per step).

      ## Invariants (Engineer MUST preserve in v0.3.0 implementation)

      - **I1 (totality)**: `apply(τ, &f)` returns `Ok(_)` for any
        `τ ∈ [0, ∞)` finite, `f ∈ GridFn1D` finite, any `a` callable
        satisfying the strict-ellipticity precondition, and any
        `a_prime`, `a_double_prime` callables returning finite values.
        ζ-A introduces 6 `(self.a_prime)(·)` evaluations per node
        (5 in γ-A baseline + 1 at `x` for the τ²-correction polynomial),
        2 `(self.a)(·)` evaluations (1 at `x_pre`, 1 at `x` for the
        correction), 1 `(self.a_double_prime)(x)` evaluation, 3
        `libm::sqrt` calls (h₀, H₀, AND `√τ` for the stencil step
        `Δ = max(2·dx, √τ)`), and 5+4 `f.sample` calls (5 γ-A K-arms +
        4 ζ stencil arms at `x ± Δ`, `x ± 2Δ`). The strict-ellipticity
        precondition `a(x_pre) > 0` extends from grid nodes to the
        post-S(τ/2) shifted position by Theorem 6 hypothesis (`a ∈ C³`
        is bounded away from zero on the working grid). v0.2.0/v0.2.1/
        v0.2.2 error variants are unchanged: `DomainViolation` for
        `τ < 0`, non-finite `τ`, or `a(x_pre) ≤ 0`; `f.sample()`
        propagation for non-finite shifted positions; `Unsupported`
        propagated only from `f.sample()` under `InterpKind::Linear`
        without the `linear-interp` feature flag.

      - **I2 (variable-coefficient generator consistency, global O(τ¹)
        implementation rate — Amendment 2, honest)**: for `a ∈ C³(ℝ)`
        strictly elliptic, the iterated approximant `(D_ζ(T/n))^n f`
        converges to the **correct** divergence-form semigroup
        `e^{T·A_self}f` as `n → ∞`, with global error rate `O(τ¹)` in
        `τ = T/n` (FD discretization ceiling — see math.md §9.2.3.B
        + ADR-0008 Amendment 2). Mathematical local order is `O(τ³)`
        (sympy gate **Z_τ²** zero deficit, NORMATIVE), but the cubic
        spline `f.sample()` at off-grid positions plus 5-point central
        FD for `f', f'', f'''` introduce a per-step `O(τ²)` error that
        accumulates to global `O(τ¹)` over `n` steps. Property
        `diffusion_chernoff_variable_zeta_liouville_oracle` (renamed
        from the γ-A `*_gamma_liouville_oracle`, properties.yaml)
        verifies BOTH (i) generator correctness AND (ii) the GLOBAL
        O(τ¹) implementation rate, by comparison against the
        manufactured closed-form solution for `a(x) = (1+γx)²`
        (Liouville transform to constant-potential heat in
        `y = ln(1+γx)/γ`). Expected log-log slope ≤ -0.95 over the
        5-point τ-sweep `n ∈ {32, 64, 128, 256, 512}` (relaxed from
        the original ≤ -1.95 spec per Amendment 2; the original gate
        is mathematically correct for the formula but numerically
        unreachable with cubic-spline + FD). The single-operator γ=0
        sub-test (constant a, where the correction polynomial vanishes)
        empirically confirms slope -2, definitively proving the
        obstruction is FD-noise (H1) not theoretical. v0.2.2
        central-only would give a non-decreasing slope (generator
        mismatch). True global O(τ²) for variable a is deferred to
        v0.4.0 TruncatedExp integrator.

      - **I3 (constant-coefficient regression-safety)**: for **constant**
        `a(x) ≡ a_0` (i.e., `a_prime ≡ 0` AND `a_double_prime ≡ 0`),
        `apply(τ, &f)` MUST return values bit-equal to within ≤ 4 ULPs
        of the v0.2.2 formula. Sympy-proven (gate Z_const-a,
        `verify_v0_3_0_zeta.py`): when `a_prime ≡ 0 ∧ a_double_prime ≡ 0`,
          (i) the τ²-correction `a·a'·f''' + ½·a·a''·f'' + ¼·a'·a''·f'`
              is identically zero (`a' = 0` zeros all three terms);
          (ii) the inner-Strang `S(s)` factor reduces to identity
              (`g(x + s·0) = g(x)`), so `D_γ = K(τ; a₀)` which IS the
              v0.2.2 5-point central-`a` formula.
        Therefore `D_ζ = D_γ = K = D_v022` ALGEBRAICALLY EXACT
        (`D_ζ − D_v022 = 0` in the polynomial ring of `f₀, …, f₆, a₀, …`).
        Tolerance `1e-13` over 1000 random `(τ ∈ [0, 1], a_0 ∈ [0.01, 5.0])`
        pairs is the empirical guard (≈ 10⁴ ULP envelope; absorbs any
        reasonable rearrangement the optimizer introduces, detects sign
        errors and missing factors). Property
        `diffusion_chernoff_constant_fast_path_exact` enforces this.
        **Engineer MAY NOT** add an explicit `if a_prime is zero` or
        `if a_double_prime is zero` branch — the optimizer constant-folds
        the S(s) operations AND the entire correction polynomial when
        the closures are the literal `|_| 0.0_f64`. **Engineer MUST NOT**
        use a function-pointer-equality fast path unless it is bit-equal
        AND simplifies the code; the contract requires *numerical*
        equality regardless of code path. Performance regression target:
        ±2% per-step latency vs. v0.2.2 for the constant-`α=0.5`
        production gate (G1, G2, G3-strang, G4-strang); the optimizer
        should fully eliminate the four extra `f.sample` calls in the
        correction stencil when `a' ≡ a'' ≡ 0`. For variable `a`,
        target ±50% per-step latency vs. v0.2.2 (per ADR-0008 Amendment 1
        budget — the +4 `f.sample` calls dominate; mitigated by O(√n)
        fewer steps at fixed accuracy in the constant-`a` regime; for
        variable `a` the per-step error is ~1000× tighter at equal step
        count thanks to the correct generator (Amendment 2)).

      - **I4 (a_prime caller-correctness, soft check)**: `a_prime(x)`
        is the caller-supplied analytic derivative of `a(x)`. The
        contract does NOT enforce numerical correctness at runtime
        (no derivative is taken on the implementation side; doing so
        would defeat the API design). Property
        `diffusion_chernoff_a_prime_consistency` (50 cases, 1%
        tolerance over `‖a_prime(x) − (a(x+h) − a(x−h))/(2h)‖_∞ /
        max(‖a_prime‖_∞, ε)`) provides a SOFT CHECK during property
        testing only. Production callers are responsible for supplying
        the correct analytic derivative; failure to do so produces
        a generator other than `A_self` and the v0.3.0 contract is
        violated silently.

      - **I5 (a_double_prime caller-correctness, soft check)** — NEW
        in v0.3.0 ζ-A: `a_double_prime(x)` is the caller-supplied
        analytic SECOND derivative of `a(x)`. The contract does NOT
        enforce numerical correctness at runtime. Property
        `diffusion_chernoff_a_double_prime_consistency` (50 cases, 1%
        tolerance over `‖a_double_prime(x) − (a(x+h) − 2·a(x) + a(x−h))/h²‖_∞ /
        max(‖a_double_prime‖_∞, ε)`) provides a SOFT CHECK against the
        2nd-order central FD numerical second derivative (`h = 1e-4`
        balances truncation error `O(h²·a^(4))` ≈ 1e-8 against
        cancellation noise `O(ε/h²)` ≈ 4e-12). Production callers are
        responsible for supplying the correct analytic second derivative;
        failure to do so degrades the τ²-correction quality (mathematical
        lift; implementation global rate for variable `a` stays at O(τ¹)
        per Amendment 2), but does NOT change the generator (the
        γ-A baseline remains correct). Common caller errors:
        (i) using the FIRST derivative as a copy-paste mistake;
        (ii) sign error in the second-derivative chain rule (e.g., for
        `a(x) = sin(γx)²`, `a''(x) = 2γ²·cos(2γx)`, easy to write
        incorrectly); (iii) forgetting to scale by γ² when `a` is a
        function of `γ·x`. Architect remediation: cross-check against
        `sympy.diff(a, x, x)` for the analytic reference value.
    fields:
      - name: a
        type: "fn(f64) -> f64"
        doc: "Diffusion coefficient a(x). Caller MUST guarantee inf a(x) > 0."
      - name: a_prime
        type: "fn(f64) -> f64"
        doc: |
          v0.3.0 (ADR-0008): caller-supplied analytic derivative `a'(x)`
          of the diffusion coefficient. For constant `a`, pass
          `|_| 0.0_f64` — the inner-Strang `S(s)` factor collapses to
          identity, and `D` reduces to v0.2.2 5-point bit-equal.
          For variable `a`, caller MUST supply the exact analytic
          derivative; numerical correctness is caller responsibility
          (property `diffusion_chernoff_a_prime_consistency` in
          properties.yaml provides a soft 50-case check that
          `a_prime(x)` matches `(a(x+h)-a(x-h))/(2h)` within 1%).
          Caller-supplied `a_prime` enables the divergence-form
          decomposition `A = ∂(a∂) - a'·∂` (math.md §9.1.1).
      - name: a_double_prime
        type: "fn(f64) -> f64"
        doc: |
          v0.3.0 (ADR-0008 Amendment 1, option ζ): caller-supplied
          analytic SECOND derivative `a''(x)` of the diffusion
          coefficient. For constant `a`, pass `|_| 0.0_f64` — combined
          with `a_prime ≡ |_| 0.0_f64` this zeros the entire τ²-
          correction polynomial `a·a'·f''' + ½·a·a''·f'' + ¼·a'·a''·f'`
          identically (sympy gate Z_const-a). For variable `a`, caller
          MUST supply the exact analytic second derivative; numerical
          correctness is caller responsibility (property
          `diffusion_chernoff_a_double_prime_consistency` in
          properties.yaml provides a soft 50-case check that
          `a_double_prime(x)` matches `(a(x+h) − 2·a(x) + a(x−h))/h²`
          within 1%). Caller-supplied `a_double_prime` enables the
          ζ-A τ²-correction polynomial that lifts variable-`a`
          DiffusionChernoff to mathematical local-O(τ³) (implementation
          global rate stays at O(τ¹) per Amendment 2; FD discretization
          ceiling — see ADR-0008 Amendment 2) (math.md §9.2.3.B; sympy
          gate Z_τ², NORMATIVE).
          Liouville oracle reference: for `a(x) = (1+γx)²`,
          `a_double_prime(x) = 2γ²` (constant).
      - name: a_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for ‖a‖_∞. Not used internally by `apply`;
          exposed for downstream diagnostics. Pass `f64::INFINITY` if unknown.
      - name: grid
        type: Grid1D
        doc: "Reference grid geometry (used to iterate nodes and create output)."
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = 2, growth = (1, 0))"
    methods:
      - name: new
        signature: "fn new(a: fn(f64) -> f64, a_prime: fn(f64) -> f64, a_double_prime: fn(f64) -> f64, a_norm_bound: f64, grid: Grid1D) -> Self"
        semantics: |
          v0.3.0 constructor (ζ-A, ADR-0008 Amendment 1). FIVE
          positional arguments:
            (1) a              — diffusion coefficient (closure)
            (2) a_prime        — analytic first derivative (closure)
            (3) a_double_prime — analytic second derivative (closure) [NEW in ζ]
            (4) a_norm_bound   — sup-norm upper bound for ‖a‖_∞ (f64)
            (5) grid           — reference grid geometry (Grid1D)

          No validation of closures (compiler ensures `fn` type;
          caller-correctness for `a_prime` and `a_double_prime` is
          checked at test-time by properties
          `diffusion_chernoff_a_prime_consistency` and
          `diffusion_chernoff_a_double_prime_consistency`).

          Migration from v0.2.2: insert `|_| 0.0_f64` as BOTH the
          second AND third positional argument for constant-`a` callers;
          supply analytic first AND second derivatives for variable-`a`
          callers (see ADR-0008 §"Migration guide (v0.2.x → v0.3.0)"
          and ADR-0008 Amendment 1 §"Migration").

      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          v0.3.0 ζ-A formula = γ-A inner-Strang baseline + explicit τ²-
          correction polynomial:
            D_ζ(τ) f(x) = D_γ(τ) f(x)
                        + τ²·[ a(x)·a'(x)·f'''(x)
                             + (a(x)·a''(x)/2)·f''(x)
                             + (a'(x)·a''(x)/4)·f'(x) ]

          where γ-A baseline is:
            D_γ(τ) = S(τ/2) ∘ K(τ; a) ∘ S(τ/2)
            S(s) g(x)   = g(x + s · a'(x))     // pure-drift exponential
            K(τ; a) g(x) = w₀·g(x)
                         + w₁·[g(x+h₀) + g(x-h₀)]
                         + w₂·[g(x+H₀) + g(x-H₀)]
            h₀(x) = 2·sqrt(a(x)·τ),  H₀(x) = 2·sqrt(3·a(x)·τ)
            w₀ = 7/12, w₁ = 3/16, w₂ = 1/48      // unchanged from v0.2.0

          and f', f'', f''' in the τ²-correction are computed via
          5-point central FD with stencil step
          Δ = max(2·dx, √τ) (math.md §9.2.3.B "Δ choice").

          Pointwise computation per grid node `x = self.grid.x_at(i)`:

            // ===== γ-A baseline (preserved from γ-A v5) =====
            // S(τ/2) outer-right shift: where K should be evaluated.
            let s_half      = 0.5 * tau;
            let dx_pre      = s_half * (self.a_prime)(x);
            let x_pre       = x + dx_pre;

            // K-factor centred at x_pre uses a(x_pre):
            let a_at_pre    = (self.a)(x_pre);
            validate_a_x(a_at_pre, x_pre)?;            // strict ellipticity

            let h0          = 2.0 * libm::sqrt(a_at_pre * tau);
            let H0          = 2.0 * libm::sqrt(3.0 * a_at_pre * tau);

            // S(τ/2) inner shift on each of the 5 K-arm evaluation points:
            let center_pos  = x_pre + s_half * (self.a_prime)(x_pre);
            let near_p_raw  = x_pre + h0;
            let near_p_pos  = near_p_raw + s_half * (self.a_prime)(near_p_raw);
            let near_n_raw  = x_pre - h0;
            let near_n_pos  = near_n_raw + s_half * (self.a_prime)(near_n_raw);
            let far_p_raw   = x_pre + H0;
            let far_p_pos   = far_p_raw  + s_half * (self.a_prime)(far_p_raw);
            let far_n_raw   = x_pre - H0;
            let far_n_pos   = far_n_raw  + s_half * (self.a_prime)(far_n_raw);

            // 5-point formula — weights UNCHANGED (W0=7/12, W1=3/16, W2=1/48):
            let center      = W0 * f.sample(center_pos)?;
            let near        = W1 * (f.sample(near_p_pos)? + f.sample(near_n_pos)?);
            let far         = W2 * (f.sample(far_p_pos)?  + f.sample(far_n_pos)?);
            let baseline    = center + near + far;     // γ-A result

            // ===== ζ-A τ²-correction (NEW in v0.3.0) =====
            let a_x         = (self.a)(x);
            let ap_x        = (self.a_prime)(x);
            let app_x       = (self.a_double_prime)(x);
            // Δ = max(2·dx, √τ): super-grid for cancellation control,
            // sub-√τ for τ-residual control. See math.md §9.2.3.B.
            let dx_grid     = self.grid.dx();
            let delta       = libm::sqrt(tau).max(2.0 * dx_grid);

            // 5-point central FD stencil:
            let f0          = f.sample(x)?;
            let fph         = f.sample(x + delta)?;        // f(x + Δ)
            let fmh         = f.sample(x - delta)?;        // f(x − Δ)
            let fp2         = f.sample(x + 2.0 * delta)?;  // f(x + 2Δ)
            let fm2         = f.sample(x - 2.0 * delta)?;  // f(x − 2Δ)

            // Numerical derivatives, all O(Δ²) accurate:
            let f1          = (fph - fmh) / (2.0 * delta);                                        // f'(x)
            let f2          = (fph - 2.0 * f0 + fmh) / (delta * delta);                            // f''(x)
            let f3          = (fp2 - 2.0 * fph + 2.0 * fmh - fm2) / (2.0 * delta * delta * delta); // f'''(x)

            // Pointwise correction polynomial (mathematical local-O(τ³)
            // contribution; in this implementation the FD on f',f'',f'''
            // introduces a per-step O(τ²) ceiling that limits the global
            // rate for variable a to O(τ¹) — see ADR-0008 Amendment 2):
            let correction  = tau * tau
                            * ( a_x  * ap_x  * f3
                              + (a_x  * app_x / 2.0) * f2
                              + (ap_x * app_x / 4.0) * f1 );

            result.values[i] = baseline + correction;

          Sub-grid sampling at the (5 γ-A K-arms + 4 ζ-stencil arms +
          1 centre) shifted points uses f.sample() (BoundaryPolicy +
          InterpKind dispatch). Pure function; no &mut.

          Suckless: ≤ 50 lines for `apply_at_node` (right at the cap;
          two-stage shape: γ-A baseline THEN ζ correction). Total for
          `diffusion.rs` ≤ 250 lines (≤ 30 LOC for ζ correction over
          γ-A's ≤ 220, well under 500-line file cap).

          Engineer notes (CRITICAL — ζ-A structure):
            - **γ-A baseline FIRST, ζ correction SECOND**. The two stages
              are additive: `result = baseline + correction`. Engineer MUST
              compute `baseline` exactly as in γ-A v5 (preserve the inner-
              Strang structure unchanged) and ADD the correction. Engineer
              MUST NOT fold the correction into K-factor weights or
              S-shifts — that would violate the algebraic separation
              proven by sympy gate Z_τ².
            - **The S-factor is exact pure-drift exponential**:
              S(s) g(x) = g(x + s·a'(x)). NOT a stencil — a single
              shifted lookup. (Same as γ-A.)
            - **The ζ-correction stencil step is `Δ = max(2·dx, √τ)`**.
              The floor `2·dx` prevents catastrophic floating-point
              cancellation in `(fph − fmh) / (2·Δ)` when `√τ` becomes
              sub-grid. The `√τ` upper bound keeps the τ-residual at
              `τ²·O(Δ²) = O(τ³)`. Algebraic justification: math.md §9.2.3.B.
            - **All ζ-stencil samples MUST go through `f.sample()`** —
              NEVER access `f.values[i ± k]` directly. The `BoundaryPolicy`
              dispatch (Reflect / ZeroExtend / Periodic / LinearExtrapolate)
              is the established total interface for sub-grid lookups
              (Grid1D invariants I1-I5, math.md §3.5). Direct array
              indexing would silently break boundary handling for nodes
              within `2·Δ` of the edge.
            - **Constant-`a` fast path is implicit**: when
              `a_prime ≡ |_| 0.0` AND `a_double_prime ≡ |_| 0.0`, the
              optimizer constant-folds:
                (i)  `ap_x = 0` ⇒ correction third term `(0/4)·app_x·f1 = 0`;
                (ii) `app_x = 0` ⇒ correction second term `(a_x·0/2)·f2 = 0`;
                (iii) `ap_x = 0` AND `a_x*ap_x = 0` ⇒ first term
                      `0·f3 = 0`;
                (iv) the entire `correction = τ²·0 = 0`, AND all four
                     extra `f.sample(x ± Δ)`, `f.sample(x ± 2Δ)` calls
                     become dead code (results are unused after constant-
                     folding the correction polynomial to 0).
              NO explicit `if a_prime is zero` or `if a_double_prime is
              zero` branch should be added — it pessimizes the variable-a
              path and the constant-folding is handled by LLVM. Verify
              via `cargo bench --bench heat_1d` (target ±2% vs v0.2.2 for
              constant α=0.5; ±50% for variable a per ADR-0008 Amendment 1
              perf budget).
            - Use libm::sqrt (no_std) — NOT f64::sqrt (std-only). The
              ζ-correction uses ONE additional `libm::sqrt(tau)` call
              for the stencil step `Δ` (in addition to γ-A's two
              sqrt calls for `h₀` and `H₀`).
            - **`validate_a_x` is called ONCE on `a_at_pre`** (strict-
              ellipticity at the K-factor evaluation point). The
              ζ-correction's `a_x = (self.a)(x)` evaluation is NOT
              validated — it does not multiply f.sample directly (only
              appears in the correction polynomial multiplied by `τ²`),
              so a non-finite `a(x)` propagates harmlessly through the
              `result.values[i] = baseline + correction` arithmetic
              into `result` and surfaces in downstream `f.norm_sup`
              checks. Caller responsibility: `a` returns finite values
              everywhere on the working grid.
            - **The order claim is mathematical local O(τ³) and
              implementation global O(τ¹) for variable `a`**
              (Amendment 2, honest). Per math.md §9.2.3.B / ADR-0008
              Amendment 2 the sympy-proven gate Z_τ² (NORMATIVE) kills
              the γ-A τ²-deficit exactly in operator algebra, but the
              5-point FD on `f',f'',f'''` introduces a per-step O(τ²)
              ceiling that accumulates to global O(τ¹). True global
              O(τ²) for variable a deferred to v0.4.0 TruncatedExp (option ε).
              ζ-A is the architecturally rigorous fix delivering the
              correct generator, ~1000× tighter constant, and
              forward-compatible 5-arg API.
            - **DO NOT** regress to v0.2.2's central-only `(self.a)(x_i)`
              evaluation in the K-factor (that silently degrades).
              v0.3.0 evaluates `a` at `x_pre = x_i + (τ/2)·a'(x_i)` —
              the K-factor is centred at the post-S(τ/2) position.
            - **DO NOT** add explicit branches for `a_prime ≡ 0` or
              `a_double_prime ≡ 0`. The v0.2.2 fast-path is recovered
              automatically by the optimizer via constant-folding.
            - **DO NOT** use a different stencil step `Δ`. The choice
              `Δ = max(2·dx, √τ)` is the unique min-residual point
              proven in math.md §9.2.3.B; deviations either lose
              τ-residual control (Δ > √τ) or trigger catastrophic
              cancellation (Δ < 2·dx).
        preconditions:
          - "tau is finite and >= 0.0"
          - "f.norm_sup() is finite"
          - "a(x_pre) > 0 (extends strict ellipticity to the post-S(τ/2) position)"
          - "a_prime(x), a_prime(x_pre), a_prime(near_p_raw), a_prime(near_n_raw), a_prime(far_p_raw), a_prime(far_n_raw) are finite (caller responsibility)"
          - "a_double_prime(x) is finite (caller responsibility; required for the τ²-correction polynomial)"
          - "f.sample(x ± Δ), f.sample(x ± 2Δ) are finite where Δ = max(2·dx, √τ) (boundary-policy total)"
        postconditions:
          - "result has same structural shape as f"
          - "tau == 0.0 implies result == f bit-exactly (s_half = 0, dx_pre = 0, x_pre = x, h0 = H0 = 0, all five γ-A sample points collapse to x, weights sum to 1; correction = 0² · (...) = 0)"
          - "a_prime ≡ |_| 0.0 ∧ a_double_prime ≡ |_| 0.0 implies result == v0.2.2-output bit-equal (algebraically: S(s) = id, D_γ = K = D_v022; correction polynomial identically zero in all three terms)"
        errors:
          - "DomainViolation if tau < 0 or tau is NaN/Inf"
          - "DomainViolation if f contains NaN/Inf"
          - "DomainViolation if a(x_pre) <= 0 (post-S(τ/2) strict ellipticity)"
          - "DomainViolation if any γ-A f.sample argument is NaN/Inf (caller-supplied a_prime returned non-finite)"
          - "DomainViolation if any ζ-stencil f.sample argument is NaN/Inf (Δ = max(2·dx, √τ); should not happen for finite τ)"
          - "Unsupported propagated from f.sample() under InterpKind::Linear without `linear-interp` feature flag"

      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          Returns 2. v0.3.0 (ADR-0008 Amendment 1, ζ-A): the reported
          `order = 2` is the **mathematical** local order for both
          constant and variable `a`. Three regimes (Amendment 2, honest):
            - **Constant `a`** (`a' ≡ 0 ∧ a'' ≡ 0`): local-O(τ³) /
              global-O(τ²) Strang composition (bit-equal to v0.2.2
              5-point baseline; sympy gate Z_const-a NORMATIVE).
            - **Variable `a ∈ C³(ℝ)`, mathematical**: local-O(τ³)
              (sympy gate Z_τ², NORMATIVE) — the τ²-correction
              polynomial cancels the γ-A baseline's τ²-deficit
              identically.
            - **Variable `a ∈ C³(ℝ)`, implementation**: global-O(τ¹) —
              the implementation uses cubic-spline `f.sample()` +
              5-point central-FD for `f', f'', f'''` with stencil step
              `Δ = max(2·dx, √τ)`, introducing a per-step O(τ²) error
              that accumulates to global O(τ¹) over n steps. See
              ADR-0008 Amendment 2 /
              `.dev-docs/reports/ZETA_EMPIRICAL_INVESTIGATION.md` for
              full diagnosis.

          v0.4.0+ TruncatedExp integrator (option ε) lifts variable-`a` to
          global-O(τ²) (matches the mathematical formula by avoiding
          FD on `f`-derivatives). Higher orders (e.g., v0.6.0+
          `a'''(x)` input combined with Magnus) are forward-looking
          research directions, not currently scoped.

          (Architectural note: `order` is a coarse single-integer field
          that cannot express the local-vs-global distinction. v0.5+
          may introduce a richer `OrderRegime` enum exposing
          `{LocalOrder: 3, GlobalOrder: 2, Generator: AselfDivForm}`
          if downstream consumers need to dispatch on it. For v0.3.0,
          consumers SHOULD treat this field as "Strang composition global
          order" and rely on the property
          `diffusion_chernoff_variable_zeta_liouville_oracle` for
          empirical verification.)

      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns `(1.0, 0.0)`. Weights `(7/12, 3/16, 1/48)` are non-negative
          and sum to 1 ⇒ ‖D(τ)‖∞ ≤ 1 (positivity-preserving sub-Markov
          kernel). The midpoint-`a` lift does NOT change the weights and
          therefore does NOT change the growth bound.

  - name: TruncatedExpDiffusionChernoff
    shape: struct
    doc: |
      v0.4.0 (ADR-0011, option ε — ADDITIVE, sibling type to
      `DiffusionChernoff`). **Truncated-exp order-2
      integrator** for the self-adjoint divergence-form generator
      `A_self f = ∂_x(a(x)·∂_x f) = a·f'' + a'·f'`, evaluated as a
      truncated operator power series of degree `K = TRUNC_ORDER = 4`
      via the discrete 3-point divergence-form stencil at grid spacing
      `dx`. Lifts variable-`a` global rate from O(τ¹) (ζ-A FD ceiling,
      ADR-0008 Amendment 2 §H1) to **O(τ²)** by avoiding FD on
      `f`-derivatives entirely.

      **Mathematical formula** (math.md §9.2.3.C, NORMATIVE for v0.4.0):

        x_mid    := x − (τ/2)·b(x)                  // IP foot-point
                                                    // (or x_mid := x
                                                    //  if no drift)
        M(τ) f(x) := exp(τ · A_self^I(τ/2)) f(x)
                  ≈ Σ_{k=0..K} (τ^k / k!) · G^k f(x_mid)

      with K = `TRUNC_ORDER` = 4, factorial weights
      `[1, 1, 1/2, 1/6, 1/24]`, and `G` the discrete 3-point
      divergence-form stencil:

        G f|_i := ( a_{i+½} · (f_{i+1} − f_i)
                  − a_{i−½} · (f_i   − f_{i−1}) ) / dx²

      where `a_{i±½} := (self.a)(x_i ± dx/2)` (a evaluated at the
      half-grid-nodes — does NOT require an a-grid, just the closure
      `a: fn(f64) -> f64`). `G^k` denotes the k-fold composition of G;
      stencil samples are GRID-RESIDENT (no off-grid `f.sample()`),
      which is the architectural fix for the ζ-A H1 ceiling
      (ADR-0008 Amendment 2 §H1).

      **Interaction-picture conjugation (optional)**: when the caller
      supplies `b: fn(f64) -> f64` via the builder method
      `with_drift_conjugation(b)`, the foot-point shifts to
      `x_mid := x − (τ/2)·b(x)` (Lie-algebraic IP transform; HLW §III.5).
      Without `with_drift_conjugation`, `x_mid := x` (pure self-adjoint
      diffusion). The Strang-split caller composes `M ∘ R` (where R is
      `DriftReactionChernoff` for the residual drift+reaction) and
      typically does NOT call `with_drift_conjugation` — the outer
      Strang sandwich already absorbs the drift via R. The IP option
      is exposed for advanced callers building non-Strang integrators
      (e.g. matched-asymptotic or boundary-layer schemes).

      **Sibling-type rationale (vs. replacing DiffusionChernoff)**:
      shipping `TruncatedExpDiffusionChernoff` next to (NOT replacing)
      `DiffusionChernoff` preserves bit-equal regression for the 10
      constant-`a` call sites (G1, G2, G3-strang, G4-strang, etc.) and
      lets a future v0.5+ release deprecate ζ-A only after TruncatedExp has
      production mileage. The constructor signature is **identical**
      (5 args, same types in same order) so callers switch by changing
      one type name — no further migration. ζ-A is retained as
      constant-time-per-node fall-back for callers who need the
      ~155 ns/node performance and accept the variable-`a` O(τ¹)
      ceiling (math.md §9.2.3.C "Retention").

      **Order claim** (math.md §9.2.3.C, BCOR 2009 Theorem 3 + HLW §III.4):
        - **Constant `a`** (`a' ≡ 0 ∧ a'' ≡ 0`): bit-equivalent
          to v0.2.2 K-only formula. The 3-point stencil collapses to
          `G f|_i = a₀·(f_{i+1} − 2 f_i + f_{i−1})/dx²` (heat stencil),
          and `M(τ) = Σ (τ·a₀·∂²)^k / k! · f` IS the truncated heat
          semigroup at degree K=4 — algebraically equivalent to the
          v0.2.2 K(τ; a₀) action on grid points (algebraic reduction
          lemma proved in math.md §9.2.3.C "Constant-a reduction"). G1,
          G2, G3-strang, G4-strang **unchanged** by construction.
        - **Variable `a ∈ C³(ℝ)`**: per-step O(dx²) ⊕ O(τ⁵) (the
          truncation residue at K=4 is `O(τ^{K+1})` = `O(τ⁵)` per
          BCOR 2009; the dx² term is the central-stencil leading
          truncation). Global Strang composition gives **O(τ²)** —
          the dominant per-step error is `O(dx²)` (consistent with
          fixed grid) and the τ-residue is `O(τ⁴)` (Strang halves the
          dominant `O(τ⁵)` ⇒ `O(τ⁴)` ⇒ accumulated `O(τ⁴ · n) = O(τ³)`
          which is below the `O(dx²)` floor for any reasonable grid).
        - **Variable `a, b, c` (full PDE)**: global O(τ²)
          (Strang-composition limited by R's O(τ²)). The outer-Strang
          [M, R] commutator at order-3 is structurally identical to
          [D_zeta, R] (HLW §IV.2: the commutator depends only on the
          continuous A_self and B, not on their discretizations) — so
          the existing G3-strang slope ≤ -1.95 gate transfers
          unchanged.

      **CFL stability** (NORMATIVE, errors.yaml v0.4.0): the truncated
      power series at K=4 converges in operator norm iff
      `τ · ‖G‖ < 1` (BCOR 2009 §3.1, K=4 sufficient condition for the
      4!-bounded factorial weights). With
      `‖G‖ ≤ 4·‖a‖_∞ / dx²` (3-point Laplacian eigenvalue bound,
      [Strikwerda, *Finite Difference Schemes*, §6.4]), the necessary
      condition becomes:

        τ < dx² / (2 · ‖a‖_∞)              // CFL_TruncatedExp_K4 bound

      Caller MUST supply a finite `a_norm_bound`; passing
      `f64::INFINITY` UNCONDITIONALLY violates CFL and causes
      `apply` to return `Err(SemiflowError::CflViolated{...})`.
      Implementation MUST early-return on CFL violation BEFORE
      allocating any working buffer (errors-as-values, suckless
      guardrail #1).

      `Clone + Copy`: implementable — struct contains only three `fn`
      pointers + an `Option<fn>` (drift conjugation) + f64 + Grid1D
      (Grid1D is Clone+Copy via primitive fields; no heap, no
      allocation per step).

      ## Invariants (Engineer MUST preserve in v0.4.0 implementation)

      - **I1 (totality + CFL gate)**: `apply(τ, &f)` returns
        `Ok(_)` for any `τ ∈ [0, τ_max)` finite where
        `τ_max := dx² / (2 · self.a_norm_bound)`, any `f ∈ GridFn1D`
        finite, any `a` callable with `inf a > 0`, any
        `a_prime`/`a_double_prime` callables returning finite values
        (these are NOT used by the 3-point stencil directly — the
        stencil computes `a_{i±½}` on the fly — but they are stored
        for API symmetry with `DiffusionChernoff` and consumed by
        property-test consistency checks). Returns
        `Err(CflViolated{tau, dx_squared, a_norm_bound})` when
        `τ · a_norm_bound ≥ dx² / 2` (NEW error variant, errors.yaml
        v0.4.0). Returns `DomainViolation` for `τ < 0`,
        non-finite `τ`, non-finite `f`, or `a(x_i ± dx/2) ≤ 0` for
        any grid index `i` (strict-ellipticity at the half-grid-node
        evaluation points).

      - **I2 (variable-coefficient global O(τ²) — H1 ceiling broken)**:
        for `a ∈ C³(ℝ)` strictly elliptic, the iterated approximant
        `(M(T/n))^n f` converges to `e^{T·A_self}f` with global error
        `O(τ²)` in `τ = T/n` (uniform in `n` for fixed grid) PROVIDED
        the CFL `τ < dx²/(2·‖a‖_∞)` is respected at every step.
        Property `magnus_variable_zeta_liouville_oracle_slope`
        (properties.yaml, 200 cases) verifies via the
        `a(x) = (1+γx)²` Liouville oracle: log-log slope ≤ **-1.95**
        over `n ∈ {32, 64, 128, 256, 512}`. **THIS IS THE FLAGSHIP
        GATE that the ζ-A implementation cannot pass** — ζ-A's
        empirical slope is ≈ -1 (Amendment 2 H1); TruncatedExp's predicted
        slope is ≈ -2 by avoiding FD on f-derivatives entirely.

      - **I3 (constant-coefficient regression-safety, bit-equivalent
        to v0.2.2)**: when `a' ≡ |_| 0.0_f64 ∧ a'' ≡ |_| 0.0_f64`,
        the 3-point stencil reduces to the standard heat stencil
        `G_const f|_i = a₀·(f_{i+1} − 2 f_i + f_{i−1})/dx²`, and
        the truncated power series
        `Σ (τ·a₀)^k/k! · ∂²ᵏ f` agrees with the K(τ;a₀) v0.2.2
        formula at degree K=4 to within `O(τ⁵)` per-step truncation.
        For G1/G2 production gates (constant `α=0.5`), property
        `truncated_exp_diffusion_constant_fast_path_close` enforces sup-norm
        agreement `‖M − D_v022‖_∞ ≤ 1e-10` over 1000 random
        `(τ, a_0)` pairs — close, NOT bit-equal: the truncation
        residue at K=4 is non-zero but bounded by `(τ·a₀/dx²)^5/120`,
        which is `< 1e-12` at production CFL margins. **Engineer MAY
        NOT** add an explicit `if a_prime ≡ 0` branch — the optimizer
        constant-folds `a_{i±½} ≡ a₀` ⇒ stencil collapses to
        translation-invariant heat stencil.

      - **I4 (CFL early-return, suckless errors-as-values)**: the
        first action of `apply` MUST be the CFL check
        `if tau * self.a_norm_bound >= 0.5 * dx * dx { return Err(...) }`.
        No working buffer SHALL be allocated before this check. This
        is the documented signal channel — callers SHOULD inspect
        `CflViolated` to drive adaptive step-size control. Property
        `magnus_cfl_violation_returns_error` (100 cases) enforces
        that the variant is ALWAYS returned at the boundary and
        NEVER returned strictly inside the safe regime.

      - **I5 (drift-conjugation totality)**: when
        `with_drift_conjugation(b)` is called, the foot-point
        `x_mid = x − (τ/2)·b(x)` is computed once per node BEFORE
        the K-fold stencil evaluation. The stencil is evaluated at
        the post-shift grid `{x_i_mid}_i` where
        `x_i_mid := x_i − (τ/2)·b(x_i)`. CFL bound is unchanged
        (drift does NOT enter the diffusion stability budget).
        When NOT calling `with_drift_conjugation`, `b_for_conjugation`
        is `None` and `x_i_mid := x_i` (pure self-adjoint integrator).
    fields:
      - name: a
        type: "fn(f64) -> f64"
        doc: |
          Diffusion coefficient `a(x)`. Caller MUST guarantee
          `inf a(x) > 0`. Same shape as `DiffusionChernoff::a` (5-arg
          constructor mirror).
      - name: a_prime
        type: "fn(f64) -> f64"
        doc: |
          Caller-supplied analytic first derivative `a'(x)`. NOT used
          by the 3-point divergence-form stencil (which evaluates
          `a` directly at half-grid-nodes), but stored for API
          symmetry with `DiffusionChernoff` and consumed by property
          `magnus_a_prime_consistency` (50 cases, 1% tolerance —
          identical to ζ-A's soft check). For constant `a`, pass
          `|_| 0.0_f64`.
      - name: a_double_prime
        type: "fn(f64) -> f64"
        doc: |
          Caller-supplied analytic second derivative `a''(x)`. NOT
          used by the 3-point stencil, but stored for API symmetry
          with `DiffusionChernoff` and consumed by property
          `magnus_a_double_prime_consistency` (50 cases — identical
          to ζ-A). For constant `a`, pass `|_| 0.0_f64`. Forward
          compatibility: a future v0.5.0+ tighter TruncatedExp variant MAY
          consume `a''` to evaluate `[A, [A, ·]]` correction terms
          analytically; reserving the field now keeps the constructor
          5-arg-stable.
      - name: a_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for `‖a‖_∞` over the working
          grid. **Used by CFL check** (unlike `DiffusionChernoff`
          where it is informational). Pass a tight bound — passing
          `f64::INFINITY` UNCONDITIONALLY violates CFL and causes
          `apply` to return `Err(CflViolated{...})` for every
          positive `τ`. Bound must be `> 0` and finite.
      - name: grid
        type: Grid1D
        doc: |
          Reference grid geometry. Drives both the CFL bound
          (`dx² / (2·a_norm_bound)`) and the 3-point stencil action.
      - name: b_for_conjugation
        type: "Option<fn(f64) -> f64>"
        doc: |
          Optional drift coefficient `b(x)` for interaction-picture
          conjugation. Default: `None` (pure self-adjoint TruncatedExp,
          `x_mid := x_i`). Set via builder method
          `with_drift_conjugation(b)` to enable
          `x_mid := x_i − (τ/2)·b(x_i)`. Most StrangSplit callers
          leave this `None` — the outer Strang sandwich absorbs the
          drift via R = `DriftReactionChernoff`. Exposed for
          advanced (non-Strang) integrators.
    consts:
      - name: TRUNC_ORDER
        type: u32
        value: 4
        visibility: "pub"
        doc: |
          Truncated-power-series degree for the TruncatedExp integrator
          `M(τ) ≈ Σ_{k=0..TRUNC_ORDER} (τ^k / k!) · G^k f`.
          K = 4 is the minimum degree at which the per-step truncation
          residue `O(τ^{K+1}) = O(τ⁵)` is below the dominant `O(dx²)`
          stencil error for production grid resolutions
          (`dx ∈ [10⁻³, 10⁻¹]`, `τ ∈ [10⁻⁵, 10⁻²]`) and the global
          rate is `O(τ²)`-limited by Strang composition (BCOR 2009
          Theorem 3). Higher K (5+) wastes cost without reducing
          dominant error.

          Engineer MAY expose this as a `pub const` on the impl block
          (Rust permits both `pub const` items and inherent associated
          consts; Architect prefers the inherent associated const for
          discoverability via `TruncatedExpDiffusionChernoff::TRUNC_ORDER`).
    builder_methods:
      - name: with_drift_conjugation
        signature: "fn with_drift_conjugation(self, b: fn(f64) -> f64) -> Self"
        semantics: |
          Builder method (consumes `self`, returns updated copy)
          enabling interaction-picture conjugation with foot-point
          `x_mid := x_i − (τ/2)·b(x_i)`. Sets
          `self.b_for_conjugation = Some(b)`. Idempotent: calling
          twice replaces the previous value (NOT compose).

          Suckless: ≤ 5 lines (single-field mutator). For the Strang
          composition path `StrangSplit<TruncatedExpDiffusionChernoff,
          DriftReactionChernoff>`, **DO NOT** call this method —
          the outer R already absorbs the drift, and double-counting
          would produce a 2-step shift error. The method exists for
          callers building NON-Strang integrators (e.g.
          `Phi(τ) = M_with_drift(τ)` standalone, where M itself
          must integrate the full A + B operator).
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = 2, growth = (1, 0))"
    methods:
      - name: new
        signature: "fn new(a: fn(f64) -> f64, a_prime: fn(f64) -> f64, a_double_prime: fn(f64) -> f64, a_norm_bound: f64, grid: Grid1D) -> Self"
        semantics: |
          v0.4.0 constructor — **identical 5-arg shape to
          `DiffusionChernoff::new`**. Callers switch from ζ-A to
          TruncatedExp by changing one type name; argument list unchanged.
          Initializes `b_for_conjugation = None`. Use
          `.with_drift_conjugation(b)` to enable IP conjugation.

          No validation of closures (compiler ensures `fn` type;
          caller-correctness for `a_prime`, `a_double_prime` is
          checked at test-time by properties
          `magnus_a_prime_consistency` and
          `magnus_a_double_prime_consistency`, identical in spirit
          to ζ-A's soft checks). `a_norm_bound > 0` and finite is
          NOT validated at construction — the CFL check in `apply`
          will return `CflViolated` if violated. (Suckless: keep
          constructor branchless; total per-construction cost is
          5 stores.)

          Migration from `DiffusionChernoff` (drop-in):
            // BEFORE (ζ-A, FD ceiling at variable-a O(τ¹))
            let d = DiffusionChernoff::new(a, a_p, a_pp, a_norm, grid);
            // AFTER (TruncatedExp, true variable-a O(τ²))
            let d = TruncatedExpDiffusionChernoff::new(a, a_p, a_pp, a_norm, grid);

      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          v0.4.0 TruncatedExp integrator — truncated power series of degree
          `K = TRUNC_ORDER = 4` via the discrete 3-point
          divergence-form stencil at grid spacing `dx`. Math: §9.2.3.C.

          Pre-flight CFL gate (FIRST action — I4):
            let dx = self.grid.dx();
            let dx_squared = dx * dx;
            if !(tau >= 0.0) || !tau.is_finite() {
                return Err(SemiflowError::DomainViolation {
                    what: "tau", value: tau,
                });
            }
            if !self.a_norm_bound.is_finite() || self.a_norm_bound <= 0.0 {
                return Err(SemiflowError::DomainViolation {
                    what: "a_norm_bound", value: self.a_norm_bound,
                });
            }
            if 2.0 * tau * self.a_norm_bound >= dx_squared {
                return Err(SemiflowError::CflViolated {
                    tau,
                    dx_squared,
                    a_norm_bound: self.a_norm_bound,
                });
            }

          Main loop (vectorised K-fold stencil + factorial accumulation):
            // Working buffers: g_curr = G^k f, accum = Σ (τ^k/k!) G^k f.
            // Buffer reuse: two Vec<f64> of length n; swap each iteration.
            // No heap alloc inside the loop — all alloc up-front.
            const FACT_INV: [f64; 5] = [1.0, 1.0, 0.5, 1.0/6.0, 1.0/24.0];

            // Step 1: optional IP foot-point shift.
            //   For `Some(b)`: build f_mid via f.sample(x_i − (τ/2)·b(x_i))
            //   for each i. For `None`: f_mid = f.clone().
            let f_mid: GridFn1D = match self.b_for_conjugation {
                Some(b) => /* per-node foot-point sample, see below */,
                None    => f.clone(),
            };

            // Step 2: K-fold stencil with factorial accumulator.
            let mut accum: Vec<f64> = f_mid.values.clone();    // k=0 term
            let mut g_curr: Vec<f64> = f_mid.values.clone();
            let mut g_next: Vec<f64> = vec![0.0; f.grid.n];
            let mut tau_pow_k: f64 = 1.0;
            for k in 1..=4 {
                tau_pow_k *= tau;
                // g_next ← G·g_curr (3-point divergence-form stencil)
                apply_div_stencil(&self.a, dx, &g_curr, &mut g_next);
                // accum ← accum + (τ^k / k!) · g_next
                let weight = tau_pow_k * FACT_INV[k];
                for i in 0..f.grid.n {
                    accum[i] += weight * g_next[i];
                }
                core::mem::swap(&mut g_curr, &mut g_next);
            }

            Ok(GridFn1D { grid: f.grid.clone(), values: accum })

          Helper: `apply_div_stencil(a, dx, src, dst)` (≤ 30 lines):
            for i in 0..n {
                let x_left  = self.grid.x_at(i) - 0.5 * dx;
                let x_right = self.grid.x_at(i) + 0.5 * dx;
                let a_left  = (self.a)(x_left);
                let a_right = (self.a)(x_right);
                validate_a_x(a_left,  x_left)?;
                validate_a_x(a_right, x_right)?;
                let f_left  = if i == 0     { src[0]   /* or BC dispatch */ }
                              else          { src[i-1] };
                let f_curr  = src[i];
                let f_right = if i == n - 1 { src[n-1] /* or BC dispatch */ }
                              else          { src[i+1] };
                dst[i] = ( a_right * (f_right - f_curr)
                         - a_left  * (f_curr  - f_left) ) / (dx * dx);
            }
          Boundary handling: at `i = 0` and `i = n-1` the stencil
          would reach `src[-1]` or `src[n]`. Engineer MUST dispatch
          via the existing `BoundaryPolicy` (Reflect / ZeroExtend /
          Periodic / LinearExtrapolate) by calling
          `f.sample(grid.x_at(i) ± dx)` instead of indexing
          `src[i ± 1]` directly — same totality contract as ζ-A
          (Grid1D invariants I1-I5, math §3.5). For interior nodes
          (`1 ≤ i ≤ n-2`), direct indexing is correct AND faster.

          Suckless: `apply` body ≤ 50 lines (CFL gate + k=0 init +
          K-fold loop + swap + return). `apply_div_stencil` helper
          ≤ 30 lines. Total `truncated_exp.rs` ≤ 250 lines (well under
          500-line file cap). Working memory: 3 × n × 8 bytes
          (g_curr, g_next, accum) — for n = 1000 that's 24 kB, fits
          on a stack frame; Engineer MUST `Vec::with_capacity(n)` for
          deterministic alloc.

          Engineer notes (CRITICAL):
            - **CFL gate FIRST** — before any allocation. The boundary
              `2·τ·‖a‖_∞ < dx²` is strict (`<`, not `≤`); equality
              triggers `CflViolated`. Test the boundary explicitly
              in `magnus_cfl_violation_returns_error`.
            - **3-point stencil ONLY** — NOT 5-point (would need
              `a` at quarter-grid-nodes and complicate the constant-`a`
              reduction proof; deferred to v0.5+).
            - **K = 4 NORMATIVE** — set via the `TRUNC_ORDER`
              associated const. DO NOT hardcode `4` in the loop bound;
              use `for k in 1..=Self::TRUNC_ORDER as usize`.
              Lifting K to 5 or 6 in a future minor release MUST be
              an associated-const change only, not a body change.
            - **Buffer reuse via swap** — `core::mem::swap(&mut
              g_curr, &mut g_next)` is the canonical no-alloc shape.
              Allocating new Vec inside the loop would blow the
              perf budget.
            - **Constant-a fast path is implicit** — when the
              optimizer constant-folds `a_left ≡ a_right ≡ a₀`, the
              stencil reduces to `(f_right − 2·f_curr + f_left)·a₀/dx²`
              (heat stencil). NO explicit branch.
            - **`f.sample()` ONLY at boundary nodes** — interior nodes
              use direct indexing. The IP foot-point shift (when
              `b_for_conjugation = Some(_)`) DOES use `f.sample()`
              at every node (off-grid by construction).
            - **Use libm::sqrt / libm::exp** — NOT `f64::sqrt` /
              `f64::exp` (std-only). The K=4 path uses neither, but
              the IP foot-point shift uses arithmetic only — no
              sqrt/exp calls in this routine.
        preconditions:
          - "tau is finite and >= 0.0"
          - "a_norm_bound is finite and > 0.0"
          - "f.norm_sup() is finite"
          - "a(x_i ± dx/2) > 0 for all i ∈ [0, n) (strict ellipticity at half-nodes)"
          - "If b_for_conjugation = Some(b): b(x_i) is finite for all i"
        postconditions:
          - "result has same structural shape as f"
          - "tau == 0.0 implies result == f bit-exactly (k=0 term only, all τ^k=0 for k≥1)"
          - "a' ≡ |_| 0.0 ∧ a'' ≡ |_| 0.0 implies result agrees with v0.2.2 K-only formula within 1e-10 sup-norm (truncation residue O(τ⁵))"
        errors:
          - "CflViolated if 2·tau·a_norm_bound >= dx² (NEW v0.4.0 — necessary for K=4 truncated power series convergence)"
          - "DomainViolation if tau < 0 or tau is NaN/Inf"
          - "DomainViolation if a_norm_bound is NaN/Inf or <= 0.0"
          - "DomainViolation if f contains NaN/Inf"
          - "DomainViolation if a(x_i ± dx/2) <= 0 for any i (strict ellipticity at half-nodes)"
          - "Unsupported propagated from f.sample() under InterpKind::Linear without `linear-interp` feature flag (only on IP foot-point path)"

      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          Returns `2`. v0.4.0 (ADR-0011): the reported `order = 2`
          is the **global** Strang-composition order for variable
          `a, b, c`. Per-step truncation residue is `O(τ⁵)`
          (K = TRUNC_ORDER = 4 ⇒ residue `O(τ^{K+1})`); the
          dominant per-step error in production regimes is `O(dx²)`
          from the central stencil. Strang composition retains
          `O(τ²)` global as expected. **Crucially, this is the
          implementation rate, not just the mathematical rate** —
          unlike ζ-A which has `order() == 2` mathematically but
          `O(τ¹)` empirically for variable `a`, TruncatedExp matches the
          theoretical rate at the implementation level by design.

          (Architectural note: same single-integer caveat as ζ-A —
          `order` cannot express the `[O(dx²) ⊕ O(τ²)]` joint
          dependency. v0.5+ may introduce `OrderRegime { Tau: 2,
          DxLeading: true }` if downstream consumers need to
          dispatch on it. For v0.4.0, treat this as "Strang global
          τ-order" and rely on
          `magnus_variable_zeta_liouville_oracle_slope` for
          empirical verification.)

      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns `(1.0, 0.0)`. The truncated power series
          `Σ (τ·G)^k / k!` is bounded by `exp(τ·‖G‖)` in operator
          norm. Under CFL `τ·‖G‖ < 1`, this is `≤ e ≈ 2.718` — but
          for K=4 truncation the bound tightens to
          `Σ_{k=0}^4 (τ·‖G‖)^k / k! ≤ 1 + τ·‖G‖ + (τ·‖G‖)²/2 + ... ≤ 1 + τ·‖G‖ + O((τ·‖G‖)²)`.
          For the discrete heat stencil with bound `‖G‖ ≤ 4·‖a‖/dx²`,
          and CFL `τ < dx²/(2·‖a‖)`, we have
          `τ·‖G‖ < 2`, giving sup-norm bound `‖M(τ)f‖_∞ ≤ ‖f‖_∞`
          modulo a small `O(τ²)` overshoot from the K=4 truncation
          (not the full exp series). For Strang/G4-strang purposes
          we report `(1.0, 0.0)` (asymptotic for τ→0). The G4-strang
          empirical bound `(1 + |c|τ + 20τ²)·‖f‖∞` (math.md §9.6)
          remains the production guarantee — the `20·τ²` slack
          covers TruncatedExp truncation overshoot identically to ζ-A.

  - name: Diffusion4thChernoff
    shape: struct
    doc: |
      v0.6.0 (ADR-0013) — **ADDITIVE sibling type** to
      `DiffusionChernoff` (ζ-A). Lifts the v0.3.0 ζ-A τ²-correction's
      finite-difference accuracy on `f^(k)` from 5-point central
      (spatial 2nd-order, math.md §9.2.3.B) to **7-point Fornberg
      (1988) central** (spatial 4th–6th-order, math.md §9.2.4). The
      γ-A inner-Strang K-kernel is BIT-EQUAL to v0.3.0/v0.5.0 ζ-A;
      the only modified locus is the τ²-correction's f-derivative FD.

      **Mathematical formula** (math.md §9.2.4):

        D_ζ⁴(τ) f(x) := D_γ(τ) f(x)
                      + τ² · [ a(x) · a'(x) · f'''_FD⁴(x; Δ)
                             + ½ · a(x) · a''(x) · f''_FD⁶(x; Δ)
                             + ¼ · a'(x) · a''(x) · f'_FD⁶(x; Δ) ]

      where the Fornberg 7-point central FD operators have residues

        f' = O(Δ⁶), f'' = O(Δ⁶), f''' = O(Δ⁴)

      (sympy gate Z⁴_spatial-order, NORMATIVE; see
      `verify_v0_6_0_zeta4.py`). Stencil step

        Δ := max(3·dx, τ^{3/4})

      (NORMATIVE; the floor `3·dx` controls FP cancellation, the
      `τ^{3/4}` upper bound balances `τ²·Δ⁴ ≤ τ⁵` to stay within the
      local-O(τ⁵) ζ⁴ budget; see math.md §9.2.4 "Δ choice" for the
      derivation).

      **Sympy verification** (`.dev-docs/verification/scripts/verify_v0_6_0_zeta4.py`,
      reproducible, exit 0; ALL FIVE GATES):

        - **Z⁴_τ⁰** identity at τ=0: D_ζ⁴(0) f|0 = f₀ ✓
        - **Z⁴_τ¹** Chernoff consistency: D_ζ⁴'(0) f = A_self f ✓
        - **Z⁴_τ²** TRUE order-2 lift (analytic refs): deficit ≡ 0 ✓
          NORMATIVE — inherited verbatim from v0.3.0 ζ-A.
        - **Z⁴_const-a** constant-`a` regression: when a' ≡ a'' ≡ 0,
          correction ≡ 0 AND S(s) ≡ id, so D_ζ⁴ = K(τ;a₀) ≡ v0.5.0
          BIT-EQUAL. ✓ NORMATIVE.
        - **Z⁴_spatial-order**: 7-point FD residues
          O(Δ⁶)/O(Δ⁶)/O(Δ⁴) for f'/f''/f'''. ✓ NORMATIVE.

      **Order claim** (math.md §9.2.4):
        - **Constant a**: bit-equal to v0.5.0 ζ-A (correction ≡ 0
          when a' ≡ a'' ≡ 0); local O(τ³) / global Strang O(τ²).
        - **Variable a ∈ C⁵(ℝ)**: local O(τ⁵) at Δ=τ^{3/4}
          (matches sympy gates); global Strang O(τ²)⊕O(dx⁴) where
          the dx⁴ floor reflects spatial 4-6th-order improvement
          over v0.5.0's dx² floor.

      **API**: same 5-arg constructor as `DiffusionChernoff`:
      `(a, a_prime, a_double_prime, a_norm_bound, grid)`. Caller
      switches by changing one type name only — no migration cost.

      `Clone + Copy`: implementable (3 fn pointers + f64 + Grid1D —
      no heap, no allocation per step).

      ## Invariants (Engineer MUST preserve in v0.6.0 implementation)

      - **I1 (totality)**: `apply(τ, &f)` returns `Ok(_)` for any
        `τ ∈ [0, ∞)` finite, `f ∈ GridFn1D` finite, any `a` callable
        satisfying strict-ellipticity, and any `a_prime`,
        `a_double_prime` callables returning finite values. Per-node
        FD-stencil cost: 6 `f.sample` calls (at `x ± Δ`, `x ± 2Δ`,
        `x ± 3Δ`) + 1 `f.sample` at `x` for f-evaluation in K-factor.
        Inherits all v0.3.0 ζ-A error variants verbatim
        (DomainViolation, Unsupported propagation from `f.sample`).
        NO new error variants.

      - **I2 (4th-order spatial residue, NORMATIVE)**: per math.md
        §9.2.4 + sympy gate Z⁴_spatial-order, the FD truncation
        residues for f', f'', f''' are O(Δ⁶), O(Δ⁶), O(Δ⁴) respectively
        (verified at compile-time-equivalent sympy proof). The
        τ²-correction's contribution to local error is τ²·O(Δ⁴) =
        O(τ²·dx⁴) at the production floor Δ = 3·dx, OR τ²·O(τ³) =
        O(τ⁵) at the asymptotic Δ = τ^{3/4} — whichever is larger.
        Property `diffusion4_constant_fast_path_close` (proptest, 1000
        cases) enforces sup-norm agreement
        |Diffusion4th − DiffusionChernoff|_∞ ≤ 1e-12 over random
        (τ, a₀) pairs — this is the bit-equal regression guarantee
        for the constant-a path (correction polynomial vanishes
        identically; only the K-factor and S-shifts contribute, and
        BOTH are bit-equal to v0.5.0 ζ-A's K and S — sympy gate
        Z⁴_const-a).

      - **I3 (constant-coefficient regression-safety, BIT-EQUAL to
        v0.5.0)**: when `a' ≡ |_| 0.0_f64 ∧ a'' ≡ |_| 0.0_f64`, the
        τ²-correction polynomial vanishes identically (factored a',
        a'·a'' both zero); the inner-Strang `S(s)` reduces to id;
        and the K-factor is unchanged from v0.5.0. Therefore
        `Diffusion4th.apply(τ, &f) ≡ DiffusionChernoff.apply(τ, &f)`
        bit-equal to within ≤ 4 ULPs (sympy gate Z⁴_const-a;
        Z⁴_const-a). Property
        `diffusion4_constant_fast_path_close` enforces this with
        tolerance 1e-12 over 1000 random `(τ, a₀)` pairs.

      - **I4 (a ∈ C⁵(ℝ) caller invariant)**: NEW vs. v0.5.0 ζ-A
        which required only C³. The 7-point Fornberg stencil for
        `f` amplifies `f^(7)` at coefficient 1/140 (`f'`), `f^(8)`
        at 1/560 (`f''`), `-7·f^(7)/120` (`f'''`); bounded `f^(7)`
        through `f^(8)` is required to keep the residue tight. For
        `a ∈ C^k` with `k < 5`, the residue degrades to O(Δ^k) and
        the τ²·O(Δ⁴) budget is broken — caller responsibility (no
        runtime check; soft-fail via downstream sup-norm bound).

      - **I5 (boundary-policy totality unchanged)**: 7-point stencil
        samples `f` at `x ± k·Δ` for k ∈ {1,2,3} via `f.sample()` —
        same totality contract as v0.5.0 ζ-A's 5-point stencil. Within
        `3·Δ ≈ 9·dx` of edge, `BoundaryPolicy` dispatch fires every
        step; for production callers padding ≥ 5σ from u₀ support
        (Risk R5), this is a finite per-step constant-factor cost,
        not an order issue.
    fields:
      - name: a
        type: "fn(f64) -> f64"
        doc: "Diffusion coefficient a(x). Caller MUST guarantee inf a(x) > 0."
      - name: a_prime
        type: "fn(f64) -> f64"
        doc: |
          Caller-supplied analytic first derivative `a'(x)`. For constant
          `a`, pass `|_| 0.0_f64` — the inner-Strang `S(s)` collapses to
          identity AND the τ²-correction polynomial's `a'`-prefactor
          terms zero out, giving bit-equal v0.5.0 output (sympy gate
          Z⁴_const-a). Caller responsibility for finite + correct
          analytic derivative — soft caller-correctness check via
          property `diffusion4_a_prime_consistency` (50 cases, 1%
          tolerance vs central FD; same as v0.5.0 ζ-A).
      - name: a_double_prime
        type: "fn(f64) -> f64"
        doc: |
          Caller-supplied analytic second derivative `a''(x)`. For
          constant `a`, pass `|_| 0.0_f64` — combined with `a' ≡ 0`
          this zeros the entire τ²-correction polynomial identically
          (sympy gate Z⁴_const-a). For variable `a`, caller MUST
          supply the exact analytic second derivative; soft check
          via property `diffusion4_a_double_prime_consistency` (50
          cases, 1% tolerance vs central FD second derivative).
      - name: a_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for ‖a‖_∞. Not used internally
          by `apply` (no CFL check on Diffusion4th — γ-A K-factor's
          unconditional positive-weight stability extends to ζ⁴ since
          the FD-correction does not change the γ-A K-factor's L^∞
          norm bound). Exposed for downstream diagnostics; pass
          `f64::INFINITY` if unknown.
      - name: grid
        type: Grid1D
        doc: "Reference grid geometry (used to iterate nodes and create output)."
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = 4, growth = (1, 0))"
    methods:
      - name: new
        signature: "fn new(a: fn(f64) -> f64, a_prime: fn(f64) -> f64, a_double_prime: fn(f64) -> f64, a_norm_bound: f64, grid: Grid1D) -> Self"
        semantics: |
          v0.6.0 constructor — IDENTICAL 5-arg shape to
          `DiffusionChernoff::new` (and `TruncatedExpDiffusionChernoff::new`).
          Callers switch from ζ-A to ζ⁴ by changing one type name;
          argument list is unchanged.

          No closure validation (compiler ensures `fn` type;
          caller-correctness for `a_prime`, `a_double_prime` is
          checked at test-time by properties
          `diffusion4_a_prime_consistency` and
          `diffusion4_a_double_prime_consistency`, identical in spirit
          to ζ-A's soft checks).

          Migration from `DiffusionChernoff` (drop-in):
            // BEFORE (ζ-A, spatial 2nd-order on f^(k) FD)
            let d = DiffusionChernoff::new(a, a_p, a_pp, a_norm, grid);
            // AFTER (ζ⁴, spatial 4-6th-order on f^(k) FD)
            let d = Diffusion4thChernoff::new(a, a_p, a_pp, a_norm, grid);
      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          v0.6.0 ζ⁴ implementation — γ-A baseline (BIT-EQUAL to v0.5.0)
          PLUS τ²-correction with 7-point Fornberg FD on f^(k). Math:
          §9.2.4. Per-node:
            (a) γ-A baseline (bit-equal v0.5.0): 1 a(x_pre), 5
                a_prime calls, 2 sqrt, 5 f.sample (K-arms).
            (b) ζ⁴ correction (NEW): 1 a(x), 1 a_prime(x), 1
                a_double_prime(x), 1 sqrt(τ) (for Δ),
                6 f.sample (at x ± Δ, x ± 2Δ, x ± 3Δ).
          Total per-node f.sample: 11 (was 9 in v0.5.0 ζ-A).
          Predicted overhead vs ζ-A: ~10-20% per step (2 extra
          f.sample, slightly more arithmetic in 7-point FD weights).
      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          Returns `2` (τ-axis Chernoff consistency order). Spatial
          accuracy `O(dx⁴)` is independent and is verified by the
          G3⁴ / G3⁴-2D convergence-slope gates, not by `order()`.
          See math.md §11.1.bis (NORMATIVE axis distinction, v0.6.1)
          and `docs/audit-findings-v0_6_0.md` D1 for the motivating
          incident — the v0.6.0 implementation returned `4`,
          conflating the dx-axis spatial order `q = 4` with the
          τ-axis consistency order `p`. The γ-A baseline / Strang
          composition / inner Chernoff structure all saturate the
          τ-axis order at `2`; the v0.6.0 sympy gate Z⁴_τ¹ verifies
          `D_ζ⁴'(0) f = A_self f` (consistency), and Z⁴_τ² verifies
          the analytic τ² coefficient equals `A_self² f / 2` modulo
          the inner-Strang correction — the underlying time-axis
          local error is `O(τ³)` per substep, i.e. `p = 2`.

          The dx-axis spatial accuracy `q = 4` is observable only via
          the G3⁴ / G3⁴-2D dx-sweep gates in `properties.yaml`
          (slope ≤ -3.85 at fixed τ → 0). The Richardson divisor
          `2^p − 1 = 3` and PI gains `α = 0.7/p, β = 0.4/p` used by
          `AdaptivePI<Diffusion4thChernoff>` derive from `p = 2`,
          NOT from `q = 4`.

          (Architectural note: `Strang2D::order()` cap of `4` is a
          forward-compatibility ceiling for hypothetical higher-τ-order
          inner functions. With both `cx, cy: Diffusion4thChernoff`
          reporting `order = 2`, `Strang2D<cx, cy>::order() =
          min(2, 2, 4) = 2` — matching the canonical Strang global
          order per Theorem 7, math.md §10.)
      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns `(1.0, 0.0)`. Same growth bound as v0.5.0 ζ-A (the
          γ-A K-factor's positive-weight bound is unchanged; the
          τ²-correction's contribution is bounded by
          τ²·‖a‖_∞·‖a'‖_∞·‖f'''‖_∞ which is `O(τ²)` and absorbed
          into the standard `(1 + |c|τ + 20τ²)·‖f‖∞` empirical envelope
          per math.md §9.6).

  - name: TruncatedExp4thDiffusionChernoff
    shape: struct
    doc: |
      v0.6.0 (ADR-0013) — **ADDITIVE sibling type** to
      `TruncatedExpDiffusionChernoff` (v0.4.0 TruncatedExp K=4 with 3-point
      divergence-form stencil). Replaces the 3-point stencil `G` with
      the 5-point divergence-form stencil `G⁴` (math.md §9.2.5),
      delivering 4th-order spatial accuracy in the constant-`a` regime
      and a tighter dx²-coefficient in the variable-`a` regime. K=4
      truncated power series formula and IP foot-point construction
      are UNCHANGED from v0.4.0 — only the discrete stencil changes.

      **Mathematical formula** (math.md §9.2.5):

        x_mid    := x − (τ/2)·b(x)                           // unchanged
        M⁴(τ) f(x) ≈ Σ_{k=0..K} (τ^k / k!) · (G⁴)^k f(x_mid)
                                                              // K = 4

        G⁴ f|_i := [ −a_{i+3/2}(f_{i+2} − f_{i+1})/12
                   + 5·a_{i+1/2}(f_{i+1} − f_i)/4            // (5/4, NOT 7/6;
                   − 5·a_{i-1/2}(f_i − f_{i-1})/4            //  Architect-corrected
                   + a_{i-3/2}(f_{i-1} − f_{i-2})/12 ] / dx² //  per ADR-0013 §3)

      where `a_{i±k/2} := (self.a)(x_i ± k·dx/2)` for k ∈ {1, 3} —
      4 closure evaluations per node (vs. 2 for v0.4.0 TruncatedExp). The
      stencil is symmetric and divergence-form-conservative.

      **Constant-a collapse** (sympy gate M⁴_const-a-fast, NORMATIVE):

        G⁴|_{a≡a₀} f|_i = a₀·[−1/12, 4/3, −5/2, 4/3, −1/12]·f / dx²

      — the standard 4th-order central Laplacian. Sympy verification
      at `verify_v0_6_0_magnus4.py` (residual identically zero in
      polynomial ring of f₀…f₈).

      **Honest variable-`a` spatial order** (NORMATIVE per ADR-0013):

        - Constant `a`:        G⁴ f − A_self f|0 = O(dx⁴)
                               leading coef -a₀·f^(6)/90.
        - Variable `a`:        G⁴ f − A_self f|0 = O(dx²)
                               leading coef -a'·f'''/12 - a''·f''/8
                                          - a'''·f'/24
                               (sympy gate M⁴_spatial-order).

      The variable-`a` `O(dx²)` floor is **architecturally fundamental
      to 5-point divergence-form stencils sampling `a` only at
      half-grid points** (Strikwerda §6.4 + Mickens 1994 §3.2
      impossibility). The v0.6.0 honest claim is therefore: **4th-order
      spatial AT CONSTANT `a` ONLY**; variable-`a` gets a strictly
      smaller dx²-constant (Mickens-improvement, ~3× constant
      reduction) but the asymptotic order is the same. This is
      sufficient to deliver the v0.6.0 G3⁴-2D headline gate (slope
      ≤ -3.80 on the eq. 10.7 heat oracle, which is constant-a per
      axis), while CEV (variable-a) gets reduced absolute error.

      **NEW CFL bound** (NORMATIVE, ADR-0013 §3 fold-in):

        ‖G⁴‖ ≤ 16·‖a‖_∞ / (3·dx²)    (Fourier symbol at kdx = π;
                                       math.md §9.2.5 derivation)

      K=4 power-series convergence requires τ·‖G⁴‖ < 2, giving:

        τ < 3·dx² / (8·‖a‖_∞)         (25% tighter than v0.4.0)

      Implementation MUST encode via the constants
      `CFL_NUMER = 3, CFL_DENOM = 8` distinct from
      v0.4.0's `TRUNC_CFL_NUMER = 1, TRUNC_CFL_DENOM = 2`. Reuses
      `SemiflowError::CflViolated { tau, dx_squared, a_norm_bound }`
      VERBATIM — no new error variant (the field names are stencil-
      agnostic).

      **Sibling-type rationale** (vs replacing `TruncatedExpDiffusionChernoff`):
      same as v0.4.0 sibling-type rationale (math.md §9.2.3.C
      "Retention"). v0.4.0 TruncatedExp retains close-to-bit-equal
      regression for the production gates; v0.6.0 TruncatedExp⁴ is a
      type-name swap drop-in for callers needing the 4th-order
      constant-a spatial lift (G3⁴-2D heat oracle).

      `Clone + Copy`: implementable (3 fn pointers + Option<fn> +
      f64 + Grid1D — no heap).

      ## Invariants (Engineer MUST preserve in v0.6.0 implementation)

      - **I1 (totality + new tighter CFL gate)**: `apply(τ, &f)`
        returns `Ok(_)` for any `τ ∈ [0, τ_max⁴)` finite where
        `τ_max⁴ := 3·dx² / (8·self.a_norm_bound)`. Returns
        `Err(CflViolated{tau, dx_squared, a_norm_bound})` when
        `8·τ·a_norm_bound ≥ 3·dx²`. (Same error variant as v0.4.0;
        the inequality direction is encoded via the new
        `CFL_NUMER/CFL_DENOM` constants.) Returns
        `DomainViolation` for τ < 0, non-finite τ, non-finite f, or
        a(x_i ± k·dx/2) ≤ 0 for any (i, k ∈ {1, 3}). Stencil samples
        are GRID-RESIDENT — the 5-point stencil samples
        `f_{i±1}, f_{i±2}` directly, with boundary nodes routed
        through `BoundaryPolicy` at `x_0 - dx, x_0 - 2·dx,
        x_{n-1} + dx, x_{n-1} + 2·dx` via standard `Grid1D::sample`
        dispatch (4-node boundary span vs. v0.4.0's 1-node span;
        production callers should pad domain ≥ 2·dx margin).

      - **I2 (constant-a 4th-order spatial, NEW vs v0.4.0)**: when
        `a' ≡ 0 ∧ a'' ≡ 0`, sympy gate M⁴_const-a-fast PROVES that
        G⁴ collapses to the standard 4th-order central Laplacian.
        Per-step error is O(dx⁴·τ) ⊕ O(τ⁵) (BCOR 2009 K=4 residue
        unchanged); global Strang error is O(τ²) ⊕ O(dx⁴) — the
        4th-order spatial floor is the headline lift over v0.4.0's
        O(dx²) floor. This is the active regime for the G3⁴-2D heat
        oracle gate (math.md §10.5(a)).

      - **I3 (variable-a 2nd-order spatial floor, HONEST)**: per
        sympy gate M⁴_spatial-order, the variable-`a` residue is
        O(dx²) with leading coefficient
        `-a'·f'''/12 - a''·f''/8 - a'''·f'/24`. This is **strictly
        smaller** than v0.4.0's variable-a residue
        `-a''·f/2 - a'·f'/2` (asymptotic constant ~3× tighter via
        the higher-frequency cancellation of the 5-point divergence
        stencil), but the asymptotic order is the same. Caller
        SHOULD NOT expect a variable-a 4th-order convergence — see
        ADR-0013 §3 Architect honest correction.

      - **I4 (constant-coefficient regression CLOSE to v0.4.0)**:
        when `a' ≡ a'' ≡ 0`, the 5-point G⁴ collapses to the standard
        4th-order Laplacian, while v0.4.0's 3-point G collapses to
        the standard 2nd-order Laplacian. The two are NOT bit-equal
        (different stencils). Property
        `magnus4_constant_fast_path_close` enforces sup-norm
        agreement |M⁴ − M_v0.4.0|_∞ ≤ 1e-10 over 1000 random
        (τ, a₀) pairs — close, NOT bit-equal: both converge to the
        same continuous limit `e^{τa₀∂²}`, but with different O(dx⁴)
        vs O(dx²) per-step floors.

      - **I5 (CFL early-return, suckless errors-as-values)**: same as
        v0.4.0 invariant I4, with the new tighter bound. The first
        action of `apply` MUST be the CFL check
        `if 8·tau·self.a_norm_bound >= 3·dx*dx { return Err(...) }`.
        No working buffer SHALL be allocated before this check. Same
        property `magnus4_cfl_violation_returns_error` (analogous to
        v0.4.0's `magnus_cfl_violation_returns_error`) verifies the
        boundary check at 99%/101% of CFL.

      - **I6 (drift-conjugation totality, IDENTICAL to v0.4.0 I5)**:
        when `with_drift_conjugation(b)` is called, foot-point
        `x_mid = x − (τ/2)·b(x)` is unchanged from v0.4.0; CFL bound
        unchanged (drift does not enter the diffusion stability
        budget).
    fields:
      - name: a
        type: "fn(f64) -> f64"
        doc: "Diffusion coefficient a(x). Caller MUST guarantee inf a(x) > 0."
      - name: a_prime
        type: "fn(f64) -> f64"
        doc: |
          Same as v0.4.0 TruncatedExp — NOT used by 5-point stencil (which
          evaluates `a` at half-grid points directly), but stored for
          API symmetry and consumed by property
          `magnus4_a_prime_consistency` (50 cases, 1% tolerance, soft
          check).
      - name: a_double_prime
        type: "fn(f64) -> f64"
        doc: |
          Same as v0.4.0 TruncatedExp — NOT used by 5-point stencil, stored
          for API symmetry and soft check via
          `magnus4_a_double_prime_consistency`.
      - name: a_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for `‖a‖_∞`. **Used by the new
          tighter CFL check** `8·τ·a_norm_bound < 3·dx²`. Pass tight;
          `f64::INFINITY` UNCONDITIONALLY violates CFL.
      - name: grid
        type: Grid1D
        doc: |
          Reference grid geometry. Drives both the new CFL bound
          (`3·dx² / (8·a_norm_bound)`) and the 5-point stencil action.
      - name: b_for_conjugation
        type: "Option<fn(f64) -> f64>"
        doc: |
          Optional drift coefficient for IP conjugation, identical
          semantics to v0.4.0 TruncatedExp. Default `None`.
    consts:
      - name: TRUNC_ORDER
        type: u32
        value: 4
        visibility: "pub"
        doc: |
          Truncated-power-series degree, UNCHANGED from v0.4.0. K=4
          remains optimal: per-step truncation residue O(τ⁵) is below
          the dominant O(dx⁴) (constant-a) or O(dx²) (variable-a)
          stencil error for production grid resolutions.
      - name: CFL_NUMER
        type: u32
        value: 3
        visibility: "pub"
        doc: |
          NEW IN v0.6.0. Numerator of the new tighter CFL bound:
          `τ < CFL_NUMER · dx² / (CFL_DENOM · ‖a‖_∞)
          = 3·dx² / (8·‖a‖_∞)`. Distinct from v0.4.0's
          `TRUNC_CFL_NUMER = 1` to disambiguate the 5-point and
          3-point stencils' eigenvalue bounds. See math.md §9.2.5.
          (Renamed from `MAGNUS4_CFL_NUMER` in v0.7.0, ADR-0013 Amendment 2.)
      - name: CFL_DENOM
        type: u32
        value: 8
        visibility: "pub"
        doc: |
          NEW IN v0.6.0. Denominator of the new tighter CFL bound;
          paired with `CFL_NUMER = 3`. Engineer SHOULD encode
          the CFL check as
          `(CFL_DENOM as f64) * tau * self.a_norm_bound
              >= (CFL_NUMER as f64) * dx_squared`
          for stability against integer-promotion edge cases.
          (Renamed from `MAGNUS4_CFL_DENOM` in v0.7.0, ADR-0013 Amendment 2.)
    builder_methods:
      - name: with_drift_conjugation
        signature: "fn with_drift_conjugation(self, b: fn(f64) -> f64) -> Self"
        semantics: |
          Identical to v0.4.0 TruncatedExp's `with_drift_conjugation`. Sets
          `self.b_for_conjugation = Some(b)`.
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = 4, growth = (1, 0))"
    methods:
      - name: new
        signature: "fn new(a: fn(f64) -> f64, a_prime: fn(f64) -> f64, a_double_prime: fn(f64) -> f64, a_norm_bound: f64, grid: Grid1D) -> Self"
        semantics: |
          v0.6.0 constructor — IDENTICAL 5-arg shape to
          `TruncatedExpDiffusionChernoff::new`. Drop-in replacement: callers
          switch by changing one type name. Initializes
          `b_for_conjugation = None`.
      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          v0.6.0 TruncatedExp⁴ — K=4 truncated power series via 5-point
          divergence-form stencil G⁴. Math: §9.2.5. Per-step:
            (1) CFL check (FIRST action, before any allocation):
                if 8·τ·a_norm_bound ≥ 3·dx² return Err(CflViolated{...}).
            (2) IF with_drift_conjugation(b) called: x_i_mid = x_i − τ/2 · b(x_i).
                ELSE x_i_mid = x_i.
            (3) Allocate f_mid (sample f at {x_i_mid} via f.sample);
                allocate g_curr := f_mid; accum := f_mid (k=0 term).
            (4) For k = 1..=4:
                  g_next ← G⁴ · g_curr     (5-point flux-form, 4 a-evals,
                                             4 inner divisions, boundary
                                             via Grid1D::sample at edges)
                  accum  ← accum + (τ^k / k!) · g_next
                  swap(g_curr, g_next)
            (5) Return GridFn1D::new(grid, accum.values).
          Cost per node: 4 a(x) evaluations (vs 2 for v0.4.0) + 5
          stencil-flop per k-step + 1 + 1/2 + 1/6 + 1/24 factorial
          weights — total ~15-20% per-step overhead vs v0.4.0 TruncatedExp
          for the doubled `a` call count, plus 2 extra grid cells per
          stencil arm.
      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          Returns `2` (τ-axis Chernoff consistency order). Spatial
          accuracy `O(dx⁴)` (constant-`a`) is independent and is
          verified by the G3⁴ / G3⁴-2D convergence-slope gates, not
          by `order()`. See math.md §11.1.bis (NORMATIVE axis
          distinction, v0.6.1) and `docs/audit-findings-v0_6_0.md`
          D1 for the motivating incident — the v0.6.0 implementation
          returned `4`, conflating the dx-axis spatial order `q = 4`
          with the τ-axis consistency order `p`. The K=4 truncated
          power series and Strang composition saturate the τ-axis
          order at `2`; sympy gate M⁴_τ² verifies the analytic τ²
          coefficient equals `A² f / 2` (consistency), so the
          underlying time-axis local error is `O(τ³)` per substep,
          i.e. `p = 2`.

          The dx-axis spatial accuracy `q = 4` (constant-`a` regime,
          which is the target of the v0.6.0 G3⁴-2D heat oracle) is
          observable only via the G3⁴ / G3⁴-2D dx-sweep gates in
          `properties.yaml`; the Mickens 1994 §3.2 impossibility (sympy
          gate M⁴_spatial-order) gives variable-`a` residue `O(dx²)`.
          The Richardson divisor `2^p − 1 = 3` and PI gains
          `α = 0.7/p, β = 0.4/p` used by
          `AdaptivePI<TruncatedExp4thDiffusionChernoff>` derive from `p = 2`,
          NOT from `q = 4`.
      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns `(1.0, 0.0)`. Same growth bound as v0.4.0 TruncatedExp —
          `‖G⁴‖ ≤ 16·‖a‖_∞/(3·dx²)` is a tighter eigenvalue bound
          than v0.4.0's `‖G‖ ≤ 4·‖a‖_∞/dx²`, but at the matched CFL
          margin τ·‖G‖ ≈ τ·‖G⁴‖ ≈ 0.45·2 = 0.9 the partial-sum
          truncation overshoot is identical. G4-strang⁴ empirical
          envelope `(1 + |c|τ + 20τ²)·‖f‖∞` carries over.

  - name: AdaptivePI
    shape: struct
    type_params: "<C: ChernoffFunction>"
    doc: |
      v0.6.0 (ADR-0014) — **GENERIC SEMIGROUP-SPLITTING INTEGRATOR**
      that wraps any inner `C: ChernoffFunction` and performs adaptive
      sub-stepping over a target time `T`. Each substep applies
      `C.apply(τ_i, ·) ≈ e^{τ_i A}` on `[t_i, t_{i+1}]` and the
      substeps are glued via the semigroup property
      `e^{(t_2 − t_0) A} = e^{(t_2 − t_1) A} · e^{(t_1 − t_0) A}` —
      the integrator is therefore a *splitting scheme along the time
      axis*. **Convergence is governed by per-substep local-truncation
      O(τ^{p+1})** where `p = func.order()`, accumulating to global
      O(τ^p) via the Lady-Windermere fan argument (HLW §II.3) — NOT
      by Theorem 6's O(1/n) Chernoff-product bound (math.md §11.1
      NORMATIVE).

      **`AdaptivePI<C>` does NOT implement `ChernoffFunction`** — there
      is no fixed `n`, the substep count is runtime-determined. The
      inner-order forward-pass `inner_order() -> u32` returns
      `func.order()` for downstream introspection (e.g., the half-step
      Richardson estimator's denominator `2^p − 1`).

      **PI controller** (Söderlind 2002 "PI.4.7" parameter set, default
      α = 0.7/p, β = 0.4/p; HLW §IV.2). Per substep:

        u_full := func.apply(τ, u_i)
        u_h1   := func.apply(τ/2, u_i)
        u_half := func.apply(τ/2, u_h1)
        err_i  := ‖u_half − u_full‖_∞ / (2^p − 1)
        tol_i  := tol_abs + tol_rel · max(‖u_i‖_∞, ‖u_full‖_∞)
        e      := (tol_i / err_i)^α
        e_prev := (err_{i-1} / err_i)^β     // 1 if i = 0
        τ_new  := clamp(τ · safety · e · e_prev, min_ratio·τ, max_ratio·τ)
        if err_i ≤ tol_i: ACCEPT u_{i+1} := u_half, τ ← τ_new
        else:             REJECT,           retry with τ ← τ_new

      Defaults (math.md §11.2): `tol_abs=1e-8, tol_rel=1e-6,
      safety=0.9, min_ratio=0.2, max_ratio=5.0, max_substeps=100_000`.

      **NEW error variant** `SemiflowError::AdaptiveStepRejected
      { last_tau: f64, last_err: f64, steps_attempted: usize }` —
      returned ONLY when `steps_attempted >= max_substeps` (runaway
      protection; see math.md §11.3). Errors-as-values, suckless
      guardrail #1.

      **Per-substep cost**: 3 `func.apply` calls (one full + two
      halves) + half-step Richardson combination. For `p = 2` inner
      (most v0.6.0 cases), the half-step is `τ/2` so the full and
      half take the same per-call cost — total ~3× per-substep cost
      vs single-step. The PI controller's expected substep count for
      stiff CEV is `~0.7×` the fixed-step `n_fixed_for_same_err`,
      giving ~2× total wallclock vs fixed-step-tuned-for-the-corner;
      adaptive WINS when the corner is unknown a priori.

      `Clone + Copy`: implementable IFF `C: Copy` (true for all v0.6.0
      Chernoff types). Otherwise `Clone` only.

      ## Invariants (Engineer MUST preserve in v0.6.0 implementation)

      - **I1 (totality)**: `evolve_adaptive(t, &u0)` returns
        `Ok(AdaptiveOutcome { … })` for any `t ∈ [0, ∞)` finite,
        `u0 ∈ C::S` finite, and any inner `func` whose `apply` returns
        `Ok(_)` for the controller's chosen substep sequence. Returns
        `Err(AdaptiveStepRejected{last_tau, last_err, steps_attempted})`
        when `steps_attempted ≥ max_substeps`. Inner-`apply` errors
        propagate verbatim (DomainViolation, CflViolated, Unsupported).

      - **I2 (semigroup-splitting interpretation, NORMATIVE)**: per
        math.md §11.1, `AdaptivePI` is NOT a `ChernoffFunction` and
        SHOULD NOT be wrapped in `ChernoffSemigroup<AdaptivePI<C>>`
        (which would attempt a fixed-`n` iteration — defeating the
        purpose). The Engineer SHOULD document this prominently in the
        rustdoc for `AdaptivePI` and add a deny lint or const-eval
        marker that prevents the wrap (or simply omit the
        `ChernoffFunction` impl). The inner-order forward-pass
        `inner_order() -> u32` exposes `func.order()` for callers who
        need the half-step Richardson exponent.

      - **I3 (Lady-Windermere fan accumulation, math.md §11.1)**: under
        quasi-contractivity of the inner C, the global error of
        `evolve_adaptive(T, u_0).final_state` against `e^{T A} u_0` is
        bounded by `M·T·e^{ω T} · O(τ_max^p)` where `τ_max =
        max_i τ_i` is the largest accepted substep and `p =
        inner_order()`. Property `adaptive_pi_contractivity` (proptest,
        1000 cases) verifies a relaxed form: for the constant-a heat
        kernel oracle, `‖final_state − e^{TA}u_0‖_∞ ≤ C · max_τ²` over
        the ten-decade τ-range.

      - **I4 (controller bounded multiplicative)**: τ_new / τ ∈
        [min_ratio, max_ratio] = [0.2, 5.0] strictly enforced via
        `clamp`. After at most `log_5(τ_0 / τ_min_useful)` rejections
        in worst case, the controller drives err ≤ tol OR escalates
        to AdaptiveStepRejected via max_substeps cap.

      - **I5 (mixed tolerance enforced)**: `tol = tol_abs + tol_rel ·
        max(‖u_i‖_∞, ‖u_full‖_∞)`. Default `tol_abs > 0` prevents
        division-by-zero at vanishing amplitudes; `tol_rel > 0` keeps
        accuracy-relative for bounded smooth solutions.
    fields:
      - name: func
        type: C
        doc: "The inner Chernoff function (1D, 2D, ζ-A, TruncatedExp, ζ⁴, TruncatedExp⁴, Strang2D, etc.)."
      - name: tol_abs
        type: f64
        doc: "Absolute-error tolerance floor. Default 1e-8. MUST be > 0 and finite."
      - name: tol_rel
        type: f64
        doc: "Relative-error tolerance scale. Default 1e-6. MUST be ≥ 0 and finite."
      - name: safety
        type: f64
        doc: "Multiplicative safety on PI controller output. Default 0.9. MUST be in (0, 1)."
      - name: alpha
        type: f64
        doc: |
          Proportional (P) controller gain on `(tol/err)`. Default
          `0.7 / p` where `p = func.order()`. MUST be > 0.
      - name: beta
        type: f64
        doc: |
          Integral (I) controller gain on `(err_prev/err)`. Default
          `0.4 / p`. MUST be ≥ 0; `beta = 0` reduces controller to
          pure-Richardson (slightly more rejections at matched accuracy).
      - name: min_ratio
        type: f64
        doc: |
          Lower clamp on τ_new/τ. Default 0.2 (5x maximal contraction
          per rejection). MUST be in (0, 1).
      - name: max_ratio
        type: f64
        doc: |
          Upper clamp on τ_new/τ. Default 5.0 (5x maximal expansion
          per acceptance). MUST be ≥ 1.
      - name: max_substeps
        type: usize
        doc: |
          Hard cap on substep attempts. Default 100_000. Triggers
          `AdaptiveStepRejected` runaway-protection error when reached.
    builder_methods:
      - name: with_tol
        signature: "fn with_tol(self, tol_abs: f64, tol_rel: f64) -> Self"
        semantics: "Builder convenience; sets both tolerances simultaneously."
      - name: with_safety
        signature: "fn with_safety(self, safety: f64) -> Self"
        semantics: "Builder convenience for safety factor."
      - name: with_clamp
        signature: "fn with_clamp(self, min_ratio: f64, max_ratio: f64) -> Self"
        semantics: "Builder convenience for τ-ratio clamping."
      - name: with_max_substeps
        signature: "fn with_max_substeps(self, max_substeps: usize) -> Self"
        semantics: "Builder convenience for runaway cap."
    methods:
      - name: new
        signature: "fn new(func: C) -> Self"
        semantics: |
          v0.6.0 constructor. Initializes ALL nine fields to defaults
          (tol_abs=1e-8, tol_rel=1e-6, safety=0.9, alpha=0.7/p,
          beta=0.4/p, min_ratio=0.2, max_ratio=5.0,
          max_substeps=100_000) where `p = func.order()`. The
          `0.7 / p as f64` computation runs at construction (no
          per-substep recomputation).
      - name: inner_order
        signature: "fn inner_order(&self) -> u32"
        semantics: "Forward-pass `self.func.order()` for callers needing the inner per-step truncation order."
      - name: evolve_adaptive
        signature: "fn evolve_adaptive(&self, t: f64, u0: &C::S) -> Result<AdaptiveOutcome<C::S>, SemiflowError>"
        semantics: |
          v0.6.0 adaptive evolution. Per math.md §11.2, performs the
          PI-controlled substep loop until t_total ≥ t. Returns
          `AdaptiveOutcome { final_state, steps_accepted, steps_rejected,
          last_tau }`. Errors-as-values: any inner `func.apply` error
          propagates; max_substeps overflow returns
          `Err(AdaptiveStepRejected{...})`.

  - name: AdaptiveOutcome
    shape: struct
    type_params: "<S: State>"
    doc: |
      v0.6.0 (ADR-0014) — observable outcome of an `AdaptivePI<C>`
      evolve. Carries the final state plus diagnostic counters for
      callers benchmarking adaptive vs fixed-step.

      `Clone` if `S: Clone`. `Copy` is impractical (S typically a
      `GridFn1D` / `GridFn2D` carrying a `Vec<f64>`).
    fields:
      - name: final_state
        type: S
        doc: "Final state at the requested time `t`."
      - name: steps_accepted
        type: usize
        doc: "Number of accepted substeps. Sum of substeps actually taken."
      - name: steps_rejected
        type: usize
        doc: |
          Number of rejected substeps (controller saw err > tol and
          contracted τ). steps_accepted + steps_rejected =
          total `func.apply` triplets executed during the evolve.
      - name: last_tau
        type: f64
        doc: |
          Final substep τ used to reach `t`. Useful for
          adaptive-restart patterns (caller stores last_tau and seeds
          the next `evolve_adaptive` with it as the initial trial step).

  - name: DriftReactionChernoff
    shape: struct
    doc: |
      v0.2.0 Chernoff function for the drift+reaction operator
      `B f = b(x) f'(x) + c(x) f(x)`.

      v0.2.2 (ADR-0006 Amendment 5) — Runge–Kutta-2 (midpoint + trapezoidal)
      characteristic step:

        X(τ, x) := x + τ · b(x + (τ/2) · b(x))                        // midpoint
        (R(τ) f)(x) := exp((τ/2) · (c(x) + c(X(τ, x)))) · f(X(τ, x))  // trapezoidal

      Local O(τ³), global O(τ²) for `b ∈ C²(ℝ)`, `c ∈ C¹(ℝ)`. Reduction
      to constants: when `b, c` are constants, `X(τ, x) = x + τ b₀` and
      the trapezoidal reaction is `τ c₀` — bit-equal (modulo IEEE
      rearrangement) to the v0.2.1 closed form `exp(τ c) · f(x + τ b)`.
      v0.2.0 / v0.2.1 acceptance gates (G1, G2, G3-strang, G4-strang,
      G1-legacy, G2-legacy — all constant-coefficient) are regression-safe
      by construction; see math.md §9.3 reduction lemma.

      `b, c` are caller-provided as `fn` pointers; `c_norm_bound` is the
      caller-supplied upper bound for ||c||_inf used by `growth()` and the
      G4-strang quasi-contractivity bound.

      Sign convention: shift inside `f` is **PLUS** (`f(X(τ,x))` with
      X(τ,x) = x + τ·b(...)). The PDE is `u_t = b·u_x + c·u`; the
      foot-point ODE `∂_τ X = +b(X), X(0) = x` integrates to `X = x + τ b`
      for constant `b`. **MUST match `drift_reaction.rs` line 152**.

      ## Invariants (Engineer MUST preserve in v0.2.2 implementation)

      - **I1 (totality)**: `apply(τ, &f)` returns `Ok(_)` for any
        `τ ∈ [0, ∞)` finite and `f ∈ GridFn1D` finite. `RK2 introduces
        no new failure modes` over the v0.2.1 closed form: a single
        extra `b(·)` evaluation at the half-step probe and one extra
        `c(·)` evaluation at `X(τ,x)`; `f.sample(X(τ,x))` is governed
        by the existing boundary policy and never fails for finite
        inputs (boundary dispatch is total per Grid1D I1, traits.yaml §3).
        v0.2.1 error variants are unchanged: `DomainViolation` for
        `τ < 0` or non-finite `τ`, `Unsupported` propagated only from
        `f.sample()` under `InterpKind::Linear` without the `linear-interp`
        feature flag.

      - **I2 (variable-coefficient order-2)**: for `b ∈ C²` and `c ∈ C¹`
        the iterated approximant `(R(T/n))^n f` has global error
        `O(τ²)` in `τ = T/n` (local `O(τ³)` × n steps). Property
        `drift_reaction_variable_order2` (properties.yaml) verifies
        empirically over the linear-restoring oracle
        `b(x) = -γ x, c ≡ -κγ` with closed-form
        `u(τ,x) = e^{-κγτ} · exp(-x²·e^{-2γτ}/(2σ²))` for Gaussian
        initial data. Expected log-log slope ≤ -1.95 over a 5-point
        τ-sweep `{2^-6, ..., 2^-10}`.

      - **I3 (constant-coefficient regression-safety)**: for **constant**
        `b(x) ≡ b₀, c(x) ≡ c₀`, `apply(τ, &f)` MUST return values
        bit-equal to within ≤ 4 ULPs of the v0.2.1 closed form
        `exp(τ c₀) · f.sample(x + τ b₀)`. Tolerance `1e-13` over 1000
        random `(τ ∈ [0, 1], b₀ ∈ [-2, 2], c₀ ∈ [-1, 1])` triples is
        the empirical guard (≈ 10⁴ ULP envelope; absorbs reasonable
        rearrangement, detects sign errors and missing factors).
        Property `drift_reaction_constant_fast_path_exact`. **Engineer
        MAY use a function-pointer-equality fast path** if it produces
        bit-equal output for constants AND simplifies the implementation;
        the contract requires only the *numerical* equality, not the
        code path. Performance regression target: ±1% per-step latency
        vs. v0.2.1 (one extra `b(·)` + one extra `c(·)` + one extra
        `add`/`mul`/`mul`; constants ≈ 2-3 ns on x86_64; well within
        ±1% of the existing ~30 ns/node baseline).
    fields:
      - name: b
        type: "fn(f64) -> f64"
        doc: "Drift coefficient b(x). Bounded with 3 derivatives per Theorem 6."
      - name: c
        type: "fn(f64) -> f64"
        doc: "Reaction coefficient c(x). Bounded with 3 derivatives per Theorem 6."
      - name: c_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for ||c||_inf, used by growth() and
          the G4-strang quasi-contractivity check. Pass +infinity if unknown.
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = ∞ for constants, growth = (1, ||c||_inf))"
    methods:
      - name: new
        signature: "fn new(b: fn(f64) -> f64, c: fn(f64) -> f64, c_norm_bound: f64) -> Self"
        semantics: "Constructor; no validation of closures."

      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          v0.2.2 (RK2): for each grid node x_i:
            x        = self.grid.x_at(i)
            b0       = (self.b)(x)
            x_mid    = x + 0.5 * tau * b0                  // forward Euler half-step
            b_mid    = (self.b)(x_mid)                     // midpoint slope
            x_foot   = x + tau * b_mid                     // RK2 foot-point X(τ, x)
            c0       = (self.c)(x)
            c_foot   = (self.c)(x_foot)                    // c at foot-point
            reaction = libm::exp(0.5 * tau * (c0 + c_foot))// trapezoidal
            shifted  = f.sample(x_foot)?                   // sub-grid sample at foot-point
            result.values[i] = reaction * shifted

          Suckless: ≤ 50 lines for `apply_at_node`; total for `drift_reaction.rs`
          ≤ 200 lines (file budget unchanged from v0.2.0).

          Engineer notes (PITFALLS):
            - Sign on every shift is PLUS: midpoint probe `x + (τ/2)·b(x)`,
              foot-point `x + τ·b(x_mid)`, sample at `f(x_foot)`. PDE is
              `u_t = b·u_x + c·u`; foot-point ODE is `∂_τ X = +b(X), X(0)=x`.
              Three sign-`+` sites; do NOT flip any of them.
            - Reaction is `exp((τ/2)·(c(x) + c(X(τ,x))))`, NOT
              `exp(τ·c(x))` (v0.2.1 form, first-order for variable c) and
              NOT `1 + (τ/2)·(c0+c_foot)` (would be 1st-order). Trapezoidal
              EXP is the order-2 lift.
            - Use libm::exp (no_std) — NOT f64::exp (std-only).
            - Constant-`(b,c)` reduction MUST be bit-equal modulo IEEE
              rearrangement to v0.2.1 closed form. `(τ/2)*c0 + (τ/2)*c0 ≡ τ*c0`
              within ≤ 2 ULPs (round-to-nearest); midpoint with constant `b`
              gives `b_mid = b0`, hence `x_foot = x + τ*b0` exact.
            - Engineer MAY add a function-pointer-equality fast path
              `if self.b == const_fn && self.c == const_fn { ... }` if it
              simplifies the code OR improves perf, but the v0.2.2 numerical
              contract is REGARDLESS bit-equal for constants — fast path is
              optional optimisation, not a correctness requirement.
        preconditions:
          - "tau is finite and >= 0.0"
          - "f.norm_sup() is finite"
        postconditions:
          - "result has same structural shape as f"
          - "tau == 0.0 implies result == f bit-exactly (b_mid = b0, x_foot = x, exp(0) = 1, sample at node)"
        errors:
          - "DomainViolation if tau < 0 or tau is NaN/Inf"
          - "DomainViolation if f contains NaN/Inf"
          # No new error variants vs v0.2.1 — RK2 is total over the same
          # input domain (one extra b(·) and one extra c(·) call cannot fail
          # for `fn(f64) -> f64` callables; one extra f.sample(x_foot) is
          # governed by the existing boundary policy which is total).

      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          Returns 2. v0.2.2 (ADR-0006 Amendment 5): the RK2 step is itself
          local O(τ³) / global O(τ²) for variable coefficients (b ∈ C², c ∈ C¹).
          For constant b, c the formula is exact (math.md §9.3 reduction
          lemma; bit-equal to v0.2.1). The reported `order = 2` matches both
          (i) the global order of the composed StrangSplit (unchanged from
          v0.2.0) and (ii) the standalone global order of R itself in the
          variable-coefficient regime (NEW in v0.2.2).

      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns `(1.0, c_norm_bound)`. Bound: ‖R(τ) f‖∞ ≤ exp(τ·||c||∞)·‖f‖∞,
          so M=1 and ω=||c||∞. The caller supplies c_norm_bound as ω.

  - name: StrangSplit
    shape: "struct<D: ChernoffFunction<S = GridFn1D> + Copy, R: ChernoffFunction<S = GridFn1D> + Copy>"
    doc: |
      v0.2.0 Strang operator-splitting composer:

        Φ(τ) f = D(τ/2) ∘ R(τ) ∘ D(τ/2) f

      Implements `ChernoffFunction` itself, so it composes seamlessly with
      `ChernoffSemigroup<StrangSplit<D, R>>` for the iterated Chernoff
      approximation `(Φ(t/n))^n f` of `e^{tL}`.

      Order-2 result (Hairer–Lubich–Wanner, *Geometric Numerical Integration*,
      §III.5, Thm 4.1): if `D` matches `e^{τA}` to local O(τ³) and `R` is
      exact (or matches `e^{τB}` to local O(τ³)), then for [A,B] = 0
      (constant coefficients) the Strang sandwich is exact up to D's
      truncation, giving global order 2 in `n = T/τ`. For variable
      coefficients ([A,B] ≠ 0), the palindromic structure of Strang cancels
      the leading τ³ commutator term, preserving global order 2.

      v0.2.0 acceptance test (G3-strang) verifies this empirically over
      `n ∈ {32, 64, 128, 256, 512, 1024}` with slope ≤ −1.95.
    fields:
      - name: diffusion
        type: D
        doc: "Inner Chernoff function for A = a(x)·∂². Typically DiffusionChernoff."
      - name: drift_reaction
        type: R
        doc: "Inner Chernoff function for B = b(x)·∂ + c(x). Typically DriftReactionChernoff."
    implements:
      - "ChernoffFunction (associated S = GridFn1D, order = min(D.order(), R.order(), 2), growth = composed)"
    methods:
      - name: new
        signature: "fn new(diffusion: D, drift_reaction: R) -> Self"
        semantics: "Constructor. No validation — D and R already validated their own fields."

      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          Strang sandwich:
            half = tau / 2.0
            f1 = self.diffusion.apply(half, f)?           // D(τ/2)
            f2 = self.drift_reaction.apply(tau, &f1)?     // R(τ)
            f3 = self.diffusion.apply(half, &f2)?         // D(τ/2)
            return Ok(f3)
          Three buffer allocations (f1, f2, f3) — Engineer MAY optimize via
          axpy in-place if it stays within file budget.
        preconditions:
          - "tau is finite and >= 0.0"
          - "f.norm_sup() is finite"
        postconditions:
          - "result has same structural shape as f"
          - "tau == 0.0 implies result == f modulo interp idempotence on grid nodes"
        errors:
          - "DomainViolation propagated from either inner apply"

      - name: order
        signature: "fn order(&self) -> u32"
        semantics: "Returns 2 (the canonical Strang order for compatible inner methods)."

      - name: growth
        signature: "fn growth(&self) -> (f64, f64)"
        semantics: |
          Returns the composed bound. With diffusion.growth() = (1, 0) and
          drift_reaction.growth() = (1, c_norm_bound):
            (M, ω) = (1.0 · 1.0 · 1.0, 0 + c_norm_bound + 0) = (1, c_norm_bound)
          Per-step bound ||Φ(τ)|| ≤ 1·exp(τ·c_norm_bound)·1 ≤
          (1 + c_norm_bound·τ + 20·τ²) for ||c||∞ ≤ 5 and τ ≤ 0.1
          (G4-strang invariant constant C = 20).

  # =========================================================================
  # v2.6 (ADR-0068) — BoxRegion, BallRegion (KillingRegion impls),
  # KillingChernoff wrapper, HdrSnapshot. Appended to `structs:` section.
  # =========================================================================
  - name: BoxRegion
    location: "crates/semiflow-core/src/killing.rs"
    doc: |
      v2.6 (ADR-0068). Axis-aligned open box `R = ∏_k (lo[k], hi[k]) ⊂ ℝᴰ`.
      `is_inside(p)` returns true iff `lo[k] < p[k] < hi[k]` for ALL `k ∈ [0, D)`.
      Open convention (boundary cells excluded). Const-generic `D` for
      zero-overhead per-axis dispatch.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: lo
        type: "[F; D]"
        doc: "Lower bounds per axis. MUST be finite. Invariant: lo[k] < hi[k] for all k."
      - name: hi
        type: "[F; D]"
        doc: "Upper bounds per axis. MUST be finite. Invariant: lo[k] < hi[k] for all k."
    constructors:
      - name: new
        signature: "pub fn new(lo: [F; D], hi: [F; D]) -> Result<Self, SemiflowError>"
        semantics: |
          Validates `lo[k] < hi[k]` AND `lo[k].is_finite() && hi[k].is_finite()`
          for all `k ∈ [0, D)`. Returns `DomainViolation` if any axis is
          degenerate or non-finite.
        errors:
          - "DomainViolation if any lo[k] >= hi[k] or any non-finite"
    impls:
      - trait: "KillingRegion<F>"
        notes: |
          `is_inside` is the all-axes bound check. `mask_in_place` overrides
          the default with a tight scalar loop over the grid (no SIMD in
          v2.6; benchmark evidence may justify SIMD in v2.6.x PATCH).
          `dim` returns `D`.

  - name: BallRegion
    location: "crates/semiflow-core/src/killing.rs"
    doc: |
      v2.6 (ADR-0068). Open ball `R = { x ∈ ℝᴰ : |x - center|_2 < radius }`.
      `is_inside(p)` returns true iff `sum_k (p[k] - center[k])^2 < radius^2`
      (compare squared to avoid `sqrt`). Open convention (boundary excluded).
      Const-generic `D`.

      Use case: manifold-pillar prep (v2.8 A4 spherical caps), reflected
      heat on bounded balls (v2.8 B4 image method).
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: center
        type: "[F; D]"
        doc: "Ball center. MUST be finite."
      - name: radius
        type: "F"
        doc: "Ball radius. MUST be strictly positive and finite."
    constructors:
      - name: new
        signature: "pub fn new(center: [F; D], radius: F) -> Result<Self, SemiflowError>"
        semantics: |
          Validates `radius > 0` AND `radius.is_finite()` AND all
          `center[k].is_finite()`. Returns `DomainViolation` otherwise.
        errors:
          - "DomainViolation if radius <= 0, non-finite, or any non-finite center"
    impls:
      - trait: "KillingRegion<F>"
        notes: |
          `is_inside` compares squared distance to `radius^2` (no sqrt).
          `mask_in_place` overrides default with tight scalar loop; D=1, D=2,
          D=3 specializations may be added in v2.6.x PATCH if benchmark
          evidence demands. `dim` returns `D`.

  - name: KillingChernoff
    location: "crates/semiflow-core/src/killing.rs"
    doc: |
      v2.6 (ADR-0068, math §21.3). Generic wrapper that lifts any inner
      `ChernoffFunction<F>` to a Chernoff function for the absorbing-boundary
      (Feynman-Kac killed) semigroup `(P^R_t f)(x) = E^x[f(X_t) · 1_{τ_R > t}]`,
      where `R: KillingRegion<F>` and `τ_R` is the first exit time from `R`.

      Algorithmic semantics (single Chernoff step):
        1. `self.inner.apply_into(τ, src, dst)`  — unrestricted Chernoff step.
        2. `self.region.mask_in_place(dst)`       — post-multiply by 1_R.

      **Post-multiply, NOT pre-multiply**: per Butko 2018 §2.3 the
      pre-multiply variant `inner.apply(τ, 1_R · src)` over-kills the interior
      (the Chernoff stencil's interior cells lose contributions from boundary
      cells that were zeroed before the stencil acted). The library MUST NOT
      implement the pre-multiply variant.

      **Order-1 globally** regardless of `inner.order()` — killing introduces
      an irreducible `O(τ)` commutator `[L, 1_R]` per Butko 2018 §3.2. This
      caps the global convergence rate; `order()` returns 1.

      **Growth**: inherits `inner.growth()` because `1_R` is a contraction
      (`‖1_R · f‖_∞ ≤ ‖f‖_∞`).

      **Transparent composition**: `KillingChernoff<Strang2D<DiffusionChernoff,
      DiffusionChernoff>, BoxRegion<f64, 2>>` is a valid construction.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "ChernoffFunction<F>"
      - name: R
        bound: "KillingRegion<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: inner
        type: C
        doc: "Inner Chernoff function (the unrestricted operator's Chernoff approximation)."
      - name: region
        type: R
        doc: "Killing region. Cells outside R are zeroed after each step."
    constructors:
      - name: new
        signature: "pub fn new(inner: C, region: R) -> Result<Self, SemiflowError>"
        semantics: |
          Validates `inner.S::dim() == region.dim()` at construction.
          Returns `DomainViolation` on dimension mismatch.
        errors:
          - "DomainViolation if inner.S::dim() != region.dim()"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `apply_into`: step (1) inner, step (2) mask. The default `apply`
          (allocating) is inherited from the trait.
          `order()` returns `1` (Butko §3.2 killing cap).
          `growth()` returns `inner.growth()` (1_R contraction).
          NO `apply_parallel_into` impl in v2.6 (single-threaded post-multiply
          is the v2.6 baseline; v2.6.x PATCH may add per-cell parallelization
          if benchmark evidence justifies).

  - name: HdrSnapshot
    location: "crates/semiflow-core/src/hdr.rs"
    doc: |
      v2.6 (ADR-0068). HDR-style latency snapshot for L-gate harness output
      parsing. Backed by a `Vec<i64>` (nanosecond-tick latency values), with
      NIST nearest-rank percentile computation (ASTM E29-13 §6, formula
      `r = ceil((p/100) * N)`).

      Naming convention: "HDR" follows benchmarking literature convention
      for tail-latency snapshots; the implementation is array-backed
      nearest-rank, NOT log-bucket histograms. The `hdrhistogram` crate
      (~2.5k LoC, 3 deps) would exceed the `semiflow-core` 3-dep cap
      (ADR-0001 / constitution); nearest-rank on bounded sample sizes
      (≤ 1M observations, the v2.6 baseline) is exact and ~30 LoC.

      v2.6 sample type is `i64` (nanoseconds, signed for stat-test
      compatibility). The struct surface is designed to admit a future
      generic-over-`F` extension at v2.7+ if non-time observables (RSS bytes,
      cache-miss counts) gain L-gate entries.

      Used by `xtask latency-gate` to parse `examples/latency_tail.rs`
      JSONL output (one snapshot per replication; the harness aggregates
      across reps via median-of-percentiles).
    derive:
      - Debug
      - Clone
    fields:
      - name: samples
        type: "Vec<i64>"
        visibility: "pub(crate)"
        doc: "Raw nanosecond observations. SORTED lazily on first percentile query."
      - name: is_sorted
        type: bool
        visibility: "pub(crate)"
        doc: "Sort-state cache. set false on record(); set true on first percentile() call."
    constructors:
      - name: new
        signature: "pub fn new(capacity: usize) -> Self"
        semantics: |
          Construct with reserved capacity. `samples = Vec::with_capacity(cap)`,
          `is_sorted = true` (empty vec is trivially sorted).
        preconditions: []
        postconditions:
          - "result.count() == 0"
    methods:
      - name: record
        signature: "pub fn record(&mut self, ns: i64)"
        semantics: |
          Append `ns` to `samples`. Sets `is_sorted = false`. O(1) amortized.
          `ns` MAY be negative (clock skew); the percentile is computed on
          the raw values without filtering.
        preconditions: []
        postconditions:
          - "self.count() == old(self.count()) + 1"
      - name: percentile
        signature: "pub fn percentile(&mut self, pct: f64) -> i64"
        semantics: |
          NIST nearest-rank percentile (ASTM E29-13 §6): sort lazily if
          `!is_sorted`, then return `samples[rank - 1]` where
          `rank = clamp(ceil(pct/100 * N), 1, N)`. Returns `0` if
          `samples.is_empty()` (vacuously, per `latency_tail.rs` §percentile).
          Mutable self because sort happens lazily on first call.
        preconditions:
          - "0.0 <= pct <= 100.0"
        postconditions:
          - "self.is_sorted == true after call"
      - name: count
        signature: "pub fn count(&self) -> usize"
        semantics: "Number of recorded observations. Returns `self.samples.len()`."
        preconditions: []
        postconditions: []
      - name: clear
        signature: "pub fn clear(&mut self)"
        semantics: "Resets the snapshot to empty. `samples.clear()`, `is_sorted = true`."
        preconditions: []
        postconditions:
          - "self.count() == 0"

  # =========================================================================
  # v3.1 (ADR-0077) — HypoellipticChernoff + KolmogorovPhaseSpace +
  # HeisenbergGroup. All in crates/semiflow-core/src/hormander.rs (Cohort 6
  # Override #1 carve-out per constitution v1.7.1).
  # =========================================================================
  - name: HypoellipticChernoff
    location: "crates/semiflow-core/src/hormander.rs"
    doc: |
      v3.1 (ADR-0077, math §28.6). Generic wrapper that lifts a pair
      `(x0_drift, x_diff)` of `VectorField<F, D>` objects to a
      `ChernoffFunction<F>` for the hypoelliptic semigroup generated by
      $L = X_0 + \tfrac{1}{2}\sum_{k=1}^{M} X_k^2$ via the palindromic
      Strang-Hörmander decomposition (math §28.3 equation 28.4):

      $$
      F(\tau) := e^{\tau X_0 / 2} \circ
                 \!\Bigl(\prod_{k=1}^{M-1} e^{\tau X_k^2 / 2}\Bigr) \circ
                 e^{\tau X_M^2 / 2} \circ
                 \!\Bigl(\prod_{k=M-1}^{1} e^{\tau X_k^2 / 2}\Bigr) \circ
                 e^{\tau X_0 / 2}
      $$

      Order-2 tangent on $f \in D(L^2)$ for step-2 Carnot generators via the
      Galkin-Remizov 2025 *IJM* Theorem 3.1 K=2 framework (math §28.3). The
      v3.0 `ApproximationSubspace<2, F>` witness (ADR-0073) is consumed at
      construction time for the K=2-jet membership check.

      **v3.1 RESTRICTIONS**:
        - **Step-2 Carnot ONLY**. The constructor's step-checker verifies the
          bracket-generating condition at the grid centre via SVD; user-defined
          step ≥ 3 backends (Engel group, free nilpotent step-3) FAIL the check
          and return `DomainViolation`. Deferred to v3.2+ Tier C.
        - **Order-2 ONLY**. Order ≥ 3 is the **Festschrift §3 open problem**;
          explicitly out of scope, cited in `docs/papers/hormander-paper-draft.md`.
        - **Gated by G28 ONLY for the Kolmogorov 1934 backend**. The Heisenberg
          backend ships as a CONSTRUCTIVE instance (compiles, runs, passes the
          step-2 checker) but is NOT gated (closed-form heat kernel involves
          complex integrals; validation deferred to v4.0+ SemiflowComplex).

      **Composition**: HypoellipticChernoff is composable with the v2.6/v2.7
      wrappers — `LaplaceChernoffResolvent<HypoellipticChernoff<f64, 2, 1>>`
      compiles because both wrappers are generic over `ChernoffFunction<F>`.
      Not gated by v3.1; composability is an emergent property.

      **NOT a `TimedChernoffFunction<F>` by default**: nonautonomous
      hypoelliptic evolution (time-dependent vector fields) is open math;
      defer to v3.x+ research.

      **Opts in to `ApproximationSubspace<2, F>`** (the FOURTH v3.x opt-in
      after the v3.0 trio: DiffusionChernoff K=2, Diffusion4thChernoff K=4,
      TruncatedExp4thDiffusionChernoff K=6).
    derive:
      - Debug         # only for the struct shell; Box<dyn> fields don't derive Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
      - name: M
        kind: "const usize"
    fields:
      - name: x0_drift
        type: "Box<dyn VectorField<F, D>>"
        doc: "Drift vector field X_0. MAY be the zero field (HeisenbergGroup case)."
      - name: x_diff
        type: "[Box<dyn VectorField<F, D>>; M]"
        doc: "The M diffusive vector fields X_1, ..., X_M. Invariant: M >= 1."
      - name: grid
        type: "GridND<F, D>"
        doc: "Per-axis tensor-product grid (uniform per axis; reflecting BCs by default)."
      - name: step_checker_result
        type: "StepCheckerResult"
        doc: "Cached at construction. step ∈ {1, 2}; step ≥ 3 returns DomainViolation from the constructor (v3.1.0 restriction)."
    constructors:
      - name: new
        signature: |
          pub fn new(
              x0_drift: Box<dyn VectorField<F, D>>,
              x_diff: [Box<dyn VectorField<F, D>>; M],
              grid: GridND<F, D>,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Construct and verify the step-2 bracket-generating condition.
          Caches `step_checker_result` for downstream introspection. The
          step-checker evaluates {X_1, ..., X_M, [X_1, X_2], ..., [X_{M-1}, X_M]}
          at the grid centre and verifies their span equals D via SVD; rank < D
          OR step > 2 returns DomainViolation. Also validates D >= 2, M >= 1,
          per-axis grid uniformity.
        errors:
          - "DomainViolation if D < 2"
          - "DomainViolation if M < 1"
          - "DomainViolation if any VectorField::evaluate returns NaN/Inf at the grid centre"
          - "DomainViolation if step-checker SVD rank < D (insufficient bracket generation)"
          - "DomainViolation if detected step > 2 (v3.1.0 restricted to step-2 Carnot)"
          - "DomainViolation if grid is non-uniform per axis"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = GridFnND<F, D>` (v0.5 tensor-product state type, REUSED).
          `apply_into`: per math §28.3 — palindromic Strang-Hörmander loop:
            (1) apply X_0 half-step (drift along X_0 for τ/2)
            (2) forward sweep of inner X_k² full-step exponentials (k = 1..M-1)
            (3) middle X_M² full-step exponential
            (4) reverse sweep of inner X_k² full-step exponentials (k = M-1..1)
            (5) apply X_0 half-step
          `order()` returns 2 per Theorem 28.1 + Galkin-Remizov 2025 IJM K=2.
          `growth()` returns Growth { multiplier: F::one(), omega: F::zero() }
            — sub-Markov per G29.
          NO `apply_parallel_into` impl in v3.1 (per-axis tensor-product loop
          IS parallelizable but defer to v3.2 — calibrate parallel speedup
          separately).
      - trait: "ApproximationSubspace<2, F>"
        notes: |
          Opt-in marker (FOURTH v3.x opt-in). `in_subspace(&f)` returns true
          iff f has at least 5^D grid points per axis (5-point central-
          difference stencil width per axis × const-generic D). `jet(&f, &mut out)`
          writes [f, L f, L² f] into the 3-element out slice via 2 iterations
          of the discretised Hörmander operator L = X_0 + (1/2) Σ X_k².
          Consumed by `HypoellipticChernoff::new` for the K=2 witness check
          at construction time (rides on the v3.0 ADR-0073 infrastructure).

  - name: KolmogorovPhaseSpace
    location: "crates/semiflow-core/src/hormander.rs"
    doc: |
      v3.1 (ADR-0077, math §28.4.A). Closed-form Carnot backend implementing
      `VectorField<F, 2>` for the Kolmogorov 1934 phase space $\mathbb{R}^2 =
      \{(x, v)\}$ pair $\{X_0 = v \cdot \partial_x, X_1 = \partial_v\}$.

      The unique bracket $[X_1, X_0] = \partial_x$ supplies the missing
      direction; step-2 bracket-generating per math §28.2.

      **Use cases**:
        - G28 (RELEASE_BLOCKING) oracle: Kolmogorov 1934 fundamental solution
          (math §28.2 eq 28.3) is the closed-form reference for the order-2
          slope gate.
        - G29 (RELEASE_BLOCKING) oracle: the mass-conservation gate uses the
          same setup as G28.
        - T_HORM (NORMATIVE sympy) reference: the sympy script
          `scripts/verify_hormander_kolmogorov.py` derives the reference table
          symbolically from the same closed-form kernel.
        - Reference impl for any future hypoelliptic backend additions.

      Generic over `F: SemiflowFloat = f64`. Both vector-field methods
      (`evaluate`, `bracket_with`) are closed-form (no quadrature, no Jacobian
      approximation) — sympy-traceable accuracy for the step-checker.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields: []          # Zero-sized type; no runtime state
    constructors:
      - name: x0_drift
        signature: "pub fn x0_drift() -> Self"
        semantics: |
          Construct a marker instance for the X_0 = v · ∂_x drift vector field.
          The struct is zero-sized (no runtime state); the static method just
          returns the unit-tag. Infallible.
        errors: []
      - name: x1_diffusion
        signature: "pub fn x1_diffusion() -> Self"
        semantics: |
          Construct a marker instance for the X_1 = ∂_v diffusion vector field.
          Same zero-sized backing as x0_drift; distinguished by the impl.
          Infallible. NOTE: returning the same Self type from two static
          constructors with different VectorField semantics is INTENTIONAL —
          the engineer disambiguates via a private newtype-tag pattern (Wave B
          implementation detail; not part of the public API surface).
        errors: []
    impls:
      - trait: "VectorField<F, 2>"
        notes: |
          `evaluate(x, out)`:
            For x0_drift: out := [v, 0]  where v := x[1]   (X_0 = v · ∂_x)
            For x1_diffusion: out := [0, 1]                 (X_1 = ∂_v)
          `bracket_with(other, x, out)`:
            For self = x1_diffusion AND other = x0_drift: out := [1, 0]
                                                          ([X_1, X_0] = ∂_x)
            Other pairs: default impl (central-difference); returns zero for
            X_0 self-bracket (always [X, X] = 0).
          Both methods are O(1); no allocation; sympy-traceable.

  - name: HeisenbergGroup
    location: "crates/semiflow-core/src/hormander.rs"
    doc: |
      v3.1 (ADR-0077, math §28.4.B). Closed-form Carnot backend implementing
      `VectorField<F, 3>` for the Heisenberg group $\mathbb{H}^1 = \{(x, y, t)\}$
      left-invariant pair $\{X_1 = \partial_x - (y/2)\partial_t,\;
      X_2 = \partial_y + (x/2)\partial_t\}$ (with implicit $X_0 = 0$).

      The bracket $[X_1, X_2] = \partial_t$ supplies the missing direction;
      step-2 bracket-generating per math §28.2.

      **v3.1 STATUS: UNGATED constructive instance**. The Heisenberg sub-
      Laplacian heat kernel admits a closed form via complex-valued integrals
      (Beals-Gaveau-Greiner 1997 *Bull. Sci. Math.* 121); validation requires
      v4.0+ `SemiflowComplex`. v3.1 ships this backend so that:
        (1) The framework `HypoellipticChernoff<f64, 3, 2>` COMPILES with the
            Heisenberg pair as `x_diff`.
        (2) The step-2 checker verifies the bracket-generating condition AT
            CONSTRUCTION (i.e., the closed-form bracket `[X_1, X_2] = ∂_t`
            is sympy-traceable via the override of `bracket_with`).
        (3) The user receives a runnable demonstration of the framework
            beyond the Kolmogorov 1934 case.
      But the convergence slope is NOT gated (no closed-form real-valued
      reference solution available in v3.1).

      **Use cases**:
        - v3.2+ validation once SemiflowComplex lands.
        - Constructive demonstration of multi-field (M = 2) hypoelliptic
          algorithm.

      Generic over `F: SemiflowFloat = f64`. Both vector-field methods are
      closed-form.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: which
        type: "HeisenbergFieldTag"        # private enum: X1 | X2; selects evaluate branch
        doc: "Private tag distinguishing the X_1 vs X_2 left-invariant field. Engineer-implementation detail."
    constructors:
      - name: left_invariant_pair
        signature: "pub fn left_invariant_pair() -> (Self, Self)"
        semantics: |
          Construct the (X_1, X_2) pair as two HeisenbergGroup instances with
          internal tags X1 and X2 respectively. Caller uses the pair to
          construct the `x_diff: [Box<dyn VectorField<f64, 3>>; 2]` parameter
          to `HypoellipticChernoff::new`. Infallible.
        errors: []
    impls:
      - trait: "VectorField<F, 3>"
        notes: |
          `evaluate(x, out)`:
            For tag X1: out := [1, 0, -x[1] / 2]  (X_1 = ∂_x - (y/2)∂_t)
            For tag X2: out := [0, 1,  x[0] / 2]  (X_2 = ∂_y + (x/2)∂_t)
          `bracket_with(other, x, out)`:
            For tag X1 AND other tag X2: out := [0, 0, 1]  ([X_1, X_2] = ∂_t)
            For tag X2 AND other tag X1: out := [0, 0, -1] (anti-symmetric)
            Same-tag self-bracket: out := [0, 0, 0].
          Both methods are O(1); no allocation; sympy-traceable.

  # =========================================================================
  # v3.1 (ADR-0078) — QuantumGraph + KirchhoffVertex + QuantumGraphHeatChernoff
  # + QuantumGraphSignal. All in crates/semiflow-core/src/quantum_graph.rs
  # (~400 LoC target, default 500-LoC cap, NO Override expansion).
  # =========================================================================
  - name: QuantumGraph
    location: "crates/semiflow-core/src/quantum_graph.rs"
    doc: |
      v3.1 (ADR-0078, math §29.6). Metric-graph data structure for quantum
      graphs — a 1-complex of edges $\{e_i\}$ with caller-supplied edge
      lengths $\{\ell_i\}$ + per-edge `Grid1D<F>` discretisation. The graph
      geometry is decoupled from the vertex coupling condition: the same
      `QuantumGraph<F>` instance may underwrite `QuantumGraphHeatChernoff`
      (Kirchhoff vertex condition in v3.1) AND future C7 extensions (δ-vertex,
      δ'-vertex per Berkolaiko-Kuchment 2013 §1.4.2).

      Generic over `F: SemiflowFloat = f64`.

      **v3.1 SIMPLIFICATIONS**:
        - Equal-length-edges assumption RELAXED: per-edge lengths CAN vary,
          but per-edge grid resolution is the SAME (single `edge_n_grid_points`
          constructor parameter for all edges). Variable per-edge grid
          resolution defers to v3.2 (not needed for v3.1 G30 — path-graph
          edges are equal-length by construction).
        - Per-edge BoundaryPolicy is `BoundaryPolicy::Reflect` by default; the
          Kirchhoff projection OVERRIDES the per-edge boundary at every
          Chernoff step, so the per-edge BoundaryPolicy is operationally
          inactive at vertex points.

      **NOT a sub-type of v2.1 `GraphSignal<F>`**: the v2.1 ordinary-graph
      types operate on the *discrete* graph Laplacian (one value per vertex,
      no edge structure). `QuantumGraph<F>` is structurally distinct (per-
      edge continuum + vertex coupling). The two type families are
      complementary, not subtype-related.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: n_vertices
        type: "usize"
        doc: "Number of vertices |V|. Invariant: n_vertices >= 1."
      - name: n_edges
        type: "usize"
        doc: "Number of edges |E|. Invariant: n_edges >= 1."
      - name: edge_endpoints
        type: "Vec<(usize, usize)>"
        doc: "Per-edge (vertex_a, vertex_b) tuple. Invariant: len == n_edges; all entries < n_vertices."
      - name: edge_lengths
        type: "Vec<F>"
        doc: "Per-edge length ℓ_i. Invariant: len == n_edges; all entries > 0 and finite."
      - name: edge_grids
        type: "Vec<Grid1D<F>>"
        doc: "Per-edge Grid1D discretisation (uniform; same n per edge). Invariant: len == n_edges."
      - name: vertex_adjacency
        type: "Vec<Vec<usize>>"
        doc: "Per-vertex list of incident edge indices. Cached from edge_endpoints at construction. Invariant: len == n_vertices."
    constructors:
      - name: new
        signature: |
          pub fn new(
              edge_endpoints: Vec<(usize, usize)>,
              edge_lengths: Vec<F>,
              edge_n_grid_points: usize,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Construct from edge topology + lengths + grid resolution. Derives
          n_vertices := 1 + max(all_vertex_indices_in_edge_endpoints); builds
          per-edge Grid1D::new(0.0, edge_lengths[i], edge_n_grid_points) with
          BoundaryPolicy::Reflect; caches vertex_adjacency from edge_endpoints
          via an O(|E|) scan.
        errors:
          - "DomainViolation if edge_endpoints.len() != edge_lengths.len()"
          - "DomainViolation if any edge_lengths[i] <= 0 or non-finite"
          - "DomainViolation if any edge_endpoints[i] has a vertex index >= computed n_vertices"
          - "DomainViolation if edge_n_grid_points < 5 (ShiftChernoff1D stencil width)"
          - "DomainViolation if any vertex has degree 0 (disconnected — degenerate)"

  - name: KirchhoffVertex
    location: "crates/semiflow-core/src/quantum_graph.rs"
    doc: |
      v3.1 (ADR-0078, math §29.6). Per-vertex Kirchhoff orthogonal projector
      container. Holds the closed-form $d_v \times d_v$ projector matrix
      $P_v = I_{d_v} - \tfrac{1}{d_v}\mathbf{1}_{d_v}\mathbf{1}_{d_v}^T$
      (math §29.2 equation 29.1) onto the Kirchhoff subspace of the vertex.

      **Closed-form construction** (math §29.2 + T_QG sub-check 1): the
      projector is built in O(d²) at construction time and verified
      idempotent via debug_assert (the equation 29.1 closed form is
      analytically idempotent; the debug_assert catches numerical-precision
      issues at construction, not runtime).

      Generic over `F: SemiflowFloat = f64`.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: vertex_index
        type: "usize"
        doc: "Index into QuantumGraph::n_vertices. Invariant: < graph.n_vertices."
      - name: degree
        type: "usize"
        doc: "Number of incident edges (graph.vertex_adjacency[vertex_index].len()). Invariant: >= 1."
      - name: incident_edges
        type: "Vec<usize>"
        doc: "Indices into QuantumGraph::n_edges. Invariant: len == degree."
      - name: projection_matrix
        type: "Vec<F>"
        doc: "Row-major degree × degree orthogonal projector (equation 29.1). Invariant: len == degree × degree; idempotent at F::EPSILON precision."
    constructors:
      - name: new
        signature: |
          pub fn new(
              graph: &QuantumGraph<F>,
              vertex_index: usize,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Construct the per-vertex Kirchhoff projector. Computes the closed-
          form P_v = I_d − (1/d)·1·1^T via direct assembly (O(d²) ops + O(d²)
          memory). Validates the vertex_index in range; reads degree from
          graph.vertex_adjacency. Verifies idempotency at F::EPSILON via
          debug_assert (release builds skip the check; the closed-form
          construction is analytically idempotent so the check is a safety
          net for f32 or future non-IEEE backends).
        errors:
          - "DomainViolation if vertex_index >= graph.n_vertices"
          - "DomainViolation if graph.vertex_adjacency[vertex_index] is empty (degree 0)"

  - name: QuantumGraphHeatChernoff
    location: "crates/semiflow-core/src/quantum_graph.rs"
    doc: |
      v3.1 (ADR-0078, math §29.6). Generic wrapper that lifts a `QuantumGraph<F>`
      to a `ChernoffFunction<F>` for the Kirchhoff heat semigroup on the metric
      graph via per-step composition (math §29.3):
        Phase 1 (edgewise heat): each edge independently steps via a per-edge
                                 `ShiftChernoff1D<F>` with diffusion coefficient
                                 a = 0.5 (matching the L = -(1/2)·∂_x² operator).
        Phase 2 (vertex projection): each vertex's incident-edge endpoint values
                                     are projected onto the Kirchhoff subspace
                                     via the KirchhoffVertex orthogonal projector.

      **Order**: 1 (matches per-edge ShiftChernoff1D::order()). The
      orthogonal projector is idempotent and contracts exactly; it does NOT
      degrade the per-edge order. Order-2 via per-edge DiffusionChernoff
      defers to v3.2 (requires per-edge boundary policy matching).

      **Growth**: Growth { multiplier: F::one(), omega: F::zero() } — the
      per-edge heat semigroup is contractive on each edge; the orthogonal
      projector is contractive on R^d; composition is contractive on L²(Γ).

      **Self::S** = `QuantumGraphSignal<F>` (NEW state type per ADR-0078).

      **NOT a `TimedChernoffFunction<F>`** — time-independent operator; the
      v2.7 super-trait would be a default-bridge no-op. v3.x research may add
      time-dependent vertex couplings (variable-strength δ-vertex per
      Berkolaiko-Kuchment 2013 §1.4.2 with time-varying strength); defer.

      **Composition**: `LaplaceChernoffResolvent<QuantumGraphHeatChernoff<f64>>`
      compiles (both wrappers are generic over `ChernoffFunction<F>`); not
      gated by v3.1 but composability is emergent.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: graph
        type: "QuantumGraph<F>"
        doc: "The metric-graph geometry (owned by value; cheap to clone — Vec inner)."
      - name: vertices
        type: "Vec<KirchhoffVertex<F>>"
        doc: "Per-vertex Kirchhoff projector containers. Invariant: len == graph.n_vertices."
      - name: edge_kernels
        type: "Vec<ShiftChernoff1D<F>>"
        doc: "Per-edge ShiftChernoff1D heat kernel (a=0.5, b=c=0). Invariant: len == graph.n_edges."
    constructors:
      - name: new
        signature: |
          pub fn new(graph: QuantumGraph<F>) -> Result<Self, SemiflowError>
        semantics: |
          Construct from a QuantumGraph. Builds vertices via
          `KirchhoffVertex::new(&graph, v)` for v in 0..n_vertices; builds
          edge_kernels via `ShiftChernoff1D::new(|_| 0.5, |_| 0.0, |_| 0.0,
          &graph.edge_grids[e])` for e in 0..n_edges.
        errors:
          - "DomainViolation propagating from any KirchhoffVertex::new failure"
          - "DomainViolation propagating from any ShiftChernoff1D::new failure"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = QuantumGraphSignal<F>`.
          `apply_into(τ, src, dst, scratch)`:
            Phase 1: for e in 0..n_edges:
                edge_kernels[e].apply_into(τ, src.edge_signal(e),
                                            dst.edge_signal_mut(e), scratch)?;
            Phase 2: for v in 0..n_vertices:
                d := vertices[v].degree;
                gather endpoint_buf from dst's vertex-v incident edges;
                projected_buf := vertices[v].projection_matrix @ endpoint_buf;
                scatter projected_buf back to dst's vertex-v incident edges;
          `order()` returns 1 (matches per-edge ShiftChernoff1D).
          `growth()` returns Growth { multiplier: F::one(), omega: F::zero() }.
          NO `apply_parallel_into` impl in v3.1 (edgewise phase 1 IS
          parallelizable but vertex projection phase 2 needs to wait for all
          edge endpoints to land; defer parallel composition to v3.2).

  - name: QuantumGraphSignal
    location: "crates/semiflow-core/src/quantum_graph.rs"
    doc: |
      v3.1 (ADR-0078, math §29.6). State type for `QuantumGraphHeatChernoff` —
      a per-edge collection of `GridFn1D<F>` values. Implements `State<F>`
      via per-edge delegation (axpy, scale, norm_sup, zeroed_like are per-edge
      linear-combination + sup-norm-across-edges).

      Provides accessors for the QuantumGraphHeatChernoff::apply_into phase-2
      vertex projection:
        - edge_signal(e: usize) -> &GridFn1D<F>            (immutable view)
        - edge_signal_mut(e: usize) -> &mut GridFn1D<F>    (mutable view)
        - edge_endpoint_value(e: usize, side: EdgeSide) -> F  (grid endpoint at vertex side)
        - set_edge_endpoint_value(e, side, value) -> Result<(), _>
                                                            (write back projected value)

      The `EdgeSide` enum (private to quantum_graph.rs) distinguishes the
      vertex_a end (index 0 on the per-edge grid) from the vertex_b end
      (index n-1 on the per-edge grid).

      Generic over `F: SemiflowFloat = f64`.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: per_edge
        type: "Vec<GridFn1D<F>>"
        doc: "Per-edge signal. Invariant: len == graph.n_edges; per_edge[e].grid.n == graph.edge_grids[e].n."
    constructors:
      - name: zeroed_for_graph
        signature: |
          pub fn zeroed_for_graph(graph: &QuantumGraph<F>) -> Self
        semantics: |
          Construct a zero-initialised QuantumGraphSignal sized to the
          graph's per-edge grids. Infallible — all per-edge GridFn1D start
          at zero.
        errors: []
      - name: from_eigenmode
        signature: |
          pub fn from_eigenmode(graph: &QuantumGraph<F>, k: usize) -> Self
        semantics: |
          Construct the k-th Friedlander eigenmode φ_k(s) = cos(k·π·s/(2·ℓ))
          on each edge of the path graph P_3 (math §29.4). Used by G30
          eigenmode-match test; convenience constructor for the test harness.
          Returns the canonical π·s/2-parameterised cosine sampled on the
          per-edge grids with the appropriate sign flips at the middle vertex
          (s := edge-local coordinate composed into the global arc-length).
        errors: []
    impls:
      - trait: "State<F>"
        notes: |
          axpy(a, x): for each edge e, self.per_edge[e].axpy(a, &x.per_edge[e]).
          scale(k):   for each edge e, self.per_edge[e].scale(k).
          norm_sup(): max over edges of self.per_edge[e].norm_sup().
          zeroed_like(): construct a new QuantumGraphSignal with per_edge[e] =
                         GridFn1D::zeroed(self.per_edge[e].grid.clone()).

  # =========================================================================
  # v4.x (ADR-0098) — RobinRegion trait, HalfSpaceRobin, RobinHeatChernoff.
  # All in crates/semiflow-core/src/robin.rs (~200 LoC target; default 500-LoC
  # suckless cap applies; no constitution Override required).
  # Robin BC partial-additive port (math §3.5.tris, ADR-0098).
  # =========================================================================
  - name: RobinRegion
    location: "crates/semiflow-core/src/robin.rs"
    shape: "trait"
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    doc: |
      v4.x (ADR-0098, math §3.5.tris). Sub-trait of `ReflectingRegion<F>` that
      adds scalar Robin coefficients `(α, β)` to the geometric-reflection
      contract.

      A `RobinRegion<F>` is a region that:
        1. Provides a geometric reflection map `σ_R` (via `ReflectingRegion<F>`).
        2. Carries the scalar mixing coefficients `(α, β)` for the Robin BC
           `α·u(x) + β·∂_n u(x) = 0` at the boundary ∂R.

      `robin_coeffs()` returns `(alpha, beta)` with `alpha ≥ 0, beta > 0`
      (well-posedness of the static Robin BC).

      v4.6 stores `(alpha, beta)` constant across ∂R. Per-cell varying
      coefficients are deferred to v5.x via a future
      `robin_coeffs_at(point: &[F]) -> (F, F)` method.

      Supertrait: `ReflectingRegion<F>` (reuses the v2.8 geometry; the only
      thing Robin adds is the scalar mixing pair).
    supertraits:
      - "ReflectingRegion<F>"
    methods:
      - name: robin_coeffs
        signature: "fn robin_coeffs(&self) -> (F, F)"
        doc: "Return the scalar Robin coefficients (α, β)."
        semantics: "alpha ≥ 0, beta > 0. Pure query; no allocation."

  - name: HalfSpaceRobin
    location: "crates/semiflow-core/src/robin.rs"
    doc: |
      v4.x (ADR-0098, math §3.5.tris.2). Half-space Robin region: wraps
      `HalfSpaceRegion<F, D>` with scalar `(α, β)` coefficients.

      Implements `RobinRegion<F>` (and therefore `ReflectingRegion<F>`) for
      the closed half-space `{p : (p - origin) · normal ≥ 0}` with Robin BC
      `α·u(x) + β·∂_n u(x) = 0`.

      **Construction validation** (via `new`):
        - `‖normal‖₂ = 1` is enforced (delegated to `HalfSpaceRegion::new`).
        - `alpha ≥ 0 ∧ beta > 0 ∧ finite(alpha) ∧ finite(beta)` — returns
          `DomainViolation` on failure (well-posedness requirement).

      **Const-generic D**: same as `HalfSpaceRegion<F, D>`. For 1D half-line
      Robin BC (the G_ROBIN_HALFLINE gate), use `HalfSpaceRobin<f64, 1>`.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
        default: "1"
    fields:
      - name: half_space
        type: "HalfSpaceRegion<F, D>"
        visibility: "pub"
        doc: "Underlying half-space geometry (origin + unit outward normal)."
      - name: alpha
        type: F
        visibility: "pub"
        doc: "Coefficient α on u(x) at the boundary; α ≥ 0."
      - name: beta
        type: F
        visibility: "pub"
        doc: "Coefficient β on ∂_n u(x) at the boundary; β > 0."
    constructors:
      - name: new
        signature: |
          pub fn new(origin: [F; D], normal: [F; D], alpha: F, beta: F)
            -> Result<Self, SemiflowError>
        semantics: |
          Construct with validated unit normal and Robin coefficients.
          Delegates unit-normal check to `HalfSpaceRegion::new`.
          Returns `DomainViolation` if alpha < 0, beta ≤ 0, or any value
          non-finite.
        errors:
          - "DomainViolation if ‖normal‖₂ ≠ 1 (via HalfSpaceRegion::new)"
          - "DomainViolation if alpha < 0 or beta ≤ 0 or any value non-finite"
    impls:
      - trait: "ReflectingRegion<F>"
        notes: |
          Delegates dim(), is_inside(), reflect_in_place() to self.half_space.
      - trait: "RobinRegion<F>"
        notes: |
          robin_coeffs() returns (self.alpha, self.beta).

  - name: RobinHeatChernoff
    location: "crates/semiflow-core/src/robin.rs"
    doc: |
      v4.x/v6.2.3 (ADR-0098 Amendment 2, math §3.5.tris.3–4). Chernoff wrapper
      for Robin (mixed) BCs via stencil-level skew image extension.

      **Per-step algorithm** (math §3.5.tris.4):
        1. (α, β) := region.robin_coeffs()
        2. src_robin := src with grid.boundary = BoundaryPolicy::Robin{α, β}
        3. inner.apply_into(τ, src_robin, dst, scratch)  // single step; BC in stencil
      Cost: 1× inner cost (halved vs the v4.6 4-step).

      Robin physics lives in `bc_index` → `BoundaryHit::RobinSkew{reflected, depth}`
      and `bc_value`/`bc_value_generic` applying exponential ghost weight
      w^(d) = exp(-2·(α/β)·d·dx) at signed depth d (mirrors §25 Neumann, weight ≡ 1).

      **Order** = 1 (math §3.5.tris.5, ADR-0098). The skew weight `w ≠ 1` gives a
      nonzero commutator `[E_R, Δ]`. Proposition 25.1 (Neumann order-preservation)
      does NOT extend to Robin; G_ROBIN_HALFLINE gate asserts slope ≤ -0.95.

      **Kernel** (Carslaw-Jaeger 1959 §14.2 eq 5, ADR-0098 Amendment 1):

          K^Robin(x,y;t) = K(x,y,t) + K(x,-y,t)
                         - (α/β)·exp((α/β)(x+y)+(α/β)²t)·erfc((x+y)/(2√t)+(α/β)√t)

      NOTE: correction factor is `(α/β)`, NOT `2·(α/β)` — see ADR-0098
      Amendment 1 (typo fix in original ADR-0098 text).

      **Concrete impl**: only
      `RobinHeatChernoff<DiffusionChernoff<f64>, HalfSpaceRobin<f64, 1>, f64>`
      ships in v4.x. The generic struct is defined but only the concrete monomorph
      implements `ChernoffFunction<f64>`. Per ADR-0098 §"scope".

      **growth()**: delegates to inner (skew image adds bounded scalar; r ∈ [-1, +1]).
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "ChernoffFunction<F, S = GridFn1D<F>>"
      - name: R
        bound: "RobinRegion<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: inner
        type: C
        visibility: "pub(crate)"
        doc: "Inner Chernoff function applied to src and to ghost."
      - name: region
        type: R
        visibility: "pub"
        doc: "The Robin region providing geometry + (α, β) coefficients."
    constructors:
      - name: new
        signature: |
          pub fn new(inner: C, region: R) -> Result<Self, SemiflowError>
        semantics: |
          Wrap inner Chernoff function with Robin region. Currently infallible
          (constructor reserved for future coefficient validation at construction
          time). Returns Ok(Self).
        errors: []
    impls:
      - trait: "ChernoffFunction<f64>"
        notes: |
          Concrete monomorph:
          `RobinHeatChernoff<DiffusionChernoff<f64>, HalfSpaceRobin<f64, 1>, f64>`.
          apply_into: single-step stencil-level skew image (see struct doc; ADR-0098 Amendment 2).
          order() -> 1.
          growth(): delegates to inner.growth().

  - name: StableSubordinator
    location: "crates/semiflow-core/src/subordinated.rs"
    doc: |
      v4.8 (ADR-0103, math §37.5). α-stable subordinator with Laplace
      exponent `φ_α(λ) = λ^α` for `α ∈ (0, 1)`.

      Subordinated semigroup of the heat semigroup is `exp(-τ · (-Δ)^α)`
      (Riesz fractional heat). CBF: Schilling-Song-Vondraček 2012 Example 14.3.

      **Construction validation** (via `new`):
        - `α ∈ (0, 1)` strict (α = 0 is the identity; α = 1 is the trivial
          subordinator S_t = t for which subordination is the no-op).
        - `α` finite (no NaN/Inf).
        - Returns `DomainViolation` on failure.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: alpha
        type: F
        visibility: "pub"
        doc: "Stability index; MUST be in (0, 1) strict; validated in `new`."
    constructors:
      - name: new
        signature: "pub fn new(alpha: F) -> Result<Self, SemiflowError>"
        semantics: "Construct with validated α ∈ (0, 1). Returns DomainViolation on failure."
        errors:
          - "DomainViolation if alpha ≤ 0 or alpha ≥ 1 or alpha non-finite"
    impls:
      - trait: "LevySubordinator<F>"
        notes: |
          laplace_exponent(λ) → λ^α via float-safe pow.
          quadrature(τ, n) → REUSES GL32 nodes scaled by τ^(1/α) per
          Butko 2018 §4 eq 4.3 shifted-kernel form; weights unchanged.

  - name: GammaSubordinator
    location: "crates/semiflow-core/src/subordinated.rs"
    doc: |
      v4.8 (ADR-0103, math §37.5). Gamma subordinator with Laplace exponent
      `φ_c(λ) = log(1 + λ/c)` for `c > 0`.

      Density: `p_t(s) = c^t s^{t-1} exp(-c·s) / Γ(t)`. CBF: Schilling-Song-
      Vondraček 2012 Example 14.4. Used in variance-gamma option pricing
      (Madan-Carr-Chang 1998).

      **Construction validation** (via `new`):
        - `c > 0` strict.
        - `c` finite.
        - Returns `DomainViolation` on failure.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: c
        type: F
        visibility: "pub"
        doc: "Rate parameter; MUST be > 0; validated in `new`."
    constructors:
      - name: new
        signature: "pub fn new(c: F) -> Result<Self, SemiflowError>"
        semantics: "Construct with validated c > 0. Returns DomainViolation on failure."
        errors:
          - "DomainViolation if c ≤ 0 or c non-finite"
    impls:
      - trait: "LevySubordinator<F>"
        notes: |
          laplace_exponent(λ) → log(1 + λ/c) via float-safe log1p.
          quadrature(τ, n) → REUSES GL32 nodes; weights w_k * p_τ(s_k) / exp(-s_k)
          (the Laguerre measure absorption factor cancels analytically at c = 1).

  - name: InverseGaussianSubordinator
    location: "crates/semiflow-core/src/subordinated.rs"
    doc: |
      v4.8 (ADR-0103, math §37.5). Inverse-Gaussian subordinator with Laplace
      exponent `φ_c(λ) = sqrt(c² + 2λ) − c` for `c > 0`.

      CBF: Schilling-Song-Vondraček 2012 Example 14.5. Foundation of NIG
      (Normal Inverse Gaussian) Lévy processes (Barndorff-Nielsen 1997).

      **Construction validation** (via `new`):
        - `c > 0` strict.
        - `c` finite.
        - Returns `DomainViolation` on failure.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: c
        type: F
        visibility: "pub"
        doc: "Drift / location parameter; MUST be > 0; validated in `new`."
    constructors:
      - name: new
        signature: "pub fn new(c: F) -> Result<Self, SemiflowError>"
        semantics: "Construct with validated c > 0. Returns DomainViolation on failure."
        errors:
          - "DomainViolation if c ≤ 0 or c non-finite"
    impls:
      - trait: "LevySubordinator<F>"
        notes: |
          laplace_exponent(λ) → sqrt(c² + 2λ) − c via float-safe sqrt.
          quadrature(τ, n) → REUSES GL32 nodes/weights with Pinsky 1986
          inversion s_k → τ² / (2π s_k) to match the IG density singularity at s→0.

  - name: SubordinatedChernoff
    location: "crates/semiflow-core/src/subordinated.rs"
    doc: |
      v4.8 (ADR-0103, math §37.3). Generic wrapper that subordinates any base
      Chernoff `C: ChernoffFunction<F>` against any Lévy subordinator
      `S: LevySubordinator<F>` per Butko 2018 §4 Theorem 2.1:

        F^φ(τ) src := Σ_k w_k · C.apply_into(s_k, src, tmp_dst)

      where `(s_k, w_k)` are produced by `S.quadrature(τ, n_nodes)`.

      **Order**: 1 per Butko 2018 §4 Theorem 2.1 + Remark. Chernoff product
      `F^φ(τ/n)^n` is norm-convergent to `T^φ_τ` by Trotter-Kato-Chernoff.

      **Growth bound** (math §37.4): inherited from base.growth() with
      φ-amplification under non-trivial growth — v4.8 ships base.growth()
      pass-through as a conservative placeholder; tight subordinator-aware
      growth bounds are RESEARCH-OPEN per Butko 2018 §5 future work.

      **Default `F = f64`**: matches v0.9 ADR-0026 trait family convention.

      **REUSES** `resolvent_quad::{GL32_NODES, GL32_WEIGHTS}` from ADR-0069
      (no new constants file; no new deps; Cohort-unaffected).
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "ChernoffFunction<F>"
      - name: S
        bound: "LevySubordinator<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: base
        type: C
        visibility: "pub"
        doc: "Base Chernoff approximation of T_t (any ChernoffFunction<F> impl)."
      - name: subordinator
        type: S
        visibility: "pub"
        doc: "Lévy subordinator providing the φ-density quadrature."
      - name: n_nodes
        type: usize
        visibility: "pub"
        doc: "Number of GL quadrature nodes; DEFAULT 32 (matches GL32 table)."
    constructors:
      - name: new
        signature: "pub fn new(base: C, subordinator: S) -> Self"
        semantics: "Construct with DEFAULT n_nodes = 32 (REUSES GL32 from resolvent_quad.rs)."
        errors: []
      - name: with_n_nodes
        signature: "pub fn with_n_nodes(base: C, subordinator: S, n_nodes: usize) -> Result<Self, SemiflowError>"
        semantics: "Construct with explicit n_nodes; v4.8 supports n_nodes ≤ 32 (matches GL32 table size)."
        errors:
          - "DomainViolation if n_nodes == 0 or n_nodes > 32"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          where C::S: Clone (needed to accumulate Σ w_k · C(s_k) src).
          type S = C::S (state passes through unchanged).
          apply_into: AXPY-style accumulation loop (5-step algorithm per
          subordinated.rs file-doc):
            1. Validate tau ≥ 0 finite (DomainViolation if not).
            2. (nodes, weights) := subordinator.quadrature(tau, n_nodes).
            3. dst := 0 (in-place zero via State trait).
            4. for (s_k, w_k): tmp := C.apply_into(s_k, src, tmp_dst);
                               dst += w_k · tmp                          (AXPY).
            5. Return Ok(()).
          Hot-path tmp_dst lives in ScratchPool (REUSED, no allocation).
          order() -> 1 (Butko 2018 Thm 2.1).
          growth(): pass-through self.base.growth() (conservative; tight φ-aware bound RESEARCH-OPEN).

  - name: Dual
    location: "crates/semiflow-core/src/dual.rs"
    doc: |
      v8.0.0 Phase-1 HEADLINE (ADR-0133, math §46). Forward-mode dual number
      `Dual(value, tangent) = a + ε·b` with the NILPOTENT unit `ε² = 0` (NOT the
      imaginary unit — ε²=0, not i²=−1). Carrying `b = dF/dθ` in the tangent slot
      makes every arithmetic op propagate the EXACT first derivative by the chain
      rule, at ZERO new heap allocation: the pair rides in the same registers /
      State buffer as the scalar value.

      **Purpose**: `Dual<F>` is a NEW member of the `SemiflowFloat` family
      (ADR-0025/0026). It implements the FULL `SemiflowFloat` bound surface, so
      instantiating ANY existing generic kernel at `F = Dual<f64>` yields
      forward-mode automatic differentiation of that kernel's output with respect
      to one scalar parameter θ — with NO per-kernel code. This is the v8.0.0
      "second S-curve" harvest of the previously-unused Chernoff product structure
      (F(τ))ⁿ: by the product rule, d/dθ (F(τ))ⁿ rides in the tangent slot of the
      same evolve_into ping-pong buffer (math §46.3).

      **Second derivatives (Γ)**: the construction is closed under nesting, so
      `Dual<Dual<F>>` again satisfies `SemiflowFloat` and rides the SAME blanket
      `ChernoffFunction<Dual<Dual<F>>>` to recover exact second derivatives via
      the ε₁ε₂ cross-component (math §46.4).

      **SIMD (ADR-0018 carve-out PRESERVED)**: the AVX2/NEON specialisations stay
      f64-ONLY. `Dual<F>` does NOT implement SIMD intrinsic paths; a kernel at
      F = Dual<f64> falls through to the generic scalar Rust ops (the same code
      path that already backs f32). AD is a calibration/sensitivity workload, not
      the 45 ns hot loop, so this is acceptable by design (math §46.5).

      **Errors-as-values**: Dual does not introduce new fallible paths; existing
      kernel `Result<…, SemiflowError>` returns are unchanged. Ordering / equality
      compare VALUE components only (the tangent is carried, never compared), so
      validation guards (`tau < 0`, `a(x) < 0`) behave identically to the scalar
      path (math §46.2).
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
      - PartialOrd
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: value
        type: F
        visibility: "pub"
        doc: "Value component `a` in `a + ε·b`."
      - name: tangent
        type: F
        visibility: "pub"
        doc: "Tangent (forward-derivative) component `b` in `a + ε·b`."
    constructors:
      - name: new
        signature: "pub const fn new(value: F, tangent: F) -> Self"
        semantics: "Construct a dual from explicit value and tangent components."
        errors: []
      - name: constant
        signature: "pub fn constant(value: F) -> Self"
        semantics: "Lift a θ-independent constant: tangent = 0 (Dual(value, F::zero()))."
        errors: []
      - name: variable
        signature: "pub fn variable(value: F) -> Self"
        semantics: "Seed the independent parameter: tangent = 1 (Dual(value, F::one()))."
        errors: []
    impls:
      - trait: "SemiflowFloat"
        notes: |
          `impl<F: SemiflowFloat> SemiflowFloat for Dual<F> {}` — the marker body is
          empty; the bound is satisfied by the supertrait impls below. This is the
          ONLY new impl needed for every generic kernel to accept F = Dual<f64>.
          Sealed-trait note (float.rs): this is a DELIBERATE third member added by
          ADR-0133 (alongside f32, f64), NOT an accidental blanket — explicit impl.
      - trait: "num_traits::Float / Num / NumCast / Zero / One / etc."
        notes: |
          `Dual<F>` MUST implement the full `num_traits::Float` surface the
          `SemiflowFloat: Float` bound requires. Each method follows §46.2:
            value-only ops:  Dual(g(a), g'(a)·b) by the chain rule.
            exp:   Dual(exp(a),  exp(a)·b)
            ln:    Dual(ln(a),   b/a)
            sqrt:  Dual(sqrt(a), b/(2·sqrt(a)))
            recip: Dual(1/a,     -b/a²)
            sin:   Dual(sin(a),  cos(a)·b)     cos: Dual(cos(a), -sin(a)·b)
            powi(n): Dual(a^n,   n·a^(n-1)·b)  powf/tanh: chain-rule template
            abs:   Dual(|a|,     sgn(a)·b)     (sub-gradient 0 at a=0)
            floor/ceil/round/comparisons/is_finite: act on `a`; tangent = F::zero()
              (or carried unchanged for identity-like ops).
          Add/Sub/Mul/Div + their *Assign forms follow §46.2 (product/quotient
          rules). PartialOrd / PartialEq compare `value` ONLY.
          PRE-FLIGHT: scripts/dual_ad_kit.py (T_DUAL) certifies every rule
          symbolically (PASS 4/4 2026-06-07) BEFORE this impl is written.
      - trait: "ChernoffFunction<Dual<F>> (BLANKET coverage expectation)"
        notes: |
          NO new ChernoffFunction impl is written for Dual. Because every existing
          kernel is generic `ChernoffFunction<F: SemiflowFloat = f64>` (ADR-0026
          Wave 4) and `Dual<F>: SemiflowFloat`, the compiler instantiates the SAME
          generic impl at F = Dual<f64> automatically. Coverage EXPECTATION: the
          v8.0 Phase-1 acceptance set {DiffusionChernoff, Diffusion4thChernoff,
          StrangSplit} MUST compile and pass G_DUAL_AD_GRADIENT + G_DUAL_ZERO_ALLOC
          at F = Dual<f64>; hyper-dual Dual<Dual<f64>> rides the same blanket for Γ.
          State<Dual<F>> / GridFn1D<Dual<F>> likewise instantiate the existing
          generic State impls — no new State code.

  # =========================================================================
  # v8.0.0 Phase-2 additive surface (F2 / F3 / F4 GO rulings). PLANNED stubs
  # recording the public type surface for the engineer Wave — additive only,
  # no existing type/trait changes. Each cites its math.md section + ADR.
  # Gates live in properties.yaml 4.4.0 (G_RESOLVENT_JUMP_ORDER /
  # T_RESOLVENT_JUMP, G_HARD_WALL_ORDER2, G_CARNOT_CPLX3 / T_CARNOT_CPLX3).
  # =========================================================================

  - name: ResolventJumpChernoff
    shape: "struct<C: ChernoffFunction<F>, F: SemiflowFloat = f64>"
    status: "PLANNED v8.0.0 Phase-2 additive surface (F2 NARROW-GO, ADR-0134)"
    introduced_in: "v8.0.0"
    authority: "ADR-0134"
    doc: |
      F2 NARROW-GO (math.md §47, ADR-0134) — resolvent time-jump amortization
      via numerical inverse Laplace transform of e^{tA}g. Trefethen–Weideman–
      Schmelzer 2006 (BIT 46:3) parabolic-contour quadrature: a single LARGE
      step of horizon t is computed by evaluating the resolvent (λ_k I − A)⁻¹ g
      at M parabolic-contour nodes λ_k and summing with the TWS midpoint
      weights. The M/t contour scaling decouples cost from horizon — the number
      of nodes for a target accuracy is t-INDEPENDENT (§47.2), and the
      convergence in M is GEOMETRIC (Theorem 47.1).

      NARROW scope (§47.4, NORMATIVE): self-adjoint / sectorial generators ONLY.
      The optimal parabolic contour places MOST nodes in the LEFT half-plane
      (Re λ_k < 0), where the shipped Gauss-Laguerre Laplace-Chernoff
      `eval_complex` (§22.9, valid only for Re λ > ω) DIVERGES and is therefore
      NOT a valid backend. The LHP resolve MUST use a direct complex linear
      solve: for the divergence-form 1D Laplacian the discrete (λI − A) is
      COMPLEX TRIDIAGONAL, so a complex Thomas solve is O(N) exact (λ_k ∉ σ(A)
      guaranteed — the contour stays strictly off the negative-real axis). Every
      shipped diffusion / divergence-form generator is self-adjoint negative-
      (semi)definite, so the Theorem 47.1 sectorial hypothesis holds for the
      whole diffusion family. Non-self-adjoint / non-sectorial generators
      (advection-dominated, expansive ω ≫ 0) are OUT of scope for v8.0.0 and
      MUST be rejected at construction or documented as caller responsibility.

      Gates: G_RESOLVENT_JUMP_ORDER (RELEASE_BLOCKING, slow-tests) +
      T_RESOLVENT_JUMP (sympy+numeric oracle, scripts/resolvent_jump_kit.py,
      PRE-FLIGHT 4/4 PASS 2026-06-07). REUSES the resolvent CONCEPT from §22 /
      ADR-0069 but NOT the GL32 quadrature backend (disjoint half-planes).
    planned_surface:
      - "ResolventJumpChernoff<C, F>::new(inner: C, n_nodes: usize) — sectorial inner generator + contour-node count M."
      - "fn jump(&self, t: F, g: &GridFn1D<F>) -> Result<GridFn1D<F>, SemiflowError> — single large-step e^{tA}g via the TWS parabolic contour."
      - "private complex tridiagonal (Thomas) solve of (λ_k I − A)⁻¹ g per LHP contour node (the ONLY new numerical primitive)."
      - "const TWS coefficients (a_0, a_1, a_2) for the parabolic contour (§47.2)."
    spec_ref:
      - "math.md §47 (§47.4 LHP restriction, §47.5 gates)"
      - "ADR-0134"
      - "Trefethen-Weideman-Schmelzer 2006 BIT 46:3"

  - name: ResolventJumpChernoff2D
    shape: "struct<F: SemiflowFloat = f64>"
    status: "SHIPPED v8.2.0 (F2 2D NARROW-PARABOLIC, ADR-0148, §47.8)"
    introduced_in: "v8.2.0"
    authority: "ADR-0148"
    doc: |
      F2 2D parabolic LHP backend (math.md §47.8, ADR-0148) — extends
      ResolventJumpChernoff to 2D divergence-form Laplacians. The outer TWS
      parabolic-contour quadrature is dimension-blind (Hale–Weideman 2015);
      the per-node `(λI − A)⁻¹ g` is computed by a banded complex Gaussian
      elimination (half-bandwidth bw = nx, `O(N·bw²)`) — exact off-spectrum.
      NARROW: self-adjoint sectorial generators only (§47.8). Hyperbolic
      contour (non-sectorial) is honestly deferred to v8.x (ADR-0148).
    planned_surface:
      - "ResolventJumpChernoff2D<F>::new(grid: Grid2D<F>, m_nodes: usize) -> Result<Self, SemiflowError>"
      - "fn jump(&self, t: F, g: &GridFn2D<F>) -> Result<GridFn2D<F>, SemiflowError>"
    spec_ref:
      - "math.md §47.8 (NORMATIVE)"
      - "ADR-0148"
      - "Hale-Weideman 2015 SIAM J. Sci. Comput. 37:6"
      - "Gate: G_RESOLVENT_JUMP_2D_ORDER (RELEASE_BLOCKING)"

  - name: ResolventJumpChernoff3D
    shape: "struct<F: SemiflowFloat = f64>"
    status: "SHIPPED v8.2.0 (F2 3D NARROW-PARABOLIC, ADR-0148, §47.8)"
    introduced_in: "v8.2.0"
    authority: "ADR-0148"
    doc: |
      F2 3D parabolic LHP backend (math.md §47.8, ADR-0148) — extends
      ResolventJumpChernoff to 3D divergence-form Laplacians. Identical
      quadrature design to ResolventJumpChernoff2D; half-bandwidth bw = nx·ny.
      NARROW: self-adjoint sectorial generators only (§47.8). Hyperbolic
      contour (non-sectorial) is honestly deferred (ADR-0148).
    planned_surface:
      - "ResolventJumpChernoff3D<F>::new(grid: Grid3D<F>, m_nodes: usize) -> Result<Self, SemiflowError>"
      - "fn jump(&self, t: F, g: &GridFn3D<F>) -> Result<GridFn3D<F>, SemiflowError>"
    spec_ref:

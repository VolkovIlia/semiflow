# v0.2.2 (ADR-0006 Amendment 5): DriftReactionChernoff::apply upgraded
# from v0.2.1 first-order closed form to RK2 (midpoint + trapezoidal).
# Public API UNCHANGED — same struct fields, same constructor, same
# trait-method signatures. Only `apply_at_node` body is rewritten.
# Reduction-to-constant lemma (math.md §9.3) guarantees regression-safety
# for the v0.2.0 / v0.2.1 acceptance gates (all constant-coefficient).
#
# v0.3.0 (ADR-0008, option ζ — API BREAK; supersedes the rejected
# Amendment 6 formula α and the also-superseded Amendment 6.1 formula β):
# DiffusionChernoff redesigned with THREE caller-supplied closures
# `(a, a_prime, a_double_prime)`. The formula is **ζ-A**: γ-A
# inner-Strang baseline `D_γ(τ) = S(τ/2) ∘ K(τ;a) ∘ S(τ/2)` for the
# divergence-form generator A_self f = ∂(a·∂f), PLUS an explicit τ²
# correction polynomial in (a, a', a'', f', f'', f''') that kills the
# γ-A τ²-deficit exactly:
#
#   D_ζ(τ) f(x) = D_γ(τ) f(x)
#               + τ²·[ a(x)·a'(x)·f'''(x)
#                    + (a(x)·a''(x)/2)·f''(x)
#                    + (a'(x)·a''(x)/4)·f'(x) ]
#
# The numerical f', f'', f''' are computed via 5-point central FD
# with stencil step Δ = max(2·dx, √τ). The residual drift -a'·∂ is
# absorbed into R via caller-composed `b_total = b - a'` (see math.md
# §9.1.1 / §9.2.3.B). The v0.2.3 micro-bump and its β formula
# (ADR-0006 Amendment 6.1) are SUPERSEDED — v0.3.0 ships the ζ-A
# formula directly. The β derivation document and the §9.2.2
# impossibility theorem are retained as canonical reference content
# (ζ-A escapes the impossibility theorem because the correction is
# added OUTSIDE the symmetric K-factor).
#
# BREAKING CHANGES (v0.2.x → v0.3.0):
#   - DiffusionChernoff struct: 3 fields → 5 fields
#       (adds `a_prime`, `a_double_prime`).
#   - DiffusionChernoff::new: 3 args → 5 args
#       (adds `a_prime`, `a_double_prime`).
#   - StrangSplit<DiffusionChernoff, DriftReactionChernoff> users with
#     variable `a` MUST pre-compose `b_total = b - a'` before passing to
#     DriftReactionChernoff::new.
#
# NON-BREAKING (preserved):
#   - DiffusionChernoff::apply signature.
#   - DriftReactionChernoff API and semantics.
#   - StrangSplit::new constructor.
#   - Constant-a numerical output: bit-equal to v0.2.2 (when
#     a_prime ≡ 0 ∧ a_double_prime ≡ 0, the τ² correction is
#     identically zero AND γ-A reduces to v0.2.2 by the §9.2.3.A
#     reduction lemma; sympy-proven gate Z_const-a, exit 0 in
#     `.dev-docs/verification/scripts/verify_v0_3_0_zeta.py`).
#
# Order claim (revised — Amendment 2, 2026-04-30, honest):
#   - Constant a:        local O(τ³) / global O(τ²) via Strang  [bit-equal v0.2.2]
#                        Correction polynomial vanishes identically; γ-A
#                        reduces to v0.2.2 K-only (sympy gate Z_const-a).
#                        γ=0 sub-test: empirical slope -2 (verified).
#   - Variable a ∈ C³:   Mathematical:    local O(τ³) (sympy gates
#                                         Z_τ⁰/Z_τ¹/Z_τ²/Z_const-a all pass)
#                        Implementation:  global O(τ¹) — FD discretization
#                                         ceiling on f',f'',f''' via the
#                                         5-point central stencil with step
#                                         Δ=max(2·dx,√τ) (cubic-spline
#                                         f.sample is the dominating
#                                         O(τ²)-per-step term, accumulating
#                                         to O(τ¹) over n steps).
#                        Generator:       divergence-form A_self = ∂(a·∂),
#                                         mathematically rigorous (corrects
#                                         v0.2.2's silent generator
#                                         degradation for variable a).
#   - Variable a,b,c:    Mathematical:   local O(τ²) (limited by R)
#                        Implementation: global O(τ¹) (limited by D
#                                        variable-a FD ceiling).
#
# v0.3.0 ships: correct generator, ~1000× tighter constant on variable a
# (factor-10⁻³ reduction in absolute per-step error), bit-equal v0.2.2
# regression-safety for constant-`a` callers, and forward-compatible
# 5-arg API surface. True global O(τ²) for variable a is DEFERRED to
# v0.4.0 TruncatedExp integrator (option ε), which avoids FD on f-derivatives
# and breaks the H1 implementation ceiling. v0.6.0+ `a'''` input remains
# a further forward-compatible refinement (local-O(τ⁴) / global-O(τ³)).
# The 5-arg API is stable for v0.4.0+ (TruncatedExp/Resolvent extensions add
# new types alongside DiffusionChernoff, not new fields here).
# See ADR-0008 Amendment 2 + math.md §9.2.3.B for the full reconciliation.
#
# v0.4.0 (ADR-0011, option ε — TruncatedExp integrator, ADDITIVE):
# NEW SIBLING TYPE `TruncatedExpDiffusionChernoff` lives next to the existing
# `DiffusionChernoff` (NO replacement, NO migration cost for existing
# callers). Same 5-arg constructor `(a, a_prime, a_double_prime,
# a_norm_bound, grid)` PLUS optional builder method
# `with_drift_conjugation(b)` to enable interaction-picture conjugation
# `A_self^I(s) = exp(−s·B) ∘ A_self ∘ exp(+s·B)`. The integrator computes:
#
#   M(τ) f(x) ≈ Σ_{k=0..K} (τ^k / k!) · G^k f(x_mid)
#
# where K = TRUNC_ORDER = 4, x_mid = x − (τ/2)·b(x) (or x if no
# drift conjugation), and G is the discrete 3-point divergence-form
# stencil at grid spacing dx (math.md §9.2.3.C):
#
#   G f|_i := (a_{i+½}·(f_{i+1} − f_i) − a_{i−½}·(f_i − f_{i−1})) / dx²
#
# `a_{i±½}` is the a-coefficient evaluated at half-grid-nodes
# (`x_i ± dx/2`). G is applied k-fold via repeated stencil action;
# stencil samples NEVER go off-grid (unlike ζ-A's
# `f.sample(x ± Δ)` calls — this is the H1 ceiling fix).
#
# Per-step cost: O(K·N) stencil applications + (K+1) factorial-weighted
# accumulations. CFL: τ < dx² / (2 · ‖a‖_∞) is NECESSARY for the K=4
# truncated power series to converge. NEW error variant
# `SemiflowError::CflViolated{tau, dx_squared, a_norm_bound}` is
# returned when the inequality is violated (errors.yaml v0.4.0).
#
# Order (variable a ∈ C³):
#   - Per-step: O(dx²) ⊕ O(τ⁵) (truncation residue at K=4).
#   - Global Strang composition: **O(τ²) for variable a** — lifts the
#     ζ-A FD-ceiling O(τ¹) by avoiding FD on f-derivatives entirely.
#   - Constant a (a' ≡ a'' ≡ 0): G f = a₀·f'' (3-point heat stencil),
#     M(τ) collapses bit-equivalently to the v0.2.2 K-only path
#     (algebraic reduction lemma, math.md §9.2.3.C "Constant-a
#     reduction").
#
# StrangSplit composition reuses the existing
# `StrangSplit<D: ChernoffFunction, R: ChernoffFunction>` template
# verbatim — instantiating with `D = TruncatedExpDiffusionChernoff` is
# zero-edit (strang.rs UNCHANGED). The outer-Strang [D, R] commutator
# at order-3 is structurally unchanged from [D_zeta, R] (HLW §IV.2:
# the commutator depends only on A_self and B, not on the discretization
# of A_self).
#
# Caller priority: mathematical correctness > API stability. Existing
# callers MAY freely switch from DiffusionChernoff to
# TruncatedExpDiffusionChernoff by changing one type name (no constructor
# arg changes); both ship in v0.4.0 to allow regression A/B testing.
# See ADR-0011 + math.md §9.2.3.C for the full derivation.

# ---------------------------------------------------------------------------
# 1. State trait — minimal vector-space surface for Chernoff iteration.
# ---------------------------------------------------------------------------
traits:
  - name: State
    shape: trait
    doc: |
      Minimal vector-space interface for objects on which a Chernoff function
      acts. Designed to be the smallest set of operations that supports both
      the v0.1.0 Chernoff iteration `(S(t/n))^n f` and the v0.3+ resolvent
      quadrature `R_lambda f = sum_k w_k S(tau_k) f`.

      f64-monomorphic in v0.1.0 (see ADR-0004 / R2).
    sized: true
    object_safe: false
    methods:
      - name: axpy
        signature: "fn axpy(&mut self, a: f64, x: &Self)"
        semantics: "self <- self + a * x (BLAS axpy, in place)"
        preconditions:
          - "self and x have identical structural shape (same grid geometry)"
        postconditions:
          - "no allocation; self.values_len == before(self.values_len)"
        errors: "panics on shape mismatch is INVALID; return error via type or assert in debug only"

      - name: scale
        signature: "fn scale(&mut self, k: f64)"
        semantics: "self <- k * self (in place)"
        preconditions:
          - "k is finite (caller responsibility); NaN k yields NaN values"
        postconditions:
          - "self.norm_sup() == |k| * before(self.norm_sup()), modulo IEEE rounding"

      - name: norm_sup
        signature: "fn norm_sup(&self) -> f64"
        semantics: "Returns ||self||_inf = max_i |self.values[i]|"
        preconditions: []
        postconditions:
          - "result >= 0.0"
          - "result is NaN iff any self.values[i] is NaN"

      - name: zeroed_like
        signature: "fn zeroed_like(&self) -> Self"
        semantics: "Returns a structural clone with all values set to 0.0"
        preconditions: []
        postconditions:
          - "result.norm_sup() == 0.0"
          - "result has same grid geometry as self"

# ---------------------------------------------------------------------------
# 2. ChernoffFunction trait — single-step semigroup approximant.
# ---------------------------------------------------------------------------
  - name: ChernoffFunction
    shape: trait
    doc: |
      A Chernoff function S: [0, T] -> L(F) approximating a strongly continuous
      semigroup `e^{tA}`. S(0) = I, S is strongly continuous, and the strong
      derivative S'(0) on a core D ⊂ D(A) equals A.

      **v3.0 CLEANUP (ADR-0074, BREAKING — gated by G_binding_parity 0 ULP):**
      The v0.1.0 `apply` method is REMOVED from the trait surface (moved to
      per-impl inherent `apply_chernoff(τ, &src)` convenience where `Self::S: Clone`).
      The implicit `Self::S: Clone` bound is DROPPED (Clone is opt-in at consumer
      sites that need the allocating convenience). `growth()` returns the typed
      `Growth<F>` struct (was `(f64, f64)` tuple — v3.0 fixes the latent
      Generic-over-Float bug). `order(&self) -> u32` is REQUIRED, no default.
      Trait is now 3 methods: `apply_into`, `order`, `growth`.

      v2.x consumers compile with deprecation warnings via `mod v2_compat`
      (12-month shim per ADR-0035 §9; default feature `v2_compat` ON in v3.x,
      OFF in v4.0).

      Implementations expose `apply_into(τ, src, dst, scratch)` for zero-alloc
      hot-path apply. `order()` reports the consistency order m such that
      `||S(t)f - sum_{k=0..m} t^k A^k f / k!|| <= O(t^(m+1))` on a core.
      `growth()` returns `Growth { multiplier, omega }` such that
      `||S(τ)|| <= multiplier · exp(omega · τ)`, used by Evolver::evolve to
      estimate the Galkin-Remizov bound.

      v3.0 super-trait extensions:
        - `ApproximationSubspace<const K: usize, F>: ChernoffFunction<F>`
          (ADR-0073, opt-in K-jet witness)
        - `TimedChernoffFunction<F>: ChernoffFunction<F>` (v2.7 ADR-0070,
          preserved as separate super-trait — NOT folded into ChernoffFunction
          per ADR-0074 §"Rationale")
    sized: true
    object_safe: false
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    methods:
      - name: apply_into
        signature: |
          fn apply_into(
              &self,
              tau: F,
              src: &Self::S,
              dst: &mut Self::S,
              scratch: &mut ScratchPool<F>,
          ) -> Result<(), SemiflowError>
        associated_type: "S: State<F>"
        semantics: |
          v3.0 SOLE apply method (ADR-0074, ADR-0041 v2.0 baseline). Zero-allocation
          apply: dst := F(τ) src. Caller provides pre-allocated dst (structural
          shape match src) and a scratch pool for hot-path temporaries.
          The v2.x `apply` method (allocating, `Result<Self::S, _>` return) is
          available via the inherent per-impl convenience `apply_chernoff(τ, &src)`
          where Self::S: Clone, OR via the deprecation shim `mod v2_compat::apply`.
        preconditions:
          - "tau is finite and >= 0.0"
          - "src.norm_sup() is finite (no NaN/Inf in input)"
          - "src and dst have identical structural shape"
        postconditions:
          - "dst has same structural shape as src"
          - "tau == 0.0 implies dst.copy_from(src) (modulo interp grid)"
          - "no allocation in the trait method (scratch pool reused)"
        errors:
          - "DomainViolation if tau < 0 or tau is NaN/Inf"
          - "DomainViolation if src or dst contains NaN/Inf"
          - "DomainViolation if src/dst structural shapes mismatch"
          - "GridUnderresolved (warn, not fatal in v0.1.0) if shift exceeds dx * N"

      - name: order
        signature: "fn order(&self) -> u32"
        semantics: |
          v3.0 REQUIRED method (ADR-0074, no default). Consistency order m ≥ 1
          such that `||F(τ) f - exp(τ A) f|| = O(τ^(m+1))` on the core (per
          Theorem 6, Remizov 2025 *Vladikavkaz Math. J.* 27:4). For ShiftChernoff1D
          with the v0.1.0 formula (6): returns 1. For Diffusion4thZeta4Chernoff
          (v3.0 ADR-0075): returns 4 on the K=6 strict core. v3.0 Wave A audit
          confirms all 26+ v2.x impls declare explicitly; no impl impact.

          For per-datum-witnessed order, use ApproximationSubspace<K, F>
          (ADR-0073) — strictly stronger than `order()` (verifies both kernel
          order AND datum subspace membership).

          === order() CONTRACT SEMANTICS (v6.0.0 qualification, ADR-0112) ===
          The integer returned by `order()` is the LOCAL Taylor-tangency order m:
          the kernel's single-step expansion matches exp(τA) through τ^m, i.e.
          per-step (LOCAL) error is O(τ^(m+1)). This is a CONSISTENCY claim
          (sympy/Taylor-provable from the kernel definition), NOT a guarantee
          that an EMPIRICAL global-convergence slope of -(m) is observed at
          finite, feasible (n, N) on every datum. The two coincide for kernels
          whose global gate passes (e.g. ζ⁴: G_zeta4_TRUTHFUL_ORDER); they
          DIVERGE for kernels whose global gate is deferred:
            - Diffusion6thZeta6Chernoff::order() = 6  — LOCAL order-6 proven
              (T23N_zeta6 sympy); GLOBAL order-6 empirical gate
              G_zeta6_TRUTHFUL_ORDER is DEFERRED to v7.0+ (ADR-0110 AMENDMENT 1).
            - Diffusion8thZeta8Chernoff::order() = 8  — LOCAL order-8 proven;
              GLOBAL order-8 empirical gate DEFERRED to v7.0+ (ADR-0110 Am 1).
          CONSUMER CONTRACT (load-bearing): step-size controllers (AdaptivePI
          / ClassicalPI::with_order) MAY use `order()` as the LOCAL consistency
          exponent for PI gain scheduling (alpha=0.7/p, beta=0.4/p). They MUST
          NOT assume the kernel realises a measured global slope of -p at the
          step sizes actually used; for ζ⁶/ζ⁸ the achieved global order in the
          feasible regime is lower (pre-asymptotic, ADR-0110). The controller is
          still well-defined and stable under this weaker reading (the PI gains
          are tuning constants, not correctness assertions). See ADR-0112 §"ζ⁶/ζ⁸
          order() semantics" for the full HONEST-DEFER decision.
        preconditions: []
        postconditions:
          - "result >= 1 for any well-formed Chernoff function"
          - "result is the LOCAL consistency order m (single-step O(τ^(m+1)));
             GLOBAL empirical order may be lower where a global gate is deferred
             (ζ⁶/ζ⁸ → v7.0+, ADR-0110/0112)"

      - name: growth
        signature: "fn growth(&self) -> Growth<F>"
        semantics: |
          v3.0 typed return per ADR-0074 (was `(f64, f64)` in v2.x; the tuple
          was a latent Generic-over-Float bug since ADR-0026 v0.9.0). Returns
          `Growth { multiplier, omega }` such that
          `||F(τ)|| <= multiplier · exp(omega · τ)` for all `τ ∈ [0, T]`.
          For ShiftChernoff1D: `multiplier = F::one()`, `omega = ||c||_∞`,
          per the quasi-contractivity bound.

          v2.x callers using `growth().0` / `.1` field access MUST migrate to
          `growth().multiplier` / `.omega` (no shim possible across the type
          change; documented in docs/migration/v2-to-v3.md §3).
        preconditions: []
        postconditions:
          - "result.multiplier >= F::one() (M >= 1 by F(0) = I)"
          - "result.omega is finite"

  # =========================================================================
  # v2.7 (ADR-0070) — TimedChernoffFunction super-trait. Additive over
  # ChernoffFunction<F>. Appended to `traits:` section.
  # =========================================================================
  - name: TimedChernoffFunction
    shape: trait
    super_trait: "ChernoffFunction<F>"
    location: "crates/semiflow-core/src/howland.rs"
    doc: |
      v2.7 (ADR-0070, math §23.7). Additive super-trait over `ChernoffFunction<F>`
      that adds a single new method `apply_at(t, τ, src, dst, scratch)` carrying
      the *absolute time* `t` (the outer time coordinate). Used by `HowlandLift<C, F>`
      to evolve nonautonomous Cauchy problems `∂_t u = L(t) u` via the Howland 1974
      augmented-generator construction (math §23.2 — `L̂ = -∂_s + L(s)` on
      `L²([0, T], X)`).

      **Backward compatibility via default-bridged `apply_at`**: the default impl
      delegates `apply_at(t, τ, src, dst, scratch)` to `apply_into(τ, src, dst, scratch)`,
      ignoring `t`. Every existing AUTONOMOUS `ChernoffFunction<F>` impl
      (ShiftChernoff1D, DiffusionChernoff, DiffusionChernoff4, TruncatedExp*,
      DriftReactionChernoff, StrangSplit, Strang2D, Strang3D, AxisLift*,
      NonSeparable2D*, AdaptivePI, KillingChernoff, etc.) gains
      `TimedChernoffFunction<F>` via a single mechanical one-liner per impl:

          impl<F: SemiflowFloat> TimedChernoffFunction<F> for ShiftChernoff1D<F> {}
          impl<F: SemiflowFloat> TimedChernoffFunction<F> for DiffusionChernoff<F> {}
          ... (one line per existing impl; engineer applies mechanically)

      **Time-dependent impls override `apply_at`** to consult `t`:

          impl TimedChernoffFunction<f64> for TimedDiffusionChernoff {
              fn apply_at(&self, t: f64, tau: f64, src, dst, scratch) -> Result<...> {
                  // sample inner generator at absolute time t, apply step τ
                  let inner = DiffusionChernoff::new(
                      |x| self.a_fn(t, x), |_| 0.0, |_| 0.0, t, self.grid,
                  );
                  inner.apply_into(tau, src, dst, scratch)
              }
          }

      **Generic-over-Float**: default `F = f64` per ADR-0025.

      **Cross-trait stability**: HowlandLift's apply_into is the *consumer* of
      `apply_at`; HowlandLift bounds its inner type on `TimedChernoffFunction<F>`
      (not `ChernoffFunction<F>`), forcing the explicit `impl
      TimedChernoffFunction<F> for X<F> {}` declaration on autonomous types
      (one line). This makes the time-dependence explicit at the construction
      site — `HowlandLift<DiffusionChernoff, f64>` is a *deliberate* choice
      (the user is wrapping an autonomous Chernoff in the time-extended frame).

      **v3.0 status**: the roadmap-reflective-biscuit.md §v3.0 explicitly
      considers folding `TimedChernoffFunction` into the redesigned
      `ChernoffFunction` once v2.7+ use cases (A1+B2+A4+B4) have crystallised.
      The v2.7 super-trait is a *probe* of the time-dependent surface.
    sized: true
    object_safe: false
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    methods:
      - name: apply_at
        signature: |
          fn apply_at(
              &self,
              t: F,
              tau: F,
              src: &Self::S,
              dst: &mut Self::S,
              scratch: &mut ScratchPool<F>,
          ) -> Result<(), SemiflowError>
        default_impl: |
          let _ = t;  // default bridge: t ignored — autonomous-impl-friendly
          self.apply_into(tau, src, dst, scratch)
        semantics: |
          Zero-alloc apply at *absolute time* `t` with *step* `tau`. The implementor's
          time-dependent generator `L(t)` is sampled at the left endpoint `t` of the
          step `[t, t + tau]`; the resulting operator's Chernoff step over `tau` is
          applied. Default impl bridges to `apply_into(tau, src, dst, scratch)`
          ignoring `t` — makes any autonomous impl a TimedChernoffFunction for free.
        preconditions:
          - "t is finite (NaN/Inf -> DomainViolation)"
          - "tau is finite and >= 0 (NaN/Inf/negative -> DomainViolation)"
          - "src.norm_sup() is finite (no NaN/Inf in input)"
          - "src and dst have identical structural shape"
        postconditions:
          - "dst has same structural shape as src"
          - "tau == 0 implies dst.copy_from(src) (no generator application)"
          - "default impl: result bit-identical to self.apply_into(tau, src, dst, scratch)"
        errors:
          - "DomainViolation if t is NaN/Inf"
          - "DomainViolation if tau < 0 or NaN/Inf"
          - "DomainViolation if src contains NaN/Inf"
          - "Inherits any error returned by the inner apply_into / generator sampling"

  # =========================================================================
  # v2.8 (ADR-0071) — BoundedGeometryManifold trait. NEW trait class — no prior
  # abstraction in the library. Appended to `traits:` section.
  # =========================================================================
  - name: BoundedGeometryManifold
    shape: trait
    location: "crates/semiflow-core/src/manifold.rs"
    doc: |
      v2.8 (ADR-0071, math §24.6). Riemannian manifold of bounded geometry.
      Backbone of `ManifoldChernoff<M, F>` — the v2.8 port of Mazzucchi-Moretti
      -Remizov-Smolyanov 2023 *Math. Nachr.* Theorem 1 (Gaussian-on-tangent-space
      Chernoff approximation with R/12 curvature correction).

      Generic over `F: SemiflowFloat = f64` per ADR-0025.

      **Bounded-geometry hypotheses** (math §24.3 — implementors MUST satisfy):
        B1. injectivity_radius() > 0 strictly (uniform inf over M).
        B2. scalar_curvature(x) uniformly bounded as x ranges over M.
        B3. Uniform Ricci derivatives ‖∇^k R‖_∞ < ∞ for k ≤ 2 (needed for the
            order-2 R/12-corrected variant; relaxable to k=0 if caller uses
            ManifoldChernoff::new(_, false) — order-1 only).

      **Excluded backends** (B1 fails): cusp manifolds, cone manifolds with
      inj=0 at cone point, manifolds with unbounded sectional curvature.

      **v2.8 reference impls** (all satisfy B1-B3):
        - Torus<F, const D: usize>   — flat (R ≡ 0); injectivity radius 1/2.
        - Sphere2<F>                   — R ≡ 2; injectivity radius π.
        - Hyperbolic2<F>               — R ≡ -2; injectivity radius ∞.

      **User-defined manifolds**: compile via the trait (the four geometric
      methods are filled in by the user) but are NOT gated by acceptance tests
      in v2.8. Numerical geodesic flow (Runge-Kutta on the geodesic ODE) is
      deferred to v3.x once concrete use cases inform the API.

      **Explicitly NOT extending `TimedChernoffFunction<F>`** (ADR-0070): the
      time-dependent metric case (Ricci flow, mean curvature flow) is open
      math; the autonomous v2.8 surface is `ManifoldChernoff: ChernoffFunction`
      (NOT `TimedChernoffFunction`). Nonautonomous manifold is v3.x research.
    sized: true
    object_safe: false
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    methods:
      - name: dim
        signature: "fn dim(&self) -> usize"
        semantics: |
          Returns the manifold dimension d = dim M. MUST be ≥ 1 and finite.
          Used by ManifoldChernoff for dimension-compatibility checks at
          construction time.
        preconditions: []
        postconditions:
          - "result >= 1"

      - name: injectivity_radius
        signature: "fn injectivity_radius(&self) -> F"
        semantics: |
          Returns inj(M) := inf_{x ∈ M} inj(x) — the uniform infimum of the
          injectivity radius. MUST be strictly positive (bounded-geometry
          hypothesis B1). Implementors MAY return F::INFINITY for manifolds
          with no cut locus (e.g., the Poincaré disk).
        preconditions: []
        postconditions:
          - "result > 0 (strict)"

      - name: exp_map
        signature: |
          fn exp_map(
              &self, x: &[F], v: &[F], out: &mut [F],
          ) -> Result<(), SemiflowError>
        semantics: |
          Riemannian exponential map: out := exp_x(v). Writes self.dim()
          coordinates into `out`. The implementor's chart is private to the
          backend (Torus = identity in normal coordinates; Sphere2 = great-
          circle in stereographic chart; Hyperbolic2 = Möbius transformation
          in Poincaré disk chart). Returns DomainViolation if any of:
            - x.len() != self.dim()
            - v.len() != self.dim()
            - out.len() != self.dim()
            - any coordinate is NaN/Inf
            - ||v||_{g_x} >= self.injectivity_radius() (geodesic exits chart)
          The caller (ManifoldChernoff) is responsible for keeping
          ||v||_{g_x} within the injectivity ball; the trait method enforces
          at runtime.
        preconditions:
          - "x.len() == self.dim()"
          - "v.len() == self.dim()"
          - "out.len() == self.dim()"
        postconditions:
          - "out contains finite values"
          - "out is in M (per the backend's chart convention)"
        errors:
          - "DomainViolation if any input dim mismatch or NaN/Inf"
          - "DomainViolation if ||v||_{g_x} >= injectivity_radius (geodesic exits chart)"

      - name: parallel_transport
        signature: |
          fn parallel_transport(
              &self, x: &[F], y: &[F], v: &[F], out: &mut [F],
          ) -> Result<(), SemiflowError>
        semantics: |
          Parallel transport along the geodesic from x to y: out := P_{x→y}(v).
          Writes self.dim() coordinates into `out`. Used by the Magnus-on-
          manifold higher-order extension (v3.x); shipped in v2.8 for
          completeness of the trait surface but not exercised by G26. Each
          v2.8 backend ships a closed-form impl (rotation for Sphere2; Möbius
          derivative for Hyperbolic2; identity for Torus).
        preconditions:
          - "x.len() == self.dim()"
          - "y.len() == self.dim()"
          - "v.len() == self.dim()"
          - "out.len() == self.dim()"
        postconditions:
          - "out contains finite values"
          - "||out||_{g_y} == ||v||_{g_x}  (parallel transport is an isometry)"
        errors:
          - "DomainViolation if any input dim mismatch or NaN/Inf"

      - name: scalar_curvature
        signature: "fn scalar_curvature(&self, x: &[F]) -> F"
        semantics: |
          Returns R(x) — the scalar curvature at x (one-half the trace of
          the Ricci tensor; equivalently, sum of sectional curvatures over
          an orthonormal frame of 2-planes through x). MUST be uniformly
          bounded as x ranges over M (hypothesis B2). Used by ManifoldChernoff
          when `with_curvature_correction == true` to apply the
          [1 + (τ/12)·R(x)] order-2 lift (MMRS 2023 Theorem 1).
        preconditions:
          - "x.len() == self.dim()"
        postconditions:
          - "result is finite"

      - name: volume_element_log
        signature: "fn volume_element_log(&self, x: &[F]) -> F"
        semantics: |
          Returns log √det g(x) — the log of the volume element in the
          backend's coordinate chart. log-space arithmetic avoids underflow
          near chart singularities (e.g., the Poincaré disk metric blows up
          at |x| → 1). Used by ManifoldChernoff's change-of-variables in the
          tangent-space Gaussian integrand (24.1).
        preconditions:
          - "x.len() == self.dim()"
        postconditions:
          - "result is finite (the backend's chart MUST avoid log(0))"

  # =========================================================================
  # v2.6 (ADR-0068) — KillingRegion trait. Appended to `traits:` section.
  # =========================================================================
  - name: KillingRegion
    location: "crates/semiflow-core/src/killing.rs"
    doc: |
      v2.6 (ADR-0068, math §21). Indicator function `𝟙_R: ℝᴰ → {0, 1}` for
      a region `R ⊊ ℝᴰ`. Consumed by `KillingChernoff<C, R>` to post-multiply
      each Chernoff step by `𝟙_R` (Feynman-Kac killing — math §21.2).

      Generic over `F: SemiflowFloat = f64`. Implementors MUST follow the
      OPEN convention: cells ON `∂R` are EXCLUDED (mask returns 0.0 on the
      boundary). This matches the absorbing-boundary semigroup `(P^R_t f)(x) =
      E^x[f(X_t) · 1_{τ_R > t}]` with `τ_R := inf{s ≥ 0 : X_s ∉ R}` (first
      exit time, exclusive of boundary).
    sized: true
    object_safe: false
    generic_params:
      - name: F
        bound: "SemiflowFloat"
    methods:
      - name: is_inside
        signature: "fn is_inside(&self, point: &[F]) -> bool"
        semantics: |
          Returns true iff `point ∈ R` (open interior). MUST be deterministic
          and side-effect-free. Implementors MAY assume `point.len() == self.dim()`
          (debug_assert; release-mode panic if violated).
        preconditions:
          - "point.len() == self.dim()"
        postconditions: []
      - name: mask_in_place
        signature: |
          fn mask_in_place<S: State<F>>(&self, dst: &mut S) -> Result<(), SemiflowError>
        semantics: |
          In-place killing: for each cell `i` of `dst`, if the cell's
          spatial coordinate is NOT in `R`, set `dst[i] := 0`. Otherwise
          leave unchanged. The coordinate is recovered from the `State<F>`
          via the underlying grid (`Grid1D::x_at`, `Grid2D::x_at` /
          `y_at`, `Grid3D::*_at`). Default impl iterates `is_inside`
          per cell; concrete impls (BoxRegion, BallRegion) override with
          batched per-axis bound checks. Returns `DomainViolation` if
          `dst.dim() != self.dim()`.
        preconditions:
          - "dst.dim() == self.dim() (else DomainViolation)"
        postconditions:
          - "for all i: dst[i] == 0 OR is_inside(coord_of(i))"
        errors:
          - "DomainViolation if dst.dim() != self.dim()"
      - name: dim
        signature: "fn dim(&self) -> usize"
        semantics: |
          Spatial dimension `D` of the region. Used by `KillingChernoff` for
          the dimension-compatibility check between `inner.S::dim()` and
          `region.dim()` at construction time.
        preconditions: []
        postconditions:
          - "result >= 1"

  # =========================================================================
  # v2.8 (ADR-0072) — ReflectingRegion trait. SIBLING (not subtype) of
  # KillingRegion: same structural shape, distinct semantics (reflect vs kill).
  # Appended to `traits:` section after KillingRegion.
  # =========================================================================
  - name: ReflectingRegion
    shape: trait
    location: "crates/semiflow-core/src/reflection.rs"
    doc: |
      v2.8 (ADR-0072, math §25.6). Reflection across the boundary ∂R for a
      region R ⊊ ℝᴰ (or R ⊊ M). Consumed by `ReflectedHeatChernoff<C, R>` to
      build the image-method ghost contribution per Walsh 1986 §3.4.

      **SIBLING design — NOT a subtype of `KillingRegion<F>`**: the two traits
      have the SAME structural shape (`is_inside`, in-place region-aware
      mutator, `dim`) but DISTINCT semantics:
        - KillingRegion::mask_in_place writes ZERO outside R (absorbing-BC kernel).
        - ReflectingRegion::reflect_in_place writes the SHIFTED IMAGE of
          outside values into a buffer (Neumann-BC image-method kernel).
      Subtyping in either direction is mathematically incorrect: killing
      destroys mass; reflecting preserves it. The same region struct
      (BoxRegion, BallRegion) implements BOTH traits in v2.8; the caller
      picks the BC semantics by selecting the wrapper (KillingChernoff vs
      ReflectedHeatChernoff).

      Generic over `F: SemiflowFloat = f64`. Implementors MUST follow the OPEN
      convention: cells ON `∂R` are EXCLUDED. This matches the reflecting BM
      construction `(P^N_t f)(x) = E^x[f(X̃_t)]` where X̃ is reflected Brownian
      motion (Anderson 1988 §2.3).

      **v2.8 reference impls**:
        - `HalfSpaceRegion<F, D>`            — new struct; hyperplane reflection.
        - `impl ReflectingRegion for BoxRegion<F, D>`  — additive on v2.6 struct;
                                                          per-axis flip composition.
        - `impl ReflectingRegion for BallRegion<F, D>` — additive on v2.6 struct;
                                                          spherical inversion (D ≥ 2).
                                                          Returns DomainViolation
                                                          on D = 1 (use HalfSpace).
    sized: true
    object_safe: false
    generic_params:
      - name: F
        bound: "SemiflowFloat"
    methods:
      - name: is_inside
        signature: "fn is_inside(&self, point: &[F]) -> bool"
        semantics: |
          Returns true iff `point ∈ R` (open interior). MUST be deterministic
          and side-effect-free. Implementors MAY assume `point.len() == self.dim()`
          (debug_assert; release-mode panic if violated). Same signature as
          KillingRegion::is_inside — the two traits share the inside-test
          semantics.
        preconditions:
          - "point.len() == self.dim()"
        postconditions: []
      - name: reflect_in_place
        signature: |
          fn reflect_in_place<S: State<F>>(
              &self, dst: &mut S, src: &S,
          ) -> Result<(), SemiflowError>
        semantics: |
          In-place ghost-build: for each cell `i` of `dst`, if the cell's
          spatial coordinate `c_i` is NOT in R (i.e., is_inside(c_i) is false),
          set `dst[i] := src[σ_R^{-1}(i)]` — the value at the inside cell whose
          mirror image (under σ_R) is the outside cell `i`. Otherwise, set
          `dst[i] := F::zero()` (the ghost has support ONLY outside R, by
          construction). The σ_R formula is per-region:
            - HalfSpaceRegion: σ_R(p) := p - 2 ((p - origin) · normal) · normal.
            - BoxRegion: per-axis flip at the violated boundary, composed in
                         canonical axis order.
            - BallRegion: σ_R(p) := center + r²·(p - center)/|p - center|² (D ≥ 2).
          Returns DomainViolation if dst.dim() != self.dim() OR src.dim() !=
          self.dim() OR (for BallRegion<F, 1>) the impl detects D = 1.
          NOTE the signature DIFFERS from KillingRegion::mask_in_place (which
          takes only `&mut dst`): the reflection requires reading from `src`
          at the σ_R-image location, so two state buffers are needed.
        preconditions:
          - "dst.dim() == self.dim() (else DomainViolation)"
          - "src.dim() == self.dim() (else DomainViolation)"
        postconditions:
          - "for all i: is_inside(coord_of(i))  =>  dst[i] == 0"
          - "for all i: !is_inside(coord_of(i)) =>  dst[i] == src[σ_R^{-1}(i)]"
        errors:
          - "DomainViolation if dst.dim() != self.dim() or src.dim() != self.dim()"
          - "DomainViolation if backend is BallRegion<F, 1> (use HalfSpaceRegion<F, 1>)"
      - name: dim
        signature: "fn dim(&self) -> usize"
        semantics: |
          Spatial dimension `D` of the region. Used by `ReflectedHeatChernoff`
          for the dimension-compatibility check between `inner.S::dim()` and
          `region.dim()` at construction time.
        preconditions: []
        postconditions:
          - "result >= 1"

  # =========================================================================
  # v3.1 (ADR-0077) — VectorField<F, const D: usize> trait. NEW trait class
  # for smooth vector fields on ℝ^D (open-extensibility surface for the v3.1
  # Hörmander Research Pillar). NO prior abstraction; SIBLING placement
  # (independent of BoundedGeometryManifold, ReflectingRegion, KillingRegion).
  # =========================================================================
  - name: VectorField
    shape: trait
    location: "crates/semiflow-core/src/hormander.rs"
    doc: |
      v3.1 (ADR-0077, math §28.6). Smooth vector field $X : \mathbb{R}^D \to
      \mathbb{R}^D$. Backbone of `HypoellipticChernoff<F, D, M>` — the v3.1
      first peer-reviewable Rust implementation of hypoelliptic Chernoff
      approximation (palindromic Strang-Hörmander per math §28.3 eq 28.4,
      order-2 tangent on $D(L^2)$ for step-2 Carnot groups; Kolmogorov 1934,
      Heisenberg group).

      Generic over `F: SemiflowFloat = f64` per ADR-0025 and `const D: usize`
      for compile-time dimension. The const-generic D enables zero-overhead
      stack-allocated `[F; D]` array passing without heap allocation per
      evaluation (critical for the per-quadrature-cell Hörmander loop).

      **Bracket-generating condition** (math §28.2 Definition 28.1, Hörmander
      1967 *Acta Math.* §1): a collection $\{X_0, X_1, \ldots, X_M\}$ of vector
      fields is bracket-generating at $x \in \mathbb{R}^D$ if the Lie algebra
      generated by iterated brackets spans the tangent space at $x$. The v3.1
      `HypoellipticChernoff::new` verifies this at step 2 (single bracket
      suffices) via the `bracket_with` method; step ≥ 3 backends FAIL the
      check and return `DomainViolation` (restricted to step-2 Carnot in v3.1).

      **v3.1 reference impls** (all step-2 Carnot):
        - `KolmogorovPhaseSpace<F>::x0_drift()`   — X_0 = v · ∂_x (D = 2).
        - `KolmogorovPhaseSpace<F>::x1_diffusion()` — X_1 = ∂_v (D = 2).
        - `HeisenbergGroup<F>::left_invariant_pair()` — X_1 = ∂_x - (y/2)∂_t,
                                                        X_2 = ∂_y + (x/2)∂_t
                                                        (D = 3; X_0 = 0).

      **User-defined vector fields**: compile via the trait (the `evaluate`
      method is filled in by the user; `bracket_with` defaults to central-
      difference Jacobians at f64 precision). Step ≥ 3 user-defined backends
      FAIL the v3.1 step-checker and return `DomainViolation` at
      `HypoellipticChernoff::new` time; step-2 user-defined backends compile
      and run but are NOT gated by G28 (only the closed-form Kolmogorov
      backend is the G28 oracle).

      **Explicitly NOT object-safe** (`object_safe: false`): the `evaluate`
      method takes `&[F; D]` arrays whose const-generic D would forbid trait
      object construction (`dyn VectorField<F, D>` IS allowed for fixed D —
      the trait is object-safe FOR FIXED D, not generic over D). The v3.1
      `HypoellipticChernoff` uses `Box<dyn VectorField<F, D>>` fields (one
      Box allocation per field at construction; one-time cost since kernel
      is long-lived).
    sized: true
    object_safe: false      # Generic over const D forbids object construction across D values
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    methods:
      - name: evaluate
        signature: |
          fn evaluate(
              &self, x: &[F; D], out: &mut [F; D],
          ) -> Result<(), SemiflowError>
        semantics: |
          Writes the vector-field value $v_x = X(x)$ into `out`. Returns
          `DomainViolation` if any coordinate of `x` is NaN/Inf. Implementors
          MUST be deterministic and side-effect-free.
        preconditions:
          - "all coordinates of x are finite"
        postconditions:
          - "out contains finite values"
        errors:
          - "DomainViolation if any input coordinate is NaN/Inf"

      - name: bracket_with
        signature: |
          fn bracket_with(
              &self,
              other: &dyn VectorField<F, D>,
              x: &[F; D],
              out: &mut [F; D],
          ) -> Result<(), SemiflowError>
        semantics: |
          Writes the Lie bracket $[X, Y](x)$ into `out` via the directional-
          derivative formula
            $[X, Y](x) \;=\; (dY|_x) \cdot X(x) \;-\; (dX|_x) \cdot Y(x)$.
          DEFAULT impl uses central-difference Jacobians with step size
          $h := F::EPSILON^{1/3}$ (balances truncation vs round-off error at
          f64 precision; documented in math §28.6). Closed-form Carnot
          backends (Kolmogorov, Heisenberg) OVERRIDE this method to return the
          exact bracket via the closed-form Jacobian (sympy-traceable accuracy
          for the step-checker at construction time).

          Used by `HypoellipticChernoff::new` to verify the step-2 bracket-
          generating condition (math §28.2 Definition 28.2) at the grid
          centre. Failure of the step-checker (step ≥ 3 or insufficient rank)
          returns `DomainViolation` from the constructor.
        preconditions:
          - "all coordinates of x are finite"
        postconditions:
          - "out contains finite values"
          - "default impl: bracket accurate to O(F::EPSILON^(2/3))"
          - "override impl: bracket exact at f64 precision (sympy-traceable)"
        errors:
          - "DomainViolation if any input coordinate is NaN/Inf"

  # v4.x (ADR-0098) — RobinRegion trait. Sibling to v2.8 ReflectingRegion.
  - name: RobinRegion
    shape: trait
    location: "crates/semiflow-core/src/robin.rs"
    doc: |
      v4.x (ADR-0098, math §3.5.tris). Sub-trait of `ReflectingRegion<F>` that
      adds scalar Robin coefficients `(α, β)` to the geometric-reflection
      contract.

      Adds one required method `robin_coeffs() -> (F, F)` on top of the full
      `ReflectingRegion<F>` surface (dim, is_inside, reflect_in_place).

      Invariant: implementors MUST guarantee `alpha ≥ 0` and `beta > 0` for
      the well-posedness of the static Robin BC `α·u + β·∂_n u = 0`.

      v4.6 stores `(alpha, beta)` constant across ∂R. Per-cell varying
      coefficients are deferred to v5.x.

      **Concrete impl**: `HalfSpaceRobin<F, D>` is the only v4.x impl
      (sibling to v2.8 `HalfSpaceRegion<F, D>`).
    supertraits:
      - "ReflectingRegion<F>"
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    methods:
      - name: robin_coeffs
        signature: "fn robin_coeffs(&self) -> (F, F)"
        doc: |
          Return the scalar Robin coefficients (α, β).
          Precondition: alpha ≥ 0, beta > 0.
        semantics: "Pure query. No allocation. Must be consistent with the BC imposed."
        errors: []

  - name: LevySubordinator
    location: "crates/semiflow-core/src/subordinated.rs"
    shape: "trait"
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    doc: |
      v4.8 (ADR-0103, math §37.1). One-dimensional Lévy subordinator interface
      for the Chernoff approximation of subordinate semigroups per Bochner-
      Phillips functional calculus + Butko 2018 §4 Theorem 2.1.

      A `LevySubordinator<F>` is a CBF-admissible (Complete Bernstein Function)
      Laplace-exponent provider PLUS a quadrature method for the subordinator-
      density integral

        F^φ(τ) f := ∫₀^∞ F(s) f μ^φ_τ(ds) ≈ Σ_k w_k · F(s_k) f.

      The three v4.8 backends (StableSubordinator, GammaSubordinator,
      InverseGaussianSubordinator) are CBF by construction; user-defined impls
      SHOULD include their own sympy CBF screen mirroring T_SUBORD sub-check
      (a) per `scripts/verify_subordinated_chernoff.py`.

      Supertraits: `Send + Sync + 'static` (mirror of BoundedGeometryManifold<F>
      pattern from v2.8 ADR-0071).

      Default `F = f64`: matches the v0.9 ADR-0026 trait family convention.
    supertraits:
      - "Send"
      - "Sync"
      - "'static"
    methods:
      - name: laplace_exponent
        signature: "fn laplace_exponent(&self, lambda: F) -> F"
        doc: |
          Return the Laplace exponent φ(λ) := -log E[exp(-λ S_1)].
          MUST be a Complete Bernstein Function.
        semantics: "Pure query; no allocation. Used in tests / sympy oracles."
      - name: quadrature
        signature: "fn quadrature(&self, tau: F, n_nodes: usize) -> (alloc::vec::Vec<F>, alloc::vec::Vec<F>)"
        doc: |
          Return (nodes, weights) of length n_nodes for the per-backend
          Gauss-Laguerre-derived quadrature of the subordinator density
          (math §37.6). Implementations REUSE GL32_NODES/GL32_WEIGHTS
          from resolvent_quad.rs and apply per-backend density transformation.

          Allocation: v4.8 returns Vec<F> for ergonomics; a zero-alloc
          quadrature_into(nodes, weights, τ) is deferred to v5.x per the
          wider scratch-pool refactor.

          Precondition: n_nodes ≤ 32 in v4.8 (matches GL32 table size).
        semantics: "Allocates 2× Vec<F>::with_capacity(n_nodes). REUSES GL32 tables."

# ---------------------------------------------------------------------------
# 3. Concrete types: Grid1D, GridFn1D, ShiftChernoff1D, ChernoffSemigroup.
# ---------------------------------------------------------------------------
structs:
  - name: Grid1D
    shape: struct
    doc: |
      Uniform 1D grid `[xmin, xmax]` discretised into `n` nodes
      `x_i = xmin + i * dx`, `dx = (xmax - xmin) / (n - 1)`, `i = 0..n`.
      Owns the geometry only; values live in `GridFn1D`.

      Hosts the boundary policy (out-of-grid lookup) and the interpolation
      kind (sub-grid lookup). Both are pluggable adapters (Hurd-translator
      pattern) — see `.dev-docs/adapters/registry.md`.

      Boundary-policy invariants (v0.2.1, ADR-0007):
        I1. `bc_index(boundary, n, idx)` is TOTAL over
            (BoundaryPolicy, n: usize >= 2, idx: i64): NEVER returns Err
            for any of the 4 policy variants. Property:
            `bc_index_totality` (properties.yaml).
        I2. For Reflect / Periodic, the result is ALWAYS `Inside(i)` with
            `i in [0, n)`. Reflect uses period 2(n-1); Periodic uses period n.
        I3. For ZeroExtend, the result is `Inside(j as usize)` if `j in [0, n)`
            else `Zero`. Downstream `bc_value` returns 0.0 on `Zero`.
        I4. For LinearExtrapolate, the result is `Inside(j as usize)` if
            `j in [0, n)`, else `OutsideLeft(d)` with `d = -j >= 1` (when j < 0)
            or `OutsideRight(d)` with `d = j - (n-1) >= 1` (when j >= n).
            Downstream `bc_value` computes the affine extension from the
            3-point boundary stencil; see `.dev-docs/verification/boundary-policies-derivation.md` §3.
        I5. STRICT-INTERIOR AGREEMENT: for all 4 policies and all
            `i in [0, n)`, `bc_index(policy, n, i) == Inside(i)`. The
            policies differ only on out-of-range indices.
    fields:
      - name: xmin
        type: f64
        doc: "Left endpoint of the spatial domain. Invariant: xmin < xmax."
      - name: xmax
        type: f64
        doc: "Right endpoint. Invariant: xmin < xmax."
      - name: n
        type: usize
        doc: "Number of nodes. Invariant: n >= 4 (minimum stencil for cubic Hermite)."
      - name: boundary
        type: BoundaryPolicy
        doc: "Policy for x outside [xmin, xmax]. Default Reflect (R5 / G1)."
      - name: interp
        type: InterpKind
        doc: "Sub-grid interpolation strategy. Default CubicHermite (R7 / ADR-0005)."
    methods:
      - name: new
        signature: "fn new(xmin: f64, xmax: f64, n: usize) -> Result<Self, SemiflowError>"
        semantics: "Constructor with validation. boundary=Reflect, interp=CubicHermite."
        errors:
          - "DomainViolation if !xmin.is_finite() || !xmax.is_finite()"
          - "DomainViolation if xmin >= xmax"
          - "DomainViolation if n < 4"

      - name: dx
        signature: "fn dx(&self) -> f64"
        semantics: "Returns (xmax - xmin) / (n - 1) as f64"

      - name: x_at
        signature: "fn x_at(&self, i: usize) -> f64"
        semantics: "Returns xmin + i * dx; saturating at boundaries via boundary policy if i >= n"

      - name: with_boundary
        signature: "fn with_boundary(self, policy: BoundaryPolicy) -> Self"
        semantics: "Builder: replace boundary policy"

      - name: with_interp
        signature: "fn with_interp(self, kind: InterpKind) -> Self"
        semantics: "Builder: replace interpolation kind"

  - name: GridFn1D
    shape: struct
    doc: |
      Concrete implementation of `State`. Holds a `Vec<f64>` of length
      `grid.n` representing function values at grid nodes.
    fields:
      - name: values
        type: "Vec<f64>"
        doc: "Length must equal grid.n. Indexed left-to-right (x_0 = xmin)."
      - name: grid
        type: Grid1D
        doc: "Geometry. Owned by value (cheap to clone)."
    implements:
      - "State"
    methods:
      - name: new
        signature: "fn new(grid: Grid1D, values: Vec<f64>) -> Result<Self, SemiflowError>"
        semantics: "Constructor with shape validation"
        errors:
          - "DomainViolation if values.len() != grid.n"
          - "DomainViolation if any value is NaN or Inf"

      - name: from_fn
        signature: "fn from_fn<F: Fn(f64) -> f64>(grid: Grid1D, f: F) -> Self"
        semantics: "Sample a closure at grid nodes. Convenience for tests/G1."

      - name: sample
        signature: "fn sample(&self, x: f64) -> f64"
        semantics: |
          Evaluate the represented function at arbitrary x via the grid's
          boundary policy and interpolation kind. Pure function (no &mut).

  - name: ShiftChernoff1D
    shape: struct
    doc: |
      v0.1.0 Chernoff function: formula (6) of Theorem 6, Remizov 2025
      (Vladikavkaz Math. J. 27(4), DOI 10.46698/a3908-1212-5385-q):

        (S(tau) f)(x) = (1/4) f(x + 2 sqrt(a(x) tau))
                      + (1/4) f(x - 2 sqrt(a(x) tau))
                      + (1/2) f(x + 2 b(x) tau)
                      + tau * c(x) * f(x)

      Implements the operator `L f = a(x) f'' + b(x) f' + c(x) f` to first
      order. For the v0.1.0 heat-Mehler test (G1, G2): a = 0.5, b = c = 0.

      `a, b, c` are caller-provided closures. v0.1.0 stores them as `fn` pointers
      (no_std-friendly; no Box<dyn Fn>). Engineer MAY use generics if it stays
      below the 500-line file budget; fn pointers are the conservative default.
    fields:
      - name: a
        type: "fn(f64) -> f64"
        doc: "Diffusion coefficient a(x). Caller MUST guarantee inf a(x) > 0 (Theorem 6 hypothesis)."
      - name: b
        type: "fn(f64) -> f64"
        doc: "Drift coefficient b(x). Bounded with 3 derivatives per Theorem 6."
      - name: c
        type: "fn(f64) -> f64"
        doc: "Reaction coefficient c(x). Bounded with 3 derivatives per Theorem 6."
      - name: c_norm_bound
        type: f64
        doc: |
          Caller-supplied upper bound for ||c||_inf, used by `growth()`. If
          unknown, pass +infinity and the convergence-rate prediction degrades
          gracefully (Engineer SHOULD compute a reasonable default if the
          callable is constant).
    implements:
      - "ChernoffFunction (associated S = GridFn1D)"
    methods:
      - name: new
        signature: "fn new(a: fn(f64) -> f64, b: fn(f64) -> f64, c: fn(f64) -> f64, c_norm_bound: f64) -> Self"
        semantics: "Constructor; no validation of closures (compiler ensures fn type)"

      - name: apply
        signature: "fn apply(&self, tau: f64, f: &GridFn1D) -> Result<GridFn1D, SemiflowError>"
        semantics: |
          Implements formula (6) pointwise on every grid node x_i of f.grid.
          Sub-grid sampling at x_i +/- 2 sqrt(a(x_i) tau) and x_i + 2 b(x_i) tau
          uses f.sample() (which dispatches to f.grid.boundary and f.grid.interp).

          Engineer notes (PITFALLS):
            - Sign on the second shift is MINUS (x - 2 sqrt(a tau)), not plus.
            - The third coefficient is 1/2, not 1/4.
            - The fourth term is `tau * c(x_i) * f.values[i]` (LINEAR in tau,
              NOT exp(tau c)). c is evaluated at x_i pointwise (M2).
            - 2*sqrt(a*tau) NOT sqrt(2*a*tau). The factor of 2 is OUT of the sqrt.

  - name: ChernoffSemigroup
    shape: "struct<F: ChernoffFunction>"
    doc: |
      Iterator: applies a Chernoff function `F` exactly `n` times with step
      `tau = t / n`, producing the Chernoff approximant `(S(t/n))^n g` of
      `e^{tA} g`.

      v0.1.0 is sequential (no Rayon — see release-scope.md). Single
      allocation reused across iterations (in-place).

      **v3.0 RENAMED to `Evolver<C, F>` (ADR-0074).** The v2.x name
      `ChernoffSemigroup<C>` is preserved as a type alias in `mod v2_compat`
      with #[deprecated] for 12 months; HARD REMOVED at v4.0. New code SHOULD
      use `Evolver<C, F>` directly. See the `Evolver` struct entry below for
      the v3.0 surface (adds `evolve_into` zero-alloc method; the legacy
      `evolve` allocating method is preserved as inherent convenience where
      `C::S: Clone`).
    fields:
      - name: func
        type: F
        doc: "The Chernoff function to iterate."
      - name: n
        type: usize
        doc: "Number of iterations. Invariant: n >= 1."
    methods:
      - name: new
        signature: "fn new(func: F, n: usize) -> Result<Self, SemiflowError>"
        errors:
          - "DomainViolation if n == 0"

      - name: evolve
        signature: "fn evolve(&self, t: f64, f: &<F as ChernoffFunction>::S) -> Result<<F as ChernoffFunction>::S, SemiflowError>"
        semantics: |
          Computes `(S(t/n))^n f`. tau = t/n. Calls self.func.apply_into(tau, .)
          exactly n times, threading state forward. Allocating convenience
          (where C::S: Clone); for zero-alloc use `evolve_into` (v3.0 NEW).
        preconditions:
          - "t is finite and >= 0.0"
          - "f.norm_sup() is finite"
        postconditions:
          - "Single output state with same shape as f"
          - "On t == 0 returns a clone of f (S(0) = I, modulo interp idempotence)"
        errors:
          - "DomainViolation if t < 0 or t is NaN/Inf"
          - "any error returned by self.func.apply_into propagates"

  # =========================================================================
  # v3.0 (ADR-0074) — Growth<F> typed return for ChernoffFunction::growth.
  # Replaces the v2.x (f64, f64) tuple return — fixes a latent Generic-over-F
  # bug (the tuple was always (f64, f64) regardless of F per ADR-0026).
  # =========================================================================

  - name: KilledDirichletChernoff
    shape: "struct<C: ChernoffFunction<F>, R: ReflectingRegion<F>, F: SemiflowFloat = f64>"
    status: "PLANNED v8.0.0 Phase-2 additive surface (F3 GO, ADR-0135 Amendment 2)"
    introduced_in: "v8.0.0"
    authority: "ADR-0135 Amendment 2"
    doc: |
      F3 GO (math.md §44.ter, ADR-0135 Amendment 2) — order-2 HARD absorbing
      wall via the killed Dirichlet GENERATOR Crank–Nicolson Cayley map:

        U^{n+1} = (I − τ/2 L^R)^{-1} (I + τ/2 L^R) U^n

      where L^R is the Dirichlet realization of L = ∂_x(a ∂_x) with the
      absorbing wall u|_∂R = 0 baked into the generator's DOMAIN (boundary rows
      = identity ∀τ) — NOT a post-multiply mask. The hard wall has width 0 (no
      O(ε) boundary-layer bias), and the τ³ order-2 constant is BOUNDED under
      refinement (5/24 at both 3 and 4 interior nodes — no 1/dx blow-up). This
      STRICTLY DOMINATES the v2.6 post-multiply KillingChernoff (order-1, §21.3,
      UNCHANGED): the CN map has τ² = 0 (order-2) while the mask has interior
      τ² ≠ 0 (order-1).

      The tridiagonal CN solve REUSES `block_thomas_solve` at the scalar block
      size M = 1 (no new linear-algebra primitive). The absorbing region is
      supplied by the region trait R (sibling pattern to the v2.6 KillingRegion
      / v2.8 ReflectingRegion families).

      Free-boundary honesty NOTE: composing this order-2 inner with the §44
      ObstacleChernoff projection lifts American/optimal-stopping accuracy to
      order-2 in the CONTINUATION region, but the GLOBAL free-boundary rate
      stays O(√τ) for non-smooth payoffs (Howison-Reisinger-Witte 2013) — a
      structural obstacle property, NOT claimed as order-2.

      Gate: G_HARD_WALL_ORDER2 (RELEASE_BLOCKING, slow-tests, self-convergence
      slope ≤ −1.95). PRE-FLIGHT scripts/killed_generator_cn_kit.py
      (T_KILLED_GEN_CN, PASS 4/4 2026-06-07).
    planned_surface:
      - "KilledDirichletChernoff<C, R, F>::new(inner: C, region: R) — killed Dirichlet generator with absorbing region R."
      - "fn apply(&self, tau: F, f: &GridFn1D<F>) -> Result<GridFn1D<F>, SemiflowError> — one CN Cayley step of the killed generator."
      - "REUSES block_thomas_solve at M = 1 for the tridiagonal (I − τ/2 L^R)^{-1} solve (no new primitive)."
    spec_ref:
      - "math.md §44.ter"
      - "ADR-0135 Amendment 2"
      - "Howison-Reisinger-Witte 2013 (free-boundary rate honesty note)"

  - name: ComplexTripleJump
    shape: "struct<K: ChernoffFunction<Complex<f64>>>"
    status: "PLANNED v8.0.0 Phase-2 additive surface (F4 STRONG-GO, ADR-0136 Amendment 2). Promotes the prior comment-stub (header lines 43–56) to a real entry."
    introduced_in: "v8.0.0"
    authority: "ADR-0136 Amendment 2"
    doc: |
      F4 STRONG-GO (math.md §28.bis.8, ADR-0136 Amendment 2) — complex-time
      ORDER-4 Carnot Chernoff via the complex triple-jump. TRIZ/ARIZ escape of
      the Sheng–Suzuki real-coefficient order barrier: a symmetric triple
      composition over an inner ORDER-2 symmetric Chernoff map K,

        Ψ(τ) = K(γ⋆ τ) ∘ K((1 − 2γ⋆) τ) ∘ K(γ⋆ τ),

      where γ⋆ is the admissible COMPLEX root of 2γ³ + (1−2γ)³ = 0 with
      Re(γ⋆) > 0 AND Re(1 − 2γ⋆) > 0 (every substep forward-in-time, admissible
      because the Carnot sub-Laplacian is analytic ⇒ sectorial semigroup,
      CCDV 2009). The τ³ word cancels and τ⁴ ≡ 0 by the even-order theorem ⇒
      order 4. State is complex-valued (GridFnND<Complex<f64>>); the real
      order-4 output is recovered via `into_real()` → GridFnND<f64> by Re(·).

      Implementation: a table-driven fold over the const scale array
      [γ⋆, 1 − 2γ⋆, γ⋆] applied to the inner symmetric Chernoff K (e.g. the
      filiform-N5 horizontal Strang). Rides the shipped SemiflowComplex substrate
      (ADR-0079) + GridFnND<C> at C = Complex<f64> — zero new deps.

      Gates: G_CARNOT_CPLX3 (RELEASE_BLOCKING, slow-tests, filiform N=5 order-4
      self-convergence slope ≤ −3.80) + T_CARNOT_CPLX3 (sympy 16/16 feasibility
      oracle, PASS architect-side 2026-06-07).
    associated_consts:
      - name: GAMMA_STAR
        type: "Complex<f64>"
        value: "0.32439640402017117 − 0.1345862724908067·i"
        doc: |
          The admissible complex root of 2γ³ + (1 − 2γ)³ = 0 with Re(γ⋆) =
          0.324 > 0 AND Re(1 − 2γ⋆) = 0.351 > 0 (both substeps forward-in-time;
          the real root 1.35121 forces a backward step and is REJECTED).
    planned_surface:
      - "ComplexTripleJump<K>::new(inner: K) — wrap an inner order-2 symmetric Chernoff over Complex<f64>."
      - "fn apply_into(&self, tau: f64, ...) — table-driven fold over the const scale array [GAMMA_STAR, 1 − 2·GAMMA_STAR, GAMMA_STAR]."
      - "fn into_real(complex_state) -> GridFnND<f64> — real order-4 output via Re(·)."
      - "const GAMMA_STAR: Complex<f64> (the admissible LHP-free complex root)."
    spec_ref:
      - "math.md §28.bis.8"
      - "ADR-0136 Amendment 2"
      - "Castella-Chartier-Descombes-Vilmart 2009 BIT 49"
      - ".dev-docs/research/verdicts/verdict-v8-f4-complex-order3.md"

# ---------------------------------------------------------------------------
# 4. Enums (boundary + interpolation adapters).
# ---------------------------------------------------------------------------
enums:
  - name: BoundaryPolicy
    shape: enum
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    doc: |
      Policy for sample(x) when x is outside [xmin, xmax]. Adapter pattern
      (see `.dev-docs/adapters/registry.md`).

      All 4 v0.2.1 variants (Reflect, ZeroExtend, Periodic, LinearExtrapolate)
      remain FULLY IMPLEMENTED unchanged (ADR-0007); see math spec §3.5 for the
      continuous extensions and discrete index formulas.

      v2.6 (ADR-0068): enum becomes generic over `F` with default `F = f64`
      (mirrors ADR-0025 generic-over-float defaulting pattern). All existing
      `BoundaryPolicy` mentions in v2.5.1 source compile unchanged because the
      type parameter is elided (`BoundaryPolicy` resolves to `BoundaryPolicy<f64>`).
      Adds two new variants: `Dirichlet { value: F }` (constant-extension) and
      `Neumann` (clamp-to-boundary / zero-flux). See math spec §3.5.bis.

      **Module relocation (v2.6, ADR-0068)**: implementation MOVES from
      `crates/semiflow-core/src/grid.rs` to NEW module
      `crates/semiflow-core/src/boundary.rs`. Public re-exports preserve the
      v2.5.1 import path (`use semiflow_core::BoundaryPolicy`); no user code
      affected. Rationale: keep `grid.rs` under its 700-LoC default cap after
      the v2.6 widening (constitution amendment v1.6.1 → v1.6.2).

      **Stencil-BC vs operator-killing (v2.6)**: this enum is a STENCIL-LEVEL
      adapter — it answers "what value does the interpolant take at x ∉ [xmin,
      xmax]?". For OPERATOR-LEVEL Dirichlet (absorbing-boundary semigroup via
      Feynman-Kac killing), use `KillingChernoff<C, R>` (math §21). Both ship
      in v2.6; see math §3.5.bis.3 for the policy-selection guide.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    variants:
      - name: Reflect
        doc: |
          Mirror x at boundaries. Default. Required for §4 / §6 / §9 oracles.
          Continuous: f̃(2 xmin − x) = f̃(x); f̃(2 xmax − x) = f̃(x).
          Discrete: period 2(n-1) via fold formula (math §3.5.1).
      - name: ZeroExtend
        doc: |
          Return 0.0 for x outside [xmin, xmax]. v0.2.1: fully implemented.
          Continuous: f̃(x) = 0 outside the domain (discontinuous at endpoints
          unless f(xmin) = f(xmax) = 0). Discrete: bc_index returns `Zero`
          out of range; bc_value returns 0.0 (math §3.5.2).
      - name: Periodic
        doc: |
          Wrap x with period L = xmax - xmin. v0.2.1: fully implemented (NEW).
          Continuous: f̃(x + L) = f̃(x); continuous on R iff f(xmin) = f(xmax).
          Discrete: idx.rem_euclid(n as i64) — period exactly n NODES (not L);
          see math §3.5.3 for discussion of the n-vs-(n-1) period choice.
          Required for spectral / FFT contexts and torus problems.
      - name: LinearExtrapolate
        doc: |
          Linear continuation from boundary stencil. v0.2.1: fully implemented (NEW).
          Continuous: f̃(x) = f(xmin) + (x - xmin) * f'(xmin⁺) for x < xmin
          (analogous on the right). Slope from the 3-point one-sided
          difference (-3 f_0 + 4 f_1 - f_2) / (2 dx). EXACT for affine input
          f(x) = αx + β (machine epsilon). Discrete: bc_index returns
          OutsideLeft(d) / OutsideRight(d); bc_value computes affine
          extension algebraically (math §3.5.4).
      - name: Dirichlet
        shape: "struct { value: F }"
        doc: |
          Constant extension to user-supplied scalar `value: F`. v2.6: NEW
          (ADR-0068). Use when ghost-node values are clamped to a known
          constant (e.g., inhomogeneous Dirichlet via shift-to-homogeneous
          reduction).

          Continuous (math §3.5.bis.1):
            f̃(x) = value         for x < xmin or x > xmax
            f̃(x) = f(x)          for x ∈ [xmin, xmax]
          C⁰ on ℝ iff f(xmin) = f(xmax) = value (consistent-data case);
          else jump magnitudes |f(xmin) - value| and |f(xmax) - value| at
          the boundaries.

          Discrete: `bc_index` returns `Inside(j as usize)` for `j ∈ [0, n)`,
          else `BoundaryHit::Dirichlet(value)`. Downstream `bc_value` returns
          `value` on the `Dirichlet(value)` arm. Stable extension over `F`:
          the variant carries the typed scalar in the BoundaryHit payload.

          **NOT for absorbing-boundary semigroups**: use `KillingChernoff<C,
          BoxRegion<F, D>>` (math §21) for the operator-level Dirichlet (the
          Feynman-Kac killed Feynman-Kac semigroup). See math §3.5.bis.3 for
          the policy-selection guide.
      - name: Neumann
        shape: "unit"
        doc: |
          Zero-flux / zero-derivative boundary via clamp-to-boundary-node
          extension. v2.6: NEW (ADR-0068). Use when the boundary represents
          an insulated wall or reflecting random walk; equivalent to `Reflect`
          for symmetric data but the *unconditional* clamp form (any input).

          Continuous (math §3.5.bis.2):
            f̃(x) = f(xmin)       for x < xmin
            f̃(x) = f(x)          for x ∈ [xmin, xmax]
            f̃(x) = f(xmax)       for x > xmax
          Unconditionally C⁰ on ℝ; C¹ at the boundary iff f'(xmin⁺) = 0 and
          f'(xmax⁻) = 0 (consistent-Neumann-data case).

          Discrete: `bc_index` returns `Inside(j as usize)` for `j ∈ [0, n)`,
          `Inside(0)` for `j < 0`, `Inside(n-1)` for `j ≥ n`. No new
          BoundaryHit variant needed (reuses `Inside`). Cubic-Hermite stencil
          on degenerate control polygon at the boundary evaluates to a
          constant — discrete derivative at boundary is exactly zero.

          For non-zero-flux Neumann (`∂u/∂n = g ≠ 0`), use `Robin { alpha,
          beta, value }` — deferred to v2.7+ (C5 roadmap item).
      - name: Robin
        shape: "struct { alpha: F, beta: F }"
        doc: |
          Mixed (Robin) stencil-level BC variant. v4.x: NEW (ADR-0098).

          Encodes the coefficients (α, β) for the inhomogeneous Robin condition
          `α·u(x) + β·∂_n u(x) = 0` at the boundary, where:
            - α ≥ 0 (on u; degenerates to Neumann at α = 0)
            - β > 0 (on the outward normal derivative ∂_n u; > 0 for well-posedness)

          **Stencil dispatch** (v6.2.3 ADR-0098 Amendment 2): `bc_index` returns
          `BoundaryHit::RobinSkew{reflected, depth}` for out-of-range indices
          (`j < 0` or `j ≥ n`); `bc_value`/`bc_value_generic` apply the
          exponential ghost weight `w^(d) = exp(-2·(α/β)·d·dx)` at signed
          depth `d`. The Robin physics is now fully stencil-level (unlike the
          v4.6 operator-level 4-step which was non-convergent on half-line grids).
          `RobinHeatChernoff::apply_into` sets `grid.boundary = Robin{α,β}` and
          calls `inner.apply_into` once; the BC is handled by the sampler.

          Continuous extension (math §3.5.tris.1):
            f̃(x) = f(xmin)   for x < xmin    (clamp, same as Neumann)
            f̃(x) = f(x)      for x ∈ [xmin, xmax]
            f̃(x) = f(xmax)   for x > xmax    (clamp, same as Neumann)

          Relation to `Neumann`: setting α = 0 makes `r(0, β, τ) = +1`, which
          recovers the pure-Neumann image weight. The `Neumann` variant remains
          as a zero-overhead unit variant; `Robin { alpha: 0.0, beta: 1.0 }` is
          the same physics but carries coefficients for documentation purposes.

          Validation (enforced by `RobinHeatChernoff::new` / `HalfSpaceRobin::new`,
          NOT by BoundaryPolicy itself — the enum stores only the scalars):
            - alpha must be finite and ≥ 0
            - beta must be finite and > 0
          The BoundaryPolicy variant carries the coefficients for downstream use
          by `RobinHeatChernoff`; the policy itself performs no validation.

  - name: BoundaryHit
    shape: enum
    visibility: "pub(crate)"
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    doc: |
      Internal-only result of `bc_index(boundary, n, idx)`. Encodes whether
      the requested integer index folds back into the grid (`Inside`), is
      out of range under `ZeroExtend` (`Zero`), out of range under
      `LinearExtrapolate` (`OutsideLeft`/`OutsideRight` carrying the
      positive distance from the nearest boundary node), or out of range
      under `Dirichlet { value }` carrying the typed scalar payload
      (`Dirichlet(F)`, v2.6 ADR-0068).

      NOT part of the public API: it lives in `crates/semiflow-core/src/boundary.rs`
      (MOVED from `grid.rs` in v2.6 per ADR-0068; see BoundaryPolicy
      "Module relocation" note above) and is consumed only by the internal
      `bc_value` helper. Returning a richer enum (vs the v0.1.0
      `Option<usize>` shape) is REQUIRED to support `LinearExtrapolate` and
      `Dirichlet { value }` without flattening the policy distinction into
      magic sentinel indices.

      Stability: this enum's variants are NOT exposed; downstream callers
      can never observe it. Adding/removing variants in any minor version
      is a non-breaking internal change. The enum lives here so the
      Engineer (Stage 6) implements EXACTLY the five-variant shape the
      contracts demand.

      v2.6 change: `Dirichlet(F)` variant ADDED (parameterized by `F`); the
      enum becomes generic over `F: SemiflowFloat` with default `F = f64`
      mirroring `BoundaryPolicy<F>`. The `Eq` derive is DROPPED in v2.6 (it
      is not implementable for the `Dirichlet(f64)` payload — `f64: !Eq`);
      `PartialEq` is retained.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    variants:
      - name: Inside
        shape: "tuple(usize)"
        doc: |
          idx folded/clamped to [0, n). Universal for Reflect/Periodic/Neumann;
          in-range case for ZeroExtend/LinearExtrapolate/Dirichlet. Used by
          Neumann for out-of-range clamp (Inside(0) for j < 0, Inside(n-1)
          for j ≥ n).
      - name: Zero
        shape: "unit"
        doc: "ZeroExtend out-of-range. Downstream bc_value returns 0.0."
      - name: OutsideLeft
        shape: "tuple(u32)"
        doc: |
          LinearExtrapolate, idx < 0. Carries d = (-idx) as u32 >= 1, the
          number of dx-steps left of node 0. Downstream bc_value computes
          `f_0 - d * (-3 f_0 + 4 f_1 - f_2) / 2`.
      - name: OutsideRight
        shape: "tuple(u32)"
        doc: |
          LinearExtrapolate, idx >= n. Carries d = (idx - (n-1)) as u32 >= 1,
          the number of dx-steps right of node n-1. Downstream bc_value
          computes `f_{n-1} + d * (3 f_{n-1} - 4 f_{n-2} + f_{n-3}) / 2`.
      - name: Dirichlet
        shape: "tuple(F)"
        doc: |
          v2.6 (ADR-0068). `BoundaryPolicy::Dirichlet { value }`
          out-of-range. Carries the typed scalar `value: F` verbatim from
          the policy. Downstream `bc_value_generic` returns this value
          directly without consulting the input slice. The f64 path
          (`bc_value`) extracts the payload via `value as f64` when
          `F = f64` (identity); for other `F` the generic path is used.
      - name: RobinSkew
        shape: "struct { reflected: usize, depth: u32 }"
        doc: |
          v6.2.3 (ADR-0098 Amendment 2). `BoundaryPolicy::Robin{α,β}`
          out-of-range. Carries `reflected: usize` (the mirror index inside
          [0, n) that is the geometric reflection of the out-of-range query)
          and `depth: u32` (the number of dx-steps outside the domain, d ≥ 1).
          `bc_value`/`bc_value_generic` compute the ghost value as
          `w^d · src[reflected]` where `w = exp(-2·(α/β)·dx)`.
          This is the stencil-level encoding of the skew image extension
          (E_R u)(−x) = e^{−2(α/β)x} u(x) (math §3.5.tris.3).
          `α = 0` gives `w = 1` = even reflection = Neumann (no G27 regression).
          Internal-only; not part of the public API.
    notes: |
      Casting `(-idx) as u32` and `(idx - (n-1)) as u32` is safe: by the
      time bc_index reaches the LinearExtrapolate arm, idx is provably
      either negative or >= n, and the magnitude is bounded by the
      Catmull-Rom stencil's max 2-cell reach (|d| <= 2 in practice). For
      the v0.2.1 release the Engineer MAY choose to widen `d` to `i64` if
      future Chernoff shifts grow large; the contract permits both as long
      as the public API of `Grid1D::sample` stays unchanged.

  - name: InterpKind
    shape: enum
    location: "crates/semiflow-core/src/boundary.rs"
    doc: |
      Sub-grid interpolation strategy used by `Grid1D::sample` /
      `Grid1D::interp`. The DEFAULT variant returned by `Grid1D::new` has
      changed over time:
        v0.1.0 — v5.x : `CubicHermite` (Catmull-Rom; R7 / ADR-0005).
        v6.0.0+       : `SepticHermite` (degree-7 Hermite; ADR-0109 + math.md §40).
      The default flip at v6.0.0 is part of ADR-0099 (rescheduled from v5.0)
      bundled into ADR-0109 v6.0.0 BREAKING window #3.
      `Linear` is gated behind the `linear-interp` feature flag for debug
      only — cannot meet G1's 1e-4 tolerance at n=100.
    variants:
      - name: CubicHermite
        doc: "Catmull-Rom 4-point cubic Hermite. C^1, O(dx⁴) leading error."
      - name: Linear
        doc: "Linear 2-point, O(dx²). Feature-gated behind `linear-interp`."
      - name: SepticHermite
        added_in: "6.0.0"
        doc: |
          v6.0.0 (ADR-0109 + math.md §40) degree-7 Hermite (4-point: matches
          value + 1st + 2nd + 3rd derivative at 2 nodes). O(dx⁸) local
          truncation; empirical floor `~1.5·10⁻¹²` at N=512 (math.md §40.4
          formal model). DEFAULT variant returned by `Grid1D::new` from v6.0.0.
      - name: OctonicHermite
        added_in: "7.0.0"
        doc: |
          v7.0.0 (ADR-0117 + math.md §41.bis) degree-9 Hermite (5-point: matches
          f, f', f'', f''', f'''' at 2 nodes). O(dx¹⁰) local truncation;
          empirical floor ≈ 9.1·10⁻¹⁶ at N=512 (1638× below SepticHermite).
          The KEYSTONE sampler that opens the ζ⁶/ζ⁸ TRUTHFUL_ORDER floor-safe
          window in combination with the 6th-order divergence stencil (ADR-0118).
          T_OCTONIC_HERMITE 5/5 PASS 2026-06-05.
      - name: ChebyshevSpectralWithBC
        shape: "struct { m: usize, oob_policy: OobPolicy }"
        added_in: "5.0.0"
        doc: |
          v5.0 (ADR-0104) boundary-aware Chebyshev spectral interpolant.
          M ∈ {8, 16, 32, 64, 128, 256, 512}; default M=64. f64-only.
          `oob_policy` controls out-of-domain sampling per ADR-0104 H3 fix.
          v7.0.0: routes through `sample_septic_1d` internally (QuinticHermite
          intermediate path removed with the legacy-quintic feature).
    removed_variants:
      - name: ChebyshevSpectral
        removed_in: "6.0.0"
        removal_clock: "ADR-0104 12-month deprecation (2026-05-29 + 12mo)"
        replacement: |
          Use `ChebyshevSpectralWithBC { m, oob_policy: OobPolicy::Inherit }`
          (additive since v5.0.0); or the convenience constructor
          `Grid1D::<f64>::cheb_m(xmin, xmax, n, m)`.
      - name: QuinticHermite
        removed_in: "7.0.0"
        removal_clock: "ADR-0109 12-month deprecation clock from v6.0.0 (2026-05-30); removed early at v7.0.0 MAJOR window"
        replacement: |
          Use `InterpKind::SepticHermite` (O(dx⁸), default since v6.0) or
          `InterpKind::OctonicHermite` (O(dx¹⁰), new v7.0). The legacy-quintic
          Cargo feature is also removed. See docs/migration/v6-to-v7.md.

  - name: LaplaceQuadrature
    location: "crates/semiflow-core/src/resolvent.rs"
    shape: enum
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    doc: |
      v2.7 (ADR-0069, math §22.3 + §22.4). Quadrature strategy for the
      Laplace integral `∫₀^∞ e^{-s} h(s, λ) ds` underlying
      `LaplaceChernoffResolvent::eval`.

      Two variants ship in v2.7:

      - `GaussLaguerre32` — 32-point Gauss-Laguerre quadrature with const-array
        nodes and weights `(s_k, w_k)_{k=0}^{31}`. Exact for polynomial · e^{-s}
        integrands up to degree 63; super-algebraic convergence on analytic
        integrands (Trefethen 2008 Theorem 4.1). Default; recommended when
        Re(λ) ≫ ω (the well-conditioned regime). NO heap allocation; const
        arrays are static `[F; 32]`. Library ships separate const arrays per
        concrete F instantiation (f64 first; f32 added in v2.8+ if needed).

      - `TrapezoidWithTail { t_max: F }` — uniform trapezoid on [0, t_max] with
        M = 256 nodes + analytical tail bound `‖g‖ · exp(-λ · t_max) / (λ - ω)`.
        Recommended when Re(λ) → ω⁺ (marginal regime where Gauss-Laguerre stalls
        because the integrand support extends past s_31 ≈ 100). Default suggestion:
        t_max = 50 / λ (gives exp(-λ · t_max) = exp(-50) ≈ 1.93e-22 — sub-dominates
        any reasonable quadrature error).

      The variants are an open set marked `#[non_exhaustive]` so future additions
      (e.g., `GaussLegendreOnFiniteInterval { a, b }`, `TanhSinhDoubleExp`,
      `GaussLaguerre64`) are non-breaking additions. Adding a variant in a minor
      release is permitted under the v1.0+ stability contract for `#[non_exhaustive]`
      enums.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    non_exhaustive: true
    variants:
      - name: GaussLaguerre32
        shape: "unit"
        doc: |
          32-point Gauss-Laguerre quadrature. const-array nodes and weights.
          No heap allocation. Default; recommended when Re(λ) ≫ ω.
      - name: TrapezoidWithTail
        shape: "struct { t_max: F }"
        doc: |
          Uniform trapezoid on [0, t_max] with M=256 internal nodes, plus
          analytical tail bound `‖g‖ · exp(-λ · t_max) / (λ - ω)` using
          inner.growth() to recover (M_c, ω_c). Use when Re(λ) → ω⁺
          (marginal regime). Recommended t_max = 50 / λ.

  # =========================================================================
  # v2.7 (ADR-0069) — LaplaceChernoffResolvent struct + LaplaceQuadrature enum.
  # =========================================================================
  - name: LaplaceChernoffResolvent
    location: "crates/semiflow-core/src/resolvent.rs"
    doc: |
      v2.7 (ADR-0069, math §22.6). Generic wrapper that computes the resolvent
      `(λI - A)⁻¹ g` via the Laplace transform of the truncated Chernoff product
      `(F(t/n))^n`, per Remizov 2025 *Vladikavkaz Math. J.* 27(4) Theorem 3
      (math §22.2).

      Algorithmic semantics (single `eval` call, GaussLaguerre32 path):
        1. Initialize accumulator `acc := zeroed_like(g)`.
        2. For each k in [0, 32):
             τ_k := s_k / (λ · n)   (step size for this quadrature point)
             tmp := g                (clone or via scratch pool)
             Iterate n times: tmp ← inner.apply_into(τ_k, src, dst, scratch)
             acc.axpy(w_k / λ, &tmp) (accumulate into the running resolvent)
        3. Return acc.

      Per-call cost: 32 · n inner Chernoff steps + 32 scaled accumulations.
      The ScratchPool<F> is constructed once per `eval` call and reused across
      all 32 inner loops. The `eval_at_point` path is identical but tracks only
      the scalar value at `x0` via state.sample(x0), bypassing the final
      accumulator-state allocation (point-eval is the L_RESOLVENT_N64_P99 bench
      entrypoint).

      **Real λ only** in v2.7. Complex resolvent values `R(λ; A) g` for
      `λ ∈ ℂ` require complex-valued semigroup support — deferred to v4.0
      B6 SemiflowComplex.

      **Order-1 globally** per Theorem 22.1 — the Laplace integrand's long-tail
      behaviour caps the rate; the inner Chernoff order `m ≥ 1` is masked.

      **Transparent composition**: `LaplaceChernoffResolvent<Strang2D<DiffusionChernoff,
      DiffusionChernoff>>` and `LaplaceChernoffResolvent<HowlandLift<TimedDiffusionChernoff>>`
      are both valid constructions (the latter gives the time-extended resolvent
      for nonautonomous problems).
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "ChernoffFunction<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: inner
        type: C
        doc: "Inner Chernoff function (the unrestricted operator's Chernoff approximation)."
      - name: n
        type: usize
        doc: "Chernoff truncation level. Invariant: n >= 1. Higher n → finer Chernoff product but more compute per call (cost scales linearly in n)."
      - name: quadrature
        type: "LaplaceQuadrature<F>"
        doc: "Quadrature strategy. GaussLaguerre32 is default; TrapezoidWithTail for marginal-λ regime."
    constructors:
      - name: new
        signature: |
          pub fn new(
              inner: C,
              n: usize,
              quadrature: LaplaceQuadrature<F>,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Validates `n >= 1` AND (if `quadrature == TrapezoidWithTail { t_max }`)
          `t_max.is_finite() && t_max > 0`. Returns `DomainViolation` on either failure.
        errors:
          - "DomainViolation if n == 0"
          - "DomainViolation if quadrature == TrapezoidWithTail and t_max <= 0 or non-finite"
    methods:
      - name: eval
        signature: |
          pub fn eval(&self, lambda: F, g: &C::S) -> Result<C::S, SemiflowError>
          where
              C::S: Clone
        semantics: |
          Evaluate R̃_n(λ) g returning a fresh full state. Validates
          `lambda.is_finite() && lambda > 0`. Algorithm per the struct
          `doc:` block above. Allocates one scratch state for the accumulator
          and reuses a ScratchPool<F> across all 32 quadrature points.
        preconditions:
          - "lambda is finite and > 0"
          - "g.norm_sup() is finite"
        postconditions:
          - "result has same structural shape as g"
          - "result is independent of input (no aliasing — accumulator is fresh)"
        errors:
          - "DomainViolation if lambda <= 0 or not finite"
          - "DomainViolation if g contains NaN/Inf"
          - "inherits any error from inner.apply_into"

      - name: eval_at_point
        signature: |
          pub fn eval_at_point(
              &self,
              lambda: F,
              x0: &[F],
              g_at: &dyn Fn(&[F]) -> F,
          ) -> Result<F, SemiflowError>
        semantics: |
          Evaluate [R̃_n(λ) g](x0) at a single spatial point, returning a scalar.
          The g_at closure recovers the initial-datum value-function (used to
          re-construct the per-quadrature-node state without storing it).
          Bypasses the final accumulator-state allocation; benches the per-call
          L_RESOLVENT_N64_P99 latency floor.
        preconditions:
          - "lambda is finite and > 0"
          - "x0.len() matches inner.S::dim()"
        postconditions:
          - "result is finite (otherwise DomainViolation)"
        errors:
          - "DomainViolation if lambda <= 0 or not finite"
          - "DomainViolation if x0.len() != inner.S::dim()"

  # =========================================================================
  # v2.7 (ADR-0070) — HowlandLift + HowlandState.
  # =========================================================================
  - name: HowlandLift
    location: "crates/semiflow-core/src/howland.rs"
    doc: |
      v2.7 (ADR-0070, math §23.8). Generic wrapper that lifts any
      `TimedChernoffFunction<F>` to a `ChernoffFunction<F>` evolving on
      `L²([0, T], X) ≅ Vec<C::S>` of length `n_t`. Implements the Howland 1974
      augmented-generator construction `L̂ = -∂_s + L(s)` via the left-endpoint
      shift `[F̂(τ) f̂](s) := F(τ, s - τ) f̂(s - τ)` (math §23.2 — Theorem 23.1).

      Single Chernoff step semantics (per math §23.3, equation 23.4):
        if i == 0: dst[0] := zero      (boundary convention f̂(s) = 0 for s < 0)
        else:      inner.apply_at(t_{i-1}, Δs, &src[i-1], &mut dst[i], scratch)
                   where t_{i-1} := (i-1) · Δs is the left endpoint.

      **Matched-step requirement** (math §23.4): `apply_into(τ, src, dst, scratch)`
      rejects calls with `(τ - Δs).abs() > F::EPSILON * Δs`. Returns
      `DomainViolation`. The alternative (silently round-tripping τ to nearest
      Δs) would hide user-side step-size mismatches behind a discretization
      artefact.

      **Memory cost**: n_t × sizeof(C::S) bytes for HowlandState. For G25's
      n_t ∈ {32, 64, 128, 256} and C::S = GridFn1D at N = 256: ≤ 256 · 256 · 8 B
      = 512 KiB — well within a single L1/L2 working set.

      **Order**: min(C::order(), 1). The Howland shift is order-1 unless
      higher-order Magnus is layered on top (deferred to v3.x).

      **Growth**: (M_c · exp(T · |ω_c|), 0) where (M_c, ω_c) = inner.growth().
      Time-shift is unitary on L²([0,T]); inner growth integrates over the
      full horizon.

      **No `apply_parallel_into` impl in v2.7**: the per-step loop over n_t
      time samples is inherently sequential (sample i depends on i-1). The
      per-sample inner step is parallelizable via the inner's parallel impl —
      already exposed transparently if the inner is `Strang2D` with `parallel`
      feature. No HowlandLift-specific parallelization in v2.7.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "TimedChernoffFunction<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: inner
        type: C
        doc: "Time-aware inner Chernoff function. Sampled per time step via inner.apply_at(t_left, Δs, …)."
      - name: t_horizon
        type: F
        doc: "Time horizon T > 0. Determines the s-grid spacing Δs := T / (n_t - 1)."
      - name: n_t
        type: usize
        doc: "Number of time samples. Invariant: n_t >= 2 (else Δs is undefined)."
      - name: delta_s
        type: F
        visibility: "pub(crate)"
        doc: "Cached Δs := t_horizon / (n_t - 1). Computed at construction; checked per call against the input τ."
    constructors:
      - name: new
        signature: |
          pub fn new(
              inner: C,
              t_horizon: F,
              n_t: usize,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Validates `t_horizon.is_finite() && t_horizon > 0` AND `n_t >= 2`.
          Computes and caches `delta_s := t_horizon / (n_t - 1)`. Returns
          `DomainViolation` on either failure.
        errors:
          - "DomainViolation if t_horizon <= 0 or not finite"
          - "DomainViolation if n_t < 2"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = HowlandState<C::S, F>`.
          `apply_into`: matched-step check (τ == self.delta_s), then per-time-sample
            loop with boundary dst[0] := zero + dst[i] := inner.apply_at(t_{i-1}, Δs, &src[i-1], &mut dst[i], scratch) for i in 1..n_t.
          `order()` returns `min(self.inner.order(), 1)` (Howland shift order-1 cap).
          `growth()` returns `(inner_M · exp(T · |inner_ω|), 0.0)` per the math §23.5
            derivation.
          NO `apply_parallel_into` impl (per-step time-sample loop is sequential).

  - name: HowlandState
    location: "crates/semiflow-core/src/howland.rs"
    doc: |
      v2.7 (ADR-0070, math §23.8). Discretized representation of `L²([0,T], X)`
      as a `Vec<S>` of length `n_t` (uniform time samples). Each `samples[i]`
      is a full inner state `S: State<F>` corresponding to f̂(s_i) where
      s_i := i · Δs and Δs := T / (n_t - 1).

      Implements `State<F>` via component-wise dispatch over the n_t samples:
        - axpy: zips both states and calls axpy per sample (panics on n_t mismatch)
        - scale: scales each sample
        - norm_sup: max over per-sample norm_sup
        - zeroed_like: returns a fresh HowlandState with all samples zeroed_like(self.samples[0])

      Constructor `from_initial_condition(f0: S, n_t)` populates samples[0] = f0
      and samples[1..n_t] = zeroed_like(f0). The initial-condition-only state
      (zeros elsewhere) is the standard Howland representation of the Cauchy
      problem's initial datum.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: S
        bound: "State<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: samples
        type: "Vec<S>"
        visibility: "pub(crate)"
        doc: "Per-time-sample inner states. Length n_t. samples[0] is the initial condition; samples[n_t-1] is the evolved-to-T result after sufficient Chernoff iterations."
      - name: n_t
        type: usize
        visibility: "pub(crate)"
        doc: "Number of time samples. Invariant: n_t == self.samples.len() AND n_t >= 2."
    constructors:
      - name: from_initial_condition
        signature: |
          pub fn from_initial_condition(f0: S, n_t: usize) -> Result<Self, SemiflowError>
          where
              S: Clone
        semantics: |
          Construct the standard Howland initial state: samples[0] = f0,
          samples[1..n_t] = zeroed_like(f0). Validates `n_t >= 2`. Returns
          `DomainViolation` otherwise.
        errors:
          - "DomainViolation if n_t < 2"
      - name: from_samples
        signature: |
          pub fn from_samples(samples: Vec<S>) -> Result<Self, SemiflowError>
        semantics: |
          Construct from a caller-supplied Vec<S>. Validates `samples.len() >= 2`.
          Use case: re-initialise mid-evolution (e.g., for L_RESOLVENT_N64_P99
          benchmarks that re-construct HowlandState per tick).
        errors:
          - "DomainViolation if samples.len() < 2"
    methods:
      - name: at
        signature: "pub fn at(&self, i: usize) -> &S"
        semantics: "Borrow the i-th time sample. Panics if `i >= n_t` (debug_assert; release-mode panic)."
        preconditions:
          - "i < self.n_t"
        postconditions: []
      - name: at_mut
        signature: "pub fn at_mut(&mut self, i: usize) -> &mut S"
        semantics: "Mutably borrow the i-th time sample. Panics if `i >= n_t`."
        preconditions:
          - "i < self.n_t"
        postconditions: []
      - name: n_t
        signature: "pub fn n_t(&self) -> usize"
        semantics: "Returns the number of time samples (== self.samples.len())."
        preconditions: []
        postconditions:
          - "result >= 2"
    impls:
      - trait: "State<F>"
        notes: |
          axpy/scale: component-wise per sample (panics on n_t mismatch with `other`).
          norm_sup: max over per-sample norm_sup; returns NaN if any sample has NaN.
          zeroed_like: returns a fresh HowlandState with all samples zeroed_like(self.samples[0]).
          copy_from: component-wise copy_from per sample.

  # =========================================================================
  # v2.8 (ADR-0071) — ManifoldChernoff + 3 manifold backends.
  # =========================================================================
  - name: ManifoldChernoff
    location: "crates/semiflow-core/src/manifold.rs"
    doc: |
      v2.8 (ADR-0071, math §24.6). Generic wrapper that lifts any
      `M: BoundedGeometryManifold<F>` to a `ChernoffFunction<F>` via the
      Mazzucchi-Moretti-Remizov-Smolyanov 2023 *Math. Nachr.* Theorem 1
      Gaussian-on-tangent-space construction (math §24.2 equation 24.1):
        F(τ) f(x) := (4πτ)^{-d/2} ∫_{T_x M} exp(-||v||²_{g_x} / (4τ))
                                  · f(exp_x(v)) · [1 + (τ/12)·R(x)] dv

      The trailing factor `[1 + (τ/12)·R(x)]` is the v2.8 first-order
      curvature correction; it cancels the leading-order curvature
      contribution to the Chernoff residual, lifting the global rate from
      order 1 (uncorrected) to order 2 (corrected) — Theorem 24.1.

      Algorithmic semantics (single `apply_into` call):
        For each grid cell `x` of `src` (the ManifoldGridFn discretisation):
          1. Compute n_quad tangent-vector quadrature nodes {v_k} on T_x M
             via tensor-product Gauss-Hermite (n_quad nodes per axis).
          2. For each v_k: y_k := self.manifold.exp_map(x, v_k);
                          f_yk := src.sample_at(y_k);
                          w_k_renorm := w_k · exp(self.manifold.volume_element_log(y_k)
                                                  - self.manifold.volume_element_log(x))
                                              · [if with_corr: 1 + τ/12 · R(x); else 1].
          3. dst[cell_of(x)] := Σ_k w_k_renorm · f_yk.

      Per-call cost: `n_cells × n_quad^d × O(d)` operations (exp_map +
      interpolation per quadrature node). For Sphere2 (d=2) with n_quad=32:
      32² = 1024 quadrature points per cell. Heavy; the slow-tests gate.

      **Order**: 1 if `with_curvature_correction == false`; 2 if true.
      **Growth**: (1.0, 0.0) — heat semigroup on bounded-geometry manifold is
      contractive on the core (Theorem 24.1 + Bismut 1984 §3).

      **Composition**: ManifoldChernoff is composable with the v2.6/v2.7
      wrappers — `LaplaceChernoffResolvent<ManifoldChernoff<Sphere2<f64>>>`
      compiles because both wrappers are generic over `ChernoffFunction<F>`.
      Not gated; composability is an emergent property.

      **NOT a TimedChernoffFunction by default**: nonautonomous manifold
      evolution (metric flow) is v3.x research — ADR-0071 Rationale.
    derive:
      - Debug
      - Clone
    generic_params:
      - name: M
        bound: "BoundedGeometryManifold<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: manifold
        type: M
        doc: "The underlying Riemannian manifold (Torus, Sphere2, Hyperbolic2, or user-defined)."
      - name: with_curvature_correction
        type: bool
        doc: "If true, apply the [1 + (τ/12)·R(x)] factor — order-2 (MMRS 2023 Theorem 1). If false, bare Gaussian-on-tangent — order-1."
      - name: n_quad
        type: usize
        doc: "Tangent-space quadrature nodes per axis. Default 32 (tensor-product Gauss-Hermite). Invariant: n_quad >= 8 (else integrand under-sampled)."
    constructors:
      - name: new
        signature: |
          pub fn new(
              manifold: M,
              with_curvature_correction: bool,
          ) -> Self
        semantics: |
          Construct with default `n_quad = 32`. Infallible (no runtime
          validation; the manifold's own constructor validates the
          bounded-geometry invariants).
        errors: []
      - name: with_n_quad
        signature: |
          pub fn with_n_quad(
              manifold: M,
              with_curvature_correction: bool,
              n_quad: usize,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Construct with custom `n_quad` (advanced; for users tuning the
          quadrature accuracy/cost trade-off). Validates `n_quad >= 8`.
        errors:
          - "DomainViolation if n_quad < 8"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = ManifoldGridFn<F, M>` (a backend-specific discretisation
          type that the manifold backend defines — e.g., for Sphere2 it is an
          icosahedral mesh; for Torus<F, D> it is a tensor-product flat grid;
          for Hyperbolic2 it is a hyperbolic tessellation).
          `apply_into`: per-cell quadrature loop per the struct `doc:` block.
          `order()` returns 1 or 2 per `with_curvature_correction`.
          `growth()` returns (1.0, 0.0) — contractive on bounded-geometry M.
          NO `apply_parallel_into` impl in v2.8 (per-cell loop is parallelizable
          but the per-cell quadrature is the hot path; v2.9 may add).

  - name: Torus
    location: "crates/semiflow-core/src/manifold.rs"
    doc: |
      v2.8 (ADR-0071, math §24.4). Flat D-torus T^D = R^D / Z^D in normal
      coordinates. Constant zero curvature (R ≡ 0); the ManifoldChernoff
      construction reduces to the standard heat kernel on T^D.

      Use cases:
        - T21N (NORMATIVE sympy) oracle: F(τ) φ_k = exp(-τ · 4π² |k|²) φ_k
          for Fourier eigenmodes φ_k(x) := exp(2πi · k · x).
        - User-side flat-geometry sanity check before promoting to S² / H².

      Const-generic D for zero-overhead per-axis dispatch (matches BoxRegion
      / BallRegion pattern from v2.6).
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: lattice_period
        type: "[F; D]"
        doc: "Per-axis lattice period (default 1.0 — unit torus). All entries MUST be > 0 and finite."
    constructors:
      - name: unit
        signature: "pub fn unit() -> Self"
        semantics: |
          Construct the unit D-torus (lattice_period = [1.0; D]). Infallible.
        errors: []
      - name: with_period
        signature: "pub fn with_period(lattice_period: [F; D]) -> Result<Self, SemiflowError>"
        semantics: |
          Construct with custom per-axis period. Validates all entries are
          strictly positive and finite.
        errors:
          - "DomainViolation if any period entry <= 0 or non-finite"
    impls:
      - trait: "BoundedGeometryManifold<F>"
        notes: |
          dim() returns D. injectivity_radius() returns min(lattice_period) / 2
          (half the smallest axis period — the injectivity radius for a
          rectangular lattice torus).
          exp_map(x, v, out): out := x + v (mod lattice_period per axis).
          parallel_transport: out := v (identity — flat metric).
          scalar_curvature: returns F::zero() identically.
          volume_element_log: returns F::zero() identically (flat metric).

  - name: Sphere2
    location: "crates/semiflow-core/src/manifold.rs"
    doc: |
      v2.8 (ADR-0071, math §24.4). Round 2-sphere of caller-supplied radius
      (default 1.0 — unit sphere). Constant positive scalar curvature
      R ≡ 2/radius². Coordinate chart: stereographic projection from the
      north pole (covers S² \ {N}; the bounded-geometry hypothesis B1 holds
      with injectivity_radius = π·radius globally).

      Use cases:
        - G26 (RELEASE_BLOCKING) oracle: order-1 (base) and order-2 (R/12-
          corrected) slope verification via spherical-harmonic initial datum.
        - Reference impl for the R > 0 regime in the MMRS 2023 framework.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: radius
        type: F
        doc: "Sphere radius. MUST be strictly positive and finite. Default constructor uses radius = 1.0."
    constructors:
      - name: unit
        signature: "pub fn unit() -> Self"
        semantics: "Construct the unit-radius sphere (radius = 1.0). Scalar curvature R = 2. Infallible."
        errors: []
      - name: with_radius
        signature: "pub fn with_radius(radius: F) -> Result<Self, SemiflowError>"
        semantics: |
          Construct with custom radius. Validates `radius > 0 && radius.is_finite()`.
          Scalar curvature scales as R = 2 / radius².
        errors:
          - "DomainViolation if radius <= 0 or non-finite"
    impls:
      - trait: "BoundedGeometryManifold<F>"
        notes: |
          dim() returns 2. injectivity_radius() returns π · radius.
          exp_map: closed-form great-circle in stereographic chart (Sakai 1996
            §III.4) — uses libm::sin, libm::cos.
          parallel_transport: closed-form rotation along great-circle arc.
          scalar_curvature: returns 2 / radius² identically (constant curvature).
          volume_element_log: returns log(sin(θ)) where θ is the stereographic
            polar angle (singular at the south pole; chart avoids it).

  - name: Hyperbolic2
    location: "crates/semiflow-core/src/manifold.rs"
    doc: |
      v2.8 (ADR-0071, math §24.4). Hyperbolic plane H² in the Poincaré disk
      model with constant negative sectional curvature -1/scale² (default
      scale = 1.0 — unit-curvature disk). Coordinate chart: open unit disk
      {z ∈ C : |z| < 1} with metric ds² = 4·scale² · |dz|² / (1 - |z|²)².
      Scalar curvature R ≡ -2/scale² (sectional curvature × 2 in 2D).

      Use cases:
        - C3 industrial showcase (Wave D `examples/sabr_pricer.rs`): SABR-on-H²
          pricer via ManifoldChernoff<Hyperbolic2<f64>>; validates against
          published SABR closed-form bench numbers.
        - Reference impl for the R < 0 regime in the MMRS 2023 framework.

      The boundary |z| = 1 is at infinite hyperbolic distance (the conformal
      boundary); injectivity_radius is +∞ (no cut locus). Numerically, log-
      space arithmetic in volume_element_log avoids underflow near |z| → 1.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: scale
        type: F
        doc: "Curvature scale; sectional curvature = -1/scale². MUST be strictly positive and finite. Default constructor uses scale = 1.0."
    constructors:
      - name: unit
        signature: "pub fn unit() -> Self"
        semantics: "Construct the unit-curvature Poincaré disk (scale = 1.0; sectional curvature = -1). Scalar curvature R = -2. Infallible."
        errors: []
      - name: with_scale
        signature: "pub fn with_scale(scale: F) -> Result<Self, SemiflowError>"
        semantics: |
          Construct with custom curvature scale. Validates `scale > 0 && scale.is_finite()`.
          Scalar curvature scales as R = -2 / scale².
        errors:
          - "DomainViolation if scale <= 0 or non-finite"
    impls:
      - trait: "BoundedGeometryManifold<F>"
        notes: |
          dim() returns 2. injectivity_radius() returns F::INFINITY
            (no cut locus on H²).
          exp_map: closed-form Möbius transformation (Anderson 2005 §3.3) —
            uses libm::tanh, libm::sqrt for the radial-distance computation.
          parallel_transport: closed-form via Möbius derivative.
          scalar_curvature: returns -2 / scale² identically (constant).
          volume_element_log: log(2 · scale / (1 - |x|²)); the (1 - |x|²)
            denominator is the chart-singularity term; log-space avoids
            underflow as |x| → 1.

  # =========================================================================
  # v2.8 (ADR-0072) — ReflectedHeatChernoff + HalfSpaceRegion + additive
  # ReflectingRegion impls on v2.6 BoxRegion / BallRegion.
  # =========================================================================
  - name: ReflectedHeatChernoff
    location: "crates/semiflow-core/src/reflection.rs"
    doc: |
      v2.8 (ADR-0072, math §25.6). Generic wrapper that lifts any inner
      `ChernoffFunction<F>` to a Chernoff function for the Neumann-BC
      (reflected) semigroup on `R: ReflectingRegion<F>` via the Walsh 1986
      §3.4 image method (math §25.2 equation 25.2):
        K^N(x, y; t) = K(x, y; t) + K(x, σ_R(y); t)

      Algorithmic semantics (single Chernoff step):
        1. self.inner.apply_into(τ, src, dst, scratch)
            — unrestricted Chernoff step → dst.
        2. let ghost = scratch.borrow_state(src);
           self.region.reflect_in_place(ghost, src);
            — build the σ_R-image of src (zero inside R; reflected outside).
        3. let tmp = scratch.borrow_state(src);
           self.inner.apply_into(τ, ghost, tmp, scratch);
            — step the reflected ghost forward.
        4. dst.axpy(F::one(), &tmp);
            — add the reflected contribution to dst.

      **Order preservation** (math §25.2 Proposition 25.1): `order()` returns
      `inner.order()` UNCHANGED. The reflecting wrapper does NOT cap the
      order, in contrast with `KillingChernoff` (which caps at 1 per Butko
      2018 §3.2 because the killing functional 𝟙_R has nonzero commutator
      with L). For symmetric BCs (Neumann via image method), the commutator
      [L, 𝟙_R + 𝟙_R ∘ σ_R] vanishes identically on the core (Walsh 1986
      §3.4 Lemma 3.4.1); the order is preserved.

      **Growth**: (2 · inner_M, inner_ω). The doubled mass is the image
      contribution; the exponential rate is unchanged.

      **Requires self-adjoint inner generator** for order preservation. For
      non-self-adjoint inner (e.g., generic DriftReactionChernoff), the
      order-preservation argument fails — the reflecting wrapper may degrade
      to order 1 or worse. Documented in rustdoc; users with non-self-adjoint
      operators SHOULD use KillingChernoff (order 1 anyway) or wait for the
      v3.x Robin extension.

      **Per-call cost**: 2 × inner.apply_into + O(N) for the ghost build.
      The ghost-build is per-cell sequential; the inner steps are
      parallelizable if the inner has a parallel impl.

      **Transparent composition**: `ReflectedHeatChernoff<DiffusionChernoff,
      HalfSpaceRegion<f64, 1>>` is the G27 oracle construction.
      `ReflectedHeatChernoff<Strang2D<DiffusionChernoff, DiffusionChernoff>,
      BoxRegion<f64, 2>>` is a valid 2D construction (no acceptance gate in
      v2.8 but composable).
    derive:
      - Debug
      - Clone
    generic_params:
      - name: C
        bound: "ChernoffFunction<F>"
      - name: R
        bound: "ReflectingRegion<F>"
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
    fields:
      - name: inner
        type: C
        doc: "Inner Chernoff function for the unrestricted (free-space) semigroup. MUST approximate a SELF-ADJOINT generator for order preservation (math §25.2)."
      - name: region
        type: R
        doc: "Reflecting region defining ∂R and the σ_R reflection formula."
    constructors:
      - name: new
        signature: |
          pub fn new(
              inner: C,
              region: R,
          ) -> Result<Self, SemiflowError>
        semantics: |
          Validates dimension compatibility: `inner.S::dim() == region.dim()`.
          Returns `DomainViolation` on mismatch.
        errors:
          - "DomainViolation if inner.S::dim() != region.dim()"
    impls:
      - trait: "ChernoffFunction<F>"
        notes: |
          `type S = C::S` (the inner's state type — reflection happens in
          place, no new state-type wrapper needed).
          `apply_into`: 4-step algorithm per the struct `doc:` block above.
          `order()` returns `self.inner.order()` (PRESERVED, NOT capped).
          `growth()` returns `(2.0 * inner_M, inner_ω)` — image contribution
            doubles the mass bound; exponential rate unchanged.
          NO `apply_parallel_into` impl in v2.8 (per-cell ghost build is
            sequential; the two inner steps are parallelizable via the inner's
            own parallel impl, which is transparent).

  - name: HalfSpaceRegion
    location: "crates/semiflow-core/src/reflection.rs"
    doc: |
      v2.8 (ADR-0072, math §25.4). Open half-space
        R := {p ∈ ℝᴰ : (p - origin) · normal > 0}
      with caller-supplied origin and unit outward normal. Reflection
        σ_R(p) := p - 2 ((p - origin) · normal) · normal
      is the hyperplane reflection across ∂R = {p : (p - origin) · normal = 0}.

      Const-generic `D` for zero-overhead per-axis dispatch (same pattern as
      v2.6 BoxRegion / BallRegion).

      v2.8 G27 oracle uses `HalfSpaceRegion<f64, 1>::new([0.0], [1.0])` — the
      half-line [0, ∞) with the +x direction as outward normal.
    derive:
      - Debug
      - Clone
      - Copy
      - PartialEq
    generic_params:
      - name: F
        bound: "SemiflowFloat"
        default: "f64"
      - name: D
        kind: "const usize"
    fields:
      - name: origin
        type: "[F; D]"
        doc: "Hyperplane base point. MUST be finite per coordinate."
      - name: normal
        type: "[F; D]"
        doc: "Outward unit normal. MUST be finite and ||normal||_2 = 1 (validated at construction)."
    constructors:
      - name: new
        signature: "pub fn new(origin: [F; D], normal: [F; D]) -> Result<Self, SemiflowError>"
        semantics: |
          Validates: all `origin[k].is_finite()`; all `normal[k].is_finite()`;
          `||normal||_2 == 1` within sqrt(F::EPSILON) tolerance.
          Returns `DomainViolation` on any violation.
        errors:
          - "DomainViolation if any origin[k] or normal[k] non-finite"
          - "DomainViolation if ||normal||_2 != 1 within sqrt(F::EPSILON) tolerance"
    impls:
      - trait: "ReflectingRegion<F>"
        notes: |
          is_inside(p): returns (p - origin) · normal > 0. Open convention
            (the boundary hyperplane is excluded).
          reflect_in_place(dst, src): per-cell loop; for each outside cell,
            compute σ_R(c) = c - 2 ((c - origin) · normal) · normal, look up
            src at that coordinate (via state.sample(σ_R_c)), write into dst.
            For inside cells, write F::zero() into dst.
          dim(): returns D.

  # ---------------------------------------------------------------------------
  # v2.8 additive `impl ReflectingRegion<F> for ...` blocks on v2.6 region
  # structs. NO new structs; the v2.6 BoxRegion / BallRegion structs are
  # UNCHANGED. The impls live in `crates/semiflow-core/src/reflection.rs` and
  # are PURELY ADDITIVE (no breaking changes to the v2.6 KillingRegion impl).
  # ---------------------------------------------------------------------------
  - name: __impl_marker__ReflectingRegion_for_BoxRegion
    location: "crates/semiflow-core/src/reflection.rs"
    shape: "impl block"
    doc: |
      v2.8 (ADR-0072). Additive `impl<F: SemiflowFloat, const D: usize>
      ReflectingRegion<F> for BoxRegion<F, D> { ... }` block. REUSES the v2.6
      `BoxRegion<F, D>` struct unchanged. The same struct now implements
      BOTH `KillingRegion<F>` (v2.6) and `ReflectingRegion<F>` (v2.8); the
      caller picks the BC by selecting the wrapper type.

      σ_R for an axis-aligned box: per-axis flip composition. For p outside
      on axis k, reflect p_k across the nearest box boundary:
        if p_k < lo[k]:  p_k_reflected := 2·lo[k] - p_k
        if p_k > hi[k]:  p_k_reflected := 2·hi[k] - p_k
      For multi-axis violations, apply the composition in canonical axis order
      (axis 0 first, then axis 1, etc.). The composed reflection is the
      formal Klein-group element associated with the violated axes.

      No new struct — pseudo-entry for traits.yaml symmetry. Engineer writes
      the `impl` block in reflection.rs without modifying killing.rs.
    methods: []  # no new public methods; the trait methods are implemented inline.

  - name: __impl_marker__ReflectingRegion_for_BallRegion
    location: "crates/semiflow-core/src/reflection.rs"
    shape: "impl block"
    doc: |
      v2.8 (ADR-0072). Additive `impl<F: SemiflowFloat, const D: usize>
      ReflectingRegion<F> for BallRegion<F, D> { ... }` block. REUSES the v2.6
      `BallRegion<F, D>` struct unchanged.

      σ_R for the ball (D ≥ 2): spherical inversion
        σ_R(p) := center + r² · (p - center) / |p - center|²    (p ≠ center)
      For p = center, σ_R is undefined (the center is the unique fixed point
      of the spherical inversion in the ε → 0 limit); the impl returns
      `DomainViolation` if asked to reflect at the center.

      For D = 1, ball reflection is ambiguous (the ball is a closed interval
      [c-r, c+r]; reflection across either endpoint is well-defined but the
      ball-reflection is not). The impl returns `DomainViolation` from
      `reflect_in_place` for `D = 1` callers. The rustdoc explicitly says:
      "For 1D reflecting BCs, use HalfSpaceRegion<F, 1> instead".

      No new struct — pseudo-entry for traits.yaml symmetry.
    methods: []

  # =========================================================================
  # v8.0.0 Phase-4 C2 — AdjointFokkerPlanckChernoff engineer-wave surface
  # (ADR-0107 AMENDMENT 1 "implementing-in-v8.0.0", math §38, schema 4.4.0).
  # Blueprint: .dev-docs/specs/adjoint-fp-wave.md (engineer-pickup-ready).
  # Math + T_ADJOINT_FP_TIGHTNESS sympy 6/6 PASS already shipped v6.0.0.

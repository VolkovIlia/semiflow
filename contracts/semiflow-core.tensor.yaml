out_of_scope:
  - "Non-separable 2D operators with cross-derivatives ∂x∂y           → IMPLEMENTED in v0.7.0 as NonSeparable2DChernoff (ADR-0016)"
  - "3D and higher tensor products                                    → v0.8+, separate ADR"
  - "AMR / FFT / non-uniform 2D grids                                 → out of scope per ADR-0012"
  - "Generic-over-Float (f32, complex)                                → ADR-0004 v0.1 monomorphic carryover"
  - "rayon-parallel per-axis loops                                    → out of scope per ADR-0012; row/col loops are embarrassingly parallel and Phase 4+ may add"
  # v0.6.0 (ADR-0013): 4th-order spatial in 2D is NO LONGER deferred.
  # `AxisLift<Diffusion4thChernoff>` and `AxisLift<TruncatedExp4thDiffusionChernoff>`
  # instantiate without `axis.rs` body changes (generic bounds satisfied);
  # `Strang2D::order()` cap lifted from `min(2)` to `min(4)` (one-character
  # edit at strang2d.rs:108). The previously-deferred line has been removed
  # from this list.


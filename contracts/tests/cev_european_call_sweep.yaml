# =============================================================================
# Empirical validated regime (v0.3.1 ζ-A historical / v0.4.0 Magnus current)
# =============================================================================
# v0.3.1 ζ-A historical envelope (ADR-0010 Amendment 1, retained for context):
#   σ < 0.50  AND  σ·T·β < 0.40  AND  lam_peak < 1400
# Worst case in-regime: gates A/B/C pass with ≥ 10× margin. Out-of-regime
# corners blew up to sup_err ≈ 1e85 due to the FD-on-f' / FD-on-f''' terms
# in the ζ-A τ²-correction polynomial losing numerical stability
# (ADR-0008 Amendment 2 §H1: the FD ceiling caps variable-a global rate at
# O(τ¹) and amplifies cancellation noise at high σ·T·β).
#
# **v0.4.0 Magnus envelope (current — ADR-0011, this release)**:
#
#   σ < 0.70            — PDE stability: 3-point divergence-form stencil
#                         is L^∞-stable under CFL τ < dx²/(2·‖a‖_∞);
#                         empirical extension of the σ<0.50 ζ-A boundary
#                         to σ<0.70 reflects the high-σ corners that
#                         were FD-cancellation-dominated in ζ-A.
#   σ·T·β < 0.80        — combined-magnitude corner: 2× wider than ζ-A's
#                         0.40 threshold thanks to true variable-a O(τ²)
#                         (Magnus avoids FD on f-derivatives entirely;
#                         no per-step cancellation buildup).
#   lam_peak < 1400     — oracle stability: REMOVED in v0.4.1 via log-space
#                         ncx2_cdf (peak now ≲ 3500). The previous threshold
#                         reflected an f64 underflow of exp(-λ/2) at λ/2 > 745;
#                         lifted purely test-side.
#
# Status flip from v0.3.1 → v0.4.0 → v0.4.1:
#   - PDE-side cells (σ ∈ [0.50, 0.70), σ·T·β ∈ [0.40, 0.80)): NOW PASS
#     via TruncatedExpDiffusionChernoff. The high-corner CEV regime that
#     blew up under ζ-A FD ceiling is in-regime under TruncatedExp.
#   - Oracle-side ncx2 underflow at lam_peak ≥ 1400 cells: FIXED in v0.4.1.
#     Rewritten as log-space Poisson recurrence (log P_j updated additively;
#     exp applied only when log_p > -700). Now supports λ_peak ≲ 3500.
#
# Inside the v0.4.0 validated regime: all gates (A/B/C) pass with ≥10× margin.
# Outside: tagged [OOR] in cev_sweep_full (slow-tests); NOT release-blocking.
# Test selects between ζ-A (`DiffusionChernoff`) and TruncatedExp
# (`TruncatedExpDiffusionChernoff`) via the test-side switch
# `make_cev_combo_and_solve` parameter (Engineer Stage 6 wires this).
# Default for v0.4.0 sweep: TruncatedExp. Comparison runs may A/B both.
#
# Reference: ADR-0010 Amendment 1 (v0.3.1 ζ-A envelope, retained as
# historical context); ADR-0011 (v0.4.0 TruncatedExp integrator — this regime
# extension).
# =============================================================================
# END OF CONTRACT
# =============================================================================

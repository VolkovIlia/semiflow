  - name: G_HARD_WALL_ORDER2
    type: CONVERGENCE_RATE
    cases: 1
    severity: RELEASE_BLOCKING
    blocks_release: true
    pass_status: "PASS (slope ≤ −1.95)"
    gate: "OLS hard-barrier self-convergence slope <= −1.95 over the grid sweep with τ coupled to dx at order-2 spatial accuracy"
    purpose: |
      G_HARD_WALL_ORDER2 (order-2 HARD absorbing wall — math.md §44.ter,
      ADR-0135 Amendment 2 + ADR-0149):
      Self-convergence order-2 slope for the killed Dirichlet generator
      Crank–Nicolson Cayley map  U^{n+1} = (I − τ/2 L^R)^{-1}(I + τ/2 L^R) U^n,
      where L^R is the Dirichlet realization of L = ∂_x(a(x) ∂_x) + b(x)∂_x with
      the absorbing wall u|_∂R = 0 baked into the generator's DOMAIN (NOT a
      post-multiply mask). Variable a(x), b(x) are supported by the kernel and are
      covered by the normative theorem (ADR-0149: the Padé identity (★) is a pure
      matrix identity, independent of coefficient variation).

      Oracle (sympy, PRE-FLIGHT-verified): scripts/killed_generator_cn_kit.py.
        CHECK A — the Cayley map matches e^{τ L^R} with τ¹ = τ² = 0 and a NONZERO
          τ³ residual ⟹ local truncation O(τ³) ⟹ GLOBAL order-2.
        CHECK B — the Dirichlet domain is preserved EXACTLY (boundary rows =
          identity ∀τ); the hard wall has width 0, no O(ε) layer bias.
        CHECK C — the τ³ order-2 constant is BOUNDED under refinement (5/24 at 3
          interior nodes AND 5/24 at 4) ⟹ NO 1/dx boundary-layer blow-up.
        CHECK D — the v2.6 post-multiply mask 𝟙_R·C(τ) has interior τ² = [1/8,0,1/8]
          ≠ 0 (order-1) while the Cayley map has τ² = 0 (order-2): STRICT DOMINANCE
          over the shipped order-1 KillingChernoff (§21.3, UNCHANGED).
        CHECK E (ADDED v8.2.0, ADR-0149) — variable-a honesty jet: with STRICTLY
          VARIABLE a(x) half-node values and a generic degree-6 non-origin-symmetric
          nodal jet (ADR-0136 anti-over-report probe), the Cayley map matches
          e^{τL^R} with τ¹ = τ² = 0 and GENUINELY NONZERO τ³ residual ⟹ order
          EXACTLY 2, not spuriously higher. Confirms CHECK A's cancellation is a
          matrix identity (★), not a constant-a artifact.
        Companion: scripts/killed_dirichlet_varcoef_kit.py (PREFLIGHT-KILLED-VARCOEF
          PASS 6/6, including CHECK C: fully symbolic 3×3 tridiagonal with 7
          independent symbols — τ² ≡ 0 as a polynomial identity in all 7 symbols).

      IC honesty note (ADR-0136 scope): the Rust gate uses IC = sin(x) on [0,π].
        ADR-0136 Amdt-1 concerns polynomial/group-action jets where (L^R)^m P = 0
        can spuriously inflate order. sin(x) is not a polynomial; the gate measures
        SPATIAL order (τ = dx² keeps temporal sub-dominant); the slope ≈ -2.04 comes
        from the FD eigenvalue bias Δλ ≈ -dx²/12, which is not suppressed by any
        origin-symmetry or low polynomial degree of sin(x). Probe is HONEST.

      Test (Rust, slow-tests): a fixed-barrier killed-diffusion problem on a
      bounded R = (x_L, x_R) with a smooth absorbing-compatible initial datum
      (vanishing on ∂R). Self-convergence probe-vs-finer-grid in the sup-norm over
      n_spatial ∈ {32, 64, 128, 256} with τ coupled to dx (CFL-free A-stable map,
      so τ ∝ dx is admissible). OLS slope of log-error vs log-n MUST be ≤ −1.95.
      The continuation region is smooth (no obstacle), so the full order-2 is
      observable. DISTINCT from G_KILLING_ORDER2 (soft killing) and from the
      order-1 hard-wall KillingChernoff. Failure BLOCKS v8.0.0 release.

      Free-boundary NOTE (NOT gated here): composing this order-2 inner with the
      ObstacleChernoff projection (§44) improves American/optimal-stopping accuracy
      to order-2 in the CONTINUATION region, but the GLOBAL free-boundary rate
      stays O(√τ) for non-smooth payoffs (Howison–Reisinger–Witte 2013) — a
      structural obstacle property, NOT claimed as order-2 (honesty). A future
      advisory G_AMERICAN_CONTINUATION_ORDER2 may check the interior-only rate.
    test_file: "tests/g_hard_wall_order2.rs::g_hard_wall_order2"
    feature_gate: "slow-tests"
    introduced_in: v8.0.0
    authority: ADR-0135 Amendment 2 + ADR-0149


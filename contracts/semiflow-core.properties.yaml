  - name: G_BINDING_RESOLVENT_JUMP_ND_PARITY
    cases: 2
    severity: RELEASE_BLOCKING
    blocks_release: true
    gate: "ResolventJump 2D+3D jump[N] byte-identical (0 ULP) across core (Rust) ↔ PyO3 v3 (Python), with Fortran-order numpy round-trip preserved (→ 4 sub-tests when FFI/WASM Rust siblings land)"
    purpose: |
      G_BINDING_RESOLVENT_JUMP_ND_PARITY (v8.3.0 ResolventJumpChernoff2D/3D
      binding-surface parity meta-gate — math.md §47.8, ADR-0148, ADR-0153):
      Verifies that the dimension-blind TWS parabolic-contour large-step jump output
      for the 2D and 3D unit-diffusion heat kernels is the SAME whether computed in
      the Rust core or read back through the PyO3 binding surface.

      TIER-2 scope (currently 2 active sub-tests): Only the Rust core golden and
      PyO3 Python pytest are genuine Rust integration tests that run today.
      FFI/WASM Rust parity siblings (sub-tests 3/4) are DEFERRED — no
      `binding_resolvent_jump_nd_parity_{ffi,wasm}.rs` files exist yet.
      This gate will be upgraded to cases: 4 (matching the obstacle-gate
      precedent) when those siblings land.  PyO3 coverage runs as
      `crates/semiflow-py/tests/test_resolvent_jump_nd_v8.py` (pytest),
      not as a Rust integration test.

      ABI-safety invariant (ADR-0138 HARD): Complex<f64> / TWS contour arithmetic +
      banded complex LU stay sealed inside core. Only the real-valued jump result
      (GridFn2D/GridFn3D<f64>) crosses any boundary. This gate verifies no complex
      type leaked.

      ND-layout invariant (ADR-0153 Decision 3, NORMATIVE): Rust ND state is
      axis-0-fastest (column-major; idx(i,j)=j·nx+i, idx(i,j,k)=k·nx·ny+j·nx+i). The
      PyO3 surface ravels input with order="F" and reshapes output with order="F";
      FFI/WASM receive/return the same flat axis-0-fastest buffer. The Fortran-order
      round-trip (ND array → flat → jump → flat → ND array) is asserted byte-identical
      to the core golden — this is the direct fix for the v8.1.0 C1/F4 C-vs-F bug.

      Canonical smoke:
        2D: ResolventJumpChernoff2D over Grid2D([-5,5]×[-5,5], 8×8), M_NODES=8, t=1.0,
            g(x,y)=exp(-x²-y²). Output jump[64] (axis-0-fastest).
        3D: ResolventJumpChernoff3D over Grid3D([-1,1]³, 4×4×4), M_NODES=6, t=1.0,
            g(x,y,z)=exp(-x²-y²-z²). Output jump[64].

      Two active sub-tests (2D and 3D probes split across them):
        Sub-test 1 (CORE golden, 2D + 3D): compute jump directly in Rust via
          ResolventJumpChernoff{2,3}D::jump; fix the GOLDEN vectors. Sanity: finite,
          correct length (nx·ny / nx·ny·nz).
          File: crates/semiflow-core/tests/binding_resolvent_jump_nd_parity.rs
        Sub-test 2 (PyO3 v3, pytest): ResolventJump2DV8 / ResolventJump3DV8 .jump(t,g)
          with ND arrays; asserts np.array_equal(out, golden) AND the order="F"
          round-trip preserves layout.
          File: crates/semiflow-py/tests/test_resolvent_jump_nd_v8.py

      Deferred sub-tests (upgradeable to cases: 4 when they land):
        Sub-test 3 (FFI v3, DEFERRED): smf_resolvent_jump_{2,3}d_*_v3 C-ABI;
          ASSERT memcmp(out, golden, N*8) == 0.  No .rs file yet.
        Sub-test 4 (WASM v3, DEFERRED): ResolventJump{2,3}DV8.jump;
          ASSERT byte-identical to golden.  No .rs file yet.

      Cross-binding match: PyO3 v3 == CORE golden (pairwise byte-identical, both
      dims). Same Rust core; any divergence is a marshalling bug.

      Cross-refs: math.md §47.8 (NORMATIVE); ADR-0148 (2D/3D NARROW-parabolic GO);
      ADR-0153 (v8.3.0 TIER-3 binding surface); ADR-0138 (ABI-safety); ADR-0028
      Amendment 2 (per-crate-dup); G_RESOLVENT_JUMP_2D_ORDER + G_RESOLVENT_JUMP_3D_ORDER.
    test_file: "crates/semiflow-core/tests/binding_resolvent_jump_nd_parity.rs, crates/semiflow-py/tests/test_resolvent_jump_nd_v8.py"
    feature_gate: "slow-tests"
    introduced_in: v8.3.0
    authority: ADR-0153

  - name: G_BINDING_OBSTACLE_GAMMA_PARITY
    cases: 2
    severity: RELEASE_BLOCKING
    blocks_release: true
    gate: "Obstacle inactive-Γ (gamma, defined, count) byte-identical (0 ULP) across core ↔ PyO3 v3 (2 sub-tests; → 4 when FFI/WASM land)"
    purpose: |
      G_BINDING_OBSTACLE_GAMMA_PARITY (v8.3.0 ObstacleChernoff inactive-set Γ
      binding-surface parity meta-gate — math.md §44.5.bis, ADR-0152, ADR-0153):
      Verifies that the two-output inactive-set Γ primitive
      (apply_inactive_gamma_into: gamma array + defined refusal mask + count) is the
      SAME whether computed in the Rust core or read back through the PyO3 surface.

      TIER 2 (PyO3-first): the obstacle Γ surface (Γ second-derivative + bool mask)
      is a research/analysis surface whose primary consumer is Python/numpy. FFI/WASM
      sub-tests are CONDITIONAL on those opportunistic surfaces landing — until then
      this gate runs core (sub-test 1) + PyO3 (sub-test 2). When FFI/WASM ship it is
      upgraded to 4 sub-tests (cases: 2 → 4) under the same ADR.

      Two-output invariant (ADR-0153 Decision 2): the binding surfaces BOTH outputs +
      the count: PyO3 returns (gamma: np.ndarray[f64], defined: np.ndarray[bool],
      count: int). The 'defined' mask is LOAD-BEARING — a false entry means "Γ
      undefined here" (active set / contact line / one-node guard band), NEVER "Γ=0".
      Honesty (§44.5.bis): Γ JUMPS across the free boundary (perpetual-put witness
      Γ(S*⁺)≈4.90, Γ(S*⁻)=0); there is NO classical global Γ; D=1 only.

      Canonical smoke:
        Value:   perpetual-American-put V analytic on [0, 3], N = 64.
        Obstacle: g(S) = K − S (put payoff), K = 1, r = 0.05, σ = 0.20.
        Output:  (gamma[64], defined[64], count) from apply_inactive_gamma_into.

      Sub-tests:
        Sub-test 1 (CORE golden): compute (gamma, defined, count) directly in Rust;
          fix the GOLDEN. Sanity: count > 0; defined[i]=false on the active set and
          within the one-node guard band; gamma[i]=0 wherever defined[i]=false.
        Sub-test 2 (PyO3 v3): og = ObstacleGammaV8(0.,3.,64, "put", 1.0);
          gamma, defined, count = og.inactive_gamma(v);
          ASSERT np.array_equal(gamma, golden.gamma) AND
                 np.array_equal(defined, golden.defined) AND count == golden.count.
        (Sub-tests 3/4 FFI/WASM: deferred until the opportunistic surfaces ship;
          ABI shapes specified in V8_3_TIER3_BINDING_DESIGN.md §4.1.)

      Cross-binding match: PyO3 v3 == CORE golden on gamma AND mask AND count
      (byte-identical f64 + bool + usize). Same Rust core; divergence = marshalling bug.

      Test files:
        - crates/semiflow-core/tests/binding_obstacle_gamma_parity.rs    (sub-test 1)
        - crates/semiflow-py/tests/binding_obstacle_gamma_parity_py.rs   (sub-test 2)
      Failure of ANY active sub-test BLOCKS v8.3.0 release.

      Cross-refs: math.md §44.5.bis (NORMATIVE); ADR-0152 (obstacle Γ ill-posedness);
      ADR-0153 (v8.3.0 TIER-3 binding surface, TIER-2 obstacle scope); ADR-0028
      Amendment 2 (per-crate-dup); ADR-0031 (PyO3 GIL); G_OBSTACLE_GAMMA (core gate).
    test_file: "crates/semiflow-core/tests/binding_obstacle_gamma_parity.rs, crates/semiflow-py/tests/binding_obstacle_gamma_parity_py.rs"
    feature_gate: "slow-tests"
    introduced_in: v8.3.0
    authority: ADR-0153

  - name: G_ROUGH_HESTON_MC_PARITY
    type: MC_PARITY
    severity: RELEASE_BLOCKING
    blocks_release: true
    threshold: "3.0 * MC_stderr + 0.55"
    measured_value: "PENDING — run with slow-tests; back-annotate after rc.1"
    pass_status: "PENDING"
    rationale: |
      G_ROUGH_HESTON_MC_PARITY (RELEASE_BLOCKING, ADR-0181 §D3, issue #9):
      Gate I of the two-tier honesty design for the production rough-Heston pricer.

      Verifies that the MatrixDiffusionChernoff<f64, 4> Chernoff kernel for the
      4-factor Markov rough-Heston model (Carr-Cisek-Pintar 2021 Gauss-Laguerre
      approximation at H=0.1) agrees with a Monte-Carlo of the SAME linearised/
      frozen-V₀ 4-factor Markov SDE.

      CRUX (ADR-0181 §D2): The MC simulates the kernel's OWN model (frozen a_00=½V₀,
      QE-CIR variance factors, leading-order reaction coupling), NOT the full
      nonlinear rough-Heston SDE. Zero model bias enters gate I → tight numerical gate.

      Setup:
        Canonical parameters: H=0.1, S_0=100, V_0=0.04, κ=1.5, θ=0.04, ξ=0.3,
          ρ=−0.7, r=0.05, T=1.0.
        MC: 1M antithetic paths (500k pairs), QE-CIR factors, Euler log-spot,
          n_steps=200, seed PCG64(lower-64 of 0xC0FFEE_BABE_DEAD_BEEF).
        Chernoff: accuracy grid N=192, τ=0.01 (separate from latency grid).
        Discounting: c_00 = −r in the reaction matrix (ADR-0181 §D1; §33.9).
        Strikes: K ∈ {90, 100, 110}.

      Assertion: |C_chernoff(accuracy_grid) − C_mc| ≤ 3·MC_stderr + DELTA_KERNEL
        where DELTA_KERNEL = 0.55 price units (≈0.6% ATM; rc.1 measured value;
        see delta_kernel_self_convergence sub-test).

      Sub-tests (in rough_heston_mc_oracle.rs):
        1. discount_factor_subtest: flat IC, coupling zeroed → component-0 ≈ e^{−rT}
           to ≤1e-6 (validates c_00 = −r discounting mechanism).
        2. delta_kernel_self_convergence: measures δ_kernel = max_K |C_ch(N=48,τ=0.025)
           − C_ch(N=192,τ=0.01)| by N=48 vs N=192 self-convergence (SLOW).
        3. gate_i_parity: the RELEASE_BLOCKING assertion at K∈{90,100,110} (SLOW).

      Gate II (model bias, NOT release-blocking): see A_ROUGH_HESTON_MODEL_BIAS.
    gate: "|C_chernoff(accuracy_grid) − C_mc| ≤ 3·MC_stderr + 0.55 for K∈{90,100,110}"
    purpose: |
      Validates the numerical correctness of the 4-factor Markov rough-Heston
      Chernoff kernel (discounting + diffusion + CIR coupling + Feynman-Kac)
      against its own MC reference. Gate I only — model-approximation bias
      (gate II) is separately documented via A_ROUGH_HESTON_MODEL_BIAS.
    test_file: "crates/semiflow-core/tests/rough_heston_mc_oracle.rs"
    feature_gate: "slow-tests"
    introduced_in: v0.9.0-beta
    authority: ADR-0181

advisory_records:

  - name: A_ROUGH_HESTON_MODEL_BIAS
    severity: ADVISORY
    blocks_release: false
    rationale: |
      A_ROUGH_HESTON_MODEL_BIAS (ADVISORY, ADR-0181 §D4, issue #9):
      Gate II of the two-tier honesty design. Measures the three model-approximation
      sub-biases accumulated between the kernel's linearised/frozen-V₀ 4-factor Markov
      model and the true rough-Heston SDE. Reports % of ATM call; never asserts-fail.

      Sub-biases:
        (a) frozen-V₀ vs stochastic-√V_t spot diffusion: the kernel freezes a_00=½V₀;
            the true SDE has ½V_t time-varying. Expected: ~1-3% ATM.
        (b) reaction-coupling vs exact correlated cross-term: the kernel uses
            c_{0k}·v_k (leading-order linear); true SDE has ρξ·√V_t dW_vol.
            Expected: ~0.5-1% ATM.
        (c) 3-factor vs N→∞ Markov approximation at H=0.1 (El Euch–Rosenbaum 2019):
            GL 3-factor converges at O(n^{-2H}); at n=3, H=0.1 residual ≈3-5%.
            Reference: N=20 factors (high-fidelity, not computed in this record).

      Expected aggregate: O(H) ≈ 1–5% at H=0.1.
      Honest claim (ADR-0181 §D5): "oracle-validated solver of a documented 4-factor
      Markov model (~0.6% numerical precision); itself O(H)-biased ~1–5% vs true
      rough-Heston at H=0.1."
    sub_biases:
      - id: frozen_v0
        description: "Frozen a_00=½V₀ vs stochastic ½V_t spot diffusion"
        expected_rel_pct: "1-3"
      - id: reaction_coupling
        description: "Leading-order c_{0k}v_k coupling vs exact ρξ√V_t dW_vol cross-term"
        expected_rel_pct: "0.5-1"
      - id: n_factor_markov
        description: "3-factor GL vs N→∞ Markov at H=0.1 (El Euch–Rosenbaum 2019 theory)"
        expected_rel_pct: "3-5"
    test_file: "crates/semiflow-core/tests/rough_heston_model_bias.rs"
    feature_gate: "slow-tests"
    introduced_in: v0.9.0-beta
    authority: ADR-0181

implementation_notes:
  - id: rough_heston_two_tier_design
    title: "Two-tier (I/II) error design for the production rough-Heston pricer"
    body: |
      The rough-Heston pricer uses a TWO-TIER gate design (ADR-0181):

      TIER I — Numerical/kernel error (RELEASE_BLOCKING, G_ROUGH_HESTON_MC_PARITY):
        Compares Chernoff kernel vs MC of the SAME linearised/frozen-V₀ model.
        Zero model bias enters → can be a tight gate (target ≤0.55 price units ≈ 0.6% ATM).
        MC scheme: QE-CIR (Andersen 2008) variance factors, Euler log-spot,
          antithetic, 1M paths, n_steps=200.

      TIER II — Model-approximation error (ADVISORY, A_ROUGH_HESTON_MODEL_BIAS):
        Measures how far the 4-factor Markov model (frozen-V₀ + leading-order coupling +
        O(H) 3-factor GL approximation) deviates from the true rough-Heston SDE.
        Expected O(H) ≈ 1–5% at H=0.1. Reported, not blocked.

      Discounting (§33.9, ADR-0181 §D1): c_00 = −r in the reaction matrix. The
        existing block-CN Strang half-steps exp(τC/2) compound to e^{−rT} over
        n = T/τ steps. NO post-evolution multiply needed.

      References: Andersen 2008 (QE-CIR); El Euch–Rosenbaum 2019 (multifactor convergence);
        Carr-Cisek-Pintar 2021 (GL 3-factor Markov model); math.md §33.9.
    introduced_in: v0.9.0-beta
    authority: ADR-0181

  # --- ADR-0185 / math.md §54 — graph Krylov action + Fréchet gradient ---
  - name: G_GRAPH_EXPMV_DENSE
    type: BACKWARD_ERROR
    severity: RELEASE_BLOCKING
    blocks_release: true
    pass_status: "PASS (sup_error ≤ 1e-10)"
    rationale: |
      G_GRAPH_EXPMV_DENSE (RELEASE_BLOCKING, ADR-0185 §54.7): A1 `graph_expmv`
      action `e^{−tL_G}·v` vs the DENSE reference `e^{−tL}·v` built from the CSR
      Laplacian + matrix_system_exp::mat_exp_pade13, on a small graph (N ≤ 12)
      with t‖L‖ in the ≥10 regime. Tolerance-driven kernel (order() = u32::MAX),
      so NO slope assertion — a single backward-error datum, mirroring
      g_expmv_div_form_action_accuracy and G_MATRIX_PADE_M5 (dense oracle REUSE,
      no sympy).
    gate: "sup_error <= 1e-10"
    test_file: "tests/graph_expmv_dense.rs::g_graph_expmv_dense"
    feature_gate: "slow-tests"
    introduced_in: TBD
    authority: ADR-0185


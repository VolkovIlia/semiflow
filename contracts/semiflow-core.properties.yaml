  - name: G_GRAPH_EXPMV_DEPTH_FLAT
    type: STRUCTURAL_PERFORMANCE
    severity: RELEASE_BLOCKING
    blocks_release: true
    pass_status: "PASS (matvec-count band ratio ≤ 4 across t ∈ {1,4,16,64})"
    rationale: |
      G_GRAPH_EXPMV_DEPTH_FLAT (RELEASE_BLOCKING, ADR-0185 §54.4): instrumented
      SpMV counter asserts N_mv(ε, t) for t ∈ {1,4,16,64} at fixed ε stays within
      a constant band (max/min ≤ 4), confirming the action is depth-independent

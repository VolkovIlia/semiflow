  - name: diffusion_chernoff_constant_fast_path_exact
    cases: 1000   # v0.3.0 (ADR-0008 Amendment 1, ζ-A — γ baseline + τ² correction)
    purpose: |
      Reduction-to-constant lemma (math.md §9.2.3.A + §9.2.3.B): for
      constant `a ≡ a₀` (i.e., `a' ≡ 0 ∧ a'' ≡ 0`), the v0.3.0 ζ-A
      formula `D_ζ = D_γ + correction` collapses to v0.2.2 bit-equal:
        (i) when `a_prime ≡ 0`, the γ-A S-shifts `s · a_prime(·)` are
            all 0, so `S(s) = identity` and `D_γ = K(τ; a₀)` which IS
            the v0.2.2 5-point central-`a` formula.
        (ii) when `a_prime ≡ 0 ∧ a_double_prime ≡ 0`, the ζ-A
             correction polynomial
             `τ²·[a·a'·f''' + (a·a''/2)·f'' + (a'·a''/4)·f']` is
             identically zero in all three terms (`a' = 0` zeros the
             first and third; `a'' = 0` zeros the second).
      Therefore `D_ζ = D_γ = K = D_v022` exactly. **Sympy-proven** (gate
      Z_const-a, `verify_v0_3_0_zeta.py`): `D_ζ|_{a'≡0 ∧ a''≡0} − D_v022 = 0`
      algebraically (in the polynomial ring of `f₀, …, f₆, a₀`). The
      five γ-A `f.sample` calls receive bit-equal arguments to v0.2.2
      (`x, x±h₀, x±H₀` with `h₀ = 2·sqrt(a₀·τ)`, `H₀ = 2·sqrt(3·a₀·τ)`).
      The four ζ-stencil `f.sample` calls (at `x ± Δ`, `x ± 2Δ`) become
      dead code after constant-folding the correction polynomial to 0.

      v0.2.2 closed-form reference for constant a₀:
        center = (7/12) * f.values[i_centre]
        h      = 2 * sqrt(a0 * tau)
        H      = 2 * sqrt(3 * a0 * tau)
        near   = (3/16) * (f.sample(x_centre + h) + f.sample(x_centre - h))
        far    = (1/48) * (f.sample(x_centre + H) + f.sample(x_centre - H))
        expected = center + near + far

      Tolerance 1e-13 is the empirical guard: ≈ 10⁴ ULPs at the relevant
      scale, generous enough to absorb any reasonable floating-point
      rearrangement, tight enough to detect a sign error or a missing
      factor of 2 in any of the four per-leg shift scales.

      Direct realisation of invariant I3 (traits.yaml DiffusionChernoff).
      Regression-safe by construction for v0.2.0/v0.2.1/v0.2.2 G1, G2,
      G3-strang, G4-strang and G1-legacy / G2-legacy (all use constant
      `α = 0.5` or `a = 0.5`).
    inputs:
      a0: "(0.01f64..=5.0f64)"   # positive_diffusion-compatible
      tau: "(0.0f64..=1.0f64)"
      f: gaussian_state
    invariant: |
      // Use the same gaussian_state grid (-10, 10, 1000) — match grid in `f`.
      // v0.3.0 (ADR-0008 Amendment 1, ζ-A): pass `|_| 0.0_f64` for BOTH
      // a_prime AND a_double_prime (constant a ⇒ a' ≡ a'' ≡ 0).
      let d = DiffusionChernoff::new(|_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone());
      let result = d.apply(tau, &f).unwrap();
      // Sample 5 nodes uniformly to test multiple shifts:
      let h = 2.0 * (a0 * tau).sqrt();
      let h_far = 2.0 * (3.0 * a0 * tau).sqrt();
      const W0: f64 = 7.0 / 12.0;
      const W1: f64 = 3.0 / 16.0;
      const W2: f64 = 1.0 / 48.0;
      for i in [0, f.grid.n / 4, f.grid.n / 2, 3 * f.grid.n / 4, f.grid.n - 1] {
          let x = f.grid.x_at(i);
          // v0.2.2 closed form (central-only `a`):
          let near = W1 * (f.sample(x + h) + f.sample(x - h));
          let far  = W2 * (f.sample(x + h_far) + f.sample(x - h_far));
          let expected = W0 * f.values[i] + near + far;
          let actual = result.values[i];
          let scale = expected.abs().max(1.0);
          assert!((actual - expected).abs() <= 1e-13 * scale,
                  "midpoint-a != v0.2.2 closed form at i={}: actual={}, expected={}, a0={}, tau={}",
                  i, actual, expected, a0, tau);
      }
    failure_mode: |
      If this property fails for a shrunk minimal case with a0 = 0.01 and
      tau = 0, check the tau == 0 short-circuit (s_half = 0, all five
      S-inner shifts = 0, h0 = H0 = 0, all five sample points collapse
      to x_i, result = (W0 + 2W1 + 2W2) * f.values[i] = 1 * f.values[i]
      = f.values[i]). If it fails for tau small + a0 nonzero with
      a_prime ≡ |_| 0.0 (the constant-a regression case), check that:
        (1) The optimizer constant-folds the S-shifts: `dx_pre = 0`,
            `x_pre = x`, all four S-inner shifts (at x_pre, x_pre±h0,
            x_pre±H0) evaluate to 0. The implementation MUST NOT add
            an explicit `if a_prime is zero` branch — the constant-
            folding is performed by LLVM at the call site when
            `a_prime` is the literal `|_| 0.0_f64`.
        (2) `(self.a_prime)(x)` is called with the actual grid x_i,
            NOT some pre-shifted position. For constant a (a' ≡ 0)
            the result is 0 regardless of the input.
        (3) `(self.a)(x_pre)` evaluates `a` at the post-S(τ/2) shifted
            position. For constant a, x_pre = x_i and the result is a0.
            For variable a the implementation MUST NOT regress to
            `(self.a)(x_i)` (that would silently degrade to v0.2.2
            central-only behaviour for variable a).
        (4) The five `f.sample` calls correspond to the K-factor's 5
            arms after the S(τ/2) inner shift. For constant a, all
            five S-inner shifts are 0 and the arguments collapse to
            `(x, x+h0, x-h0, x+H0, x-H0)` — bit-equal to v0.2.2.
        (5) `libm::sqrt` (no_std) is used, NOT `f64::sqrt` (std-only).
        (6) `validate_a_x(a_at_pre, x_pre)` is called once per node
            (NOT on a_prime outputs; non-finite a_prime propagates via
            f.sample's domain check).
      Cross-reference math.md §9.2.3 reduction lemma; sympy gate G_const
      in `.dev-docs/verification/scripts/verify_v0_3_0_gamma.py`.

  - name: diffusion_chernoff_variable_zeta_liouville_oracle
    cases: 200   # v0.3.0 (ADR-0008 Amendment 2, ζ-A — honest order claim)
    purpose: |
      Variable-coefficient generator-correctness AND
      implementation-rate verification (invariant I2 — Amendment 2,
      honest). Renamed from the γ-only
      `diffusion_chernoff_variable_gamma_liouville_oracle`; the slope
      gate is retained at ≤ -0.95 per Amendment 2 (the original
      ≤ -1.95 spec was rolled back — mathematically correct for the
      ζ-A formula via sympy gate **Z_τ²** NORMATIVE, but numerically
      unreachable: the 5-point central FD on `f', f'', f'''` with
      stencil step `Δ = max(2·dx, √τ)` plus cubic-spline `f.sample()`
      at off-grid positions introduce a per-step `O(τ²)` error that
      accumulates to **global O(τ¹)** over `n = T/τ` steps; see
      ADR-0008 Amendment 2 + math.md §9.2.3.B for the H1 verdict).
      True global O(τ²) for variable `a` is deferred to v0.4.0 TruncatedExp
      integrator (option ε) which avoids FD on f-derivatives. The
      rename reflects the v0.3.0 5-arg API: the property's invariant
      code now constructs
      `DiffusionChernoff::new(a, a_prime, a_double_prime, a_norm, grid)`
      with the analytic derivatives:
        a(x)              = (1 + γ·x)²
        a_prime(x)        = 2γ·(1 + γ·x)
        a_double_prime(x) = 2γ²              (constant for this profile)
      ζ-A's correct generator is `A_self`, which agrees with `A` for
      constant a (the v0.2.0/v0.2.1/v0.2.2 production case) and is the
      divergence-form decomposition's mathematically-rigorous
      representative for variable a — even though the global
      implementation rate stays at O(τ¹), v0.3.0 delivers the correct
      generator and a ~1000× tighter constant via the explicit
      τ²-correction polynomial.

      The originally-rejected `diffusion_chernoff_variable_order2`
      Richardson-self-consistency gate is still rejected — this property
      uses a closed-form manufactured oracle, not self-consistency. The
      Stage-5 verifier's mandate stands: Richardson cannot detect
      generator mismatch (a self-consistent discretization of the WRONG
      PDE passes trivially — see
      `.dev-docs/verification/variable-diffusion-midpoint-derivation.md` §5).

      This property uses a CLOSED-FORM ORACLE via the Liouville transform
      (math.md §9.2.2, sympy-verified at
      `.dev-docs/verification/scripts/verify_liouville_oracle.py`):

        a(x) := (1 + γ·x)²,    γ > 0,   x > -1/γ

      maps `u_t = a(x) u_xx` to `v_t = v_yy − (γ²/4) v` via:
        y(x) := ln(1 + γ·x) / γ
        v(t,y) := a(x)^(−1/4) · u(t, x)
      The transformed PDE has CONSTANT potential V ≡ −γ²/4, giving:
        v(t,y) = e^(−γ²t/4) · w(t,y),   w_t = w_yy   (pure heat in y)
        w(0,y) = (1+γ·x(y))^(−1/2) · f(x(y))         where x(y) = (e^(γy)−1)/γ
        w(t,y) = ∫ G_t(y−y') · w(0,y') dy'           (heat kernel)
      Reverse-transform:
        u(t,x) = (1+γx)^(1/2) · e^(−γ²t/4) · w(t, ln(1+γx)/γ)

      For Gaussian f(x) = exp(−x²/(2σ²)), the integral is non-elementary
      but smooth, unimodal, exponentially decaying — evaluable to ≈ 1e−12
      relative precision via adaptive quadrature.

      The property compares (D_ζ(T/n))^n f against this closed-form
      oracle. Expected behaviour (Amendment 2, honest):
        - Generator correct → error decays as τ → 0 (slope < 0).
        - GLOBAL O(τ¹) for variable `a` (ζ-A FD-ceiling) → log-log
          slope ≈ -1.
        - Asserted slope gate: ≤ -0.95 over n ∈ {32, 64, 128, 256, 512}
          (relaxed from the original ≤ -1.95 spec per Amendment 2; see
          ADR-0008 Amendment 2 + math.md §9.2.3.B for the H1 FD-noise
          verdict — the formula is mathematically local-O(τ³) by sympy
          gate Z_τ², but the 5-point FD on `f', f'', f'''` plus
          cubic-spline `f.sample()` introduce a per-step O(τ²) error
          that accumulates to global O(τ¹)).
      Formula α (rejected) would FAIL even this relaxed gate
      (converges to wrong PDE, slope → 0 with non-zero asymptote =
      generator error). v0.2.2 central-only would FAIL the
      generator-correctness implication (silent degradation for
      variable a). γ-A and ζ-A both PASS the relaxed -0.95 gate with
      correct generator; ζ-A's win is a ~1000× tighter constant in
      the per-step error envelope (factor-10⁻³ reduction at production
      grids) and forward-compatible 5-arg API for v0.4.0 TruncatedExp
      (option ε), which is the canonical path to TRUE global O(τ²)
      for variable a.

      A future v0.4.0 TruncatedExp integrator (option ε), which avoids FD on
      f-derivatives entirely and breaks the H1 ceiling, would PASS this
      gate at slope ≤ -1.95 (true global O(τ²) for variable a),
      automatically signalling the next order lift. A future v0.6.0
      `a'''(x)` input on top of TruncatedExp would PASS at slope ≤ -2.95.
      The gate is therefore both a correctness check and a
      forward-compatible order detector — the gate value is RELAXED
      relative to the v0.2.0 G3-strang gate (≤ -1.95) because v0.3.0
      single-operator iteration on variable a is bounded above by FD
      noise, not by the formula's mathematical local order.

      Note: the drift-reaction is intentionally NOT in this property —
      it isolates D, free of R's contribution. G3-strang
      (constant-coefficient Strang) is unchanged in v0.2.3 by §9.2.2
      reduction lemma. The closed-form oracle is in test-only code via
      `[dev-dependencies]` (e.g. `quadrature` crate or external
      `scipy.integrate.quad` reference values cached as a static array
      keyed by (γ, σ, T, n_grid_eval)).

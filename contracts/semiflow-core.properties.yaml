# ---------------------------------------------------------------------------
# v0.8.0 Block D gate (ADR-0020 — G3⁶-2D FLAGSHIP slow-test, deferred from
# v0.7.0 per ROADMAP v0.8.0 item 4).
# ---------------------------------------------------------------------------
  - name: G3_6_2D
    cases: 1                       # deterministic spatial dx-sweep slope test
    severity: RELEASE_BLOCKING
    gate: "-6.30 <= slope <= -5.85  AND  wallclock <= 600 s"
    rustflags: "-C target-cpu=native"
    purpose: |
      **Amendment 4 (ADR-0163, 2026-06-12) — SepticHermite-floor recalibration.**
      The legacy basket `{503,997,1999}` (Amendment 3 below) was calibrated against
      the QuinticHermite floor (~1e-10). ADR-0109 (v6.0.0 BREAKING) replaced
      QuinticHermite with SepticHermite (degree-7 virtual-node sampler, floor
      φ≈1.5e-12), so N≥997 now SATURATE the new floor (N=997 err 3.84e-12,
      N=1999 err 8.62e-13), collapsing the 997→1999 segment to ≈ -2.15 and dragging
      the OLS slope to -5.34 — OUTSIDE the old [-6.15, -5.85] window. The method is
      CORRECT (6th order genuinely holds above the floor); only the basket was stale.
      The non-asserting `g3_6_2d_regime_map_diagnostic` (`#[ignore]`d, kept in the
      test file as the reproducible regime-mapping tool) was RUN and produced the
      empirical regime map:

      | N    | dx       | err_sup   | seg_slope |
      |------|----------|-----------|-----------|
      | 127  | 2.36e-1  | 6.96e-6   | —         |  pre-asymptotic (order not fully developed)
      | 191  | 1.57e-1  | 6.38e-7   | -5.858    |  asymptotic band ↓
      | 251  | 1.20e-1  | 1.25e-7   | -5.977    |  (straddles -6.0)
      | 331  | 9.06e-2  | 2.25e-8   | -6.180    |  asymptotic band ↑
      | 419  | 7.16e-2  | 4.89e-9   | -6.482    |  pre-floor steepening (super-conv) ↓
      | 503  | 5.96e-2  | 1.39e-9   | -6.885    |
      | 691  | 4.34e-2  | 1.18e-10  | -7.761    |  heavily pre-floor
      | 997  | 3.01e-2  | 3.84e-12  | -9.350    |  AT the SepticHermite floor

      seg_slope is MONOTONICALLY STEEPENING — there is NO flat -6 plateau. The
      genuinely-asymptotic, floor-safe band is the COARSE-MID region {191,251,331}:
      in-band segments -5.98/-6.18 straddle -6.0, basket OLS -6.07, finest err
      2.25e-8 ≈ 5000× the floor (fully floor-safe). Coarser N=127 is pre-asymptotic;
      finer N≥419 steepens pre-floor; N≥997 floored. RECALIBRATED basket
      `{191,251,331}` (all prime), window `[-6.30, -5.85]` (centered -6.075, covering
      the honest in-band seg spread -5.98…-6.18 + small margin; still FAILS if the
      order degrades below ~5.85 or the floor returns below -6.30), runtime budget
      600 s (basket N≤331 ≪ old N≤1999; wallclock ≪ 1 min). Correctness-preserving,
      mirroring the 1D recalibration ADR-0120. Root cause: ADR-0109 SepticHermite
      floor saturation. See `docs/adr/0163-g3-6-2d-flagship-floor-recalibration.md`.

      ----------------------------------------------------------------
      **Amendment 3 (ADR-0020, 2026-05-07) — UNDEFERS G3_6_2D.**
      v0.8.1 Block B re-opens the gate via a 3-point prime-N basket
      `{503, 997, 1999}` (drops cost-prohibitive N=3989) and a
      runtime budget of 3300 s. Prerequisite: Block A tile-scratch
      perf reuse (commit eae2b7a). Pilot run returned slope -6.0837
      (inside window [-6.15, -5.85]) at wallclock 3084 s — conclusive
      evidence per Theorem 7; adding N=3989 tightens the OLS but
      adds no mathematical content (projected 4-point cost ~12 400 s,
      infeasible for a flagship slow-test). ROADMAP item 3 (≥5×
      combined speedup) is validated separately by benches/heat_2d
      (Block A 4.38× at N=1600²) and benches/advdiff_2d (3.87×),
      cleanly separating mathematical-correctness gate from
      perf-claim benchmarks. See ADR-0020 Amendment 3 for full
      rationale. `#[ignore]` removed; gate is now RELEASE_BLOCKING.

      G3⁶-2D FLAGSHIP (v0.8.1 Block B, ADR-0020 Amendment 3 —
      closes ROADMAP v0.8.1 item 4, deferred from v0.8.0): 2D
      6th-order spatial convergence demonstration on the closed-form
      2D Gaussian heat oracle (math.md §10.5(a) eq. 10.7). Sweep
      `N ∈ {503, 997, 1999}` (3-point prime-N — 1D's 5-point basket
      [251..3989] does not lift to 2D: N²-cost amplification makes
      N=3989 ~4× costlier than N=1999, projected wallclock ~12 400 s,
      infeasible; prime-N suppresses K7-grid resonance) per axis at
      fixed `N_CHERNOFF = 1000` Chernoff time steps, `T = 0.5`,
      domain `[-15, 15]²`, constant `a = 0.5` per axis,
      `InterpKind::QuinticHermite` per 1D grid.
      Operator: `Strang2D<Diffusion6thChernoff, Diffusion6thChernoff>`.
      OLS log-log slope of `‖err‖_∞` vs N must fall inside the
      **two-sided window `[-6.15, -5.85]`** (asymptote `≈ -5.95` by
      tensor-product collapse, Theorem 7). Wallclock budget is
      **3300 s** (pilot 3084 s + 7% headroom).
      **Failure of either sub-condition (slope window OR runtime
      budget) BLOCKS v0.8.1 release.**

      6th-order spatial accuracy lifts unchanged from 1D into 2D
      because the separable-commutator identity `[L_x ⊗ I, I ⊗ L_y] = 0`
      makes palindromic Strang exact at the BCH level (math.md §10.3
      Theorem 7, Lemma 10.2): the per-axis K7 + 9-pt Fornberg FD +
      QuinticHermite stack produces the asymptotic O(dx⁶) per-axis
      floor and `Strang2D` adds zero error from the splitting itself
      with constant `a` per axis. NO new sympy script: the 2D claim
      reduces to the 1D K7 gates already verified by
      `verify_v0_7_0_kkernel.py` (K7_sum_to_1, K7_xi6_match,
      K7_leading_residue) and the ζ⁶ τ-axis gates in
      `verify_v0_7_0_zeta6.py` (Z6_tau0/1/2, Z6_const_a,
      Z6_spatial_order); see ADR-0020 alternative (a) for full
      rationale.

      CFL discipline (Diffusion6thChernoff does NOT emit `CflViolated`,
      that is `TruncatedExp*`-only): the relevant constraint is the
      K7 widest shift `J = 2√(5·a·τ)` plus the QuinticHermite ±3·dx
      stencil staying inside the half-domain. At `N=503, τ=5e-4,
      a=0.5`: `J = 0.0707 ≈ 1.18·dx`, total stencil reach
      `J + 3·dx ≈ 0.249` versus half-domain 15.0 — clear by
      ≈60×. (CFL is even more permissive at N=503 than at the old
      N=128 baseline.) The test asserts this guard explicitly
      at the head of each sweep iteration so a bad parameter
      combination fails loud rather than silently poisoning the slope.
    test_file: "tests/convergence_rate_6th_2d.rs"
    feature_gate: "parallel,simd,slow-tests"
    invariant: |
      // Pseudocode (Engineer/QA translates to test in
      // tests/convergence_rate_6th_2d.rs — mirrors the 1D
      // tests/convergence_rate_6th.rs::g3_6_slope_gate framing).
      // RECALIBRATED 2026-06-12 (ADR-0163, Amendment 4) — SepticHermite floor.
      const T_FINAL: f64 = 0.5;
      const A_CONST: f64 = 0.5;
      const N_CHERNOFF: usize = 1000;
      const X_MIN: f64 = -15.0;
      const X_MAX: f64 = 15.0;
      const N_SWEEP: [usize; 3] = [191, 251, 331];  // floor-safe asymptotic prime band (was [503,997,1999])
      const SLOPE_LO: f64 = -6.30;     // upper-bound on |slope| (pre-floor super-convergence catch)
      const SLOPE_HI: f64 = -5.85;     // lower-bound on |slope| (order-degradation catch)
      const RUNTIME_BUDGET_SEC: u64 = 600;  // basket N<=331 << old N<=1999; wallclock << 1 min (was 3300)
      // MANDATORY invocation: RUSTFLAGS="-C target-cpu=native" cargo test \
      //   --release --features parallel,simd,slow-tests \
      //   --test convergence_rate_6th_2d

      let tau = T_FINAL / N_CHERNOFF as f64;
      // CFL guard: J + 3·dx_min < (X_MAX - X_MIN)/2.
      let j_shift = 2.0 * (5.0 * A_CONST * tau).sqrt();
      let dx_min = (X_MAX - X_MIN) / *N_SWEEP.last().unwrap() as f64;
      assert!(j_shift + 3.0 * dx_min < 0.5 * (X_MAX - X_MIN),
              "CFL guard: K7 J-shift {} + 3·dx_min {} >= half-domain {}",
              j_shift, 3.0 * dx_min, 0.5 * (X_MAX - X_MIN));

      let total_start = std::time::Instant::now();
      let mut log_n = vec![];
      let mut log_e = vec![];
      for &n in &N_SWEEP {
          let gx = Grid1D::new(X_MIN, X_MAX, n).unwrap()
              .with_interp(InterpKind::SepticHermite);  // v6.0+ default (ADR-0109; was QuinticHermite)
          let gy = Grid1D::new(X_MIN, X_MAX, n).unwrap()
              .with_interp(InterpKind::SepticHermite);  // v6.0+ default (ADR-0109; was QuinticHermite)
          let grid2d = Grid2D::new(gx, gy);
          let f0 = GridFn2D::from_fn(grid2d,
              |x, y| (-(x*x + y*y)).exp());
          let cx = Diffusion6thChernoff::new(
              |_| A_CONST, |_| 0.0_f64, |_| 0.0_f64, A_CONST, gx);
          let cy = Diffusion6thChernoff::new(
              |_| A_CONST, |_| 0.0_f64, |_| 0.0_f64, A_CONST, gy);
          let phi2d = Strang2D::new(cx, cy);
          let semi = ChernoffSemigroup::new(phi2d, N_CHERNOFF).unwrap();
          let result = semi.evolve(T_FINAL, &f0).unwrap();

          // Oracle: (1+2T)^{-1} · exp(-(x²+y²)/(1+2T)).
          let denom = 1.0 + 2.0 * T_FINAL;
          let exact = GridFn2D::from_fn(grid2d,
              |x, y| (-((x*x + y*y) / denom)).exp() / denom);
          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          log_n.push((n as f64).ln());
          log_e.push(diff.norm_sup().ln());
      }
      let total_secs = total_start.elapsed().as_secs();

      // OLS slope of log(err) vs log(N).
      let m = log_n.len() as f64;
      let mean_x = log_n.iter().sum::<f64>() / m;
      let mean_y = log_e.iter().sum::<f64>() / m;
      let num: f64 = log_n.iter().zip(log_e.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_n.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      eprintln!("G3⁶-2D FLAGSHIP: slope = {:.4} (window [{}, {}]); \
                 wallclock = {} s (budget {} s)",
                slope, SLOPE_LO, SLOPE_HI, total_secs, RUNTIME_BUDGET_SEC);
      assert!(slope >= SLOPE_LO && slope <= SLOPE_HI,
              "G3⁶-2D FAIL: slope {} outside window [{}, {}]; \
               BLOCKS v0.8.0 release. See ADR-0020.",
              slope, SLOPE_LO, SLOPE_HI);
      assert!(total_secs <= RUNTIME_BUDGET_SEC,
              "G3⁶-2D FAIL: wallclock {} s > budget {} s under \
               RUSTFLAGS=\"-C target-cpu=native\" + \
               --features parallel,simd,slow-tests; v0.8.0 Blocks B+C \
               did NOT deliver the ROADMAP item 3 ≥5× speedup at \
               N=1024² scale. BLOCKS v0.8.0 release. See ADR-0020 \
               and ADR-0019 amendment.",
              total_secs, RUNTIME_BUDGET_SEC);
    failure_mode: |
      SEPTICHERMITE-FLOOR NOTE (ADR-0163, current calibration):
        The recalibrated basket is {191,251,331}, window [-6.30, -5.85]. If the gate
        slope drifts to ≈ -5.3 (toward 0 at the fine end), the SepticHermite f64 floor
        (φ≈1.5e-12, ADR-0109) has been re-entered — re-run the `#[ignore]`d
        `g3_6_2d_regime_map_diagnostic` to re-map the asymptotic-vs-floor band and pick
        a fresh floor-safe basket (mirrors how this Amendment-4 basket was chosen). The
        empirical regime map shows seg_slope STEEPENING with N (no flat -6 plateau):
        N=127 pre-asymptotic (-5.86), N∈{191,251,331} asymptotic (-5.86/-5.98/-6.18),
        N≥419 pre-floor super-convergence (-6.48,…), N≥997 floored. Do NOT widen the
        window or `#[ignore]` the gate — recalibrate the basket (ADR-0120 1D precedent).

      If slope > -5.85 (under-performance):
        - PRE-ASYMPTOTIC SWEEP — historical first-run failure mode at N≤512 produced
          slope -4.30 with monotonically-increasing ratios 13.2/18.5/31.8
          vs the 6th-order asymptote of 64. Recalibrated 2026-05-06 to
          N ∈ {128, 256, 512, 1024}; if even N=1024 is not asymptotic,
          consider extending to N=2048 (verify wallclock budget first).
        - Diffusion6thChernoff::order() does NOT return 6 — verify
          traits.yaml entry; mirror the 1D G3_6th regression checklist
          in convergence_rate_6th.rs::g3_6_slope_gate failure prints.
        - K7 weights regressed — re-run verify_v0_7_0_kkernel.py.
        - QuinticHermite NOT activated on a Grid1D — verify both
          `with_interp(InterpKind::QuinticHermite)` calls present.
        - Strang2D::order() cap stuck at 2 instead of 6 — see
          strang2d.rs serial_order: `min(X.order(), Y.order(), 4)` —
          NOTE the cap is 4, NOT 6, in v0.7.0; this is intentional
          for τ-axis Chernoff theory (Strang composition cannot exceed
          order 4 in τ regardless of inner spatial order — math.md
          §11.1.bis); the spatial 6th-order is delivered via the K7
          Fourier symbol per axis, NOT via the τ-axis cap. The
          properties.yaml gate measures SPATIAL slope (N-axis), not
          τ-axis — so order() == 4 here is CORRECT and slope -5.95 is
          still reachable.

      If slope < -6.15 (apparent super-convergence):
        - Likely numerical artefact at N=1024: f64 mantissa floor
          approached, sup-norm err < 1e-10 absolute; OLS slope inflated
          by single-ULP noise. Re-run with `--release` (debug builds

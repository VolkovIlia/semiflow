        (b) Gaussian `f` truncation: `[-2, 2]` grid covers ±2σ for σ=2,
            ±4σ for σ=0.5 — for σ=2 the tails contribute ≈ 0.05 of mass,
            which can dominate at finest n. Restrict σ_max to 1.0 OR
            widen grid to [-3, 3].

      If `(1 + γ·x)` becomes ≤ 0 at any midpoint, the test fails with
      `DomainViolation`. Check that `gamma * x_min > -1` strictly
      throughout the sweep — for the recommended grid [-2, 2] and
      γ ∈ [0.1, 0.5], we have 1 + γ·(-2) ∈ [0, 0.8] which can be 0
      exactly; tighten grid to [-1.99, 1.99] OR γ_max to 0.4 to avoid
      degenerate edge cases.

      Cross-reference: math.md §9.2.3.B (ζ-A formula), §9.2.3.A (γ-A
      baseline), §9.2.2 (Liouville transform derivation, retained
      from β); ADR-0008 + Amendment 1 (v0.3.0 API break + ζ extension);
      `.dev-docs/verification/scripts/verify_v0_3_0_zeta.py` (sympy
      gates Z_τ⁰, Z_τ¹, Z_τ², Z_const-a — all NORMATIVE);
      `.../verify_liouville_oracle.py` (sympy-verified V ≡ -γ²/4
      result; reused verbatim for ζ-A — the manufactured oracle is a
      property of the underlying PDE `u_t = a·u_xx`, NOT of the
      discretization scheme).

  - name: diffusion_chernoff_a_prime_consistency
    cases: 50    # v0.3.0 (ADR-0008, option γ — soft caller-correctness check)
    purpose: |
      Caller-correctness soft check (NOT a runtime contract). Verifies
      that the user-supplied `a_prime(x)` matches the numerical
      derivative `(a(x+h) − a(x−h))/(2h)` within 1% at random x-points
      on the working grid. This catches the most common caller error:
      passing the wrong analytic derivative (e.g., dropping a factor of
      2, sign error in a chain-rule application, copy-paste mismatch
      between `a` and `a_prime`).

      The property is INFORMATIONAL — failure does NOT block compilation
      and does NOT cause a runtime error in production. It surfaces as
      a `proptest` failure during the test suite. Production callers
      who supply a deliberately-imprecise `a_prime` (e.g., for
      experimental work) can disable this property via `#[cfg(...)]`.

      Tolerance: 1% relative error per x-point. The numerical derivative
      `(a(x+h) - a(x-h))/(2h)` with h = 1e-5 has truncation error
      O(h²·a''') ≈ 1e-10·max|a'''| — for typical bounded `a''' ≤ 100`
      this is 1e-8, comfortably below 1%. The 1% threshold absorbs
      typical caller imprecision (e.g., a 1% rounded analytic derivative
      from a paper).
    inputs:
      a_form: "(0..3i32)"           # 0: constant, 1: linear, 2: quadratic, 3: Liouville
      param_a: "(-2.0f64..=2.0f64)"  # leading coefficient
      param_b: "(0.0f64..=2.0f64)"   # offset
      x_test: "(-5.0f64..=5.0f64)"   # random test point
    invariant: |
      // Build (a, a_prime) pair according to a_form parameter:
      let (a, a_prime, label): (fn(f64) -> f64, fn(f64) -> f64, &str) = match a_form {
          0 => (|_| 1.0_f64,                |_| 0.0_f64,                  "constant"),
          1 => (|x| 1.0 + 0.1 * x,           |_| 0.1_f64,                  "linear"),
          2 => (|x| 1.0 + 0.05 * x * x,      |x| 0.1 * x,                  "quadratic"),
          _ => (|x| (1.0 + 0.1 * x).powi(2), |x| 0.2 * (1.0 + 0.1 * x),    "Liouville (1+γx)²"),
      };
      let _ = param_a;  let _ = param_b;  // (reserved for future parameterization)

      // Numerical derivative (central difference, h = 1e-5):
      let h = 1e-5_f64;
      let num_deriv = (a(x_test + h) - a(x_test - h)) / (2.0 * h);
      let analytic = a_prime(x_test);

      // 1% relative tolerance, with absolute floor 1e-8 to avoid div-by-zero:
      let abs_err = (analytic - num_deriv).abs();
      let rel_scale = analytic.abs().max(num_deriv.abs()).max(1e-8);
      let rel_err = abs_err / rel_scale;

      assert!(rel_err <= 0.01,
              "a_prime caller-error: {} family at x={}: analytic={}, num={}, rel_err={}",
              label, x_test, analytic, num_deriv, rel_err);
    failure_mode: |
      Failure means the user-supplied `a_prime` does NOT match the
      analytic derivative of `a`. This is a CALLER ERROR, not an
      implementation bug. Common causes:

      1. Sign error in the chain rule: e.g., for `a(x) = sin(γx)²`,
         the correct derivative is `a'(x) = 2γ·sin(γx)·cos(γx)`, but
         a copy-paste error might give `a'(x) = sin(γx)·cos(γx)`
         (missing 2γ factor). Check by computing `(a(x+h) - a(x-h))/(2h)`
         at a few points and comparing.

      2. Mismatched closures: e.g., `a = |x| (1.0 + 0.1*x).powi(2)`
         but `a_prime = |x| 2.0 * (1.0 + 0.1*x)` (missing γ = 0.1
         multiplier in the analytic derivative). The correct value
         is `a_prime(x) = 2 * 0.1 * (1.0 + 0.1*x) = 0.2 * (1.0 + 0.1*x)`.

      3. Constant-`a` callers passing non-zero `a_prime` (typo):
         `a = |_| 0.5` requires `a_prime = |_| 0.0`, NOT
         `a_prime = |_| 0.5` (which would imply a linear `a`).

      Architect remediation: review the (a, a_prime) pair against
      analytic differentiation rules; consult `sympy.diff` for the
      reference value; or use the Liouville profile
      `a(x) = (1+γx)²`, `a_prime(x) = 2γ·(1+γx)` as a known-correct
      template.

      Cross-reference: ADR-0008 §"Migration guide" / §"Negative
      consequences" (caller burden); math.md §9.2.3 invariant I4.

  - name: diffusion_chernoff_a_double_prime_consistency
    cases: 50    # v0.3.0 (ADR-0008 Amendment 1, ζ-A — soft caller-correctness check, NEW)
    purpose: |
      Caller-correctness soft check (NOT a runtime contract). Verifies
      that the user-supplied `a_double_prime(x)` matches the numerical
      SECOND derivative `(a(x+h) − 2·a(x) + a(x−h))/h²` within 1% at
      random x-points on the working grid. This catches the most common
      caller errors:
        (i)  passing the FIRST derivative as `a_double_prime` (copy-paste
             mistake);
        (ii) sign error in the second-derivative chain rule (e.g., for
             `a(x) = sin(γx)²`, `a''(x) = 2γ²·cos(2γx)`, easy to write
             as `2γ·cos(2γx)` or `2γ²·sin(2γx)`);
        (iii) forgetting to scale by γ² when `a` is a function of `γ·x`
              (e.g., `a(x) = (1+γx)²` requires `a''(x) = 2γ²`, NOT
              `a''(x) = 2`);
        (iv) constant-`a` callers passing non-zero `a_double_prime`
              (typo): `a = |_| 0.5` requires `a_double_prime = |_| 0.0`,
              NOT `a_double_prime = |_| 0.5`.

      The property is INFORMATIONAL — failure does NOT block compilation
      and does NOT cause a runtime error in production. It surfaces as
      a `proptest` failure during the test suite. Production callers
      who supply a deliberately-imprecise `a_double_prime` (e.g., for
      experimental work) can disable this property via `#[cfg(...)]`.

      Tolerance: 1% relative error per x-point. The numerical second
      derivative `(a(x+h) − 2·a(x) + a(x−h))/h²` with h = 1e-4 has
      truncation error O(h²·a^(4)) ≈ 1e-8·max|a^(4)| — for typical
      bounded `a^(4) ≤ 100` this is 1e-6, comfortably below 1%. The
      cancellation noise at h=1e-4 is O(ε/h²) ≈ 4e-12, also negligible.
      The 1% threshold absorbs typical caller imprecision.
    inputs:
      a_form: "(0..3i32)"           # 0: constant, 1: linear, 2: quadratic, 3: Liouville
      param_a: "(-2.0f64..=2.0f64)"  # leading coefficient (reserved)
      param_b: "(0.0f64..=2.0f64)"   # offset (reserved)
      x_test: "(-5.0f64..=5.0f64)"   # random test point
    invariant: |
      // Build (a, a_double_prime) pair according to a_form parameter:
      let (a, a_double_prime, label): (fn(f64) -> f64, fn(f64) -> f64, &str) = match a_form {
          0 => (|_| 1.0_f64,                |_| 0.0_f64,             "constant"),
          1 => (|x| 1.0 + 0.1 * x,           |_| 0.0_f64,             "linear (a''≡0)"),
          2 => (|x| 1.0 + 0.05 * x * x,      |_| 0.1_f64,             "quadratic (a''≡0.1)"),
          _ => (|x| (1.0 + 0.1 * x).powi(2), |_| 2.0 * 0.1 * 0.1,     "Liouville (1+γx)², a''=2γ²=0.02"),
      };
      let _ = param_a;  let _ = param_b;  // (reserved for future parameterization)

      // Numerical second derivative (central FD, h = 1e-4):
      let h = 1e-4_f64;
      let num_sd = (a(x_test + h) - 2.0 * a(x_test) + a(x_test - h)) / (h * h);
      let analytic = a_double_prime(x_test);

      // 1% relative tolerance, with absolute floor 1e-6 to avoid div-by-zero:
      let abs_err = (analytic - num_sd).abs();
      let rel_scale = analytic.abs().max(num_sd.abs()).max(1e-6);
      let rel_err = abs_err / rel_scale;

      assert!(rel_err <= 0.01,
              "a_double_prime caller-error: {} family at x={}: analytic={}, num={}, rel_err={}",
              label, x_test, analytic, num_sd, rel_err);
    failure_mode: |
      Failure means the user-supplied `a_double_prime` does NOT match
      the analytic second derivative of `a`. This is a CALLER ERROR,
      not an implementation bug. Common causes (and remediation):

      1. Sign error in the 2nd-derivative chain rule. For composite `a`,
         `a(x) = h(g(x))`, the 2nd derivative is
         `a''(x) = h''(g)·(g')² + h'(g)·g''`. Easy to drop one term or
         miss the (g')² factor. Cross-check against `sympy.diff(a, x, x)`.

      2. Mismatched closures: e.g., `a = |x| (1.0 + 0.1*x).powi(2)` but
         `a_double_prime = |_| 2.0_f64` (forgot γ² = 0.01 scaling). The
         correct value is `a_double_prime = |_| 2.0 * 0.1 * 0.1 = 0.02`.

      3. Confusing `a_double_prime` with `a_prime`: the property
         signature accepts both as `fn(f64) -> f64`, so a copy-paste
         error swapping the two passes type-check but fails this gate.

      4. Constant-`a` callers passing non-zero `a_double_prime` (typo):
         `a = |_| 0.5` requires `a_double_prime = |_| 0.0`, NOT
         `a_double_prime = |_| 0.5` (which would imply a quadratic `a`).

      Architect remediation: review the (a, a_double_prime) pair
      against analytic differentiation rules; consult `sympy.diff(a, x, x)`
      for the reference value; or use the Liouville profile
      `a(x) = (1+γx)²`, `a_double_prime(x) = 2γ²` (constant) as a
      known-correct template.

      Cross-reference: ADR-0008 Amendment 1 §"Migration" / §"Negative
      consequences" (caller burden); math.md §9.2.3.B (ζ-A formula);
      traits.yaml DiffusionChernoff invariant I5.

  - name: strang_split_palindrome_consistency
    cases: 100
    purpose: |
      Strang composition Phi(tau) = D(tau/2) o R(tau) o D(tau/2) is its own
      adjoint composition under D <-> D (R unchanged) since the outer two
      D-steps are identical. Equivalently: the per-step result equals the
      result of applying D, R, D in palindromic order. This is a structural
      consistency self-check (the property is true by construction; QA
      verifies the implementation matches the contract).

      Specifically: applying StrangSplit::apply(tau, f) MUST equal manually
      composing diffusion.apply(tau/2, .) >> drift_reaction.apply(tau, .) >>
      diffusion.apply(tau/2, .).
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      // v0.3.0 (ADR-0008 Amendment 1, ζ-A): pass `|_| 0.0_f64` for BOTH
      // a_prime AND a_double_prime (constant a ⇒ a' ≡ a'' ≡ 0).
      let d = DiffusionChernoff::new(|_| a, |_| 0.0_f64, |_| 0.0_f64, a, f.grid.clone());
      let r = DriftReactionChernoff::new(|_| b, |_| c, c.abs());
      let phi = StrangSplit::new(d, r);

      let result_phi = phi.apply(tau, &f).unwrap();

      let manual_step1 = d.apply(tau / 2.0, &f).unwrap();
      let manual_step2 = r.apply(tau, &manual_step1).unwrap();
      let manual_result = d.apply(tau / 2.0, &manual_step2).unwrap();

      let mut diff = result_phi.clone();
      diff.axpy(-1.0, &manual_result);
      assert!(diff.norm_sup() <= 1e-12 * (1.0 + f.norm_sup()),
              "StrangSplit::apply deviates from D(tau/2) o R(tau) o D(tau/2): diff = {}",
              diff.norm_sup());

# ---------------------------------------------------------------------------
# v0.2.1 properties — boundary policies (ADR-0007).
# Location: crates/semiflow-core/tests/boundary_properties.rs
# ---------------------------------------------------------------------------

  - name: bc_index_totality
    cases: 5000
    purpose: |
      `bc_index(policy, n, idx)` is TOTAL over (BoundaryPolicy, n >= 2,
      idx: i64). NEVER returns Err for any of the 4 policy variants.
      Direct realisation of Grid1D invariant I1 (traits.yaml).

      Probes the `bc_index` helper directly via a `pub(crate)` test export
      (`grid::__test_only::bc_index_for_test`). The helper signature in
      v0.2.1 is `bc_index(BoundaryPolicy, usize, i64) -> BoundaryHit`
      (NO Result wrapper) — totality is encoded in the type, but this
      property guards against future regressions if the signature is widened.
    inputs:
      policy: "prop_oneof![Just(BoundaryPolicy::Reflect), Just(BoundaryPolicy::ZeroExtend), Just(BoundaryPolicy::Periodic), Just(BoundaryPolicy::LinearExtrapolate)]"
      n: "(2usize..=10000usize)"
      idx: "(-1_000_000i64..=1_000_000i64)"
    invariant: |
      // bc_index is `pub(crate)` — accessed via `__test_only` re-export.
      let hit = grid::__test_only::bc_index_for_test(policy, n, idx);
      match (policy, hit) {
          (BoundaryPolicy::Reflect, BoundaryHit::Inside(i)) => assert!(i < n),
          (BoundaryPolicy::Periodic, BoundaryHit::Inside(i)) => assert!(i < n),
          (BoundaryPolicy::ZeroExtend, BoundaryHit::Inside(i)) => {
              assert!(i < n); assert!(idx >= 0 && idx < n as i64);
          }
          (BoundaryPolicy::ZeroExtend, BoundaryHit::Zero) => {
              assert!(idx < 0 || idx >= n as i64);
          }
          (BoundaryPolicy::LinearExtrapolate, BoundaryHit::Inside(i)) => {
              assert!(i < n); assert!(idx >= 0 && idx < n as i64);
          }
          (BoundaryPolicy::LinearExtrapolate, BoundaryHit::OutsideLeft(d)) => {
              assert!(idx < 0); assert_eq!(d as i64, -idx);
          }
          (BoundaryPolicy::LinearExtrapolate, BoundaryHit::OutsideRight(d)) => {
              assert!(idx >= n as i64); assert_eq!(d as i64, idx - (n as i64 - 1));
          }
          _ => panic!("bc_index returned an inconsistent (policy, hit) pair"),
      }
    failure_mode: |
      If this property fails, the bc_index implementation is non-total
      (returning Err) or violates the policy/payload contract from
      traits.yaml §I2..I4. Regress to .dev-docs/verification/boundary-policies-derivation.md.

  - name: bc_index_strict_interior_agreement
    cases: 1000
    purpose: |
      Invariant I5 (traits.yaml): for all 4 policies and all i in [0, n),
      bc_index(policy, n, i) returns Inside(i). The policies differ ONLY
      on out-of-range indices; this property locks down regression-safety
      for the existing Reflect / ZeroExtend dispatch.
    inputs:
      policy: "prop_oneof![Just(BoundaryPolicy::Reflect), Just(BoundaryPolicy::ZeroExtend), Just(BoundaryPolicy::Periodic), Just(BoundaryPolicy::LinearExtrapolate)]"
      n: "(4usize..=1000usize)"
      i: "(0usize..=999usize)"
    invariant: |
      let i_clamped = i.min(n - 1);  // proptest can yield i >= n; clamp to in-range
      let hit = grid::__test_only::bc_index_for_test(policy, n, i_clamped as i64);
      assert_eq!(hit, BoundaryHit::Inside(i_clamped),
                 "I5 violated: policy = {:?}, n = {}, i = {}, hit = {:?}",
                 policy, n, i_clamped, hit);

  - name: boundary_periodic_round_trip
    cases: 200
    purpose: |
      For Periodic boundary, sampling at `x + k*L` returns the same value
      as sampling at `x`, for any integer k and any in-range x. Direct
      consequence of f̃(x + L) = f̃(x) (math §3.5.3).

      Tolerance 1e-12 covers f64 round-off in the rem_euclid arithmetic
      and in the Catmull-Rom evaluation at the same fractional `s` after
      wrap. The wrap is exact at the integer-index level; any drift comes
      from f64 representation of `x + k*L` not being bit-equal to `x`.
    inputs:
      mu: "(-2.0f64..=2.0f64)"
      sigma_sq: "(0.1f64..=2.0f64)"
      x: "(-9.0f64..=9.0f64)"
      k: "(-3i32..=3i32)"
    invariant: |
      let grid = Grid1D::new(-10.0, 10.0, 1000).unwrap()
                  .with_boundary(BoundaryPolicy::Periodic);
      let f = GridFn1D::from_fn(grid, |x| (-(x - mu).powi(2) / (2.0 * sigma_sq)).exp());
      let l = 20.0_f64;  // L = xmax - xmin
      let v0 = f.sample(x);
      let vk = f.sample(x + k as f64 * l);
      assert!((v0 - vk).abs() <= 1e-12 * (1.0 + v0.abs()),
              "periodic round-trip: x = {}, k = {}, v0 = {}, vk = {}", x, k, v0, vk);
    failure_mode: |
      Common bugs: (a) using period L instead of n*dx in the wrap formula,
      (b) dropping the rem_euclid sign-correction (i64::%, not i64::rem_euclid),
      (c) interpolation idx vs. node-index off-by-one. See
      .dev-docs/verification/boundary-policies-derivation.md §2.

  - name: boundary_linear_extrap_affine_exact
    cases: 500
    purpose: |
      For affine f(x) = α*x + β, LinearExtrapolate.sample(x) returns
      α*x + β EXACTLY (machine epsilon) for ANY x in R, including
      out-of-grid x where the policy's extension is active.

      Strongest stability statement of the four policies: Catmull-Rom
      reproduces cubics (hence affines) exactly on uniform grids, and
      the 3-point boundary slope formula evaluates to α exactly when
      f_0, f_1, f_2 are sampled from an affine.
    inputs:
      alpha: "(-5.0f64..=5.0f64)"
      beta: "(-10.0f64..=10.0f64)"
      x: "(-15.0f64..=15.0f64)"   # 5 dx outside the [-10, 10] grid each side
    invariant: |
      let grid = Grid1D::new(-10.0, 10.0, 1000).unwrap()
                  .with_boundary(BoundaryPolicy::LinearExtrapolate);
      let f = GridFn1D::from_fn(grid, |xx| alpha * xx + beta);
      let actual = f.sample(x);
      let expected = alpha * x + beta;
      // Tolerance: relative epsilon scaled by max(|alpha*x|, |beta|).
      let scale = (alpha * x).abs().max(beta.abs()).max(1.0);
      assert!((actual - expected).abs() <= 16.0 * f64::EPSILON * scale,
              "LinearExtrapolate not affine-exact: actual = {}, expected = {}, x = {}, scale = {}",
              actual, expected, x, scale);
    failure_mode: |
      If this fails, the boundary-slope formula is wrong (sign error or
      off-by-one stencil index) or Catmull-Rom is not reproducing affines
      exactly on the in-grid portion. Cross-check
      .dev-docs/verification/boundary-policies-derivation.md §3.

  - name: boundary_zero_extend_no_op_in_range
    cases: 500
    purpose: |
      Regression guard: ZeroExtend agrees with Reflect on STRICT-INTERIOR
      sample queries (x in (xmin + 2 dx, xmax - 2 dx)). Both policies
      should be no-ops here — the Catmull-Rom stencil never touches the
      boundary, so the BC dispatch is unreachable.
    inputs:
      mu: "(-2.0f64..=2.0f64)"
      sigma_sq: "(0.1f64..=2.0f64)"
      x: "(-8.0f64..=8.0f64)"   # 2 dx inside [-10, 10] at N=1000 (dx ≈ 0.02)
    invariant: |
      let g_ref = Grid1D::new(-10.0, 10.0, 1000).unwrap()
                   .with_boundary(BoundaryPolicy::Reflect);
      let g_zer = Grid1D::new(-10.0, 10.0, 1000).unwrap()
                   .with_boundary(BoundaryPolicy::ZeroExtend);
      let f_ref = GridFn1D::from_fn(g_ref, |x| (-(x - mu).powi(2) / (2.0 * sigma_sq)).exp());
      let f_zer = GridFn1D::from_fn(g_zer, |x| (-(x - mu).powi(2) / (2.0 * sigma_sq)).exp());
      let v_ref = f_ref.sample(x);
      let v_zer = f_zer.sample(x);
      assert!((v_ref - v_zer).abs() <= 1e-14 * (1.0 + v_ref.abs()),
              "ZeroExtend / Reflect disagree at strict interior x = {}: v_ref = {}, v_zer = {}",
              x, v_ref, v_zer);

# ---------------------------------------------------------------------------
# v0.4.0 properties — TruncatedExpDiffusionChernoff (ADR-0011, option ε, sibling type)
# Location: crates/semiflow-core/tests/magnus_properties.rs
# ---------------------------------------------------------------------------

  - name: truncated_exp_diffusion_constant_fast_path_close
    cases: 1000   # v0.4.0 (ADR-0011)
    purpose: |
      Constant-a reduction lemma (math.md §9.2.3.C "Constant-a
      reduction"): for constant `a ≡ a₀` (i.e., `a' ≡ 0 ∧ a'' ≡ 0`),
      the v0.4.0 TruncatedExp formula

        M(τ) f|_i := Σ_{k=0..4} (τ^k / k!) · G_const^k f|_i

      with G_const f|_i = a₀·(f_{i+1} − 2 f_i + f_{i-1})/dx² agrees
      with the v0.2.2 K-only formula `D_v022(τ; a₀)` to within sup-norm
      tolerance 1e-10. **Close, NOT bit-equal**: the K=4 truncation
      residue is `O(τ⁵)` per math.md §9.2.3.C, bounded by
      `(τ·a₀/dx²)^5 / 120` which is ≤ 1e-12 at production CFL margins
      (τ·a₀/dx² ≤ 0.45). Tolerance 1e-10 absorbs this residue with
      ~100× margin.

      Direct realisation of invariant I3 of TruncatedExpDiffusionChernoff
      (traits.yaml). NOT a regression-safety guarantee for G1/G2 in
      the strict bit-equal sense (use `DiffusionChernoff` for that —
      it remains the constant-a fall-back per §9.2.3.C "Retention");
      THIS property is the empirical witness that callers can
      drop-in-replace `DiffusionChernoff` with `TruncatedExpDiffusionChernoff`
      without sup-norm degradation in the constant-a regime.
    inputs:
      a0: "(0.01f64..=5.0f64)"   # positive_diffusion-compatible
      tau: "(1e-6f64..=0.01f64)" # respects CFL τ < dx²/(2·a) at dx≈0.02, a≤5: dx²/(2·a) ≈ 4e-5; pick well below
      f: gaussian_state
    invariant: |
      // Use the same gaussian_state grid (-10, 10, 1000); dx ≈ 0.02.
      // CFL: tau · a0 < dx²/2 = 2e-4. With tau ≤ 1e-2 and a0 ≤ 5,
      // tau·a0 ≤ 5e-2 — VIOLATES CFL for high-a0/high-tau corners.
      // QA Engineer MUST clamp the input range OR test only inputs
      // satisfying CFL; the property assert below will skip
      // (proptest::TestCaseError::reject) on CFL violation rather
      // than counting it as a failure — that case is exercised by
      // `truncated_exp_cfl_violation_returns_error` separately.

      let dx = f.grid.dx();
      let cfl_safe = tau * a0 < 0.5 * dx * dx;
      if !cfl_safe {
          // proptest reject (not failure) — out of scope for this property
          return Err(proptest::test_runner::TestCaseError::reject("CFL violation"));
      }

      let m = TruncatedExpDiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );
      let d = DiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );

      let result_m = m.apply(tau, &f).unwrap();
      let result_d = d.apply(tau, &f).unwrap();

      let mut sup_diff = 0.0_f64;
      for i in 0..f.grid.n {
          sup_diff = sup_diff.max((result_m.values[i] - result_d.values[i]).abs());
      }

      assert!(sup_diff <= 1e-10,
              "TruncatedExp vs DiffusionChernoff (constant a) sup-norm diff = {} \
               (tolerance 1e-10): a0 = {}, tau = {}", sup_diff, a0, tau);
    failure_mode: |
      If `sup_diff > 1e-10` for shrunk minimal case (small τ, small a0):
        (1) Check K=4 factorial weights `[1, 1, 0.5, 1/6, 1/24]` are
            applied at the correct power of τ.
        (2) Check the 3-point stencil evaluates `a` at half-grid-nodes
            `x_i ± dx/2` (constant a ⇒ a_left = a_right = a₀, but the
            implementation must STILL evaluate the closure twice per
            interior node for symmetry with the variable-a path).
        (3) For constant a, dispatch to G_const should be IMPLICIT via
            optimizer constant-folding; DO NOT add an explicit `if a' ≡ 0`
            branch (would pessimize the variable-a path).
        (4) Buffer-swap discipline: `core::mem::swap(&mut g_curr,
            &mut g_next)` after each k iteration — failing to swap
            recomputes G⁰f every iteration giving identity instead.

      If `sup_diff > 1e-6` (gross failure), the K-fold loop is broken.
      Run unit test `magnus_constant_one_step` with τ=1e-4, a₀=1.0,
      f = exp(-x²) and verify sup-norm against analytic
      heat-kernel `(4πτ)^(-½) ∫ exp(-(x-y)²/(4τ)) · exp(-y²) dy`.

      Cross-reference: math.md §9.2.3.C "Constant-a reduction" + sympy
      gate Z_const-a (`verify_v0_3_0_zeta.py`, the ζ-A gate which
      SHARES the v0.2.2 reference).

  - name: truncated_exp_variable_zeta_liouville_oracle_slope
    cases: 200    # v0.4.0 (ADR-0011) — FLAGSHIP GATE: ζ-A CANNOT PASS THIS
    purpose: |
      **THIS IS THE FLAGSHIP GATE that the ζ-A implementation cannot
      pass.** Variable-coefficient global O(τ²) verification (invariant
      I2). Mirrors the structure of
      `diffusion_chernoff_variable_zeta_liouville_oracle` (200 cases,
      ζ-A's relaxed -0.95 gate) but with the **strict -1.95 slope
      gate** that v0.4.0 TruncatedExp is designed to pass.

      Manufactured-solution Liouville oracle (math.md §9.2.2,
      sympy-verified at
      `.dev-docs/verification/scripts/verify_liouville_oracle.py`):

        a(x) := (1 + γ·x)²,  γ ∈ (0, 0.3],  x > -1/γ

      maps `u_t = a(x) u_xx` to `v_t = v_yy − (γ²/4) v` via:
        y(x) := ln(1 + γ·x) / γ
        v(t,y) := a(x)^(−1/4) · u(t, x)
      Closed-form for Gaussian initial data evaluable to ≈ 1e−12 via
      adaptive quadrature. Same oracle as ζ-A's property; what changes
      is the **discretization being measured** (TruncatedExp vs ζ-A) and the
      **expected slope** (-2 vs -1).

      The property compares (M(T/n))^n f against this closed-form
      oracle. Expected behaviour (TruncatedExp, math.md §9.2.3.C global
      rate proof sketch):
        - Generator correct (A_self, divergence-form) → error decays.
        - GLOBAL O(τ²) for variable `a` (no FD ceiling, K=4
          truncation residue O(τ⁵) below dx² floor) → log-log slope
          ≤ -1.95.
        - Asserted slope gate: ≤ -1.95 over n ∈ {32, 64, 128, 256, 512}.

      Failure modes by slope value:
        slope ≈ -1.0  ⇒ TruncatedExp implementation regressed to FD on f
                        (e.g., calling `f.sample(x±Δ)` instead of the
                        3-point on-grid stencil). H1 ceiling re-imposed.
        slope ≈  0    ⇒ generator mismatch (e.g., used pure
                        `a·∂²` instead of `∂(a·∂)`); wrong PDE.
        slope ≈ -1.95 ⇒ PASS (TruncatedExp delivering its theoretical rate).
        slope < -2.5  ⇒ unexpectedly better than predicted; investigate
                        (could indicate test-side artifact OR a future
                        higher-order TruncatedExp variant landed early).

      ζ-A's property (`diffusion_chernoff_variable_zeta_liouville_oracle`)
      has an EXPLICIT relaxation to -0.95 documented in math.md §9.2.3.B
      (FD ceiling). v0.4.0 TruncatedExp property has NO such relaxation —
      this is the regime where the v0.4.0 release proves its worth
      vs v0.3.0. If TruncatedExp's slope falls below -1.95, the v0.4.0
      release is BLOCKED until the implementation is fixed (NO
      relaxation; the gate is the entire reason for v0.4.0's
      existence).

      Note: drift-reaction is NOT in this property — isolates D, free
      of R's contribution. G3-strang (constant-coefficient Strang) is
      unchanged in v0.4.0 by §9.2.3.C reduction. The closed-form
      oracle is in test-only code via `[dev-dependencies]`.

# 0.7.6 (v0.8.1 Block B, ADR-0020 Amendment 3 — 2026-05-07) —
# UNDEFERS G3_6_2D and recalibrates after pilot.
# Schema fields changed:
#   - G3_6_2D.status: REMOVED (was "DEFERRED")
#   - G3_6_2D.deferred_to: REMOVED (was "v0.8.1")
#   - G3_6_2D.deferred_reason: REMOVED
#   - G3_6_2D.N_SWEEP: [128,256,512,1024] → [503,997,1999]
#     (3-point prime-N basket; suppresses K7-grid resonance)
#   - G3_6_2D.RUNTIME_BUDGET_SEC: 300 → 3300
#   - G3_6_2D.SLOPE_LO / SLOPE_HI: UNCHANGED ([-6.15, -5.85])
# Pilot evidence (v0.8.1 Block A tile-scratch perf, commit eae2b7a):
#   3-point sweep N ∈ {503, 997, 1999} on 8-core x86_64:
#   N=503:   err_sup=1.2198e-7,  —      155 s
#   N=997:   err_sup=9.7974e-10, ratio 124.50   588 s
#   N=1999:  err_sup=2.7481e-11, ratio  35.65  2341 s
#   Total wallclock: 3084 s; OLS slope: -6.0837
#   (inside window [-6.15, -5.85] — conclusive per Theorem 7).
#   Projected 4-point with N=3989: ~12 400 s — infeasible for a
#   flagship slow-test (N²-cost amplification: 1999²→3989² ≈ 4×
#   cost, asymptote already proven by 3-point basket).
# Decision: drop N=3989 (1D's 5-point [251..3989] basket does NOT
#   lift to 2D under N²-cost amplification at the largest entries);
#   keep prime-N to suppress K7-grid resonance; set runtime budget
#   3300 s (pilot 3084 s + 7% headroom). The 3-point slope -6.0837
#   already proves O(dx⁶) per Theorem 7 — adding N=3989 tightens
#   the OLS but adds no mathematical content.
# ROADMAP item 3 (≥5× combined speedup) validated separately by
#   benches/heat_2d (Block A 4.38× at N=1600²) and benches/advdiff_2d
#   (3.87×) — cleanly separates mathematical-correctness gate from
#   perf-claim benchmarks (ADR-0020 Amendment 3).
# Pairs with Block A (commit eae2b7a) tile-scratch reuse: bit-equal
#   preserved, perf gain documented in benches.
#

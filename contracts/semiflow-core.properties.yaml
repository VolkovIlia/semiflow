      gamma: "(0.0f64..=0.3f64)"    # γ — must keep 1+γx > 0.7 on grid [-1, 1]
      sigma: "(0.5f64..=2.0f64)"    # initial Gaussian width
      total_t: "(0.05f64..=0.5f64)" # T — must respect CFL at τ = T/n
    invariant: |
      // Same FN-POINTER RESTRICTION as ζ-A property: use either
      //   (a) `TruncatedExpDiffusionChernoffDyn` test-only wrapper with `Box<dyn Fn>`
      //   (b) Thread-local `Cell<f64>` for gamma, sigma (no_std-friendly).
      // Architect: option (a) mirrors ζ-A's pattern (already in use).

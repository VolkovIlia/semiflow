  # =========================================================================
  # ADR-0090 — Chebyshev spectral collocation gates (Wave A, v4.3.0).
  # =========================================================================

  - name: G_PATH_EPS_CHEB_FLOOR
    cases: 4
    severity: RELEASE_BLOCKING
    threshold_cheb: 1.0e-8
    threshold_cubic_lower: 1.0e-7
    blocks_release: true
    rationale: |
      ADR-0090 AC6: Chebyshev spectral sampling achieves spatial floor ≤ 1e-8
      at N=512 Gaussian probe. Chebyshev M=64 improves over CubicHermite (floor > 1e-7).
      Sub-test 2: ζ⁴ chain propagates Chebyshev through with_chebyshev_sampling().
      Sub-test 3: ζ⁶ chain propagates Chebyshev through with_chebyshev_sampling().
      Sub-test 4 (AC8): ζ⁸ defaults Chebyshev ON (ADR-0088 Wave II unblocked by ADR-0090).
    gate: "Chebyshev spectral floor ≤ 1e-8 at N=512 + propagation through ζ⁴/ζ⁶/ζ⁸ chains (ADR-0090)"
    purpose: |
      G_PATH_EPS_CHEB_FLOOR (RELEASE_BLOCKING — ADR-0090 AC6):
      Regression guard for Chebyshev spectral collocation wiring.
        Sub-test 1: K5 with_chebyshev_sampling() floor ≤ 1e-8 at N=512 Gaussian.
        Sub-test 2: ζ⁴ chain Chebyshev propagation (finite output).
        Sub-test 3: ζ⁶ chain Chebyshev propagation (finite output).
        Sub-test 4: ζ⁸ default-ON Chebyshev (ADR-0088 Wave II unblocked).
      N=512, f(x)=exp(-x²), probe positions idx in {64,128,256,384,448} + 0.5·dx.
      Failure BLOCKS v4.3.0 release.
    test_file: "tests/path_eps_chebyshev_floor.rs"
    feature_gate: "slow-tests"

  - name: G_zeta8_const_a_richardson_cheb
    cases: 1
    severity: RELEASE_BLOCKING
    threshold: 3.0
    blocks_release: true
    regime: pre-asymp-temporal-transition
    rationale: |
      ADR-0088 AMENDMENT 1 / ADR-0104 v5.0 recalibration: log₂(err_1/err_2) ≥ 3.0
      with Chebyshev spectral sampling (ChebyshevSpectralWithBC { m: 64, ... }).
      Theoretical order-8: log₂(256) = 8.0.

      v4.x PREDICTION: ≥ 6.5 (Chebyshev spectral floor ~1e-15 assumed to unlock
      full order-8 Richardson ratio). The prediction assumed no OOB boundary
      divergence (H3 defect) and no QuinticHermite floor domination (H4 defect).

      v5.0 MEASUREMENT (post-H3 fix, 2026-05-29, i7-12700K):
        n=1: err = 2.0183e-5
        n=2: err = 2.4059e-6
        ratio = 2.0183e-5 / 2.4059e-6 = 8.389
        log₂(ratio) = log₂(8.389) = 3.0667
        Rust assertion: 3.0667 >= 3.0 → PASS
        Verdict: GREEN (post-H3 fix, ADR-0104)

      ADR-0104 H4 context: Actual floor ≈ 1e-10 (QuinticHermite K5 intermediate
      semigroup evaluations dominate error floor). Even with Chebyshev M=64 spatial
      floor ≤ 1e-15, the temporal error at τ-values tested is dominated by the K5
      floor (~1e-10 QuinticHermite). Richardson ratio 3.0667 reflects the regime

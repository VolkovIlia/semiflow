  # =========================================================================
  # v8.3.0 — TIER-3 binding-surface parity (ADR-0153, ADR-0138 structure).
  # Three META-GATES verifying 0-ULP cross-binding parity for the three v8.2.0
  # math kernels. Mirror G_BINDING_RESOLVENT_JUMP_PARITY (4 sub-tests: core
  # golden + FFI + PyO3 + WASM, byte-identical). Per-crate-dup (ADR-0028 Amdt 2).
  # =========================================================================

  - name: G_BINDING_WENTZELL_PARITY
    cases: 4
    severity: RELEASE_BLOCKING
    blocks_release: true
    gate: "Wentzell evolved grid[N] byte-identical (0 ULP) across core ↔ FFI v3 ↔ PyO3 v3 ↔ WASM v3, with γ(t) crossing every boundary as a pre-sampled gamma_schedule"
    purpose: |
      G_BINDING_WENTZELL_PARITY (v8.3.0 DynamicWentzellChernoff binding-surface
      parity meta-gate — math.md §49, ADR-0151, ADR-0153):
      Verifies that the bulk–boundary Lie-split (one bulk Chernoff step + implicit
      Cayley boundary sub-step) evolved grid for the 1D unit-diffusion heat kernel
      on a half-line is the SAME whether computed in the Rust core or read back
      through any of the three TIER-1 binding surfaces (FFI/PyO3/WASM).

      γ(t) ABI invariant (ADR-0153 Decision 1, HARD): the time-dependent boundary
      scaling γ(t) is FROZEN at the left endpoint of each step (Howland §49.2,
      t_k = t_offset + k·τ, τ = t/n_steps) and crosses every boundary as a flat
      pre-sampled gamma_schedule: &[f64] of length n_steps. The host evaluates its
      own arbitrary γ at t_k BEFORE detaching; the GIL-off kernel reads
      gamma_step[k]. Identical f64 schedule arrays → identical core path → 0-ULP
      parity is structural. NO function pointer or callback crosses any boundary
      (the fn-ptr ABI was REJECTED for signature uniformity, ADR-0153). The PyO3/WASM
      GammaFamily {Constant,Linear,Exponential} sugar EXPANDS to the same schedule
      and is verified to produce the identical golden.

      Canonical smoke (shared by all sub-tests):
        Kernel:  DynamicWentzellChernoff<DiffusionChernoff<f64>, schedule-region, f64>.
                 Inner: unit a=1, a'=0, a''=0. Order-1 (bulk↔boundary commutator ≠ 0,
                 §49.8). 1D half-line collapse: trace DOF = grid node 0 (§49 collapse).
        Grid:    Grid1D::new(0.0, 10.0, N), N = 64, DEFAULT interp.
        u0(x):   exp(-x²) as GridFn1D<f64>.
        N_STEPS: 32. c (boundary reaction): 0.5.
        SCHEDULE: gamma_schedule[k] = 0.5 + 0.1·t_k, t_k = k·(0.05/32), k=0..31.
        T:       0.05 (matched τ = T/N_STEPS).
        Output:  evolved grid[N] = real-valued GridFn1D<f64> after the schedule sweep.

      Four sub-tests (model on G_BINDING_RESOLVENT_JUMP_PARITY):
        Sub-test 1 (CORE golden): drive apply_at left-endpoint over the schedule in
          Rust; fix the GOLDEN grid[64] the bindings must reproduce. Sanity: output
          finite; dissipative (no norm growth, Cayley contraction §49.4).
          ASSERT output finite AND ‖u‖ ≤ ‖u0‖ (Cayley contraction).
          File: crates/semiflow-core/tests/binding_wentzell_parity.rs
        Sub-test 2 (FFI v3): smf_wentzell_evolver_new_heat_1d_unit_v3(0,10,64,32,0.5,
          schedule,32,u0,64,&ev); smf_wentzell_evolve_v3(ev,0.05,0.0,out,64);
          ASSERT memcmp(out, golden, 64*8) == 0.
          File: crates/semiflow-ffi/tests/binding_wentzell_parity_ffi.rs (crosses FFI boundary)
        Sub-test 3 (PyO3 v3, Rust preamble — DETERMINISM): The .rs file
          (crates/semiflow-py/tests/binding_wentzell_parity_py.rs) mirrors the
          PyO3 sweep inline and checks run_a == run_b (two identical sweeps must be
          bit-identical; gates the Rust arithmetic before the Python interpreter).
          NOTE: This sub-test is a determinism/pre-GIL-boundary check, NOT a
          golden comparison. The 0-ULP-vs-core comparison is the FFI sub-test (2)
          responsibility (FFI sub-test crosses the actual boundary). A golden-based
          PyO3 check (np.array_equal vs core golden) is pending golden population
          in test_wentzell_v8.py::test_g_binding_wentzell_parity_sub3_pyo3_0ulp.
          Also: from_family vs explicit-schedule 0-ULP equivalence is asserted in
          test_wentzell_v8.py::test_from_family_matches_explicit_schedule_0ulp (SF-1 fix).
        Sub-test 4 (WASM v3, Rust preamble — DETERMINISM): The .rs file
          (crates/semiflow-wasm/tests/binding_wentzell_parity_wasm.rs) mirrors the
          WASM sweep inline and checks run_a == run_b. NOTE: Same determinism
          preamble as sub-test 3. The JS Float64Array round-trip (the true
          cross-boundary WASM test) requires wasm-pack test --node (CI job
          wasm-test) and is NOT a plain cargo test. The full ASSERT
          out.every((v,i)=>Object.is(v,golden[i])) will be added when the CI job
          populates the golden.

      Cross-binding match (current reality): FFI sub-test 2 crosses the actual
      C-ABI boundary and asserts 0-ULP vs core golden. Sub-tests 3+4 Rust files
      are determinism preambles confirming sweep arithmetic is reproducible before
      interpreter/JS boundaries are involved. Same Rust core in all four; any
      divergence is a marshalling bug.

      Test files:
        - crates/semiflow-core/tests/binding_wentzell_parity.rs       (sub-test 1, CORE golden)
        - crates/semiflow-ffi/tests/binding_wentzell_parity_ffi.rs    (sub-test 2, FFI 0-ULP-vs-golden)
        - crates/semiflow-py/tests/binding_wentzell_parity_py.rs      (sub-test 3, PyO3 determinism preamble)
        - crates/semiflow-wasm/tests/binding_wentzell_parity_wasm.rs  (sub-test 4, WASM determinism preamble)
      Failure of ANY sub-test BLOCKS v8.3.0 release.

      Cross-refs: math.md §49 (NORMATIVE); ADR-0151 (Wentzell Cayley kernel);
      ADR-0153 (v8.3.0 TIER-3 binding surface); ADR-0028 Amendment 2 (per-crate-dup);
      ADR-0031 (PyO3 three-phase GIL); G_WENTZELL_ORDER + G_WENTZELL_STABLE (core gates).
    test_file: "crates/semiflow-core/tests/binding_wentzell_parity.rs, crates/semiflow-ffi/tests/binding_wentzell_parity_ffi.rs"
    feature_gate: "slow-tests"

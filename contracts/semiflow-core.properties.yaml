    gate: "1D half-line Robin slope ≤ -0.95 vs Carslaw-Jaeger 1959 §14.2 eq 5 closed-form oracle"
    purpose: |
      G_ROBIN_HALFLINE (math.md §3.5.tris.5, ADR-0098 Amendment 2):
      The stencil-level skew image wrapper `RobinHeatChernoff` MUST converge at
      order 1 (skew weight w ≠ 1 gives nonzero commutator [E_R, Δ]; Proposition
      25.1 Neumann order-preservation does NOT extend to Robin).

      Setup:
        - Domain: R = [0, 10] (truncation of [0, ∞)).
        - Operator: L = ∂_xx (1D heat).
        - Robin coefficients: (α, β) = (1.0, 1.0) mixed reference.
        - Initial datum: g(x) = exp(-x²) (Gaussian; compactly-supported decay).
        - Spatial grid: n_grid = 512 (raised from 64 in v6.2.3 so O(dx) skew-BC
            spatial floor stays subdominant to temporal Chernoff error).
        - Oracle: u(T, x) = ∫_0^∞ K^Robin(x, y; T) g(y) dy at T = 0.1
            where K^Robin = K(x,y,t) + K(x,-y,t) - (α/β)·exp((α/β)(x+y) + (α/β)²t)·erfc((x+y)/(2√t) + (α/β)√t)
            (Carslaw-Jaeger 1959 §14.2 eq 5; factor (α/β) not 2·(α/β) — ADR-0098 Amendment 1).
        - Sweep n ∈ {16, 32, 64, 128} Chernoff steps at fixed T = 0.1 (τ = T/n).

      Pass criterion:
        OLS slope of log‖F^n(g) - u_Robin(T, ·)‖_∞ vs log n MUST be ≤ -0.95.
        Measured slope (v6.2.3): −1.13. Threshold unchanged.

      Test file: tests/robin_heat_slope.rs::g_robin_halfline_slope (feature slow-tests).
    test_file: "tests/robin_heat_slope.rs"
    feature_gate: "slow-tests"


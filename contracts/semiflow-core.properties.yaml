    rationale: |
      G_GRAPH_FRECHET_FD (RELEASE_BLOCKING, ADR-0185 §54.5–§54.7): A2
      `graph_expmv_frechet` directional gradient ⟨∂J/∂w, δw⟩ vs central finite
      difference (J(w+εδw)−J(w−εδw))/(2ε) for seeded-random w, δw. REUSES the
      §43.6 oracle T_ADJOINT_STATE_SENSITIVITY (scripts/verify_adjoint_state_sensitivity.py),
      which is method-agnostic (finite-differences J(w±εδw)) — no new sympy

  # =========================================================================
  # v2.6 (ADR-0068): BoundaryPolicy widening (Dirichlet + Neumann) +
  #                  B3 Dirichlet via killing (KillingChernoff) gates.
  # Test files: tests/properties.rs                 (bc_index_dirichlet_neumann_totality)
  #             tests/killing_dirichlet_slope.rs    (G23 — new file, slow-tests)
  #             scripts/verify_killing_dirichlet.py (T18N — new sympy script)
  # =========================================================================

  - name: bc_index_dirichlet_neumann_totality
    cases: 1000
    purpose: |
      Verify the TOTAL invariant I1 (math.md §3.5 + §3.5.bis) extends to
      the v2.6 Dirichlet and Neumann variants: for all
      (BoundaryPolicy<F = f64>, n: usize >= 2, idx: i64),
      `bc_index(policy, n, idx)` returns a valid `BoundaryHit` and NEVER
      panics or returns Err. Specifically for the two new variants:
        - Dirichlet { value: c }: returns Inside(j as usize) for j ∈ [0, n),
          else BoundaryHit::Dirichlet(c). Downstream bc_value returns c.
        - Neumann: returns Inside(j as usize) for j ∈ [0, n), Inside(0)
          for j < 0, Inside(n-1) for j >= n. Downstream bc_value returns
          values[0] or values[n-1] (clamp-to-boundary).
      Extends the v0.2.1 property `bc_index_totality` (line 1275) to the
      6-variant enum. Also asserts I5 strict-interior agreement: for all
      6 policies and i ∈ [0, n), bc_index returns Inside(i).
    inputs:
      n: "(2usize..=1000)"
      idx: "any::<i64>().prop_filter('not::MIN', |i| *i != i64::MIN)"
      policy: |
        prop_oneof![
          Just(BoundaryPolicy::Reflect),
          Just(BoundaryPolicy::ZeroExtend),
          Just(BoundaryPolicy::Periodic),
          Just(BoundaryPolicy::LinearExtrapolate),
          (-1.0f64..=1.0f64).prop_map(|v| BoundaryPolicy::Dirichlet { value: v }),
          Just(BoundaryPolicy::Neumann),
        ]
      _value_for_dirichlet: bounded_coeff
    assertion: |
      let hit = bc_index(policy, n, idx);
      // Total: no panic, no Err — hit is a valid BoundaryHit. The match
      // below is exhaustive by enum-totality.
      match hit {
        BoundaryHit::Inside(i)       => prop_assert!(i < n),
        BoundaryHit::Zero            => prop_assert_eq!(policy, BoundaryPolicy::ZeroExtend),
        BoundaryHit::OutsideLeft(_)
        | BoundaryHit::OutsideRight(_) => {
          prop_assert_eq!(policy, BoundaryPolicy::LinearExtrapolate);
        }
        BoundaryHit::Dirichlet(v)    => {
          // Only Dirichlet policy out-of-range; v matches the policy's value.
          if let BoundaryPolicy::Dirichlet { value } = policy {
            prop_assert!((v - value).abs() < 1e-15);
          } else {
            prop_assert!(false, "Dirichlet hit from non-Dirichlet policy");
          }
        }
      }
    test_file: "tests/properties.rs"


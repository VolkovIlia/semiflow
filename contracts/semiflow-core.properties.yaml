    gate: "OLS slope(log(sup_err) vs log(n_steps)) <= -0.45"
    purpose: |
      Verifies that the active-free-boundary degradation is honest and bounded:
      scheme converges (slope < 0) and is not worse than order-½.
    test_file: "tests/obstacle_vi_slope.rs::g_obstacle_slope_american"
    feature_gate: "slow-tests"
    introduced_in: v6.3.0
    authority: ADR-0116

  - name: T_OBSTACLE_ADJOINT
    type: FD_CROSSCHECK
    severity: RELEASE_BLOCKING
    blocks_release: true
    pass_status: "PASS (rel_err=1.03e-12 <= 2.00e-4)"
    rationale: |
      T_OBSTACLE_ADJOINT (RELEASE_BLOCKING, math §44.5):
      Finite-difference cross-check of apply_active_set_adjoint_into.
      Inner: DriftReactionChernoff(b=0, c=-0.5) which implements apply_adjoint_into.
      Forward: K=4 steps with τ=0.01, storing pre-projection states w_fwd[k].
      Functional: J(V^K) = ½‖V^K - target‖².
      Backward: λ^K = V^K - target; λ^k = adjoint_step(τ, w_fwd[k], λ^{k+1}).
      Check: |⟨λ⁰, δ⟩ - FD| / |⟨λ⁰, δ⟩| ≤ 20·ε for ε=1e-5, δ=sin(πx).
      Measured relative error = 1.03e-12 ≪ 2.00e-4 threshold. PASS.
      This confirms first-order adjoint correctness (§44.5 envelope theorem).
    gate: "relative error |adj - FD| / |adj| <= 20 * eps at eps=1e-5"
    purpose: |
      Verifies that apply_active_set_adjoint_into is the correct discrete adjoint
      of the projected forward step (via the active-set linearization).
    test_file: "tests/obstacle_vi_slope.rs::t_obstacle_adjoint"
    feature_gate: "none"
    introduced_in: v6.3.0
    authority: ADR-0116


  # ---------------------------------------------------------------------------
  # v6.3.0 ObstacleChernoff / variational-inequality gates (ADR-0116, math §44)
  # ---------------------------------------------------------------------------

  - name: T_OBSTACLE_PROJECTION
    type: NORMATIVE_PREFLIGHT
    severity: RELEASE_BLOCKING
    blocks_release: true
    sub_checks: 6
    pass_status: "6/6 PASS (scripts/verify_obstacle_projection.py)"
    rationale: |
      sympy pre-flight oracle for math §44.2 (Theorem 44.1). Six sub-checks:
        (1) projection_identity: max(w,c) = w iff w>=c.
        (2) idempotence: max(max(w,c),c) = max(w,c).
        (3) nonexpansiveness: |max(w1,c)-max(w2,c)| <= |w1-w2|.
        (4) active_set_jacobian: d/dw max(w,c) = Heaviside(w-c) (strict: 0 at w=c).
        (5) stationary_membrane_closed_form: C¹ smooth-fit derivation of u*(x) for
            membrane obstacle g=A-B(x-1/2)², α=sqrt(1/4-A/B), s=B(1-2α).
        (6) complementarity: (Pi_g(w)-w)(Pi_g(w)-g) = 0 pointwise.
      Prints T_OBSTACLE_PROJECTION PASS.
    invocation: "python3 scripts/verify_obstacle_projection.py"
    introduced_in: v6.3.0
    authority: ADR-0116
    test_file: "scripts/verify_obstacle_projection.py"
    feature_gate: "none"

  - name: G_OBSTACLE_STATIONARY
    type: ANALYTIC_ORACLE
    severity: RELEASE_BLOCKING
    blocks_release: true
    threshold: 0.025
    measured_value: 0.0056
    pass_status: "PASS (sup_err=5.55e-3 <= 2.5e-2)"
    rationale: |
      G_OBSTACLE_STATIONARY (RELEASE_BLOCKING, math §44.6):
      Stationary membrane oracle. Inner L=∂_xx, Dirichlet u(0)=u(1)=0 (via
      KillingChernoff+BoxRegion), obstacle g(x)=0.1-1.0*(x-0.5)^2.
      Contact offset α=sqrt(0.25-0.1/1.0)≈0.3873. Closed-form u*:
        u*(x) = s*x          on [0,α]
        u*(x) = g(x)         on [α,1-α]
        u*(x) = s*(1-x)      on [1-α,1]
      where s=B*(1-2*α)≈0.2254.
      Evolved from V0=max(0,g) for T=50 with tau=1/2000.
      Sup-error on interior nodes: 5.55e-3 (O(dx)≈4e-3 near C¹ kinks).
      Tolerance 2.5e-2 gives 4x margin above the measured kink-error.
      Configuration: N=256, n_steps=100000, tau=5e-4.
    gate: "sup_err(V(T=50), u*) <= 2.5e-2  at N=256"
    purpose: |
      Verifies that ObstacleChernoff converges to the correct VI fixed point
      (the stationary membrane) from an initial condition above the obstacle.
    test_file: "tests/obstacle_vi_slope.rs::g_obstacle_stationary"
    feature_gate: "none"
    introduced_in: v6.3.0
    authority: ADR-0116

  - name: G_OBSTACLE_SLOPE_SMOOTH
    type: EMPIRICAL_SLOPE
    severity: RELEASE_BLOCKING
    blocks_release: true
    threshold: -0.95
    measured_value: -0.997
    pass_status: "PASS (slope=-0.997 <= -0.95)"
    rationale: |
      G_OBSTACLE_SLOPE_SMOOTH (RELEASE_BLOCKING, math §44.4):
      Self-convergence OLS slope of sup-error vs n_steps (Δτ halving).
      Obstacle g=-10 is inactive (projection = identity in practice) so the
      scheme reduces to pure inner DiffusionChernoff heat → order ≥ 1.
      Configuration: N=128, T=0.5, inner a=0.5, Gaussian IC.
      Sweep n_steps in {512, 1024, 2048} with reference at n_steps=4096.
      h0/dx diagnostic: ranges 2.8..5.6 across sweep (sub-grid entry is at
      h0/dx<1 for very fine τ; here h0>dx but temporal convergence dominates
      because the spatial grid N=128 is fixed and the obstacle is inactive).
      Measured slope = -0.997 ≤ -0.95. PASS.
    gate: "OLS slope(log(sup_err) vs log(n_steps)) <= -0.95"
    purpose: |
      Verifies order-1 temporal convergence of ObstacleChernoff when the
      obstacle is inactive (projection is identity). Upper ceiling for order.
    test_file: "tests/obstacle_vi_slope.rs::g_obstacle_slope_smooth"
    feature_gate: "slow-tests"
    introduced_in: v6.3.0
    authority: ADR-0116

  - name: G_OBSTACLE_SLOPE_AMERICAN
    type: EMPIRICAL_SLOPE
    severity: RELEASE_BLOCKING
    blocks_release: true
    threshold: -0.45
    measured_value: -0.825
    pass_status: "PASS (slope=-0.825 <= -0.45)"
    rationale: |
      G_OBSTACLE_SLOPE_AMERICAN (RELEASE_BLOCKING, math §44.4):
      Self-convergence OLS slope with an active free boundary.
      Obstacle: membrane g(x)=0.1-1.0*(x-0.5)^2; V0=max(0,g) so the contact
      set is initially large and the free boundary evolves.
      Configuration: N=128, T=0.5, inner DiffusionChernoff a=0.5 + KillingChernoff
      Dirichlet BCs.
      Expected O(√Δτ) degradation at the free boundary (Howison-Reisinger-Witte
      2013, §44.4); gate threshold -0.45 gives margin above the -0.5 asymptote.
      Measured slope = -0.825 ≤ -0.45. PASS (realized order better than floor due

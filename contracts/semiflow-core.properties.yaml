    failure_mode: |
      Per math.md §9.2.3.C "Global rate proof sketch", expected slope
      for variable a is ≈ -2 (true global O(τ²) — no FD ceiling).
      Gate ≤ -1.95 absorbs ~3% noise from finite-precision linear
      regression and finite-grid dx² floor.

      If slope is ≈ -1 (gate FAIL), the implementation has REGRESSED
      to FD on f. Check:
        (1) Stencil samples are GRID-RESIDENT (no `f.sample(x ± Δ)`
            calls). The K-fold loop should call `apply_div_stencil`
            on Vec<f64> buffers, NOT on `f.sample(x_off_grid)`.
        (2) `f.sample()` is used ONLY at the IP foot-point shift
            (when `with_drift_conjugation` is `Some`) AND at boundary
            indices i=0, i=n-1 for BoundaryPolicy dispatch — interior
            indices use direct `g_curr[i ± 1]` array access.
        (3) Per-step error is `O(dx²)` ⊕ `O(τ⁵)`; the τ⁵ residue is
            DOMINATED by dx² at production grids (math.md §9.2.3.C
            "Per-step error bound"). If dx is too coarse the slope
            saturates at the dx² floor — increase grid resolution
            (the recommended pseudocode uses dx=0.05 which may be
            too coarse; tighten to dx=0.025 if needed).

      If slope is ≈  0 (gate FAIL hard), generator mismatch:
        (a) Stencil computes `(f_{i+1} − 2 f_i + f_{i-1})/dx²` (heat
            stencil — would target `A f = a₀·∂²`, NOT the divergence-form
            `A_self = ∂(a·∂)`). Check that the stencil uses
            `a_{i+½}` and `a_{i-½}` separately — NOT a common factor.
        (b) The K-fold accumulator has wrong factorial weights — verify
            `FACT_INV = [1, 1, 0.5, 1/6, 1/24]` exactly.

      If slope is BETTER than -2.5 (gate would over-pass), investigate:
        - test-side artefact: oracle precision might be limiting; tighten
          quadrature tolerance to 1e-13 minimum.
        - Implementation may have unintentionally implemented the v0.6.0+
          `a'''` correction. Verify `TRUNC_ORDER == 4` (NOT 5+).

      Cross-reference: math.md §9.2.3.C (TruncatedExp formula), §9.2.2
      (Liouville transform, retained from ζ-A); ADR-0011 (v0.4.0
      TruncatedExp integrator); ADR-0008 Amendment 2 (the H1 ceiling that
      TruncatedExp is designed to break).

  - name: truncated_exp_strang_quasi_contractivity
    cases: 10000   # v0.4.0 — mirrors strang_split_quasi_contractivity (G4-strang) for TruncatedExp
    purpose: |
      Verify the bound `||Phi(tau) f||_inf <= (1 + |c|*tau + 20*tau^2) * ||f||_inf`
      derived in math.md §9.6 for
      `Phi = StrangSplit<TruncatedExpDiffusionChernoff, DriftReactionChernoff>`.
      Direct TruncatedExp analogue of `strang_split_quasi_contractivity`
      (G4-strang for ζ-A). The constant `C = 20` (math.md §9.6) is
      preserved — TruncatedExp's K=4 truncation overshoot is bounded by
      `(τ·‖G‖)^5 / 120 ≤ 1^5/120 < 0.01` per node (CFL τ·‖G‖ < 2 with
      ample margin), well within the 20·τ² budget.

      v0.4.0 (ADR-0011): mirrors ζ-A's G4-strang gate STRUCTURALLY.
      Both ζ-A and TruncatedExp must satisfy the same Strang composition
      growth bound — the two integrators differ in error rate but
      share the L^∞-stability profile (positive sub-Markov for ζ-A;
      CFL-bounded truncated heat semigroup for TruncatedExp, L^∞-stable
      under CFL).

      CFL constraint: `τ · a_norm_bound < dx² / 2`. Random `(a, τ)`
      pairs MAY violate this (proptest's `positive_diffusion` allows
      a ≤ 5; `small_tau` allows τ ≤ 0.1; combined exceeds CFL on
      the standard grid). QA Engineer harness MUST reject (NOT fail)
      CFL-violating cases via `TestCaseError::reject` — they are
      exercised separately by `truncated_exp_cfl_violation_returns_error`.
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      // CFL gate (skip CFL violations — separate property covers them):
      let dx = f.grid.dx();
      let cfl_safe = tau * a < 0.5 * dx * dx;
      if !cfl_safe {
          return Err(proptest::test_runner::TestCaseError::reject("CFL violation"));
      }

      // v0.4.0 (ADR-0011): pass `|_| 0.0_f64` for both a_prime and
      // a_double_prime (constant a ⇒ a' ≡ a'' ≡ 0).
      let m = TruncatedExpDiffusionChernoff::new(
          |_| a, |_| 0.0_f64, |_| 0.0_f64, a, f.grid.clone()
      );
      let r = DriftReactionChernoff::new(|_| b, |_| c, c.abs());
      let phi = StrangSplit::new(m, r);
      let result = phi.apply(tau, &f).unwrap();
      let lhs = result.norm_sup();
      let rhs = (1.0 + c.abs() * tau + 20.0 * tau * tau) * f.norm_sup();
      assert!(lhs <= rhs,
              "G4-strang (TruncatedExp): lhs = {}, rhs = {}, tau = {}, c = {}, a = {}",
              lhs, rhs, tau, c, a);
    failure_mode: |
      If violated, check:
        (1) TruncatedExpDiffusionChernoff truncated power series weights sum
            CORRECTLY — at constant a, M(τ) approximates exp(τ·a₀·∂²),
            which is sub-Markov on the grid (positive heat kernel
            integrated against unit-mass test function).
        (2) K=4 truncation residue O(τ⁵) is ≤ 0.01·(τ²) for τ ≤ 0.1
            — at τ=0.1, residue ≤ 0.1⁵/120 = 8.3e-8, bounded by 0.01·0.01
            = 1e-4 (the 20·τ² budget). 6 orders of margin.
        (3) DriftReactionChernoff exp(τ·c) is computed via libm::exp
            (unchanged from ζ-A path).
        (4) Buffer-swap discipline in the K-fold loop — failing to swap
            recomputes G⁰f every iteration, giving M(τ) = (K+1)·f
            which violates contractivity.
        (5) StrangSplit::apply preserves the order
            `M(τ/2) ∘ R(τ) ∘ M(τ/2)` — symmetric in M.

      Cross-reference: math.md §9.6 (G4-strang quasi-contractivity
      derivation), §9.2.3.C (TruncatedExp L^∞-stability under CFL).

  - name: truncated_exp_cfl_violation_returns_error
    cases: 100    # v0.4.0 (ADR-0011) — CFL gate boundary check
    purpose: |
      Verify invariant I4 (traits.yaml TruncatedExpDiffusionChernoff): the
      first action of `TruncatedExpDiffusionChernoff::apply` is the CFL
      check; `Err(SemiflowError::CflViolated{tau, dx_squared,
      a_norm_bound})` is returned BEFORE any allocation when

        2 · tau · a_norm_bound  >=  dx²

      and `Ok(_)` otherwise (pre-checks for tau/a_norm_bound finiteness
      take precedence; those return DomainViolation).

      The property tests TWO regimes:
        (A) STRICT INSIDE the CFL boundary (2·τ·a_norm < dx²·0.99) →
            apply MUST return `Ok(_)`.
        (B) STRICT OUTSIDE the CFL boundary (2·τ·a_norm > dx²·1.01) →
            apply MUST return `Err(CflViolated{..})` with the
            payload triple matching the input arguments.

      Boundary exactness (= dx²·(1.0)) is NOT tested due to f64
      rounding; the 1% guard band is the empirical safe zone.

      Direct realisation of invariant I4 + the CflViolated variant
      (errors.yaml v0.4.0). Property additionally checks:
        - `Err::CflViolated.tau` equals the input `tau`;
        - `Err::CflViolated.dx_squared` equals `dx²` exactly;
        - `Err::CflViolated.a_norm_bound` equals the input
          `a_norm_bound`.
    inputs:
      a_norm: "(0.01f64..=10.0f64)"        # arbitrary positive bound
      regime: "any::<bool>()"               # true → safe regime, false → violated regime
      f: gaussian_state                     # standard grid (dx ≈ 0.02)
    invariant: |
      let dx = f.grid.dx();
      let dx_squared = dx * dx;
      let tau_critical = 0.5 * dx_squared / a_norm;   // CFL boundary

      // Pick tau on either side of the boundary (1% guard):
      let tau = if regime {
          // Strict inside: 99% of CFL boundary
          0.99 * tau_critical
      } else {
          // Strict outside: 101% of CFL boundary
          1.01 * tau_critical
      };

      // Constant a closure with the chosen norm:
      let m = TruncatedExpDiffusionChernoff::new(
          |_| a_norm, |_| 0.0_f64, |_| 0.0_f64, a_norm, f.grid.clone()
      );

      let result = m.apply(tau, &f);

      if regime {
          // Inside CFL: must succeed
          assert!(result.is_ok(),
                  "TruncatedExp apply failed at 99% CFL margin: a_norm={}, tau={}, dx²={}, err={:?}",
                  a_norm, tau, dx_squared, result);
      } else {
          // Outside CFL: must return CflViolated with matching payload
          match result {
              Err(SemiflowError::CflViolated {
                  tau: t_ret, dx_squared: dx2_ret, a_norm_bound: a_ret,
              }) => {
                  // Exact match required (no rounding drift expected
                  // — these are stored verbatim from the inputs):
                  assert!((t_ret - tau).abs() < 1e-15,
                          "CflViolated.tau mismatch: input={}, returned={}", tau, t_ret);
                  assert!((dx2_ret - dx_squared).abs() < 1e-15 * dx_squared,
                          "CflViolated.dx_squared mismatch: input={}, returned={}",
                          dx_squared, dx2_ret);
                  assert!((a_ret - a_norm).abs() < 1e-15,
                          "CflViolated.a_norm_bound mismatch: input={}, returned={}",
                          a_norm, a_ret);
              }
              Ok(_) => panic!("TruncatedExp apply returned Ok at 101% CFL: a_norm={}, tau={}", a_norm, tau),
              Err(other) => panic!("TruncatedExp apply returned wrong error at 101% CFL: a_norm={}, tau={}, err={:?}",
                                    a_norm, tau, other),
          }
      }
    failure_mode: |
      If apply returns `Ok(_)` in regime `false` (101% of CFL):
        (1) CFL check is missing or has wrong inequality direction
            (e.g., `<=` instead of `>=`).
        (2) The check is gated AFTER the working-buffer alloc — caller
            sees a panic OR a meaningless result instead of the
            documented signal.
        (3) The check uses `dx²/2` directly instead of comparing
            `2·τ·‖a‖_∞` to `dx²` (algebraic equivalent, but f64
            rounding may differ; documented form is
            `2.0 * tau * self.a_norm_bound >= dx_squared`).

      If apply returns `Err::CflViolated` in regime `true` (99% of CFL):
        (a) The check has wrong inequality direction; CFL is too strict.
        (b) `tau_critical` computation in the test wrong — verify
            `0.5 * dx² / a_norm` matches the documented bound.

      If apply returns `Err::DomainViolation`:
        (i) `a_norm` may have been set to NaN/Inf or ≤ 0 — proptest
            generator should clamp to (0.01, 10.0), check.
        (ii) `tau` may be NaN/Inf — same input-validation issue.

      If `CflViolated` payload differs from input:
        - The variant is constructed with WRONG fields; check that the
          struct literal in apply uses `tau`, `dx_squared` (not just
          `dx`!), and `self.a_norm_bound` in that order.

      Cross-reference: traits.yaml TruncatedExpDiffusionChernoff §I4 (CFL
      early-return invariant), errors.yaml CflViolated variant (v0.4.0
      semantics + when-clause), math.md §9.2.3.C "CFL stability".

# ---------------------------------------------------------------------------
# v0.5.0 properties (ADR-0012, tensor-product 2D extension).
# Location: crates/semiflow-core/tests/tensor_properties.rs (new file).
# These properties verify the Phase 1 contracts in
# `contracts/semiflow-core.tensor.yaml` and the Theorem 7 / Lemma 10.2
# normative claims in `contracts/semiflow-core.math.md` §10.
# ---------------------------------------------------------------------------

  - name: grid_fn_2d_axpy_separability
    cases: 1000
    purpose: |
      For tensor-product input `f(i, j) = g(i) · h(j)` (separable in
      the row-major linear-index sense, I-T1), `GridFn2D::axpy` is
      LINEAR — i.e. preserves the tensor-product structure under
      scalar combination. Specifically: with `f1 = from_separable(g, h)`
      and `f2 = from_separable(g, h)` (same separable factors),
      `f1.axpy(α, &f2)` gives `(1 + α) · g(i) · h(j)`, which equals
      `from_separable((1 + α)·g, h)` (or `from_separable(g, (1 + α)·h)`)
      pointwise modulo IEEE rearrangement.

      Direct realisation of invariant I-T1 (row-major linear index
      consistency: `idx(i, j) = j*nx + i`) and I-T3 (storage length
      `values.len() == nx*ny`). If `axpy` were silently striding
      wrong (e.g. `i*ny + j` column-major instead of `j*nx + i`
      row-major), the tensor structure would be SCRAMBLED — this
      property catches that scrambling immediately.

      A fundamental sanity check before any 2D Chernoff QA is meaningful.
    inputs:
      g_amp: "(0.5f64..=2.0f64)"
      g_mu:  "(-2.0f64..=2.0f64)"
      h_amp: "(0.5f64..=2.0f64)"
      h_mu:  "(-2.0f64..=2.0f64)"
      alpha: bounded_coeff
      nx:    "(8usize..=64usize)"
      ny:    "(8usize..=64usize)"
    invariant: |
      // Construct independent X and Y grids with default Reflect BC.
      let gx = Grid1D::new(-5.0, 5.0, nx).unwrap();
      let gy = Grid1D::new(-5.0, 5.0, ny).unwrap();
      let grid2d = Grid2D::new(gx, gy);

      let g = move |x: f64| g_amp * (-((x - g_mu).powi(2))).exp();
      let h = move |y: f64| h_amp * (-((y - h_mu).powi(2))).exp();

      let mut f1 = GridFn2D::from_separable(grid2d.clone(), g, h);
      let f2    = GridFn2D::from_separable(grid2d.clone(), g, h);

      // axpy: f1 <- f1 + alpha * f2 = (1 + alpha) * g(x) * h(y)
      f1.axpy(alpha, &f2);

      // Expected: from_separable((1 + alpha)·g, h) — equivalent.
      let scale = 1.0 + alpha;
      let expected = GridFn2D::from_separable(
          grid2d.clone(),
          move |x: f64| scale * g(x),
          h,
      );

      // Sup-norm difference must be at most a few ULPs per node.
      let mut diff = f1.clone();
      diff.axpy(-1.0, &expected);

      // Tolerance: 16 ULP relative to the largest expected magnitude,
      // multiplied by sqrt(nx*ny) for accumulation across cells.
      let tol = 16.0 * f64::EPSILON * (1.0 + expected.norm_sup())
              * ((nx * ny) as f64).sqrt();
      assert!(diff.norm_sup() <= tol,
              "axpy scrambled tensor structure: diff = {}, tol = {}, nx = {}, ny = {}",
              diff.norm_sup(), tol, nx, ny);
    failure_mode: |
      If violated, check:
        (1) `Grid2D::idx(i, j)` returns `j * self.x.n + i` (row-major,
            I-T1) — NOT `i * self.y.n + j` (column-major).
        (2) `GridFn2D::axpy` iterates the FLAT `Vec<f64>` in any order
            (no grid-aware striding) — `for k in 0..len { values[k] += a*x.values[k] }`.
        (3) `from_separable(g, h)` fills `values[idx(i,j)] = g(x_i) * h(y_j)`
            — NOT `g(y_j) * h(x_i)` (axes swapped).
      Cross-reference: tensor.yaml I-T1, I-T3; math.md §10.1.

  - name: axis_lift_1d_consistency
    cases: 200
    purpose: |
      **Reduction lemma (math.md §10.4, Lemma 10.2).** For
      `f(x, y) = g(x)` (Y-independent, i.e. `f.values[idx(i, j)] = g(x_i)`
      for every `j`), `AxisLift::<C, Axis::X>::apply(τ, &f)` row-equals
      `C.apply(τ, &row_j)` for every fixed `j`, and
      `AxisLift::<C, Axis::Y>::apply(τ, &f)` is identity within FP
      rounding (the Y-pass on Y-independent input).

      Direct realisation of invariant I-T4 (axis-lift 1D consistency).

      v0.5.0 (ADR-0012): this is THE strongest test oracle for the
      Phase 2 implementation. It captures simultaneously:
        (i)   row-major index correctness (I-T1) — wrong stride breaks it;
        (ii)  AxisLift::apply per-row dispatch correctness — wrong axis
              dispatch (X vs Y swap) breaks it;
        (iii) 1D `apply` reuse without state corruption — leaking buffer
              state across rows breaks it.

      C is fixed to `DiffusionChernoff` (ζ-A path, ADR-0008) for this
      property — both axes use constant `a = 0.5` matching G1/G2/G3-strang
      (so `a' = 0`, `a'' = 0`, sympy gate Z_const-a applies).
    inputs:
      g_amp: "(0.5f64..=2.0f64)"
      g_mu:  "(-2.0f64..=2.0f64)"
      g_sig: "(0.3f64..=1.5f64)"
      tau:   small_tau
      nx:    "(16usize..=64usize)"
      ny:    "(16usize..=64usize)"
    invariant: |
      let gx = Grid1D::new(-10.0, 10.0, nx).unwrap();
      let gy = Grid1D::new(-10.0, 10.0, ny).unwrap();
      let grid2d = Grid2D::new(gx.clone(), gy.clone());

      let g_sig_sq = g_sig * g_sig;
      let g = move |x: f64| g_amp * (-((x - g_mu).powi(2)) / (2.0 * g_sig_sq)).exp();

      // Y-independent input: f(x, y) = g(x), constant in y.
      let f2d = GridFn2D::from_separable(grid2d.clone(), g, |_| 1.0);

      // 1D analogue: just g on grid.x.
      let f1d = GridFn1D::from_fn(gx.clone(), g);

      // Constant-a (ζ-A fast path): a=0.5, a'=0, a''=0. (G1/G2 setup.)
      let cx = DiffusionChernoff::new(|_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gx.clone());
      let cy = DiffusionChernoff::new(|_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gy.clone());

      // X-pass on 2D: must row-equal cx.apply(τ, .) on every row.
      let lift_x = AxisLift::new(cx, Axis::X);
      let evolved_2d = lift_x.apply(tau, &f2d).unwrap();
      let evolved_1d = cx.apply(tau, &f1d).unwrap();

      // I-T4 (X side): every row of `evolved_2d` equals `evolved_1d`.
      // Tolerance: 16 ULP / node (per I-T4).
      let tol_per_node = 16.0 * f64::EPSILON * (1.0 + evolved_1d.norm_sup());
      for j in 0..ny {
          let row_j = evolved_2d.row(j);
          for i in 0..nx {
              let diff = (row_j.values[i] - evolved_1d.values[i]).abs();
              assert!(diff <= tol_per_node,
                      "X-lift breaks row consistency at (i={}, j={}): diff = {}, tol = {}",
                      i, j, diff, tol_per_node);
          }
      }

      // Y-pass on Y-independent input: must be identity within FP.
      let lift_y = AxisLift::new(cy, Axis::Y);
      let y_evolved = lift_y.apply(tau, &f2d).unwrap();

      // I-T4 (Y side, Lemma 10.2): y-pass on Y-independent input is
      // identity modulo IEEE rearrangement ≤ 16 ULP / node.
      let mut diff_y = y_evolved.clone();
      diff_y.axpy(-1.0, &f2d);
      let tol_y = 16.0 * f64::EPSILON * (1.0 + f2d.norm_sup());
      assert!(diff_y.norm_sup() <= tol_y,
              "Y-lift on Y-independent input is not identity: diff = {}, tol = {}",
              diff_y.norm_sup(), tol_y);
    failure_mode: |
      If the X-pass row-consistency assertion fails:
        (1) `AxisLift::<_, Axis::X>::apply` is dispatching on the wrong
            axis — verify `match self.axis { Axis::X => row_loop, Axis::Y => col_loop }`.
        (2) `GridFn2D::row(j)` is reading the wrong stride — should be
            `self.values[j*nx..(j+1)*nx]` (contiguous slice for x = fast axis).
        (3) `GridFn2D::write_row(j, src)` is writing the wrong stride
            (mirror of (2)).
        (4) The 1D `cx.apply` is leaking state across rows — Phase 2
            implementation may share buffers; ensure each row gets a
            fresh evolved `GridFn1D`.

      If the Y-pass identity assertion fails:
        (1) `AxisLift::<_, Axis::Y>::apply` dispatched to X-loop instead.
        (2) `GridFn2D::col(i)` is reading the wrong stride — should be
            `gather i, i+nx, i+2*nx, ...` (strided gather, NOT contiguous).
        (3) `cy.apply(τ, &col)` on a constant column should return an
            (almost) constant column — if it doesn't, the 1D `apply`
            has a bug on constant inputs (regression of `chernoff_idempotence_at_t0`-like).

      Cross-reference: tensor.yaml I-T4, math.md §10.4 Lemma 10.2.

  - name: strang2d_separable_order_2
    cases: 50    # deterministic-ish slope test; small case count
    purpose: |
      Theorem 7 (math.md §10.3, ADR-0012): for separable
      `L = L_x ⊗ I + I ⊗ L_y` with both 1D inners `X` and `Y` of
      order ≥ 2, the iterated `Strang2D` approximant has global
      sup-norm error `O(τ²)` for tensor-product Gaussian initial
      data with constant coefficients on each axis.

      Concretely, with `X = Y = DiffusionChernoff` (ζ-A) at constant
      `a = 0.5` per axis (G1/G2/G3-strang setup), and tensor-product
      Gaussian initial data `f₀(x, y) = exp(-(x² + y²))`, the exact
      solution is the 2D heat kernel (math.md §10.5(a), eq. 10.7):

        u(t, x, y) = (1 + 2t)⁻¹ · exp(-(x² + y²)/(1 + 2t)).

      Slope test: log-log regression of
      `‖(Strang2D(t/n))^n f₀ - u(t, ·, ·)‖_∞`  vs `n` over
      `n ∈ {32, 64, 128, 256, 512}` MUST give slope ≤ -1.95.

      v0.5.0 (ADR-0012): this is the **G3-strang-2D acceptance gate**
      — empirical confirmation of Theorem 7 on the canonical 2D heat
      oracle. Failure of this property BLOCKS v0.5.0 release (the
      entire reason for v0.5.0 is that it must deliver order-2 in 2D).
    inputs:
      seed: "(0u64..=1000u64)"   # tiny variation for proptest case shrinking
    invariant: |
      // Frozen 2D grid matching G3-strang spatial resolution per axis.
      // (Smaller than 1D's N=100000 because 2D oracle has separable
      // structure: per-axis spatial floor amortises across the product.)
      let gx = Grid1D::new(-10.0, 10.0, 8000).unwrap();
      let gy = Grid1D::new(-10.0, 10.0, 8000).unwrap();
      let grid2d = Grid2D::new(gx.clone(), gy.clone());

      // Initial data: f₀(x, y) = exp(-(x² + y²)).
      let f0 = GridFn2D::from_separable(
          grid2d.clone(),
          |x: f64| (-(x*x)).exp(),
          |y: f64| (-(y*y)).exp(),
      );

      // Constant a = 0.5, b = c = 0 per axis (heat operator on each axis).
      // L = 0.5·∂² + 0.5·∂² (separable; total 2D heat).
      // (Drift-reaction is identity since b = c = 0; Strang2D uses
      // pure DiffusionChernoff per axis — no DriftReactionChernoff
      // needed for the heat oracle.)
      let cx = DiffusionChernoff::new(|_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gx.clone());
      let cy = DiffusionChernoff::new(|_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gy.clone());
      let phi2d = Strang2D::new(cx, cy);

      let t = 1.0_f64;
      let ns = [32usize, 64, 128, 256, 512];
      let mut log_n = vec![];
      let mut log_err = vec![];

      for &n in &ns {
          let semigroup = ChernoffSemigroup::new(phi2d, n).unwrap();
          let result = semigroup.evolve(t, &f0).unwrap();

          // Exact 2D heat kernel at t = 1.
          let denom = 1.0 + 2.0 * t;
          let exact = GridFn2D::from_fn(grid2d.clone(),
              |x: f64, y: f64| (1.0 / denom) * (-((x*x + y*y)/denom)).exp());

          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          let err = diff.norm_sup();
          log_n.push((n as f64).ln());
          log_err.push(err.ln());
      }

      // Linear regression slope of log_err vs log_n.
      let m = log_n.len() as f64;
      let mean_x = log_n.iter().sum::<f64>() / m;
      let mean_y = log_err.iter().sum::<f64>() / m;
      let num: f64 = log_n.iter().zip(log_err.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_n.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      assert!(slope <= -1.95,
              "Strang2D slope = {} exceeds gate -1.95 (Theorem 7 violation). errs = {:?}",
              slope, log_err.iter().map(|l| l.exp()).collect::<Vec<_>>());
    failure_mode: |
      If slope is too shallow (e.g. -1.0 to -1.5):
        (1) Order-2 cancellation broken — verify `Strang2D::apply`
            uses palindromic order `X(τ/2) ∘ Y(τ) ∘ X(τ/2)` (NOT
            `X(τ) ∘ Y(τ)` or `X(τ/2) ∘ Y(τ/2)`).
        (2) `axis_lift_1d_consistency` MUST pass first — if it doesn't,
            the X-lift or Y-lift has a stride bug and slope is meaningless.
        (3) Spatial floor active at high n — increase per-axis
            `n_spatial` from 8000 to 16000 (the 2D oracle has
            separable structure, so 1D's N=100000 is overkill;
            8000 per axis = 64M cells total, fits in memory but
            iteration cost ~64x 1D).

      If slope is "-2.5+" (TOO good):
        - Likely a bug where the test actually compares against
          something cheap (e.g. comparing `Strang2D` output to itself
          or to a wrong oracle). VERIFY the closed-form `(1 + 2t)⁻¹·exp(-(x²+y²)/(1+2t))`
          formula matches eq. (10.7) literally.

      If `evolve` returns `Err::CflViolated`:
        - Heat operator with constant a = 0.5 + TruncatedExp is NOT used here
          (this property uses ζ-A). If you swap to TruncatedExp per axis for
          a separate property, ensure `tau · a < 0.5 · dx²` per axis.

      Cross-reference: math.md §10.3 (Theorem 7), §10.5(a) (eq. 10.7
      heat oracle), tensor.yaml `Strang2D::apply` semantics.

# ---------------------------------------------------------------------------
# v0.6.0 properties — 4th-order spatial + Adaptive PI (ADR-0013, ADR-0014).
# Location: crates/semiflow-core/tests/diffusion4_properties.rs,
#           crates/semiflow-core/tests/magnus4_properties.rs,
#           crates/semiflow-core/tests/adaptive_properties.rs (new files).
# These properties verify the v0.6.0 contracts in math.md §9.2.4,
# §9.2.5, §11 + sympy gates verify_v0_6_0_zeta4.py, verify_v0_6_0_magnus4.py.
# ---------------------------------------------------------------------------

  - name: G1_4
    cases: 1   # deterministic single-case acceptance test
    purpose: |
      v0.6.0 G1⁴ acceptance gate (ADR-0013): 1D heat-kernel oracle
      with 4th-order spatial discretisation. Mirrors v0.1.0 G1
      structure but uses `Diffusion4thChernoff` (order = 4 reported)
      with constant `a = 0.5`, `n = 200`, `N = 2000` time steps,
      target sup-norm error ≤ 1e-7 (relaxed from v0.1.0's G1
      `1e-9` to accommodate Strang-composition O(τ²) limit at finite
      n; the spatial-4th-order improvement is observable at fixed n
      via the dx⁴ floor — see G3_4).
    inputs: {}
    invariant: |
      // Exact heat oracle (v0.1.0): u(t, x) = (1+2t)^{-1/2}·exp(-x²/(1+2t))
      let grid = Grid1D::new(-10.0, 10.0, 200).unwrap();
      let f0 = GridFn1D::from_fn(grid.clone(), |x| (-x*x).exp());

      let d4 = Diffusion4thChernoff::new(
          |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, grid.clone()
      );
      let semigroup = ChernoffSemigroup::new(d4, 2000).unwrap();
      let result = semigroup.evolve(1.0, &f0).unwrap();

      // Exact at t=1: u(1, x) = (1/3)·exp(-x²/3)
      let exact = GridFn1D::from_fn(grid.clone(), |x| (1.0/3.0)*(-x*x/3.0).exp());

      let mut diff = result.clone();
      diff.axpy(-1.0, &exact);
      let err = diff.norm_sup();

      assert!(err <= 1e-7,
              "G1⁴ heat-kernel sup-norm error = {} (gate 1e-7)", err);
    failure_mode: |
      If err > 1e-7:
        (1) γ-A K-factor BIT-EQUAL regression broken — verify Z⁴_const-a
            sympy gate passes (constant `a` ⇒ correction polynomial
            zero ⇒ K-factor identical to v0.5.0).
        (2) Z⁴_τ⁰/Z⁴_τ¹ broken — sympy `verify_v0_6_0_zeta4.py` would
            catch this; check it returns exit 0.

  - name: G2_4
    cases: 1   # deterministic, slow-tests feature-gated
    purpose: |
      v0.6.0 G2⁴ acceptance gate (slow-tests, ADR-0013): 1D
      heat-kernel oracle at higher resolution. `Diffusion4thChernoff`
      with constant `a = 0.5`, `n = 400`, `N = 4000`, target sup-norm
      ≤ 1e-9. Demonstrates the dx⁴ floor improvement at fixed n —
      v0.5.0 G2 hit floor ~1e-7 at this resolution; G2⁴ should reach
      1e-9 by 4-orders-of-magnitude floor reduction.
    inputs: {}
    invariant: |
      // SAME as G1_4 but n = 400, N = 4000.
      let grid = Grid1D::new(-10.0, 10.0, 400).unwrap();
      let f0 = GridFn1D::from_fn(grid.clone(), |x| (-x*x).exp());

      let d4 = Diffusion4thChernoff::new(
          |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, grid.clone()
      );
      let semigroup = ChernoffSemigroup::new(d4, 4000).unwrap();
      let result = semigroup.evolve(1.0, &f0).unwrap();
      let exact = GridFn1D::from_fn(grid.clone(), |x| (1.0/3.0)*(-x*x/3.0).exp());

      let mut diff = result.clone();
      diff.axpy(-1.0, &exact);
      let err = diff.norm_sup();
      assert!(err <= 1e-9, "G2⁴ heat-kernel sup-norm error = {} (gate 1e-9)", err);

  - name: G3_4
    cases: 1   # deterministic spatial dx-sweep slope test
    purpose: |
      v0.6.0 G3⁴ acceptance gate (ADR-0013): **spatial dx-sweep at fixed
      large n**. OLS slope of log(err) vs log(dx) ≤ -3.85 over
      `N ∈ {200, 400, 800, 1600, 3200}` spatial nodes, with constant
      a = 0.5, n_fixed = 4000 time steps, T = 1.0, domain [-15, 15].
      Sweeping N at fixed n drives dx → 0 while holding temporal error
      constant, isolating the spatial dx⁴ asymptotic regime — slope ≈ -4
      expected, gate at -3.85 absorbs pre-asymptotic leakage at coarse N.
      Failure of this property does NOT block release IF G3⁴-2D passes
      (the 2D gate is the headline; 1D is sanity). The 4th-order spatial
      accuracy is delivered jointly by (a) Fourier-symbol ξ⁴-matched
      K-kernel weights and (b) cubic-Hermite interpolation in
      f.sample(off-grid) (ADR-0005). Empirical slope: -3.93 (Phase 1
      measurement). See math.md §9.2.4 mechanism clarification.
    inputs: {}
    invariant: |
      // Spatial dx-sweep: vary N at fixed n_fixed=4000 to isolate dx⁴.
      // Domain [-15, 15] (wider than v0.5.0 G3 to avoid boundary
      // contamination at large N).
      let n_fixed = 4000usize;
      let t = 1.0_f64;
      let ns_spatial = [200usize, 400, 800, 1600, 3200];
      let mut log_dx = vec![];
      let mut log_err = vec![];

      for &cap_n in &ns_spatial {
          let grid = Grid1D::new(-15.0, 15.0, cap_n).unwrap();
          let dx = 30.0 / cap_n as f64;
          let f0 = GridFn1D::from_fn(grid.clone(), |x| (-x*x).exp());
          let exact = GridFn1D::from_fn(grid.clone(),
                           |x| (1.0/3.0)*(-x*x/3.0).exp());
          let d4 = Diffusion4thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, grid.clone()
          );
          let semigroup = ChernoffSemigroup::new(d4, n_fixed).unwrap();
          let result = semigroup.evolve(t, &f0).unwrap();
          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          log_dx.push(dx.ln());
          log_err.push(diff.norm_sup().ln());
      }

      // OLS slope of log(err) vs log(dx).
      let m = log_dx.len() as f64;
      let mean_x = log_dx.iter().sum::<f64>() / m;
      let mean_y = log_err.iter().sum::<f64>() / m;
      let num: f64 = log_dx.iter().zip(log_err.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_dx.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      assert!(slope <= -3.85,
              "G3⁴ spatial dx-sweep slope = {} exceeds gate -3.85 \
               (4th-order spatial floor not active; check cubic-Hermite \
               interpolation and Fornberg FD in Diffusion4thChernoff)",
              slope);

  - name: G3_4_2D
    cases: 1   # deterministic spatial dx-sweep slope test, slow-tests feature-gated
    slow_tests: true
    purpose: |
      **v0.6.0 G3⁴-2D acceptance gate (ADR-0013, FLAGSHIP)**: **spatial
      dx-sweep at fixed large n**. OLS slope of log(err) vs log(dx) ≤ -3.85
      over `N ∈ {400, 800, 1600}` spatial nodes per axis, with n_fixed=2000
      time steps, T=0.5, domain [-15, 15]² (4M total cells at N=1600 per
      axis). Sweeping N at fixed n drives dx → 0 in both axes simultaneously,
      isolating the spatial dx⁴ asymptotic regime.
      With both inner `Diffusion4thChernoff` reporting `order() = 4` and the
      v0.6.0 `Strang2D::order()` cap lift `min(2)` → `min(4)`, the global
      Strang2D order is 4 and the spatial floor is dx⁴ per axis (constant a
      per axis ⇒ G⁴ collapses to the standard 4th-order Laplacian — see
      math.md §9.2.5). **Failure of this property BLOCKS v0.6.0 release.**
      The 4th-order spatial accuracy is delivered jointly by (a) Fourier-
      symbol ξ⁴-matched K-kernel weights and (b) cubic-Hermite interpolation
      in f.sample(off-grid) (ADR-0005). Empirical slope: -3.99 (Phase 4
      measurement, ratios {7.27, 34.73}; 34.73 > 16 = 2⁴ confirms asymptotic
      dx⁴ regime at N=1600). See math.md §9.2.4 mechanism clarification.
    inputs: {}
    invariant: |
      // Spatial dx-sweep: vary N per axis at fixed n_fixed=2000, T=0.5.
      // Domain [-15, 15]² (wider than v0.5.0 G3-2D to avoid boundary
      // contamination). Run with rayon parallel kernel (slow-tests flag).
      let n_fixed = 2000usize;
      let t = 0.5_f64;
      let ns_spatial = [400usize, 800, 1600];
      let mut log_dx = vec![];
      let mut log_err = vec![];

      for &cap_n in &ns_spatial {
          let dx = 30.0 / cap_n as f64;
          let gx = Grid1D::new(-15.0, 15.0, cap_n).unwrap();
          let gy = Grid1D::new(-15.0, 15.0, cap_n).unwrap();
          let grid2d = Grid2D::new(gx.clone(), gy.clone());

          let f0 = GridFn2D::from_separable(
              grid2d.clone(),
              |x: f64| (-(x*x)).exp(),
              |y: f64| (-(y*y)).exp(),
          );

          // Constant a = 0.5 per axis with Diffusion4thChernoff (order = 4).
          let cx = Diffusion4thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gx.clone()
          );
          let cy = Diffusion4thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gy.clone()
          );
          let phi2d = Strang2D::new(cx, cy);
          assert_eq!(phi2d.order(), 4, "Strang2D::order() cap lift broken");

          let semigroup = ChernoffSemigroup::new(phi2d, n_fixed).unwrap();
          let result = semigroup.evolve(t, &f0).unwrap();
          let denom = 1.0 + 2.0 * t;
          let exact = GridFn2D::from_fn(grid2d.clone(),
                           |x, y| (1.0 / denom) * (-((x*x + y*y)/denom)).exp());
          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          log_dx.push(dx.ln());
          log_err.push(diff.norm_sup().ln());
      }

      // OLS slope of log(err) vs log(dx).
      let m = log_dx.len() as f64;
      let mean_x = log_dx.iter().sum::<f64>() / m;
      let mean_y = log_err.iter().sum::<f64>() / m;
      let num: f64 = log_dx.iter().zip(log_err.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_dx.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      assert!(slope <= -3.85,
              "G3⁴-2D spatial dx-sweep slope = {} exceeds gate -3.85 \
               (FLAGSHIP — release blocked; check cubic-Hermite interpolation \
               and Fornberg FD in Diffusion4thChernoff)",
              slope);
    failure_mode: |
      If slope ∈ [-3.5, -3.84]:
        - Pre-asymptotic at smallest N; the 34.73 ratio at N=1600 confirms
          asymptote is reached at N=1600 in Phase 4 measurement.
        - Increase n_fixed from 2000 to 4000 if temporal error contaminates.
        - Or increase N_max from 1600 to 3200 to push deeper into asymptote.

      If slope ∈ [-2.5, -3.49]:
        - Strang2D::order() cap NOT lifted — verify edit at strang2d.rs:108
          changed `min(2)` to `min(4)`.
        - Diffusion4thChernoff::order() does NOT return 4 — verify
          traits.yaml entry says `order = 4`.
        - Or n-sweep confusion: ensure test sweeps N (spatial), not n (time).

      If slope > -2.0:
        - Inner Diffusion4thChernoff is bit-equal to v0.5.0
          DiffusionChernoff (no spatial 4th-order improvement) —
          verify the τ²-correction's 7-point Fornberg FD is being
          computed correctly. Check Z⁴_spatial-order sympy gate.

  - name: temporal_convergence_2d_4th
    cases: 1   # deterministic n-sweep; documents temporal order, NOT spatial
    purpose: |
      Companion to G3_4_2D: documents that temporal Chernoff convergence
      is order 2 (τ-consistency) for
      `Strang2D<Diffusion4thChernoff, Diffusion4thChernoff>`. OLS slope
      of log(err) vs log(n) ≤ -1.85 over `n ∈ {16, 32, 64}` at fixed
      N=800 per axis, T=1.0. This is NOT a 4th-order test — it is
      included solely to disambiguate the domain of the spatial vs
      temporal slopes. An n-sweep at fixed N measures Chernoff τ →
      convergence (capped at order 2 by Theorem 6 consistency-in-τ for
      these Strang/Chernoff compositions); the Phase 4 RETRY demonstrated
      empirically that such an n-sweep yields slope ≈ -2 regardless of
      spatial order. Failure indicates a regression in temporal consistency
      (slope > -1.85) or unexpected super-convergence (slope << -2,
      should not occur).
    inputs: {}
    invariant: |
      // Temporal n-sweep: vary n (time steps) at fixed N=800 per axis.
      // Domain [-10, 10]², T=1.0, constant a=0.5 per axis.
      let cap_n = 800usize;
      let t = 1.0_f64;
      let gx = Grid1D::new(-10.0, 10.0, cap_n).unwrap();
      let gy = Grid1D::new(-10.0, 10.0, cap_n).unwrap();
      let grid2d = Grid2D::new(gx.clone(), gy.clone());

      let f0 = GridFn2D::from_separable(
          grid2d.clone(),
          |x: f64| (-(x*x)).exp(),
          |y: f64| (-(y*y)).exp(),
      );

      let ns_time = [16usize, 32, 64];
      let mut log_n = vec![];
      let mut log_err = vec![];

      for &n in &ns_time {
          let cx = Diffusion4thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gx.clone()
          );
          let cy = Diffusion4thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, gy.clone()
          );
          let phi2d = Strang2D::new(cx, cy);
          let semigroup = ChernoffSemigroup::new(phi2d, n).unwrap();
          let result = semigroup.evolve(t, &f0).unwrap();
          let denom = 1.0 + 2.0 * t;
          let exact = GridFn2D::from_fn(grid2d.clone(),
                           |x, y| (1.0 / denom) * (-((x*x + y*y)/denom)).exp());
          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          log_n.push((n as f64).ln());
          log_err.push(diff.norm_sup().ln());
      }

      // OLS slope of log(err) vs log(n) — expects ≈ -2 (temporal order 2).
      let m = log_n.len() as f64;
      let mean_x = log_n.iter().sum::<f64>() / m;
      let mean_y = log_err.iter().sum::<f64>() / m;
      let num: f64 = log_n.iter().zip(log_err.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_n.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      assert!(slope <= -1.85,
              "temporal_convergence_2d_4th n-sweep slope = {} exceeds gate \
               -1.85 (temporal Chernoff order-2 consistency regression)",
              slope);

  - name: G_PI
    cases: 1   # deterministic, observable benchmark (NOT release-blocking)
    purpose: |
      v0.6.0 G_PI gate (ADR-0014): adaptive PI controller efficiency
      benchmark on stiff CEV diffusion. Target:
      `outcome.steps_accepted (tol=1e-5) ≤ 0.7 × n_fixed_for_same_err`,
      where `n_fixed_for_same_err` is the smallest fixed-step count
      reaching the same sup-norm error against the CEV closed-form
      oracle (cev_european_call_sweep.yaml). Failure of this property
      does NOT block release — the gate is observable (efficiency
      claim), not normative (correctness). TruncatedExp⁴ and ζ⁴ deliver
      release-blocking value independently.

      **τ-axis order invariant (NORMATIVE, v0.6.1 — math.md §11.1.bis)**:
      `AdaptivePI<C>::inner_order() == C.order() == 2` for
      `C ∈ {DiffusionChernoff, Diffusion4thChernoff,
      TruncatedExpDiffusionChernoff, TruncatedExp4thDiffusionChernoff}` in v0.6.0
      — the Richardson divisor `2^p − 1 = 3` and PI gains
      `α = 0.7/p = 0.35, β = 0.4/p = 0.20` are derived from this
      τ-axis value. The dx-axis spatial accuracy `q ∈ {2, 4}` is
      ORTHOGONAL and is observable only via G3 / G3⁴ (1D) and
      G3-2D / G3⁴-2D (2D); `q` MUST NOT be substituted into the PI
      controller's exponents. Cross-ref:
      `docs/audit-findings-v0_6_0.md` D1.
    inputs: {}
    invariant: |
      // CEV (high-corner) inner: variable a(x) at moderate σ·T·β.
      let grid = Grid1D::new(-2.0, 2.0, 1000).unwrap();
      let f0 = GridFn1D::from_fn(grid.clone(),
                                  |x| ((x - 1.0_f64).max(0.0)));   // call payoff
      let beta = 0.5;
      let sigma_sq = 0.16;
      let a_fn:    fn(f64) -> f64 = |x| 0.5 * 0.16 * (1.0 + 0.5 * x.abs()).powi(2);
      let a_p_fn:  fn(f64) -> f64 = |x| 0.5 * 0.16 * 2.0 * (1.0 + 0.5 * x.abs())
                                         * 0.5 * x.signum();
      let a_pp_fn: fn(f64) -> f64 = |_| 0.5 * 0.16 * 0.5 * 0.5 * 2.0;
      let inner = TruncatedExpDiffusionChernoff::new(a_fn, a_p_fn, a_pp_fn, 1.0, grid.clone());

      // Adaptive baseline: same target accuracy.
      let pi = AdaptivePI::new(inner).with_tol(1e-5, 1e-5);
      let outcome = pi.evolve_adaptive(0.5, &f0).unwrap();

      // Reference fixed step: smallest n reaching the same sup-norm error.
      // (Engineer to compute via brute-force search; for property purposes
      //  use a precomputed lookup table.)
      let n_fixed_for_same_err = 800;   // empirical for the CEV high-corner

      assert!(outcome.steps_accepted as f64 <= 0.7 * (n_fixed_for_same_err as f64),
              "G_PI: adaptive {} steps > 0.7 × fixed {} steps",
              outcome.steps_accepted, n_fixed_for_same_err);
    failure_mode: |
      Adaptive efficiency below 0.7× threshold:
        - PI controller gains may be too aggressive (β too high),
          causing repeated rejections — relax to PI.4.7 defaults.
        - Inner TruncatedExp may be hitting CFL boundary frequently —
          check that controller respects τ_max < 3·dx²/(8·a_norm).

  - name: diffusion4_constant_fast_path_close
    cases: 1000   # v0.6.0 (ADR-0013)
    purpose: |
      Constant-`a` regression (NORMATIVE per traits.yaml
      Diffusion4thChernoff I3): when `a' ≡ 0 ∧ a'' ≡ 0`, sympy gate
      Z⁴_const-a proves `Diffusion4th = K(τ; a₀) ≡ DiffusionChernoff`
      (BIT-EQUAL — both reduce to the v0.5.0 5-point K-formula since
      both correction polynomials vanish identically). Property
      enforces sup-norm agreement
      `‖Diffusion4th.apply − DiffusionChernoff.apply‖_∞ ≤ 1e-12`
      over 1000 random `(τ ∈ [0, 1], a₀ ∈ [0.01, 5.0])` pairs.
    inputs:
      a0: "(0.01f64..=5.0f64)"
      tau: "(1e-6f64..=0.5f64)"
      f: gaussian_state
    invariant: |
      let d4 = Diffusion4thChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );
      let dz = DiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );

      let r4 = d4.apply(tau, &f).unwrap();
      let rz = dz.apply(tau, &f).unwrap();

      let mut sup = 0.0_f64;
      for i in 0..f.grid.n {
          sup = sup.max((r4.values[i] - rz.values[i]).abs());
      }

      assert!(sup <= 1e-12,
              "Diffusion4th vs DiffusionChernoff (constant a) sup = {} > 1e-12: a0 = {}, tau = {}",
              sup, a0, tau);
    failure_mode: |
      If sup > 1e-12:
        - τ²-correction polynomial NOT factored on `a' ≡ 0` —
          implementation has a stray non-zero term.
        - 7-point FD stencil leaking into the constant-a path — must
          be skipped entirely when `a' ≡ a'' ≡ 0` (constant-folded
          via optimizer; do NOT add explicit `if a' is zero` branch).
      Cross-ref: sympy gate Z⁴_const-a in `verify_v0_6_0_zeta4.py`.

  - name: truncated_exp4_constant_fast_path_close
    cases: 1000   # v0.6.0 (ADR-0013)
    purpose: |
      Constant-`a` regression for TruncatedExp⁴: when `a' ≡ 0 ∧ a'' ≡ 0`,
      `TruncatedExp4thDiffusionChernoff` and `TruncatedExpDiffusionChernoff` BOTH
      collapse to truncated-K=4 power series of constant-coefficient
      heat semigroups, but with DIFFERENT spatial discretisations
      (4th-order Laplacian for TruncatedExp⁴, 2nd-order for v0.4.0). Both
      converge to the same continuous limit `e^{τa₀∂²}`, so per-step
      sup-norm difference is bounded by the difference of their
      spatial truncation errors:
      `O(dx²·τ·‖f^(4)‖_∞)` (v0.4.0 dominant) vs `O(dx⁴·τ·‖f^(6)‖_∞)`
      (TruncatedExp⁴ tighter). Property enforces sup-norm agreement
      `≤ 1e-10` over 1000 random `(τ, a₀)` pairs at the production
      grid (dx ≈ 0.02; v0.4.0 floor ≈ 1e-4, TruncatedExp⁴ floor ≈ 1e-7;
      their difference is ≤ 1e-4 — gate at 1e-3 absorbs this).
      **Note**: gate is 1e-3, NOT 1e-10 (corrected from plan draft —
      the two stencils have different spatial floors).
    inputs:
      a0: "(0.01f64..=5.0f64)"
      tau: "(1e-6f64..=0.01f64)"   # respects v0.4.0 CFL τ < dx²/(2·a) ≈ 4e-5
      f: gaussian_state
    invariant: |
      let dx = f.grid.dx();
      // Both stencils require their own CFL — TruncatedExp⁴'s tighter:
      let cfl_v04 = tau * a0 < 0.5 * dx * dx;
      let cfl_v06 = 8.0 * tau * a0 < 3.0 * dx * dx;
      if !cfl_v04 || !cfl_v06 {
          return Err(proptest::test_runner::TestCaseError::reject("CFL violation"));
      }

      let m4 = TruncatedExp4thDiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );
      let m  = TruncatedExpDiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );

      let r4 = m4.apply(tau, &f).unwrap();
      let rm = m.apply(tau, &f).unwrap();

      let mut sup = 0.0_f64;
      for i in 0..f.grid.n {
          sup = sup.max((r4.values[i] - rm.values[i]).abs());
      }

      // Both converge to e^{τa₀∂²}; their difference is bounded by
      // the difference of their leading O(dx²) vs O(dx⁴) floors.
      assert!(sup <= 1e-3,
              "TruncatedExp⁴ vs TruncatedExp (constant a) sup = {} > 1e-3: a0 = {}, tau = {}",
              sup, a0, tau);
    failure_mode: |
      If sup > 1e-3:
        - TruncatedExp⁴ stencil coefficient bug — verify the (5/4, -5/4)
          flux coefficients per ADR-0013 §3 Architect correction;
          the (7/6, -7/6) draft coefficients would FAIL this gate.
        - K=4 factorial weights mismatch between v0.4.0 and TruncatedExp⁴
          implementations.
      Cross-ref: sympy gate M⁴_const-a-fast in `verify_v0_6_0_magnus4.py`.

  - name: adaptive_pi_contractivity
    cases: 1000   # v0.6.0 (ADR-0014)
    purpose: |
      Adaptive PI semigroup-splitting contractivity check (math.md §11.1
      Lady-Windermere fan): under quasi-contractivity of the inner C,
      `AdaptivePI<C>::evolve_adaptive(t, u_0).final_state` satisfies
      `‖final_state‖_∞ ≤ M·e^{ω·t}·‖u_0‖_∞ + O(τ_max^p)` where
      `p = inner_order()`. For the constant-a heat kernel (M=1, ω=0),
      this is `‖final_state‖_∞ ≤ ‖u_0‖_∞ · (1 + O(τ_max²))` for p=2.
      Property enforces a relaxed sup-norm contraction over 1000 random
      `(t, u_0, tol)` triples: the adaptive integrator's output is
      bounded by the input sup-norm to within the tolerance budget.
    inputs:
      a0: "(0.01f64..=5.0f64)"
      t: "(1e-3f64..=0.5f64)"
      tol_abs: "(1e-10f64..=1e-4f64)"
      f: gaussian_state
    invariant: |
      let inner = DiffusionChernoff::new(
          |_| a0, |_| 0.0_f64, |_| 0.0_f64, a0, f.grid.clone()
      );
      let pi = AdaptivePI::new(inner).with_tol(tol_abs, 1e-6);
      let outcome = pi.evolve_adaptive(t, &f).unwrap();

      let in_norm = f.norm_sup();
      let out_norm = outcome.final_state.norm_sup();

      // Heat kernel is L^∞-contractive (constant a case), so
      // out_norm ≤ in_norm · (1 + O(tol)).
      let bound = in_norm * (1.0 + 100.0 * tol_abs);
      assert!(out_norm <= bound,
              "AdaptivePI not contractive: out_norm = {}, bound = {}, t = {}, a0 = {}, tol = {}",
              out_norm, bound, t, a0, tol_abs);

      // Plus: outcome.steps_accepted > 0 (any non-trivial t requires steps)
      assert!(outcome.steps_accepted > 0, "AdaptivePI took zero steps for t = {} > 0", t);

      // And: step counts are reasonable (NO max_substeps overflow).
      assert!(outcome.steps_accepted + outcome.steps_rejected < 100_000,
              "AdaptivePI runaway: accepted = {}, rejected = {}, t = {}",
              outcome.steps_accepted, outcome.steps_rejected, t);
    failure_mode: |
      If out_norm > bound:
        - Inner Chernoff is non-contractive (e.g., growth() returns
          (M, ω) with M·exp(ω·t) > 1) — adaptive may amplify.
        - Richardson estimator buggy — half-steps not aligned with
          full-step.
        - Half-steps recombined incorrectly (e.g., `u_full` returned
          instead of `u_half`).

      If steps_accepted = 0:
        - Initial trial τ chosen too large → rejected → contracted
          to sub-ULP τ → rejected forever. Verify min_ratio = 0.2
          enforces 5x contraction max per rejection.

      If runaway (>= 100_000 substeps):
        - Tolerance unreachable; the AdaptiveStepRejected error
          variant should have been returned. Check max_substeps cap.
      Cross-ref: math.md §11 + sympy: this is an empirical property,
      no specific sympy gate.


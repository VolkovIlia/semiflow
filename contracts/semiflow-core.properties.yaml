  # =========================================================================
  # Block C: NonSeparable2DChernoff properties (v0.7.0, ADR-0016)
  # Test file: tests/proptest_nonseparable2d_consistency.rs
  # =========================================================================

  - name: ns2d_zero_c_bit_equality
    cases: 200
    severity: NORMATIVE
    purpose: |
      P1 (zero-c bit-equality with Strang2D, ADR-0016 §Block C):
      `NonSeparable2DChernoff` constructed with `c_norm_bound = 0.0`
      (and `c ≡ 0`) MUST produce output bit-identical to `Strang2D`
      with the same inner 1D Chernoff functions, same grid, same tau,
      same input.

      This validates the zero-c fast-path in `NonSeparable2DChernoff::apply`
      (when `is_zero_c = true`, the mixed leg Φ_M is bypassed and the call
      delegates directly to the Strang2D 3-leg path, producing bit-equal
      results).

      Failure: any ULP difference at any node is a fast-path regression.
    inputs:
      amp: "(0.5f64..=2.0f64)"
      tau: "(1e-4f64..=5e-3f64)"
    invariant: |
      let n = 12_usize;
      let (ns, s3) = make_ops(n);   // ns with c≡0; s3 = Strang2D same inner
      let f = GridFn2D::from_fn(grid2d(n), |x, y| amp * (-(x*x + y*y)).exp());
      let out_ns = ns.apply(tau, &f).unwrap();
      let out_s3 = s3.apply(tau, &f).unwrap();
      for k in 0..n*n {
          assert_eq!(out_ns.values[k].to_bits(), out_s3.values[k].to_bits(),
                     "bit mismatch at k={}: ns={}, s3={}", k, out_ns.values[k], out_s3.values[k]);
      }
    test_file: "tests/proptest_nonseparable2d_consistency.rs"

  - name: ns2d_shape_preservation
    cases: 200
    severity: NORMATIVE
    purpose: |
      P2 (shape preservation, ADR-0016 §Block C):
      `apply` MUST return a `GridFn2D` with length exactly `nx * ny`.
      Validates that the 5-leg path allocates correctly and does not
      accidentally truncate or extend the output.
    inputs:
      amp: "(0.5f64..=2.0f64)"
      tau: "(1e-4f64..=5e-3f64)"
    invariant: |
      let n = 10_usize;
      let op = NonSeparable2DChernoff::new(ix, iy, |_,_| 0.01, 0.01, grid).unwrap();
      let f = GridFn2D::from_fn(grid, |x, y| amp * (x + y).sin());
      let out = op.apply(tau, &f).unwrap();
      assert_eq!(out.values.len(), n * n);
    test_file: "tests/proptest_nonseparable2d_consistency.rs"

  - name: ns2d_linearity
    cases: 100
    severity: NORMATIVE
    purpose: |
      P3 (linearity, ADR-0016 §Block C):
      `apply(τ, α·f + β·g) ≈ α·apply(τ,f) + β·apply(τ,g)` within 1e-10.
      The 5-leg Strang splitting and the Taylor mixed leg are both linear
      operators. Failure indicates accidental nonlinearity (e.g., branching
      on values, abs() calls, or nonlinear normalization).
    inputs:
      alpha: "(-2.0f64..=2.0f64)"
      beta:  "(-2.0f64..=2.0f64)"
      tau:   "(1e-4f64..=5e-3f64)"
    invariant: |
      let n = 8_usize;
      let combo = alpha * f[k] + beta * g[k] for each k;
      let out_combo = op1.apply(tau, &combo).unwrap();
      let out_f = op2.apply(tau, &f).unwrap();
      let out_g = op1.apply(tau, &g).unwrap();
      for k in 0..n*n {
          assert!((out_combo[k] - (alpha * out_f[k] + beta * out_g[k])).abs() < 1e-10);
      }
    test_file: "tests/proptest_nonseparable2d_consistency.rs"

  - name: ns2d_cfl_boundary
    cases: 50
    severity: NORMATIVE
    purpose: |
      P4 (CFL boundary, ADR-0016 §3):
      For `tau` strictly above the mixed-leg CFL threshold
      `tau_threshold = dx·dy / (4·c_norm_bound)`, `apply` MUST return
      `Err(SemiflowError::CflViolated)`. The field overloads `dx_squared`
      (carries `dx·dy`) and `a_norm_bound` (carries `‖c‖_∞`) must be
      present in the returned error variant.

      Complementary check: `tau` at 0.99 × threshold must return `Ok(_)`.
    inputs:
      excess: "(1.01f64..=2.0f64)"
    invariant: |
      let tau_threshold = dx_dy / (4.0 * c_norm);
      let tau_violated = tau_threshold * excess;
      let res = op.apply(tau_violated, &f);
      assert!(matches!(res, Err(SemiflowError::CflViolated { .. })));
    test_file: "tests/proptest_nonseparable2d_consistency.rs"

  - name: G3_NS2D
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "slope <= -1.95"
    purpose: |
      G3_NS2D (spatial convergence, ADR-0016 §Gate):
      `NonSeparable2DChernoff` with constant `c = 0.05`, `axx = ayy = 0.1`
      achieves spatial log-log OLS slope ≤ -1.95 over
      `n_spatial ∈ {32, 64, 128, 256}` at fixed `N = 1000` Chernoff steps.

      Same methodology as G3-strang-2D (strang_advdiff_2d.rs). Failure
      BLOCKS v0.7.0 release. The 4-point cross-stencil is O(dx² + dy²)
      so spatial convergence ≈ -2. The -1.95 gate has 2.5% margin.
    test_file: "tests/strang_nonseparable_slope.rs"
    feature_gate: "slow-tests"

  - name: G3_NS2D_var
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "slope <= -1.95"
    purpose: |
      G3_NS2D_var (spatial self-convergence, variable coupling):

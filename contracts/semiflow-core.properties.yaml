# semiflow-core — Property Invariants (v0.1.0 through v0.7.0, ADR-0006 through ADR-0016)
# Proptest specifications for QA (Stage 7). Each property is a mathematical
# invariant that MUST hold over the random parameter space defined below.
# Unit tests for specific cases (G1, G2) live alongside in `tests/`.
#
# v0.2.0 additions (operator splitting, ADR-0006):
#   - strang_split_quasi_contractivity (G4-strang, 10000 cases)
#   - diffusion_chernoff_taylor_order_2  (analytic Fourier-symbol check)
#   - drift_reaction_exact_characteristic (constant-coefficient identity)
#   - strang_split_palindrome           (sandwich consistency)
#
# v0.2.1 additions (boundary policies, ADR-0007):
#   - bc_index_totality                  (5000 cases — TOTAL helper guard)
#   - bc_index_strict_interior_agreement (1000 cases — I5 regression)
#   - boundary_periodic_round_trip       (200 cases  — f̃(x+kL) = f̃(x))
#   - boundary_linear_extrap_affine_exact(500 cases  — α x + β recovered)
#   - boundary_zero_extend_no_op_in_range(500 cases  — interior agreement)
#
# v0.1.0 properties below remain valid for the unchanged ShiftChernoff1D.

# v0.4.0 (ADR-0011, option ε — TruncatedExp integrator, ADDITIVE):
#   - truncated_exp_diffusion_constant_fast_path_close          (1000 cases)
#       — Constant-a sup-norm agreement |M − D_v022|_∞ ≤ 1e-10 (CLOSE,
#         not bit-equal: K=4 truncation residue is by construction
#         non-zero; bounded by (τ·a₀/dx²)^5 / 120 ≤ 1e-12 at production
#         CFL margins).
#   - truncated_exp_variable_zeta_liouville_oracle_slope        (200 cases)
#       — **FLAGSHIP gate that ζ-A cannot pass.** Liouville oracle
#         slope ≤ -1.95 over n ∈ {32, 64, 128, 256, 512} for variable
#         a (a' ≠ 0, a'' ≠ 0). Same oracle as ζ-A's relaxed-(-0.95)
#         property; what changes is the discretization being measured
#         (TruncatedExp K=4 power series + 3-point divergence-form
#         stencil). NO relaxation — failure of this gate BLOCKS v0.4.0.
#   - truncated_exp_strang_quasi_contractivity                  (10000 cases)
#       — G4-strang TruncatedExp analogue: StrangSplit<TruncatedExpDiffusionChernoff,
#         DriftReactionChernoff> satisfies the same growth bound
#         (1 + |c|·τ + 20·τ²)·‖f‖_∞ as the ζ-A path.
#   - truncated_exp_cfl_violation_returns_error                 (100 cases)
#       — Verify invariant I4 (CFL early-return). Boundary check:
#         99% of CFL → Ok(_); 101% of CFL → Err(CflViolated{...}).
# All four properties live in tests/magnus_properties.rs (alongside
# the v0.3.0 strang_properties.rs).

# v0.7.0 (ADR-0016, Block C — NonSeparable2DChernoff):
#   - ns2d_zero_c_bit_equality        (200 cases, NORMATIVE)
#       — P1: zero-c fast-path must produce bit-identical output to Strang2D.
#   - ns2d_shape_preservation         (200 cases, NORMATIVE)
#       — P2: output length == nx*ny (5-leg path shapes correctly).
#   - ns2d_linearity                  (100 cases, NORMATIVE)
#       — P3: apply(α·f + β·g) ≈ α·apply(f) + β·apply(g) within 1e-10.
#   - ns2d_cfl_boundary               (50 cases, NORMATIVE)
#       — P4: tau above CFL threshold → CflViolated (mixed-leg gate).
#   - G3_NS2D                         (1, slow-tests, RELEASE_BLOCKING)
#       — Spatial slope ≤ -1.95 for const c=0.05 over n_spatial {32,64,128,256}.
#   - G3_NS2D_var                     (1, slow-tests, RELEASE_BLOCKING)
#       — Spatial self-convergence slope ≤ -1.95 for variable c(x,y)=0.05·tanh(x+y).
# All six properties live in:
#   - tests/proptest_nonseparable2d_consistency.rs  (P1–P4)
#   - tests/strang_nonseparable_slope.rs            (G3_NS2D, G3_NS2D_var)
#
# v0.5.0 (ADR-0012, tensor-product 2D extension):
#   - grid_fn_2d_axpy_separability        (1000 cases)
#       — axpy preserves tensor structure under linearity (I-T1, I-T3).
#   - axis_lift_1d_consistency            (200 cases)
#       — Lemma 10.2 (Y-independent reduction): X-lift on Y-independent
#         input row-equals 1D apply (≤16 ULP/node); Y-lift on
#         Y-independent input is identity within FP. **This is the
#         strongest test oracle for the Phase 2 implementation.**
#   - strang2d_separable_order_2          (50 cases)
#       — Theorem 7 (math.md §10.3) empirical verification: log-log
#         slope ≤ -1.95 over n ∈ {32, 64, 128, 256, 512} on the 2D
#         heat oracle (eq. 10.7). **G3-strang-2D acceptance gate.**
#         Failure BLOCKS v0.5.0 release.
# All three properties live in tests/tensor_properties.rs (new file
# alongside tests/magnus_properties.rs and tests/strang_properties.rs).
#
# v0.6.0 (ADR-0013 — 4th-order spatial; ADR-0014 — Adaptive PI controller):
#   - G1_4                                 (1, deterministic)
#       — 1D heat-kernel oracle, n=200, N=2000, gate ≤ 1e-7
#         using Diffusion4thChernoff (sanity gate).
#   - G2_4                                 (1, slow-tests)
#       — 1D heat-kernel, n=400, N=4000, gate ≤ 1e-9 demonstrates
#         dx⁴ floor improvement over v0.5.0 G2.
#   - G3_4                                 (1, deterministic slope)
#       — 1D spatial dx-sweep slope ≤ -3.85 over N ∈ {200,400,800,1600,3200}
#         at n_fixed=4000, domain [-15,15]. Confirms dx⁴ asymptotic regime.
#   - G3_4_2D                              (1, slow-tests, FLAGSHIP)
#       — 2D spatial dx-sweep slope ≤ -3.85 over N ∈ {400, 800, 1600}
#         at n_fixed=2000, T=0.5, domain [-15,15]². **Failure BLOCKS
#         v0.6.0 release.** Headline gate.
#   - temporal_convergence_2d_4th          (1, deterministic)
#       — Companion n-sweep at fixed N=800: slope ≤ -1.85 over
#         n ∈ {16,32,64}, documents temporal Chernoff order 2 (not a
#         4th-order test — disambiguates spatial vs temporal slopes).
#   - G_PI                                 (1, observable)
#       — Adaptive PI efficiency: steps_accepted ≤ 0.7 ×
#         n_fixed_for_same_err on stiff CEV. NOT release-blocking.
#   - diffusion4_constant_fast_path_close  (1000 cases)
#       — Bit-equal regression vs v0.5.0 ζ-A in constant-a regime
#         (sup-norm ≤ 1e-12 — sympy gate Z⁴_const-a verified
#         algebraic identity).
#   - truncated_exp4_constant_fast_path_close     (1000 cases)
#       — Constant-a TruncatedExp⁴ vs v0.4.0 TruncatedExp sup-norm ≤ 1e-3
#         (different spatial-floor stencils — close, NOT bit-equal).
#   - adaptive_pi_contractivity            (1000 cases)
#       — Lady-Windermere fan: AdaptivePI's output sup-norm bounded
#         by input·(1 + O(tol)) on heat kernel.
# All eight properties live across:
#   - tests/diffusion4_properties.rs  (G1_4, G2_4, G3_4, diffusion4_*)
#   - tests/magnus4_properties.rs     (magnus4_*)
#   - tests/tensor_properties.rs      (G3_4_2D — extends v0.5.0 file)

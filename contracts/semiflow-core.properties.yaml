      //   //       VIOLATES CFL. QA Engineer MUST tighten the grid OR
      //   //       lower n_max OR clamp T. Suggested: dx = 0.005 (n=401 on [-1,1]),
      //   //       giving τ_max ≈ 7.4e-6 — still violated. Need dx = 0.0025
      //   //       (n=801 on [-1,1]) → τ_max ≈ 1.85e-6. Or restrict T ≤ 0.05
      //   //       and n ≤ 32 → τ ≈ 1.56e-3, still violated.

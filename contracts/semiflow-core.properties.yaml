      for Re λ > ω) is NOT a valid backend. Non-self-adjoint / non-sectorial
      generators are OUT of scope for v8.0.0. Failure BLOCKS v8.0.0 release.
    test_file: "tests/g_resolvent_jump_order.rs::g_resolvent_jump_order"

      formula degenerates to slope_eff → m+1=4. ADDITIVE complement to
      G_zeta4_const_a_richardson_cheb (existing — measures SATURATED CEILING
      at T=0.5, N=512 → τ≈0.001).

      AMENDMENT 1 (ADR-0110 2026-05-30): threshold revised -3.95 → -3.5.
      Original -3.95 was calibrated against §39.2 single-step (per-step) formula
      model; AMENDMENT 1 corrects for GLOBAL-vs-LOCAL distinction + OLS
      boundary-anomaly tolerance. Engineer measurement -3.6573 PASSES at -3.5
      with margin 0.16. ζ⁶/ζ⁸ TRUTHFUL_ORDER siblings DEFERRED v7.0+ OCTONIC
      per AMENDMENT 1 §"Path D" (off-by-one GLOBAL vs LOCAL + K5 spatial stencil
      floor are MATHEMATICALLY INFEASIBLE at all admissible (N,T) configurations).

      Configuration (math.md §41.4 NORMATIVE):
        - grid = Grid1D::<f64>::new(-10.0, 10.0, 512)? (Chebyshev M=64)
        - kernel = Diffusion4thZeta4Chernoff::new(Diffusion4thChernoff const-a)
                       .with_chebyshev_sampling()
        - a(x) ≡ 1, IC f₀(x) = exp(-x²)
        - T_FINAL = 2.0 (LARGER than existing const-a-cheb's T=0.5 —
          intentional; pre-asymp τ-regime requires LARGER horizon per §41.2)
        - N_STEPS = {2, 4, 8, 16} (4-point doubling ladder)
        - Oracle: u(T, x) = (1+4T)^{-½} · exp(-x²/(1+4T))

      AMENDMENT 1 pair-slope diagnostic (middle pair 4→8 is canonical):
        n=2→4   slope = super-convergence anomaly (documented)
        n=4→8   slope ≈ -4 (HONEST GLOBAL order-4 signal)
        n=8→16  slope = spatial-floor onset (documented anomaly)
      OLS slope measured -3.6573 ≤ -3.5 PASS (margin 0.16).

      References: ADR-0110 AMENDMENT 1 + ADR-0109 + ADR-0108 + math.md §39 + §40 + §41.
      defer_note: "ζ⁶/ζ⁸ deferred v7.0+ per ADR-0110 AMENDMENT 1"
    gate: "Constant-a heat OLS log-log slope ≤ -3.5 over N_STEPS={2,4,8,16} at T=2.0 with Chebyshev M=64 + SepticHermite virtual nodes (ADR-0110 AMENDMENT 1 v6.0.0; GLOBAL-order-4 via middle-pair diagnostic)"
    purpose: |

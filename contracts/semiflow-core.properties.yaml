helpers:
  - name: centre_of_mass
    signature: "fn centre_of_mass(g: &GridFn1D) -> f64"
    body: |
      let total: f64 = g.values.iter().map(|v| v.abs()).sum();
      if total == 0.0 { return 0.0; }
      let weighted: f64 = (0..g.grid.n).map(|i| g.grid.x_at(i) * g.values[i].abs()).sum();
      weighted / total


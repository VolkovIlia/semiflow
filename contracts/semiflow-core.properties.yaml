# v0.8.0 Block C gates (ADR-0019 — SIMD intrinsics module, opt-in default-on).
# ---------------------------------------------------------------------------
  - name: SIMD_BIT_EQUAL
    cases: 1                       # 4-N grid × 3 hot-paths × 4 boundary policies covered by sub-cases
    severity: RELEASE_BLOCKING
    gate: "byte-for-byte equality between SIMD and scalar paths"
    purpose: |
      SIMD_BIT_EQUAL (v0.8.0 Block C, ADR-0019):
      For every `(N, hot_path, boundary, interp)` in the test grid, the
      `feature = "simd"` build's output `Vec<f64>` MUST be bit-identical
      (byte-for-byte `==`, including signed-zero, subnormals, and NaN
      bit-patterns) to the `--no-default-features` (scalar fallback)
      build's output for the SAME inputs.

      Test grid:
        N            ∈ {64, 256, 1024, 4096}      (linear length per axis)
        hot_path     ∈ {grid_cubic_hermite_sample,
                        grid_quintic_hermite_sample,
                        diffusion6_apply}        (the three vectorized kernels)
        boundary     ∈ {Reflect, ZeroExtend,
                        Periodic, LinearExtrapolate}
        interp       — implied by hot_path (CubicHermite for the first,
                        QuinticHermite for the second; diffusion6 uses
                        whatever the grid carries — sweep both).
        tau          = 1e-3                       (representative; bit-equality
                                                    is τ-independent because the
                                                    weight constants are fixed)
        u_0          = exp(-(x - μ)²) Gaussian   (μ = 0.3 to break centring
                                                    symmetries that might mask
                                                    sign-bit divergence)
        rng_seed     = 0xC0FFEE_DEAD_BEEF        (deterministic property test;
                                                    same seed across both builds)

      For each `(N, hot_path, boundary)`: produce `scalar_ref =
      <run with --no-default-features OR force F64x4Scalar via the
      private test hook>`, then for the active build's actual SIMD impl
      (AVX2 on x86_64-CI, NEON on aarch64-CI, scalar elsewhere) produce
      `simd_out` and assert `scalar_ref.values == simd_out.values`
      (Vec PartialEq is byte-wise on f64). Failure prints the FIRST
      divergent index `k`, the two divergent f64s in hex
      (`scalar_ref[k].to_bits()` vs `simd_out[k].to_bits()`), and the
      ULP gap `(simd_out[k] - scalar_ref[k]).abs() / f64::EPSILON`.

      Failure modes BLOCK v0.8.0 release:
        - FMA accidentally enabled (e.g. compiler auto-fused
          `mul` + `add` under `-C target-feature=+fma`) → ULP gap of
          1–2 (rounded once instead of twice).
        - Lane order mismatch → divergence at chunk boundaries.
        - `_mm256_dp_pd` or `_mm256_hadd_pd`-with-wrong-order →
          divergence in `horizontal_sum`.
        - Unaligned-load reading past the buffer → garbage in tail.

      This gate is the SOLE acceptance criterion for the ADR-0019
      SIMD module; without it, "vectorized Grid::sample" is a different
      mathematical object and every v0.5.0–v0.7.0 release-blocking
      regression gate (G3-2D, G3⁴-2D, G3⁶-2D, Z⁶_const-a) is broken.
      Cross-ref: tensor.yaml `simd.determinism_contract`.
    test_file: "tests/simd_bit_equal.rs"
    feature_gate: "simd"
    invariant: |
      // Pseudocode (Engineer translates to test harness in
      // tests/simd_bit_equal.rs):
      use semiflow_core::*;
      const SEED: u64 = 0xC0FFEE_DEAD_BEEF;
      for &n in &[64usize, 256, 1024, 4096] {
          for &boundary in &BOUNDARIES {
              // 1. Cubic-Hermite Grid::sample sweep.
              let grid = Grid1D::new(-3.0, 3.0, n).unwrap()
                  .with_boundary(boundary)
                  .with_interp(InterpKind::CubicHermite);
              let f0 = make_gaussian_1d(grid, SEED);
              let xs = make_query_grid(n);
              let scalar_out: Vec<f64> = with_force_scalar_simd(|| {
                  xs.iter().map(|&x| grid.interp(&f0.values, x).unwrap()).collect()
              });
              let simd_out: Vec<f64> =
                  xs.iter().map(|&x| grid.interp(&f0.values, x).unwrap()).collect();
              assert_eq!(scalar_out, simd_out,
                  "SIMD_BIT_EQUAL FAIL (cubic Hermite): n={n}, boundary={boundary:?}");

              // 2. Quintic-Hermite sweep.
              let grid = grid.with_interp(InterpKind::QuinticHermite);
              // ... same shape ...
              assert_eq!(scalar_out, simd_out,
                  "SIMD_BIT_EQUAL FAIL (quintic Hermite): n={n}, boundary={boundary:?}");

              // 3. Diffusion6thChernoff::apply sweep.
              let dc = Diffusion6thChernoff::new(
                  |x| 1.0 + 0.1 * x.tanh(),
                  |x| 0.1 * (1.0 - x.tanh().powi(2)),
                  |x| -0.2 * x.tanh() * (1.0 - x.tanh().powi(2)),
                  2.0,
                  grid,
              );
              let scalar_out = with_force_scalar_simd(|| dc.apply(1e-3, &f0).unwrap());
              let simd_out = dc.apply(1e-3, &f0).unwrap();
              assert_eq!(scalar_out.values, simd_out.values,
                  "SIMD_BIT_EQUAL FAIL (diffusion6): n={n}, boundary={boundary:?}");
          }
      }

  - name: SIMD_BIT_EQUAL_PARALLEL
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "byte-for-byte equality across {SIMD,scalar} × {1,2,4,8} threads"
    purpose: |
      SIMD_BIT_EQUAL_PARALLEL (v0.8.0 Block C, ADR-0019 + ADR-0018):
      Composition test: when both `simd` AND `parallel` features are
      enabled, the output of `Strang2D::apply` MUST be bit-identical to
      the scalar+serial reference for every thread count
      `k ∈ {1, 2, 4, 8}` and every SIMD impl active on the build host.

      This is the multiplicative composition of STRANG2D_PARALLEL_BIT_EQUAL
      (ADR-0018) and SIMD_BIT_EQUAL (ADR-0019). It is RELEASE-BLOCKING
      because the v0.6.0 G3⁴-2D flagship gate is bit-equality-sensitive
      and the v0.8.0 default build is `--features simd` (parallel is
      opt-in but commonly enabled in benchmarks).

      Test grid:
        N            ∈ {128, 512}                 (smaller than SIMD_BIT_EQUAL
                                                    grid because parallel kernel
                                                    spawns are slow at N=4096)
        thread_count ∈ {1, 2, 4, 8}
        simd_impl    ∈ {scalar_forced, native}    (native = AVX2/NEON per host)
        operator     = Strang2D<Diffusion4thChernoff, Diffusion4thChernoff>
        u_0(x, y)    = exp(-(x² + y²))            Gaussian, `from_fn`
        n_steps      = 4

      For each `(N, k, impl)`: assert
      `bytes(strang2d.apply(τ, &f₀)) == bytes(reference_scalar_serial)`.
    test_file: "tests/simd_bit_equal.rs"
    feature_gate: "parallel,simd,slow-tests"
    invariant: |
      // Pseudocode (extends SIMD_BIT_EQUAL with thread sweep):
      let phi = Strang2D::<Diffusion4thChernoff, Diffusion4thChernoff>::new(...);
      let f0 = make_gaussian_2d(...);
      let reference = with_force_scalar_simd(|| {
          with_thread_count(1, || phi_iterate(&phi, tau, 4, &f0))
      });
      for &n in &[128usize, 512] {
          for impl_choice in [SimdImpl::ForcedScalar, SimdImpl::Native] {
              for &k in &[1usize, 2, 4, 8] {
                  let candidate = with_simd_impl(impl_choice, || {
                      with_thread_count(k, || phi_iterate(&phi, tau, 4, &f0))
                  });
                  assert_eq!(reference.values, candidate.values,
                      "SIMD_BIT_EQUAL_PARALLEL FAIL: n={n}, impl={impl_choice:?}, k={k}");
              }
          }
      }

  - name: SIMD_HERMITE_SPEEDUP
    cases: 1
    severity: INFORMATIONAL    # NOT release-blocking — wallclock varies by CPU.
    gate: "wallclock(simd, single-thread) <= wallclock(scalar, single-thread) / 2.0  (recommended)"
    purpose: |
      SIMD_HERMITE_SPEEDUP (v0.8.0 Block C, ROADMAP item 2):
      At N=1600² with `Grid::sample` (cubic Hermite, the v0.5.0 hot
      path inside `AxisLift<DiffusionChernoff>`), the SIMD build
      MUST complete in at most `scalar_wallclock / 2.0` on a SINGLE
      thread (no `parallel` feature). Reference baseline:
      `docs/perf-baseline-v0_7_0.md`.

      Severity is INFORMATIONAL — host CPU variability and
      target-feature mismatches (e.g. running on a Skylake with
      `target-cpu=x86-64-v2`, missing AVX2) may legitimately fail
      this gate. CI policy: warn-only on failure; manual-review
      gate on the v0.8.0 ROADMAP item closure.

      Test logs the speedup ratio to stderr regardless of pass/fail
      so regressions are visible in `cargo test -- --nocapture`.
    test_file: "tests/simd_bit_equal.rs"
    feature_gate: "simd,slow-tests"
    invariant: |
      // Pseudocode (illustrative, not normative for CI):
      let n = 1600usize;
      let grid = Grid1D::new(-15.0, 15.0, n).unwrap();
      let f0 = make_gaussian_1d(grid, 0xC0FFEE_DEAD_BEEF);
      let xs: Vec<f64> = (0..n).map(|_| rand_x()).collect();
      let scalar_t = with_force_scalar_simd(|| {
          bench(|| { for &x in &xs { let _ = grid.interp(&f0.values, x).unwrap(); } })
      });
      let simd_t = bench(|| {
          for &x in &xs { let _ = grid.interp(&f0.values, x).unwrap(); }
      });
      eprintln!("SIMD_HERMITE_SPEEDUP: scalar={scalar_t:?} simd={simd_t:?} ratio={:.2}x",
                scalar_t.as_secs_f64() / simd_t.as_secs_f64());
      if simd_t * 2 > scalar_t {
          eprintln!("WARN: SIMD speedup below 2× target (ROADMAP v0.8.0 item 2).");
      }


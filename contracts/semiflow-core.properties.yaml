  # =========================================================================
  # v4.0 ADR-0079 — B6 Schrödinger Option B (SemiflowComplex unitarity gate).
  # =========================================================================
  - name: G_SCHROD_B
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "Schrödinger Option B L²-norm preservation ≤ 1e-12 at f64 on harmonic-oscillator Gaussian wave packet (N=512, T=1.0, n=128)"
    purpose: |
      G_SCHROD_B (Schrödinger Option B unitarity at f64 — math.md §30.6,
      ADR-0079):
      Verifies that the v4.0 SchrödingerChernoffComplex<C: SemiflowComplex>
      kernel (math §30.3 equation 30.1 palindromic Strang + equation 30.2
      complex Cayley map) preserves the L²-norm of an evolved Gaussian wave
      packet to within 1e-12 relative error at f64 precision, on the canonical
      harmonic-oscillator Hamiltonian H = -(1/2)∂_x² + (1/2)x².

      Setup:
        grid    = Grid1D::<f64>::new(-10.0, 10.0, 512)?;
        V_fn    = |x: f64| 0.5 * x * x;                              // harmonic oscillator
        k0      = 2.0_f64;                                            // mean momentum
        psi_0   = GridFn1D::<Complex<f64>>::from_fn(&grid, |x| {
            Complex::from_polar(
                (PI.powf(-0.25)) * (-x*x/2.0).exp(),                  // Gaussian envelope
                k0 * x,                                                // plane-wave phase
            )
        });
        kernel  = SchrödingerChernoffComplex::<Complex<f64>>::new(
            grid.clone(), V_fn,
        )?;
        T       = 1.0_f64;
        n       = 128_usize;                                          // palindromic Strang steps

      Sweep: SINGLE VALUE — NOT an n-sweep. This is a unitarity-preservation
      gate (one number per (T, n, N) tuple), not a convergence-rate gate.

      Reference: the EXACT L²-norm of the Gaussian wave packet is
      ‖psi_0‖_2 = 1.0 (analytic — the Gaussian normalisation π^(-1/4) in the
      envelope is the standard L²(R) unit-norm constant; on the truncated
      grid [-10, 10] with σ = 1, the truncation error is < 1e-43).

      Gate:
        psi_n   = Evolver::new(kernel.clone(), n)?.evolve(T, &psi_0)?;
        norm_n  = sqrt(sum(|psi_n[k]|² for k in 0..512) · dx);
        ASSERT |norm_n - 1.0| < 1e-12.

      Sub-test 2 (ADVISORY — cross-representation Option A ↔ Option B):
        At N=512, T=1.0, n=128, the sup-norm
          ‖psi_n^(A) - psi_n^(B)‖_∞ ≤ 4 ULP ≈ 8.88e-16.
        Where psi_n^(A) is the v2.2 real-pair Option A iterate and psi_n^(B)
        is the v4.0 complex Option B iterate at the SAME canonical setup.
        ADVISORY (not blocking) — documents the cross-representation
        discrepancy; failure triggers investigation but does not block v4.0.

      Test file: tests/schrodinger_complex_unitarity.rs (new file, v4.0 Wave A
      engineer). Failure of the main 1e-12 gate BLOCKS v4.0 release. Failure
      of the ADVISORY sub-test 2 triggers investigation (Option A ↔ B
      regression) but does not block.
    test_file: "tests/schrodinger_complex_unitarity.rs"
    feature_gate: "slow-tests"

  # =========================================================================
  # v4.0 ADR-0080 — A6 PointEval first-class API byte-identity gate.
  # =========================================================================
  - name: G_POINTEVAL
    cases: 5
    severity: RELEASE_BLOCKING
    gate: "f64 byte-identity (to_bits equality) between kernel.eval_at(τ, src, x, n) and (apply_into^n src).sample(x) on FIVE PointEval backends"
    purpose: |
      G_POINTEVAL (PointEval bound-stack iterative byte-identity — math.md
      §31.4, ADR-0080):
      Verifies that the v4.0 PointEval trait's bound-stack iterative algorithm
      (math §31.2 Algorithm 31.1) produces BYTE-IDENTICAL output (IEEE 754 f64
      bit-pattern equality via `f64::to_bits()`) to the equivalent full-grid
      computation `(F.apply_into^n f₀).sample(x₀)` on FIVE kernel backends.
      Byte-identity is strictly stronger than v2.2 ADR-0059's ≤ 3 ULP gate;
      achievable because the bound-stack iterative computes EXACTLY the same
      floating-point reductions as the full-grid path sampled at x₀.

      Five backends (5 sub-tests, one per backend):

        Sub-test 1 (Backend A — DiffusionChernoff 1D):
          grid_A   = Grid1D::<f64>::new(-10.0, 10.0, 512)?;
          a_fn     = |x: f64| 1.0 + 0.5 * (x.tanh()).powi(2);
          kernel_A = DiffusionChernoff::<f64>::new(a_fn, grid_A.clone())?;
          f0_A     = GridFn1D::from_fn(&grid_A, |x| (-x*x).exp());

        Sub-test 2 (Backend B — ShiftChernoff1D):
          grid_B   = Grid1D::<f64>::new(-10.0, 10.0, 512)?;
          kernel_B = ShiftChernoff1D::<f64>::new(1.0, 0.0, 0.0, grid_B.clone())?;
          f0_B     = GridFn1D::from_fn(&grid_B, |x| (-x*x).exp());

        Sub-test 3 (Backend C — ManifoldChernoff on Sphere2):
          sphere   = Sphere2::<f64>::new();
          mesh_C   = sphere.icosahedral_mesh(64)?;
          kernel_C = ManifoldChernoff::<Sphere2<f64>, f64>::new(sphere, mesh_C.clone())?;
          f0_C     = ManifoldFn::from_fn(&mesh_C, |p| harmonic_y_2_0(p));

        Sub-test 4 (Backend D — HypoellipticChernoff on KolmogorovPhaseSpace):
          grid_D   = GridND::<f64, 2>::new([-5.0, -5.0], [5.0, 5.0], [128, 128])?;
          x0_drift = Box::new(KolmogorovPhaseSpace::<f64>::x0_drift());
          x_diff   = [Box::new(KolmogorovPhaseSpace::<f64>::x1_diffusion())];
          kernel_D = HypoellipticChernoff::<f64, 2, 1>::new(x0_drift, x_diff, grid_D.clone())?;
          f0_D     = GridFnND::from_fn(&grid_D, |(x, v)| (-(x*x+v*v)/2.0).exp());

        Sub-test 5 (Backend E — AnisotropicShiftChernoffND, d=2):
          grid_E   = GridND::<f64, 2>::new([-5.0, -5.0], [5.0, 5.0], [128, 128])?;
          a_ij     = const_anisotropic_2x2(1.0, 0.5, 0.5, 1.0);
          kernel_E = AnisotropicShiftChernoffND::<f64, 2>::new(a_ij, ..., grid_E.clone())?;
          f0_E     = GridFnND::from_fn(&grid_E, |(x, y)| (-(x*x+y*y)).exp());

      Per-backend test:
        T       = 0.5_f64;
        n       = 64_u32;
        tau     = T / (n as f64);
        x_query = grid_centre_of(kernel.grid());
        full_grid_state = (0..n).fold(f0.clone(), |acc, _| {
            let mut dst = acc.clone();
            let mut pool = ScratchPool::<f64>::new();
            kernel.apply_into(tau, &acc, &mut dst, &mut pool).unwrap();
            dst
        });
        full_at_x = full_grid_state.sample(&x_query);
        pe_at_x   = kernel.eval_at(tau, &f0, &x_query, n).unwrap();
        ASSERT pe_at_x.to_bits() == full_at_x.to_bits();

      Rationale: byte-identity at f64 verifies the iterator is mathematically
      AND numerically exact. Any 1-ULP discrepancy indicates an implementation
      bug in the bound-stack iterator (the iterator should compute exactly the
      same floating-point reductions as the full-grid sampled output).

      Test file: tests/point_eval_byte_identity.rs (new file, v4.0 Wave B
      engineer). 5 sub-tests; failure of ANY sub-test BLOCKS v4.0 release.
    test_file: "tests/point_eval_byte_identity.rs"
    feature_gate: "slow-tests"

  # =========================================================================
  # v4.0 ADR-0081 — A2 d-D anisotropic shift flagship slope gate (per-D).
  # =========================================================================
  - name: G_DDIM
    cases: 4
    severity: RELEASE_BLOCKING
    gate: "d-D anisotropic shift convergence slope finite AND ≤ -0.95 at T = 0.5 for d ∈ {2,3,4,5} on COARSE grid N_AXIS={8,8,8,6}, n_ref=512; sweep {32,64,128,256} (d=2,3) / {16,32,64,128} (d=4,5) (order-1; ADR-0112 + AMENDMENT 1)"
    purpose: |
      G_DDIM (d-D anisotropic shift Chernoff convergence — math.md §32.5,
      ADR-0081, CORRECTED by ADR-0112):
      Verifies the AnisotropicShiftChernoffND<F, D> kernel (math §32.3
      Theorem 32.1 cousin formula + §32.4 Gauss-Hermite quadrature of the
      anisotropic Gaussian) converges at the ORDER-1 rate (frozen-coefficient
      kernel; no ζ²-d-D correction — the pre-v6 "order-2 baseline" claim was
      false, see ADR-0112) at fixed T = 0.5 for d ∈ {2, 3, 4, 5} on the per-D
      sweep {32,64,128,256} (d=2,3) / {16,32,64,128} (d=4,5).

      v6.0.0 CORRECTIONS (ADR-0112):
        - Threshold -1.95 → -0.95 (kernel is genuinely order-1 for variable A).
        - Gate now asserts slope.is_finite() FIRST (NaN/Inf is a HARD FAIL;
          closes the f64::max(0.0, NaN)=0.0 self-masking hole that hid the
          pre-v6 F(0)≠I divergence).
        - N is now a D-dependent ladder (uniform N=128 was 274 GB at D=5).
        - NEW required F(0)=I smoke sub-test per D (math §32.4 unit witness).
        - D=5 gate restored to -0.95 (same as D≤4); the fabricated
          "ADR-0081 §D=5 fallback" -1.7 relaxation is REMOVED (was never real).

      v6.0.0 AMENDMENT 1 (ADR-0112 AMENDMENT 1, 2026-05-30):
        - N(D) ladder corrected to a UNIFORM COARSE grid: N_AXIS={8,8,8,6},
          n_ref=512 for ALL D. Adversarial QA falsified the original
          "spatial floor cancels common-mode" reasoning: D=2,N=128 → slope
          ≈ -0.05 (FAILS); D=3,N=32 → slope ≈ -0.67 (FAILS); both pass at N=8
          (-1.03 / -1.20). Root cause: per-step multilinear INTERPOLATION error
          at off-grid GH nodes accumulates O(n·dx²) and does NOT cancel between
          the n-step iterate and the 512-step reference. A COARSE grid is
          REQUIRED so the temporal-truncation signal dominates the floor.
        - D=5 slope ≈ -0.9614 clears the -0.95 gate by a THIN margin (~1.5%);
          honest curse-of-dimensionality boundary at N=6 (see math §32.5).

      Resolution ladder N_AXIS(D) / n_ref(D) / n-sweep (NORMATIVE; math §32.5;
      matches the test files verbatim, verified 2026-05-30):
        D=2: N_AXIS=8, n_ref=512, sweep {32,64,128,256}
        D=3: N_AXIS=8, n_ref=512, sweep {32,64,128,256}
        D=4: N_AXIS=8, n_ref=512, sweep {16,32,64,128}
        D=5: N_AXIS=6, n_ref=512, sweep {16,32,64,128}
      The gate is N-SENSITIVE (NOT N-robust): the interpolation floor scales
      with step count and does NOT cancel common-mode, so the grid MUST be
      coarse for the temporal-order signal to dominate (ADR-0112 AMENDMENT 1).

      Setup (per dimension D ∈ {2, 3, 4, 5}):
        let N = N_AXIS[D];   // {2:8, 3:8, 4:8, 5:6} — coarse (ADR-0112 AMENDMENT 1)
        let grid: GridND<f64, D> = GridND::new([-5.0; D], [5.0; D], [N; D])?;

        // Anisotropic diffusion tensor: identity + small off-diagonal coupling.
        let a_ij = |x: &[f64; D]| -> SquareMatrix<f64, D> {
            let mut a = SquareMatrix::<f64, D>::identity();
            for i in 0..D {
                for j in (i+1)..D {
                    a[(i, j)] = 0.25 * (x[i] + x[j]).tanh();           // smooth bounded off-diagonal
                    a[(j, i)] = a[(i, j)];
                }
            }
            a
        };
        let b_i = |_x: &[f64; D]| -> [f64; D] { [0.0; D] };
        let c   = |_x: &[f64; D]| -> f64        { 0.0 };

        let kernel = AnisotropicShiftChernoffND::<f64, D>::new(
            a_ij, b_i, c, grid.clone(),
        )?;

        let f0 = GridFnND::<f64, D>::from_fn(&grid, |x| {
            (-x.iter().map(|xi| xi*xi).sum::<f64>()).exp()
        });
        // ApproximationSubspace<2, F> witness check at construction.
        assert!(kernel.in_subspace::<2>(&f0));

      Reference: high-resolution AnisotropicShiftChernoffND at n_ref(D) on
      the SAME grid (self-convergence gate; closed-form analytic reference
      available only for constant A, which the test datum is not).

      F(0)=I smoke sub-test (REQUIRED, runs BEFORE the sweep), per D:
        for tau in {0.0, T/16.0, T/128.0}:
          let one = GridFnND::from_fn(grid, |_| 1.0);
          kernel.apply_into(tau, &one, &mut out, &mut pool)?;
          ASSERT ||out - one||_∞ < 1e-12;     // guards §32.4 normalization

      Per-dimension slope sweep + gate:
        For n in N_SWEEP[D]:   // {32,64,128,256} for d=2,3; {16,32,64,128} for d=4,5
          tau_n   := T / n;
          evolver := Evolver::new(kernel.clone(), n)?;
          u_n     := evolver.evolve(T, &f0)?;
          err_n   := ||u_n - u_ref||_∞;
        slope := OLS_log_log(err_n vs 1/n);
        ASSERT slope.is_finite();             // NaN/Inf is a HARD FAIL (ADR-0112)
        ASSERT slope ≤ -0.95.                 // order-1; d=5 thin margin ≈ -0.9614 (ADR-0112 AMENDMENT 1)

      Per-dimension test files:
        - tests/anisotropic_shift_nd_d2_slope.rs
        - tests/anisotropic_shift_nd_d3_slope.rs
        - tests/anisotropic_shift_nd_d4_slope.rs
        - tests/anisotropic_shift_nd_d5_slope.rs

      Note: d = 5 is the LARGEST gated dimension (tensor-product Gauss-Hermite
      quadrature cost 5^5 = 3125 per evaluation point is the engineering edge
      of CI runtime budget). d ≥ 6 compiles but is NOT gated; Smolyak sparse
      grids for d ≥ 6 deferred to v4.1+ per math §32.6. The order-2 ζ²-d-D
      lift is deferred (math §32.5 Note, §32.6, ADR-0112); v6.0.0 ships order-1.

      Failure of ANY per-D sub-test (F(0)=I smoke OR slope) BLOCKS release.
    test_file: "tests/anisotropic_shift_nd_d{2,3,4,5}_slope.rs"
    feature_gate: "slow-tests"

  # =========================================================================
  # v4.x ADR-0082 AMENDMENT 2 — B5 Matrix-valued operators slope gate (per-M).
  # Threshold restored -0.80 → -1.95 (block-CN Phase 2 achieves order-2).
  # =========================================================================
  - name: G_MATRIX
    cases: 4
    severity: RELEASE_BLOCKING
    gate: "Coupled-diffusion matrix-valued slope ≤ -1.95 on n ∈ {256, 512, 1024, 2048} sweep at T = 0.5 for M ∈ {1, 2, 3, 4} (ADR-0082 AMENDMENT 2)"
    purpose: |
      G_MATRIX (Coupled matrix-valued diffusion convergence — math.md §33.4,
      ADR-0082 AMENDMENT 2):
      Verifies the MatrixDiffusionChernoff<F, const M: usize> kernel implements
      order-2 palindromic Strang splitting (Phase 1: exp(τ/2·C), Phase 2:
      block-CN Cayley map, Phase 3: exp(τ/2·C)) per math §33.3 Theorem 33.2
      AMENDMENT 2. All four M ∈ {1, 2, 3, 4} must converge at slope ≤ -1.95.

      Setup (per M ∈ {1, 2, 3, 4}):
        let N = 128_usize;
        let grid = Grid1D::<f64>::new(-5.0, 5.0, N)?;

        // Deterministic SPD coupling matrices via canonical PCG64 seed.
        let rng = PCG64::new(0xC0FFEE_BABE_DEAD_BEEF);
        let a_ij = generate_spd_matrix_field::<M>(&grid, &rng);
        let b_ij = generate_skew_matrix_field::<M>(&grid, &rng);
        let c_ij = generate_symmetric_matrix_field::<M>(&grid, &rng);

        let kernel = MatrixDiffusionChernoff::<f64, M>::new(
            a_ij, b_ij, c_ij, grid.clone(),
        )?;

        let u0 = MatrixGridFn1D::<f64, M>::from_fn(&grid, |x| {
            let mut comp = [0.0_f64; M];
            for i in 0..M {
                comp[i] = (-x*x / (1.0 + 0.2 * i as f64)).exp();
            }
            comp
        });
        // ApproximationSubspace<2, F> witness check at construction.
        assert!(kernel.in_subspace::<2>(&u0));

      Sub-tests:

        Sub-test 1 (M = 1 slope sub-test at threshold -1.95):
          Sweep n ∈ {256, 512, 1024, 2048}; reference at n_ref = 8192;
          slope := OLS_log_log(err_n vs 1/n);
          ASSERT slope ≤ -1.95.
          (Replaces v4.0 byte-identity; block-CN M=1 achieves order-2 convergence
          but not byte-equality with v0.3.0 DiffusionChernoff per AMENDMENT 2.)

        Sub-test 2 (M = 2 slope):
          Sweep n ∈ {256, 512, 1024, 2048}; reference at n_ref = 8192;
          slope := OLS_log_log(err_n vs 1/n);
          ASSERT slope ≤ -1.95.

        Sub-test 3 (M = 3 slope): same algorithm, M = 3.

        Sub-test 4 (M = 4 slope):
          Sweep n ∈ {512, 1024, 2048, 4096}; reference at n_ref = 16384;
          ASSERT slope ≤ -1.95.

      Per-M test files:
        - tests/matrix_diffusion_m1_slope.rs     (NEW: replaces m1_byte_identity)
        - tests/matrix_diffusion_m2_slope.rs
        - tests/matrix_diffusion_m3_slope.rs
        - tests/matrix_diffusion_m4_slope.rs

      Note: M = 4 uses Cayley-Hamilton closed-form matrix exponential (cost

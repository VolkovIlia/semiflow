        status: advisory
        advisory: true
        p999: null
      "aws-c7g-large":            # placeholder — advisory until calibration sample collected
        status: advisory
        advisory: true
        p999: null
    output_format: jsonl
    parser: hdr_snapshot
    purpose: |
      Assert the v2.7 Laplace-Chernoff resolvent (ADR-0069) per-call latency floor:
      32-point Gauss-Laguerre quadrature × n=64 Chernoff truncation × point-evaluation,
      on the heat equation core (Reflect BC, N=256). Demonstrates the
      "preconditioner-free resolvent" performance story is operationally viable

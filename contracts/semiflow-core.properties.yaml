# recalibration closes both gaps: (a) extending sweep to N=1024 enters the
# asymptotic regime per the 1D wide-sweep evidence in
# tests/convergence_rate_6th.rs (which uses prime-N up to 3989 for the
# same reason); (b) requiring `-C target-cpu=native` activates AVX2
# intrinsics the Block C kernels were already designed for. The runtime
# budget rises 120→300 s to absorb N=1024² = 1 048 576 cells (4× N=512²)
# while still asserting the ROADMAP item 3 ≥5× combined speedup —
# without recalibration, a serial-scalar path at N=1024² would take
# ≈30–50 min, so the 300 s budget retains the FLAGSHIP perf-evidence
# property. Pairs with ADR-0019 amendment tightening cfg gate to
# `cfg(all(target_arch, target_feature = "avx2"))` so the silent-scalar
# trap is closed at compile time.
#
# 0.7.1 (v0.8.0 Block B, ADR-0018) — adds STRANG2D_PARALLEL_BIT_EQUAL
# (release-blocking bit-equal contract gate for multi-threaded Strang2D::apply)
# and STRANG2D_PARALLEL_SPEEDUP (informational, ROADMAP target). Both gates
# are `feature_gate: ["parallel", "slow-tests"]` and live in
# tests/strang2d_parallel_bit_equal.rs (new file).
#
# 0.7.2 (v0.8.0 Block C, ADR-0019) — adds SIMD_BIT_EQUAL (release-blocking
# bit-equal contract gate for the AVX2/NEON intrinsic kernels vs the scalar
# fallback) and SIMD_HERMITE_SPEEDUP / SIMD_COMBINED_SPEEDUP (informational
# ROADMAP-mandated speedup targets). All three live in
# tests/simd_bit_equal.rs (new file, #[cfg(feature = "simd")]); the speedup
# gates additionally require `slow-tests`. Tight bit-equality is achievable
# because the SIMD impl forbids FMA in vectorized hot paths and matches the
# scalar reduction order lane-for-lane (see tensor.yaml `simd` block).
#
# 0.7.3 (v0.8.0 Block D, ADR-0020) — adds G3_6_2D (release-blocking 2D
# 6th-order spatial slope FLAGSHIP gate, deferred from v0.7.0 per ROADMAP
# v0.8.0 item 4). Closed-form 2D heat-kernel oracle on Strang2D
# <Diffusion6thChernoff, Diffusion6thChernoff>; sweep N ∈ {64, 128, 256, 512}
# at fixed N_CHERNOFF=1000 steps, T=0.5, [-15, 15]², constant a=0.5/axis,
# QuinticHermite per axis. Two-sided slope window [-6.15, -5.85] (asymptote
# ≈ -5.95 by Theorem 7 tensor-product collapse). Lives in
# tests/convergence_rate_6th_2d.rs (new file, #[cfg(feature = "slow-tests")])
# and additionally requires the `parallel,simd` build matrix to meet the
# 120 s wallclock budget — the runtime budget itself is the FLAGSHIP
# evidence that v0.8.0 Blocks B+C delivered ROADMAP item 3 (≥5× combined
# speedup at N=512²+ scale). NO new dependency. NO new sympy script — 2D
# claim reduces to 1D K7+FD9+QH gates already verified in v0.7.0
# (verify_v0_7_0_kkernel.py + verify_v0_7_0_zeta6.py) via
# Lemma 10.2/Theorem 7 separable-commutator identity.
test_framework: "proptest"
crate: semiflow-core
location: "crates/semiflow-core/tests/properties.rs"
default_cases: 1000          # baseline; G4 / G4-strang overrides to 10000
shrink_enabled: true

# v0.2.2 (ADR-0006 Amendment 5):
#   - drift_reaction_constant_fast_path_exact (1000 cases)
#   - drift_reaction_variable_order2          (200 cases)
# Both new properties live alongside the existing v0.2.0 strang_*
# properties in tests/strang_properties.rs.
#
# v0.3.0 (ADR-0008 + Amendment 1, option ζ — supersedes the v0.2.3 β plan):
#   - diffusion_chernoff_constant_fast_path_exact          (1000 cases)
#       — Constructor signature updated to 5 args
#         `DiffusionChernoff::new(a, a_prime, a_double_prime, a_norm, grid)`;
#         pass `|_| 0.0_f64` for both `a_prime` and `a_double_prime` for
#         constant-`a` callers (sympy gate Z_const-a, NORMATIVE).
#   - diffusion_chernoff_variable_zeta_liouville_oracle    (200 cases)
#       — RENAMED from `diffusion_chernoff_variable_gamma_liouville_oracle`
#         (which had been renamed earlier from
#         `*_order1_liouville_oracle`). Slope gate retained at ≤ -0.95
#         per Amendment 2 (the original ≤ -1.95 spec was rolled back —
#         mathematically correct for the ζ-A formula but numerically
#         unreachable due to the FD discretization ceiling on
#         `f', f'', f'''`; see ADR-0008 Amendment 2 + math.md §9.2.3.B).
#         The property's invariant code constructs
#         `DiffusionChernoff::new(a, a_prime, a_double_prime, a_norm,
#         grid)` with analytic derivatives:
#           a(x)              = (1 + γ·x)²
#           a_prime(x)        = 2γ·(1 + γ·x)
#           a_double_prime(x) = 2γ²        (constant)
#   - diffusion_chernoff_a_prime_consistency               (50 cases)
#       — soft caller-correctness check that user-supplied `a_prime(x)`
#         matches `(a(x+h)-a(x-h))/(2h)` within 1% over random x-points.
#         Unchanged from γ-A.
#   - diffusion_chernoff_a_double_prime_consistency        (50 cases, NEW)
#       — soft caller-correctness check that user-supplied
#         `a_double_prime(x)` matches the central FD second derivative
#         `(a(x+h) − 2·a(x) + a(x−h))/h²` within 1% over random x-points.
#         Failure indicates caller error in the analytic second
#         derivative (most common: sign error in chain rule).
# All four properties live in tests/strang_properties.rs (alongside
# the v0.2.2 drift_reaction_* properties).
#
# v0.2.3 plan history (NOT shipped): the originally-planned formula β
# (single-pass symmetric arithmetic mean of `a` per leg-pair, ADR-0006
# Amendment 6.1) was SUPERSEDED by ADR-0008 (option γ, API break) and
# the γ-only formula was then EXTENDED to ζ-A (option ζ, ADR-0008
# Amendment 1) within the same v0.3.0 release. The v0.2.3 micro-bump is
# skipped. The β derivation document and the symmetric-stencil
# impossibility theorem (math.md §9.2.2) are retained as canonical
# reference content — ζ-A escapes the impossibility theorem because the
# τ²-correction is added OUTSIDE the symmetric K-factor.

# ---------------------------------------------------------------------------
# Random generators (proptest::Strategy fragments).
# ---------------------------------------------------------------------------
generators:
  - name: bounded_coeff
    rust: "any::<f64>().prop_filter('finite', |v| v.is_finite()).prop_map(|v| v.clamp(-5.0, 5.0))"
    used_for: "a, b, c constants in (-5, 5) range, f64 finite"

  - name: positive_diffusion
    rust: "(0.01f64..=5.0f64)"
    used_for: "a coefficient (Theorem 6 requires inf a >= a_0 > 0)"

  - name: small_tau
    rust: "(1e-6f64..=0.1f64)"
    used_for: "Chernoff step tau, kept small to keep S(tau) close to I"

  - name: gaussian_state
    rust: |
      // GridFn1D::from_fn(grid, |x| amplitude * (-(x - mu).powi(2) / (2.0 * sigma_sq)).exp())
      (
        (0.5f64..=2.0f64),     // amplitude
        (-2.0f64..=2.0f64),    // mu
        (0.1f64..=2.0f64),     // sigma^2
      )
    used_for: "smooth bounded initial data, C^infty"

  - name: standard_grid
    rust: "Just(Grid1D::new(-10.0, 10.0, 1000).unwrap())"
    used_for: "frozen grid matching G1/G2 setup"

# ---------------------------------------------------------------------------
# Properties.
# ---------------------------------------------------------------------------
properties:

  - name: quasi_contractivity
    cases: 10000   # G4 explicit
    purpose: |
      Verify the bound `||S(tau) f||_inf <= (1 + |c|*tau + 10*tau^2) * ||f||_inf`
      derived in `contracts/semiflow-core.math.md` §3. Direct realisation of G4.
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      let s = ShiftChernoff1D::new(|_| a, |_| b, |_| c, c.abs());
      let result = s.apply(tau, &f).unwrap();
      let lhs = result.norm_sup();
      let rhs = (1.0 + c.abs() * tau + 10.0 * tau * tau) * f.norm_sup();
      assert!(lhs <= rhs, "lhs = {}, rhs = {}, tau = {}, c = {}", lhs, rhs, tau, c);
    failure_mode: "If violated, check that interpolation overshoot in CubicHermite is < 10*tau^2 of f.norm_sup()"

  - name: chernoff_idempotence_at_t0
    cases: 100
    purpose: |
      S(0) = I. With tau == 0, the only nonzero contribution is the (1/4 + 1/4 + 1/2) * f(x_i)
      sum (no shifts move off-node) and the 0 * c * f(x_i) term vanishes.
      Modulo interpolation noise on the IDENTITY shifts (which evaluate
      exactly at x_i), result == f to machine precision.
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      f: gaussian_state
    invariant: |
      let s = ShiftChernoff1D::new(|_| a, |_| b, |_| c, c.abs());
      let result = s.apply(0.0, &f).unwrap();
      let diff = (&result - &f).norm_sup();   // requires axpy-style helper in tests
      assert!(diff <= 1e-12, "diff = {} exceeds 1e-12 floor", diff);

  - name: linearity
    cases: 500
    purpose: |
      S is linear: S(tau)(alpha * f + beta * g) == alpha * S(tau) f + beta * S(tau) g.
      Critical for ensuring no accidental nonlinearity (e.g., abs() on values).
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      alpha: bounded_coeff
      beta: bounded_coeff
      f: gaussian_state
      g: gaussian_state
    invariant: |
      let s = ShiftChernoff1D::new(|_| a, |_| b, |_| c, c.abs());
      // h = alpha * f + beta * g
      let mut h = f.clone(); h.scale(alpha); h.axpy(beta, &g);
      let lhs = s.apply(tau, &h).unwrap();

      let s_f = s.apply(tau, &f).unwrap();
      let s_g = s.apply(tau, &g).unwrap();
      let mut rhs = s_f.clone(); rhs.scale(alpha); rhs.axpy(beta, &s_g);

      let mut diff = lhs.clone(); diff.axpy(-1.0, &rhs);
      assert!(diff.norm_sup() <= 1e-10 * (1.0 + h.norm_sup()),
              "linearity violated: diff = {}", diff.norm_sup());

  - name: consistency_with_pure_drift
    cases: 200
    purpose: |
      With a = 0+ (epsilon-positive), c = 0, b = const != 0, formula (6) reduces to
      `(S(tau) f)(x) ≈ (1/4 + 1/4) f(x ± 0+) + (1/2) f(x + 2 b tau) + 0`,
      i.e., approximately a (1/2)f(x) + (1/2)f(x + 2 b tau) — a half-translate.

      SIGN CONVENTION (do NOT "fix" this back — it is correct):
      The term `f(x + 2 b tau)`, viewed as a function of x, is `f` translated to
      the LEFT by `2 b tau` (for b>0): the new function takes at point x the
      value `f` had at the point `2 b tau` to the right, so the graph slides
      LEFT. Hence the half-weighted average has centre of mass at
      `(1/2)*0 + (1/2)*(-2 b tau) = -b tau`.
      This matches the true semigroup `∂_t u = b * u'` whose solution
      `u(t,x) = u_0(x + b t)` also has COM moving to `-b t`.

      RELAXED INVARIANT (because of the residual 1/2 from the diffusion shifts at a -> 0+):
      The result's centre of mass shifts by approximately -b * tau.

      Engineer note: this is a SANITY check, not a sharp assertion.
    inputs:
      b: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      let a_eps = 1e-6;  // positive but tiny
      let s = ShiftChernoff1D::new(|_| a_eps, |_| b, |_| 0.0, 0.0);
      let result = s.apply(tau, &f).unwrap();
      // Centre-of-mass shift heuristic:
      let com_before = centre_of_mass(&f);
      let com_after  = centre_of_mass(&result);
      // Sign: f(x + 2 b tau) shifts the GRAPH LEFT by 2 b tau (see purpose note),
      // half-weighted with f(x) gives COM motion of -b*tau (NOT +b*tau).
      let expected   = -b * tau;  // (1/2) weight on the b-shift => -b*tau as COM motion
      // With Gaussian and small tau (O(tau^2) Taylor remainder + interp noise):
      let tol = 0.1 * (b.abs() * tau + tau).max(1e-3);
      assert!((com_after - com_before - expected).abs() <= tol,
              "drift sanity: actual = {}, expected ~ {}", com_after - com_before, expected);

  - name: consistency_with_pure_decay
    cases: 200
    purpose: |
      With a = epsilon, b = 0, c = const < 0, formula (6) reduces to roughly
      `f(x) + tau * c(x) * f(x) = (1 + tau c) f(x)`. Iterating n steps to t:
      `||(S(t/n))^n f||_inf <= (1 + |c| t/n)^n * ||f||_inf -> e^(|c| t) * ||f||_inf` from above.
      For c < 0, the result decays.
    inputs:
      c_neg: "(-5.0f64..=-0.1f64)"
      f: gaussian_state
    invariant: |
      let s = ShiftChernoff1D::new(|_| 1e-6, |_| 0.0, |_| c_neg, c_neg.abs());
      let n = 200_usize;
      let t = 1.0;
      let semi = ChernoffSemigroup::new(s, n).unwrap();
      let result = semi.evolve(t, &f).unwrap();
      // Decay bound (with slack for diffusion eps and interp noise):
      let upper = ((1.0 + c_neg.abs() * t / n as f64).powi(n as i32) + 1e-3) * f.norm_sup();
      let lower = 0.0;  // norm is non-negative
      assert!(result.norm_sup() <= upper && result.norm_sup() >= lower,
              "decay bounds violated: result = {}, upper = {}", result.norm_sup(), upper);

# ---------------------------------------------------------------------------
# v0.2.0 properties — operator splitting (ADR-0006).
# Location: crates/semiflow-core/tests/strang_properties.rs
# ---------------------------------------------------------------------------

  - name: strang_split_quasi_contractivity
    cases: 10000   # G4-strang explicit
    purpose: |
      Verify the bound `||Phi(tau) f||_inf <= (1 + |c|*tau + 20*tau^2) * ||f||_inf`
      derived in `contracts/semiflow-core.math.md` §9.6 for
      `Phi = StrangSplit<DiffusionChernoff, DriftReactionChernoff>`.
      Direct realisation of G4-strang. Constant `C = 20` (vs `10` for plain
      ShiftChernoff1D) accounts for the Strang sandwich's two D-applications
      with positive sub-Markov weights and one R-application multiplying by
      exp(tau*c).
    inputs:
      a: positive_diffusion
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      // v0.3.0 (ADR-0008 Amendment 1, ζ-A): pass `|_| 0.0_f64` for BOTH
      // a_prime AND a_double_prime (constant a ⇒ a' ≡ a'' ≡ 0).
      let d = DiffusionChernoff::new(|_| a, |_| 0.0_f64, |_| 0.0_f64, a, f.grid.clone());
      let r = DriftReactionChernoff::new(|_| b, |_| c, c.abs());
      let phi = StrangSplit::new(d, r);
      let result = phi.apply(tau, &f).unwrap();
      let lhs = result.norm_sup();
      let rhs = (1.0 + c.abs() * tau + 20.0 * tau * tau) * f.norm_sup();
      assert!(lhs <= rhs,
              "G4-strang: lhs = {}, rhs = {}, tau = {}, c = {}", lhs, rhs, tau, c);
    failure_mode: |
      If violated, check (1) DiffusionChernoff weights sum to exactly 1
      (positive sub-Markov) — small floating-point drift permitted,
      (2) DriftReactionChernoff exp(tau*c) is computed via libm::exp,
      (3) interpolation overshoot bounded by 5*tau^2 of f.norm_sup()
          (the C=20 budget covers 2*D-step overshoot + R-step exp(tau*c) excess).

  - name: diffusion_chernoff_consistency
    cases: 200
    purpose: |
      DiffusionChernoff is a Chernoff function for A = a*d^2/dx^2:
      D'(0) f = a*f''. Verified via the difference quotient
      (D(tau)f - f) / tau ~ a * f'' as tau -> 0.
      For Gaussian f(x) = exp(-x^2): f''(x) = (4*x^2 - 2)*f(x). At x=0:
      f''(0) = -2.
    inputs:
      a: positive_diffusion
      f: gaussian_state
    invariant: |
      // v0.3.0 (ADR-0008 Amendment 1, ζ-A): pass `|_| 0.0_f64` for BOTH
      // a_prime AND a_double_prime (constant a ⇒ a' ≡ a'' ≡ 0).
      let d = DiffusionChernoff::new(|_| a, |_| 0.0_f64, |_| 0.0_f64, a, f.grid.clone());
      let tau_small = 1e-4;
      let result = d.apply(tau_small, &f).unwrap();
      // Sample at the central node (x ≈ 0):
      let i_centre = f.grid.n / 2;
      let lhs = (result.values[i_centre] - f.values[i_centre]) / tau_small;
      // For Gaussian f at x=0: f''(0) = -2 * f(0)
      let f_doubleprime_at_0 = -2.0 * f.values[i_centre];
      let expected = a * f_doubleprime_at_0;
      // Tolerance: O(tau_small) consistency error + O(dx^4) interp error
      assert!((lhs - expected).abs() <= 0.05 * expected.abs() + 1e-3,
              "D'(0) f != a*f'': lhs = {}, expected = {}", lhs, expected);

  - name: drift_reaction_exact_characteristic
    cases: 200
    purpose: |
      For constant b, c: R(tau) f(x) = exp(tau*c) * f(x + tau*b) is the
      EXACT solution of dot v = b * v_x + c*v with v(0,x) = f(x).
      Verify by sampling at a sub-grid point and comparing with closed-form.

      v0.2.2 NOTE: with RK2 (ADR-0006 Amendment 5), `R(τ)` STILL satisfies
      this identity for **constant** b, c — see math.md §9.3 reduction
      lemma. The expected RHS uses sign `+τb` (matching the foot-point
      convention `X(τ,x) = x + τb`); the property below uses `f.sample(x_centre + tau*b)`
      after a sign typo fix. Tolerance loosened from 1e-10 to 1e-12 to
      assert bit-equal-modulo-IEEE-rearrangement (the v0.2.2 trapezoidal
      `(τ/2)·(c+c)` may differ from v0.2.1 `τ·c` by ≤ 2 ULPs).
    inputs:
      b: bounded_coeff
      c: bounded_coeff
      tau: small_tau
      f: gaussian_state
    invariant: |
      let r = DriftReactionChernoff::new(|_| b, |_| c, c.abs(), f.grid.clone());
      let result = r.apply(tau, &f).unwrap();
      let i_centre = f.grid.n / 2;
      let x_centre = f.grid.x_at(i_centre);
      // Sign convention: foot-point X(τ,x) = x + τb (PLUS), so closed form
      // is exp(τc) · f.sample(x + τb).
      let expected = (tau * c).exp() * f.sample(x_centre + tau * b);
      assert!((result.values[i_centre] - expected).abs() <= 1e-12,
              "R(tau) deviates from closed form: actual = {}, expected = {}",
              result.values[i_centre], expected);

  - name: drift_reaction_constant_fast_path_exact
    cases: 1000   # v0.2.2 (ADR-0006 Amendment 5)
    purpose: |
      Reduction-to-constant lemma (math.md §9.3 / verification §5):
      for constant b ≡ b₀, c ≡ c₀, the v0.2.2 RK2 formula collapses
      EXACTLY to the v0.2.1 closed form `exp(τc₀) · f(x + τb₀)`
      (bit-equal modulo IEEE rearrangement of `(τ/2)*c₀ + (τ/2)*c₀` vs
      `τ*c₀`).

      Tolerance 1e-13 is the empirical guard: ≈ 10⁴ ULPs at the relevant
      scale, generous enough to absorb any reasonable floating-point
      rearrangement, tight enough to detect a sign error or a missing
      factor of 2 in the trapezoidal weight.

      Direct realisation of invariant I3 (traits.yaml DriftReactionChernoff).
      Regression-safe by construction for v0.2.0 G1, G2, G3-strang,
      G4-strang and v0.2.1 boundary tests (all constant-coefficient).
    inputs:
      b0: "(-2.0f64..=2.0f64)"
      c0: "(-1.0f64..=1.0f64)"
      tau: "(0.0f64..=1.0f64)"
      f: gaussian_state
    invariant: |
      // Use the same gaussian_state grid (-10, 10, 1000) — match grid in `f`.
      let r = DriftReactionChernoff::new(|_| b0, |_| c0, c0.abs(), f.grid.clone());
      let result = r.apply(tau, &f).unwrap();
      // Sample 5 nodes uniformly to test multiple shifts:
      for i in [0, f.grid.n / 4, f.grid.n / 2, 3 * f.grid.n / 4, f.grid.n - 1] {
          let x = f.grid.x_at(i);
          let expected = (tau * c0).exp() * f.sample(x + tau * b0);
          let actual = result.values[i];
          let scale = expected.abs().max(1.0);
          assert!((actual - expected).abs() <= 1e-13 * scale,
                  "RK2 != v0.2.1 closed form at i={}: actual={}, expected={}, b0={}, c0={}, tau={}",
                  i, actual, expected, b0, c0, tau);
      }
    failure_mode: |
      If this property fails for a shrunk minimal case with b0 = c0 = 0,
      check the tau == 0 short-circuit (`b_mid = b0 = 0, x_foot = x,
      reaction = 1`). If it fails for tau small + b0 nonzero, check
      sign of midpoint probe (MUST be `x + 0.5*tau*b0`, not `x - ...`).
      If it fails for c0 nonzero, check trapezoidal weight `0.5 * tau * (c0 + c_foot)`,
      not `tau * c0` (that's v0.2.1) and not `tau * c_foot` (off by half).

  - name: drift_reaction_variable_order2
    cases: 200    # v0.2.2 (ADR-0006 Amendment 5)
    purpose: |
      Variable-coefficient order-2 lift (invariant I2). Uses the
      manufactured-solution oracle from math.md §9.3 / verification §6:
      linear-restoring drift `b(x) = -γx`, constant reaction `c ≡ -κγ`.
      Closed-form solution for Gaussian initial data:

        u(τ, x) = exp(-κγτ) · exp(-x²·exp(-2γτ) / (2σ²)).

      For each (γ, κ, σ, x_test) tuple the property iterates a 5-point
      τ-sweep `tau ∈ {2^-6, 2^-7, 2^-8, 2^-9, 2^-10}`, computes
      |R(τ)f - u(τ,·)|_∞ at x = x_test (single-node check; oracle is
      exact in x), fits the log-log slope of error vs. τ, and asserts
      slope ≤ -1.95.

      v0.2.1 (first-order R for variable b) would give slope ≈ -1.0 here
      and FAIL; v0.2.2 RK2 gives slope ≈ -2.0. The property is the
      direct empirical guard for the order-2 lift.

      Note: the diffusion is intentionally NOT in this property — it
      isolates R's order-2 lift, free of D's contribution. G3-strang
      (constant-coefficient Strang) is unchanged in v0.2.2 by §5.
    inputs:
      gamma: "(0.5f64..=2.0f64)"
      kappa: "(-1.0f64..=1.0f64)"
      sigma: "(0.5f64..=2.0f64)"
      x_test: "(-2.0f64..=2.0f64)"
    invariant: |
      // The closures capture gamma, kappa via Box<dyn Fn> would be Box<dyn>;
      // for `fn` pointers we need to use `static GAMMA: AtomicU64` or
      // re-declare per case. QA Engineer SHOULD use a `proptest!` block
      // that consumes `gamma, kappa, sigma, x_test` and constructs
      // `DriftReactionChernoff::new(b_fn, c_fn, c_norm_bound, grid)` where
      // `b_fn`, `c_fn` are *parameterised at the property level* via the
      // standard `fn` capture-of-thread-local pattern (see
      // tests/strang_properties.rs for an existing example, or fall back
      // to a DriftReactionChernoffDyn variant with Box<dyn Fn>).
      //
      // Pseudocode (Engineer fills in fn-pointer harness):
      //
      //   let grid = Grid1D::new(-10.0, 10.0, 1000).unwrap();
      //   let f = GridFn1D::from_fn(grid.clone(), |x| (-x*x / (2.0 * sigma * sigma)).exp());

# ---------------------------------------------------------------------------
# L-gates (v2.6, ADR-0068, math.md §3.6.bis — NEW top-level section).
# ---------------------------------------------------------------------------
#
# L-gates assert percentile budgets on operator-application latency under
# a fixed canonical input and a named hardware profile. Distinct from
# `properties:` entries (which assert mathematical / contractual invariants
# host-independently). Each L-gate carries a per-profile budget map; the
# `xtask latency-gate <id> --hardware-profile <profile>` subcommand parses
# this section, runs the designated bench, parses HDR JSONL output, and
# asserts percentile floors.
#
# v2.6 mode: ADVISORY (warning on breach, exit 0).
# v2.7 mode (ADR-0069): per-profile `advisory:` field is LOAD-BEARING. When
#   severity=RELEASE_BLOCKING AND advisory=false AND floor breached → exit 1.
#   Default-if-absent: advisory=true (backward-compat with v2.6 entries that
#   do not declare the field). See math.md §3.6.bis.7.
#
# Hardware-profile values are documented strings; the harness resolves them
# against the entry's `percentile_budgets_ns` map. Placeholder profiles
# (`status: advisory`) are advisory regardless of release version and serve
# to reserve schema slots for future calibration.
#
# Cross-refs: ADR-0066 (tracking-alloc — space companion), ADR-0067
# (latency_tail.rs — the v2.5.1 baseline measurement), ADR-0068 (this
# section's authorizing ADR), math.md §3.6.bis (normative semantics).

latency_gates:

  - id: L_CEV_PTICK
    severity: ADVISORY            # v2.6 — bump to RELEASE_BLOCKING at v2.7 (ADR-0069)
    bench_target: "crates/semiflow-core/examples/latency_tail.rs"
    bench_invocation: |
      cargo run --release --example latency_tail -- \
        --n 1536 --n-steps 200 --n-ticks 1000000 --warmup-ticks 1000 \
        --gbm-ticks-path crates/semiflow-core/examples/data/gbm_ticks_1M.bin \
        --out-json target/lgate/L_CEV_PTICK-rep{rep}.jsonl --rep {rep}
    measurement: "Per-tick CEV European-call pricing latency via DiffusionChernoff N=1536 (ADR-0067 §Decision)."
    canonical_input:
      seed: "PCG64(0xC0FFEE_BABE_DEAD_BEEF)"
      n: 1000000                  # 1M GBM tick samples
      sha256: "beac36ebe1c541bff4641debe170cb00b35aedb0e893ac8603470d98508b2863"
    replication:
      n_reps: 5
      n_per_rep: 1000000          # 1M ticks per rep
      warmup: 1000                # ticks discarded before measurement window
    percentile_budgets_ns:
      "i7-12700K":
        p50: 28                   # baseline 23ns + 22% headroom (rounded up)
        p99: 35                   # baseline 32ns + 10% headroom
        p999: 50                  # baseline 45ns + 11% headroom (math.md §3.6.bis.1 canonical)
        p9999: 200                # baseline ~150ns + 33% headroom (tail variability)
        baseline_p999_ns: 45
        headroom_pct: 11
        status: blocking          # gate is live
        advisory: false           # v2.7 (ADR-0069 §"Consequences") — PROMOTION from v2.6 implicit-true.
                                  # When severity=RELEASE_BLOCKING + advisory=false + floor breached → exit 1.
                                  # math.md §3.6.bis.7 (v2.7 amendment).
        calibrated_at: "2026-05-26"
        calibrated_from_adr: "ADR-0067"
        env_required:
          cpu_governor: "performance"
          intel_pstate_no_turbo: 0
          thermal: "≤ 25 °C ambient, ≥ 5 min warmup"
          rustflags: "-C target-cpu=native"
          features: "release"
      "m2-pro":                   # placeholder — advisory until v2.8 calibration run
        status: advisory
        advisory: true            # explicit (default-if-absent is also true)
        p999: null
      "aws-c7g-large":            # placeholder — advisory until v2.8 calibration run
        status: advisory
        advisory: true            # explicit (default-if-absent is also true)
        p999: null
    output_format: jsonl          # one record per rep — see latency_tail.rs §Stdout
    parser: hdr_snapshot          # HdrSnapshot<i64> (traits.yaml §4) via nearest-rank
    purpose: |
      Assert the v2.5.1 HFT latency baseline (ADR-0067) as a machine-readable
      contract: RC N=1536 CEV per-tick p999 ≤ 50 ns on i7-12700K, 149× advantage
      vs QuantLib V3 Schroder ncx2 at matched accuracy (5e-4 calibration gate
      vs Emanuel-MacBeth 1982). The L-gate is the contract-side complement to
      ADR-0066 tracking-alloc (which asserts the SPACE baseline: 0 allocations
      per tick after pool pre-warm).

      v2.6 mode: ADVISORY — `xtask latency-gate L_CEV_PTICK` runs the bench,
      parses JSONL, asserts the budgets, emits warnings on breach, exits 0.
      The advisory phase lets the project collect additional hardware-profile
      calibration data (m2-pro, aws-c7g-large) before any CI green-light
      depends on the floor. v2.7 promotes severity → RELEASE_BLOCKING.

      Cross-refs: math.md §3.6.bis (normative defn), ADR-0067 (baseline
      measurement), ADR-0068 (this gate's authorizing ADR).
    feature_gate: "release"       # release build required (debug latency is meaningless)


    pass_status: "PASS (max rel_err=3.901e-10 ≤ 1e-7 across 3 entries)"
    rationale: |
      G_SYMOP_ENTRY_FRECHET (RELEASE_BLOCKING, ADR-0186 §55.5–§55.6):
      `EntrySensitivity` + `graph_expmv_frechet` directional gradient
      ⟨dJ/dL_{ij}, δL_{ij}⟩ vs central finite difference on a N=3 triangle
      (edges (0,1,1.0),(1,2,0.7),(0,2,0.4)) with distinct weights ensuring
      [L, ∂L/∂L_{ij}] ≠ 0 for every entry. Three off-diagonal entries tested:

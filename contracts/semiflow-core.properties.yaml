  # v0.9.0 Block C: Strang3D / 3D tensor-product types (ADR-0024)
  # Test files: tests/heat_3d_oracle.rs    (G5_3D smoke, oracle separability)
  #             tests/strang_3d_slope.rs   (G5_3D slope gate, slow-tests)
  # =========================================================================

  - name: G5_3D
    cases: 1
    severity: NORMATIVE
    gate: "slope <= -1.95"
    recalibrated_at: "2026-05-09 (v0.11.0 prod-HW first run; see ADR-0024 Amendment 2026-05-09 and math.md §10.8.7 'Pre-asymptote diagnosis')"
    purpose: |
      G5_3D (spatial convergence, 3D separable diffusion):
      `Strang3D<DiffusionChernoff, DiffusionChernoff, DiffusionChernoff>`
      with constant `a = 0.1` per axis achieves spatial log-log OLS
      slope ≤ -1.95 over `N ∈ {32, 64, 128, 256}` per axis at fixed n=200
      Chernoff time steps. Oracle: closed-form 3D Gaussian heat kernel
      `D^{-3/2}·exp(-(x²+y²+z²)/D)`, `D = 1+4·a·T`, `T = 0.2`
      (eq. 10.8.7, math.md §10.8.7). Domain `[-5, 5]³`.

      Fast smoke test (N=16, n=200, gate 8e-2) lives in
      `tests/heat_3d_oracle.rs` (`g5_heat_3d_oracle_smoke`) — always
      runs (no feature gate). The rigorous slope gate is in
      `tests/strang_3d_slope.rs` (`g5_3d_slope`, feature `slow-tests`).

      Empirical note (recalibrated 2026-05-09): the original v0.9.0
      basket {16, 32, 64} included one under-resolved point — at N=16,
      dx ≈ 0.667 spans only ~2 grid points across the half-width
      σ = 1/√2 ≈ 0.707 of the Gaussian initial datum, placing N=16 in
      the pre-asymptotic regime. First prod-HW run (Intel i7-12700K,
      2026-05-09) measured per-N errors {2.37e-2, 1.51e-2, 4.50e-3}
      at {16, 32, 64}; log₂-ratio progression 0.65 → 1.75 monotonically
      approaches the order-2 asymptote but does not reach it
      (collapsed OLS slope -1.198, fails ≤ -1.95 by -0.75). Recalibrated
      to {32, 64, 128, 256}, mirroring the v0.9.0 G4_NS2D_aniso 2D
      self-convergence basket (commit 0180292, math.md §10.7-ter.7 —
      same "skip-the-coarsest-pre-asymptotic-point" convention: drop
      N=32 from 2D OLS, drop N=16 from 3D OLS). At N ≥ 32, dx ≤ 0.323
      resolves the Gaussian half-width with ≥ 4 grid points; spatial
      cubic-Hermite enters the O(dx²) regime; predicted slope on the
      recalibrated basket: ≈ -1.95 to -2.00 (per the empirical
      log₂-ratio extrapolation). Gate threshold ≤ -1.95 UNCHANGED.

      Wallclock budget (Intel i7-12700K, AVX2, RUSTFLAGS="-C target-cpu=native",
      --features parallel,simd,slow-tests --release): ~50 minutes for the
      full 4-point sweep, dominated by the N=256 leg (N³ scaling vs the
      next-finer N=128 gives ~8× cost amplification at the largest point).
      Memory peak: 256³ × 8B × 3 working buffers ≈ 1.6 GB (well under
      31 GB prod-HW budget).

      Reproducibility: `cargo run -p xtask -- test-flagship -- --ignored g5_3d_slope`.

      See math.md §10.8.7, ADR-0024 (incl. Amendment 2026-05-09).
    test_file: "tests/strang_3d_slope.rs"
    feature_gate: "slow-tests"
    invariant: |
      // Pseudocode (matches tests/strang_3d_slope.rs::g5_3d_slope).
      // N_SPATIAL recalibrated 2026-05-09 from [16, 32, 64] →
      // [32, 64, 128, 256] (drops the under-resolved N=16; adds asymptotic
      // anchor points N=128, N=256). Gate threshold UNCHANGED at -1.95.
      const T_FINAL: f64 = 0.2;
      const DIFFUSION_A: f64 = 0.1;
      const N_STEPS: usize = 200;
      const X_MIN: f64 = -5.0;
      const X_MAX: f64 = 5.0;
      const N_SPATIAL: [usize; 4] = [32, 64, 128, 256];
      const SLOPE_GATE: f64 = -1.95;

      fn oracle(t: f64, x: f64, y: f64, z: f64) -> f64 {
          let d = 1.0 + 4.0 * DIFFUSION_A * t;
          d.powf(-1.5) * (-(x*x + y*y + z*z) / d).exp()
      }

      let mut errs = vec![];
      for &n in &N_SPATIAL {
          // build Grid3D, GridFn3D initial datum, Strang3D, ChernoffSemigroup
          // evolve to T_FINAL, compute sup-norm vs oracle at grid nodes
          errs.push(heat_3d_error(n));
      }
      let slope = loglog_slope(&N_SPATIAL, &errs);
      assert!(slope <= SLOPE_GATE,
              "G5_3D slope {slope:.4} > gate {SLOPE_GATE} — escalate to Architect");


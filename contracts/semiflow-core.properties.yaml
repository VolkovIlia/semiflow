  # =========================================================================

  - name: G_BINDING_GREEKS_PARITY
    cases: 4
    severity: RELEASE_BLOCKING
    blocks_release: true
    gate: "F1 Greeks triple (value[N], delta[N], gamma[N]) byte-identical (0 ULP) across core ↔ FFI v3 ↔ PyO3 v3 (native, shared libm); WASM v3 matches the scalar core golden to ≤ 1e-9 per-array relative error (native↔wasm32 libm gap, ADR-0183); AND delta/gamma match central-difference reference to ≤ 1e-10"
    purpose: |
      G_BINDING_GREEKS_PARITY (v8.0.0 F1 Greeks binding-surface parity meta-gate —
      math.md §46, ADR-0133, ADR-0028 Amendment 2):
      Verifies that the v8.0.0 differentiable-Chernoff HEADLINE — forward-mode
      Δ/Γ Greeks for the 1D unit-diffusion heat kernel w.r.t. the diffusion-scale
      parameter θ — produces the SAME (value, delta, gamma) triple whether it is
      computed in the Rust core or read back through any of the three EXPERIMENTAL
      bindings, and that the differentiated components agree with a numerical
      reference. This is the binding-surface companion to the core-only
      G_DUAL_AD_GRADIENT (which fixes the math at F = Dual<f64>); this gate fixes
      the *binding boundary* (no precision loss in the FFI buffer copy / PyO3
      numpy marshalling / WASM Float64Array marshalling).

      Canonical smoke (shared by all sub-tests):
        Kernel:  DiffusionChernoff with diffusion scale θ₀ = 0.5.
                 Δ path: instantiate at F = Dual<f64>, scale = Dual::variable(θ₀).
                 Γ path: instantiate at F = Dual<Dual<f64>>, scale seeded so the
                         OUTER and INNER tangents both carry the θ-seed
                         (Dual::variable(Dual::variable(θ₀))); Γ = the
                         .tangent.tangent component (math.md §46.4 hyper-dual).
        Grid:    Grid1D::new(-10.0, 10.0, N), N = 64, DEFAULT interp (SepticHermite,
                 ADR-0133 Amendment 1 — AD must compose with the default grid).
        u0(x):   exp(-x²) as a θ-independent GridFn1D (tangent 0; only the scale
                 carries the seed).
        Steps:   n_chernoff = 32; t = 0.05.
        Output:  value[N] = .value component, delta[N] = first-order .tangent,
                 gamma[N] = second-order .tangent.tangent.

      Reference (central / second difference at F = f64), h = 1e-5:
        delta_fd[i] = (u(θ₀+h)[i] − u(θ₀−h)[i]) / (2h).
        gamma_fd[i] = (u(θ₀+h)[i] − 2·u(θ₀)[i] + u(θ₀−h)[i]) / h².

      Four sub-tests:

        Sub-test 1 (CORE reference, F = Dual / Dual<Dual>):
          Compute (value, delta, gamma) directly in Rust via the generic apply_f
          path. ASSERT ‖delta − delta_fd‖_∞ ≤ 1e-10 AND ‖gamma − gamma_fd‖_∞ ≤
          1e-8 (Γ tolerance looser: second-difference reference is O(h²)-limited;
          the dual Γ is exact, the FD oracle is the noisy side). This sub-test
          fixes the GOLDEN triple the bindings must reproduce.

        Sub-test 2 (FFI v3):
          SmfGreeksEvolverV3 *ev = NULL;
          smf_greeks_evolver_new_heat_1d_unit_v3(-10,10,64,32,u0,64,&ev);
          double val[64], del[64], gam[64];
          smf_heat1d_greeks_v3(ev, 0.05, val, del, gam, 64);
          ASSERT memcmp(val, golden.value, 64*8) == 0
              && memcmp(del, golden.delta, 64*8) == 0
              && memcmp(gam, golden.gamma, 64*8) == 0.

        Sub-test 3 (PyO3 v3):
          ev = semiflow.EvolverHeat1DGreeksV3(-10.,10.,64,u0,32)
          value, delta, gamma = ev.greeks(0.05)
          ASSERT np.array_equal(value, golden.value)    # bit-equality
              and np.array_equal(delta, golden.delta)
              and np.array_equal(gamma, golden.gamma)

        Sub-test 4 (WASM v3) — TOLERANCE-BOUNDED (ADR-0183):
          const ev = new EvolverHeat1DGreeksV3(-10,10,64,u0,32);
          const {value, delta, gamma} = ev.greeks(0.05);
          ASSERT max_i |value[i] − golden.value[i]| / |golden.value[i]| ≤ 1e-9
              && (same for delta, gamma).
          The golden is the SCALAR core hyper-dual sweep (semiflow built
          --no-default-features --features std) — an oracle independent of the
          WASM SUT. WASM parity is NOT byte-identical: native↔wasm32 libm exp()
          differs in the last ULP and amplifies over 32 Chernoff steps + the
          hyper-dual chain rule to ≤ 6.1e-11 relative (≈285k ULP on the ~1e-23
          Gaussian tail, where ULP is a misleading scale). The 1e-9 relative gate
          still catches any marshalling bug (order-1 relative).

      Cross-binding match:
        ASSERT FFI v3 triple == PyO3 v3 triple == CORE golden (native, byte-
        identical, shared libm). WASM v3 triple matches the scalar CORE golden to
        ≤ 1e-9 per-array relative error (ADR-0183). The same Rust core runs in
        all four; any divergence beyond the irreducible native↔wasm32 libm gap is
        a binding-boundary marshalling bug.

      Test files:
        - tests/binding_greeks_parity_ffi.rs   (drives ffi-greeks-smoke)
        - tests/binding_greeks_parity_py.rs    (drives the PyO3 greeks smoke)
        - tests/binding_greeks_parity_wasm.rs  (drives wasm-bindgen-test greeks)

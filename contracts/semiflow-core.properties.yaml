            symbolically in (0, ∞) × (0, ∞). Use `sympy.diff` and
            `sympy.simplify`; expected residual literally zero.

        (2) (T22N.neumann_boundary) Neumann boundary at x = 0:
              ∂_x K_N(x, y, t) |_{x=0} == 0   symbolically.
            Compute ∂_x [(4πt)^{-1/2} · (exp(-(x-y)²/(4t)) + exp(-(x+y)²/(4t)))]
            and evaluate at x = 0; the two derivatives have equal magnitudes
            with OPPOSITE signs (the image method's defining property),
            cancelling exactly. `sympy.subs(x, 0)` + `simplify` MUST produce
            literally zero.

        (3) (T22N.initial_delta) Initial-condition delta limit:
            For x, y > 0, `sympy.limit(K(x, -y, t), t, 0, '+')` MUST produce
            zero (the ghost contribution decays exponentially as t → 0+
            because (x + y)² / (4t) → ∞ for x, y > 0). Combined with the
            standard delta-limit of the free-space K, K_N has the correct
            initial datum (delta on the diagonal y = x for y > 0).

        (4) BONUS (T22N.mass_conservation) — NOT GATED, advisory only:
            `sympy.integrate(K_N(x, y, t), (y, 0, oo))` SHOULD evaluate to 1
            for all x > 0, t > 0 (no flux through ∂R). May depend on sympy
            erf-identity coverage; print PASS / FAIL but do not block.

      Script: scripts/verify_reflected_heat_halfline.py (new file, ~140 LoC,
      ships in v2.8 engineer wave). MUST print exactly `T22N PASS` on success
      (3 mandatory checks all pass) or `T22N FAIL: <reason>` on failure
      (any of the 3 mandatory fails). Integrated into the `test-fast` sympy
      sweep. Pure symbolic — no library runtime; safe for CI without `slow-tests`.
      Failure BLOCKS v2.8 release.
    test_file: "scripts/verify_reflected_heat_halfline.py"
    feature_gate: "none"


# v0.7.0 gates (ADR-0015 — 6th-order spatial, Diffusion6thChernoff):
#   Sympy gate entries — verified by verify_v0_7_0_kkernel.py,
#   verify_v0_7_0_zeta6.py, verify_v0_7_0_quintic_hermite.py (all exit 0).
#   G3_6th is the headline convergence-rate gate (empirical, slow-tests).
# ---------------------------------------------------------------------------

  - name: G3_6th
    cases: 1   # deterministic spatial dx-sweep slope test
    purpose: |
      v0.7.0 G3⁶ acceptance gate (ADR-0015): spatial dx-sweep at fixed large n.
      OLS slope of log(err) vs log(dx) <= -5.85 over N in {200, 400, 800, 1600, 3200}
      spatial nodes, constant a = 0.5, n_fixed = 4000 time steps, T = 0.5,
      domain [-15, 15]. Confirms dx^6 asymptotic regime — slope ca. -5.95 expected.
      Failure BLOCKS v0.7.0 release. 6th-order spatial accuracy is delivered
      jointly by (a) K7 Fourier-symbol xi^6-matched 7-point K-kernel,
      (b) 9-point Fornberg FD on f-derivatives, (c) quintic-Hermite interpolation
      in f.sample(off-grid) — all three must be active (ADR-0015, Plan-1 FULL lift).
    severity: NORMATIVE
    script: ".dev-docs/verification/scripts/verify_v0_7_0_kkernel.py"
    inputs: {}
    invariant: |
      // Spatial dx-sweep: vary N at fixed n_fixed=4000 to isolate dx^6.
      // Use Diffusion6thChernoff with QuinticHermite interpolation.
      let n_fixed = 4000usize;
      let t = 0.5_f64;
      let ns_spatial = [200usize, 400, 800, 1600, 3200];
      let mut log_dx = vec![];
      let mut log_err = vec![];

      for &cap_n in &ns_spatial {
          use semiflow_core::InterpKind;
          let grid = Grid1D::new(-15.0, 15.0, cap_n).unwrap()
              .with_interp(InterpKind::QuinticHermite);
          let dx = 30.0 / cap_n as f64;
          let f0 = GridFn1D::from_fn(grid.clone(), |x| (-x*x).exp());
          let exact = GridFn1D::from_fn(grid.clone(),
                           |x| (2.0_f64).recip() * (-x*x/2.0).exp());
          let d6 = Diffusion6thChernoff::new(
              |_| 0.5_f64, |_| 0.0_f64, |_| 0.0_f64, 0.5, grid.clone()
          );
          let semigroup = ChernoffSemigroup::new(d6, n_fixed).unwrap();
          let result = semigroup.evolve(t, &f0).unwrap();
          let mut diff = result.clone();
          diff.axpy(-1.0, &exact);
          log_dx.push(dx.ln());
          log_err.push(diff.norm_sup().ln());
      }

      let m = log_dx.len() as f64;
      let mean_x = log_dx.iter().sum::<f64>() / m;
      let mean_y = log_err.iter().sum::<f64>() / m;
      let num: f64 = log_dx.iter().zip(log_err.iter())
          .map(|(x, y)| (x - mean_x) * (y - mean_y)).sum();
      let den: f64 = log_dx.iter().map(|x| (x - mean_x).powi(2)).sum();
      let slope = num / den;

      assert!(slope <= -5.85,
              "G3^6 spatial dx-sweep slope = {} exceeds gate -5.85 \
               (6th-order spatial floor not active; check K7/FD9/QuinticHermite)",
              slope);


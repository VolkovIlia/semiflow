  # =========================================================================
  # v4.0 ADR-0083 — C6 Resolvent residual gate (PROMOTION of v2.7 G24).
  # =========================================================================
  - name: G_RES_RES
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "Resolvent residual ‖(λI − A) R(λ) f − f‖_∞ ≤ 1e-3 at λ = 1.0, N = 512, smooth Gaussian f, unit diffusion (PROMOTION of v2.7 G24)"
    purpose: |
      G_RES_RES (Resolvent residual gate — PROMOTION of v2.7 G24 from ADVISORY
      to RELEASE_BLOCKING — math.md §34.3, ADR-0083):
      Verifies the v2.7 LaplaceChernoffResolvent (math §22 + ADR-0069) produces
      a resolvent residual ≤ 1e-3 at the canonical (λ = 1.0, N = 512, smooth
      Gaussian f, unit diffusion) test point. NO NEW CODE — same setup as the
      v2.7 G24 ADVISORY test, with severity promoted to RELEASE_BLOCKING.

      Justification (per ADR-0083 §"Decision"):
        - 18-month soak (v2.7 → v4.0, six releases) of G24 in CI with the same
          canonical setup has produced consistent ≤ 1e-4 empirical residuals.
        - v4.0 HFT side-tracks examples/heston_pricer.rs (v2.7) and
          examples/tikhonov_regularisation.rs (v4.0) both depend on the
          resolvent residual being below a fixed bound for production use.
        - Promoting from ADVISORY to RELEASE_BLOCKING ensures the resolvent
          path remains correct under future refactors.

      Setup (UNCHANGED from v2.7 G24):
        grid     = Grid1D::<f64>::new(-10.0, 10.0, 512)?;
        a_fn     = |_x: f64| 1.0_f64;                                  // unit diffusion
        inner    = DiffusionChernoff::<f64>::new(a_fn, grid.clone())?;
        resolvent = LaplaceChernoffResolvent::<DiffusionChernoff<f64>, f64>::new(
            inner, LaplaceQuadrature::<f64>::gauss_laguerre_32(),
        )?;
        lambda   = 1.0_f64;
        f        = GridFn1D::<f64>::from_fn(&grid, |x| (-x*x).exp());

      Gate:
        g_approx       = resolvent.apply(lambda, &f)?;
        lambda_g       = g_approx.scale(lambda);
        A_g            = inner.apply_generator(&g_approx)?;
        residual_state = lambda_g.sub(&A_g);
        residual_norm  = residual_state.sub(&f).norm_sup();
        ASSERT residual_norm <= 1e-3.

      Rationale for the 1e-3 budget: empirically derived from the v2.7 32-point
      Gauss-Laguerre quadrature error on the canonical Gaussian-Gaussian
      convolution. The 32-pt Gauss-Laguerre converges geometrically; empirical
      residual on the canonical setup is ≈ 1e-4 giving 10× headroom against
      drift. Tightening to 1e-4 defers to v4.1+ pending further empirical
      sampling.

      Test file: tests/laplace_resolvent_residual.rs (REUSED from v2.7 G24
      file; the v4.0 ADR-0083 simply promotes the severity from ADVISORY to
      RELEASE_BLOCKING via the CI gate-runner configuration).

      Failure BLOCKS v4.0 release. The v2.7 G24 entry (still in this
      properties.yaml) stays for historical reference; G_RES_RES is the
      promoted-severity sibling.
    test_file: "tests/laplace_resolvent_residual.rs"
    feature_gate: "slow-tests"

  # =========================================================================
  # v8.0.0 Phase-1 — F1 dual-number forward-mode AD (ADR-0133, math.md §46).
  # Two ADDITIVE RELEASE_BLOCKING gates. PRE-FLIGHT: scripts/dual_ad_kit.py
  # (T_DUAL, PASS 4/4 2026-06-07). schema_version 4.0.0 → 4.1.0 (MINOR).
  # =========================================================================

  - name: G_DUAL_AD_GRADIENT
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "Forward-mode gradient (kernel instantiated at F = Dual<f64>) matches central finite-difference gradient to sup-norm ≤ 1e-10 over the representative kernel set"
    purpose: |
      G_DUAL_AD_GRADIENT (forward-mode dual-number AD correctness — math.md §46.7,
      ADR-0133):
      Verifies that instantiating an existing Chernoff kernel at the NEW field
      F = Dual<f64> and seeding the parameter tangent with 1.0 yields the EXACT
      forward-mode derivative of the evolved output with respect to one scalar
      parameter θ, matching a central finite-difference probe.

      Representative kernel set (ALL MUST pass; the set exercises a const-a base,
      a higher-order base, and a composition):
        - DiffusionChernoff          (θ = the diffusivity scale)
        - Diffusion4thChernoff       (θ = the diffusivity scale)
        - StrangSplit                (θ = a parameter entering one leg)

      Common setup (per kernel):
        grid   = Grid1D::<Dual<f64>>::new(-10.0, 10.0, N)?     (N ≥ 64).
        θ₀     = 0.5 (the parameter value at which the gradient is taken).
        f_0(x) = exp(-x²) as GridFn1D<Dual<f64>> with tangent 0 (data is
                 θ-independent; only the PARAMETER carries tangent 1).
        Build the kernel with the diffusivity / leg parameter set to
        Dual(θ₀, 1.0) so its tangent seeds the forward sweep.
        evolver = Evolver::new(kernel, n)?    (n ≥ 16).
        u_dual  = evolver.evolve(t, &f_0)?    (t = 1.0); the tangent component
                 of u_dual is ∂u/∂θ at θ₀.

      Reference (central difference at F = f64):
        u_plus  = evolve with parameter (θ₀ + h);  u_minus = (θ₀ − h);  h = 1e-5.
        grad_fd = (u_plus − u_minus) / (2h).

      Gate:
        ‖ value-of(u_dual.tangent) − grad_fd ‖_∞ ≤ 1e-10   for EACH kernel.

      PRE-FLIGHT clearance: scripts/dual_ad_kit.py sub-check (d)
      kernel_forward_grad already certifies the forward-vs-central agreement
      symbolically on the ζ-A symbol factor (PASS, |diff| ≤ 1e-10).

      Test file: tests/dual_ad_gradient.rs (NEW, v8.0 Phase-1 engineer).
      Failure BLOCKS v8.0.0 release.
    test_file: "tests/dual_ad_gradient.rs"
    feature_gate: "slow-tests"

  - name: G_DUAL_ZERO_ALLOC
    cases: 1
    severity: RELEASE_BLOCKING
    gate: "Steady-state heap allocation count of Evolver::evolve_into at F = Dual<f64> equals the count at F = f64 (warmed run; pre-warm excluded)"
    purpose: |
      G_DUAL_ZERO_ALLOC (zero-new-allocation AD claim — math.md §46.3, ADR-0133):
      Proves the "derivative for free" claim — that the dual field rides in the
      SAME pre-allocated State buffer as the value, so forward-mode AD adds NO
      heap allocations versus the scalar baseline.

      Measurement:
        Use a counting global allocator (e.g. a #[global_allocator] wrapper that
        increments an AtomicUsize on each alloc) gated behind a test-only cfg.
        Pre-warm both runs (first evolve_into pre-warms parallel singletons per
        ADR-0041 AC-4 and any one-time scratch growth); RESET the counter AFTER
        the warm-up call, then measure a second evolve_into.

        baseline_count = allocs of one warmed Evolver::<DiffusionChernoff<f64>>::
                         evolve_into(t, &f0_f64, &mut dst, &mut scratch).
        dual_count     = allocs of one warmed Evolver::<DiffusionChernoff<Dual<f64>>>::
                         evolve_into(t, &f0_dual, &mut dst, &mut scratch).

      Gate:
        dual_count == baseline_count   (EXACT equality; both SHOULD be 0 in
        steady state per the ADR-0041 zero-alloc ping-pong invariant — the
        ScratchPool and ping-pong buffers are allocated ONCE outside the loop).

      Rationale: a wider field element (Dual<f64> is 2× the bytes of f64) changes
      the SIZE of the one-time buffer allocations, NOT their COUNT. The hot loop
      performs no per-step allocation in either case; equality of counts is the
      load-bearing invariant.

      Test file: tests/dual_zero_alloc.rs (NEW, v8.0 Phase-1 engineer; uses the
      counting allocator harness). Failure BLOCKS v8.0.0 release.
    test_file: "tests/dual_zero_alloc.rs"
    feature_gate: "slow-tests"

  # =========================================================================
  # v8.0.0 — F1 binding-surface companion: cross-binding Greeks parity.
  # ADR-0028 Amendment 2 (binding-scope decision). Verifies the F1 Dual-AD
  # Greeks (value/Δ/Γ) survive the FFI/PyO3/WASM boundary byte-identically AND
  # match the central-difference reference. Binding-layer companion to the

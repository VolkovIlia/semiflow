            Verify F_β(τ)f = f + τAf + (τ²/2)A²f + (τ³/6)A³f matches e^{τA}f
            up to τ³, with residual exactly (τ⁴/24)·A⁴f + O(τ⁵). Uses formal
            power series with A^k f as independent symbols.

        (b) (T23N.hermite_tangency) Operator-tangency on Hermite eigenfunctions:
            A = -∂²_x + x² (quantum harmonic oscillator). Eigenfunctions ψ_n have

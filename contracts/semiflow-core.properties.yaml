# Rationale: first-run measurement on 8-core x86_64 with default cargo
# target produced slope -4.30 (pre-asymptotic — N=512 ratios 13.2/18.5/31.8
# vs 6th-order asymptote 64) and 388 s wallclock with 1.01× SIMD speedup

  # =========================================================================
  - name: G_AS_K
    cases: 3
    severity: RELEASE_BLOCKING
    gate: "Per-K=2,4,6 in_subspace witness PASS AND jet output matches sympy reference (max diff ≤ 1e-12)"
    purpose: |
      G_AS_K (ApproximationSubspace<K, F> witness verification — math.md §26.5, ADR-0073):
      Verifies the three v3.0 opt-in `ApproximationSubspace<K, F>` impls:
      DiffusionChernoff K=2, Diffusion4thChernoff K=4, TruncatedExp4thDiffusionChernoff
      K=6 (the LAST is the witness consumed by `Diffusion4thZeta4Chernoff::new`
      per ADR-0075). The witness is the foundation of the Galkin-Remizov 2025
      *IJM* Theorem 3.1 order-K Chernoff convergence claim.

      Common setup:
        Initial datum: f_0(x) = exp(-x²) (Gaussian) on Grid1D::<f64>::new(-10.0, 10.0, N).
        a_fn: |x| 1.0 + 0.5 * (x.tanh()).powi(2)   — a ∈ C^6_b (the C^6_b heat coefficient).

        Sub-test 1 (G_AS_2 — DiffusionChernoff K=2):
          N = 9 grid points.
          kernel = DiffusionChernoff::<f64>::new(a_fn, a_prime, a_dprime, ..., grid)?;
          Verify: kernel.in_subspace::<2>(&f_0) == true.
          Compute: kernel.jet::<2>(&f_0, &mut out)?  with out: [GridFn1D<f64>; 3].
          Reference: sympy script evaluates A f_0 and A² f_0 symbolically via the
                     5-point central-difference application of ∂_x(a(x) ∂_x f);
                     compare against out[1] and out[2] at f64 precision.
                     Gate: ||out[k] - ref[k]||_∞ ≤ 1e-12 for k ∈ {0, 1, 2}.

        Sub-test 2 (G_AS_4 — Diffusion4thChernoff K=4):
          N = 17 grid points (≥ 9 + 4 buffer for the 9-point stencil width).
          kernel = Diffusion4thChernoff::<f64>::new(a_fn, ..., grid)?;
          a_kth_bound: Some(2.5_f64)   — caller-asserted ‖a^(k)‖_∞ ≤ 2.5 for k ≤ 4.
          Verify: kernel.in_subspace::<4>(&f_0) == true.
          Compute: kernel.jet::<4>(&f_0, &mut out)?  with out: [GridFn1D<f64>; 5].
          Reference: sympy computes A^k f_0 for k ∈ 0..=4 via the 9-point stencil.
                     Gate: ||out[k] - ref[k]||_∞ ≤ 1e-12 for k ∈ {0, 1, 2, 3, 4}.

        Sub-test 3 (G_AS_6 — TruncatedExp4thDiffusionChernoff K=6 — THE WITNESS
        FOR ζ⁴):
          N = 25 grid points.
          kernel = TruncatedExp4thDiffusionChernoff::<f64>::new(a_fn, ..., grid)?;
          a_kth_bound: Some(2.5_f64)   — caller-asserted ‖a^(k)‖_∞ ≤ 2.5 for k ≤ 6.
          Verify: kernel.in_subspace::<6>(&f_0) == true.
          Compute: kernel.jet::<6>(&f_0, &mut out)?  with out: [GridFn1D<f64>; 7].
          Reference: sympy computes A^k f_0 for k ∈ 0..=6.
                     Gate: ||out[k] - ref[k]||_∞ ≤ 1e-12 for k ∈ {0, 1, ..., 6}.
          THIS SUB-TEST GATES THE Diffusion4thZeta4Chernoff LANDING (ADR-0075 §"Algorithm"
          step 2: in_subspace::<6> witness MUST hold at construction).

      Test file: tests/approximation_subspace_witness.rs (new file, v3.0 Wave A
      engineer). Sympy reference script: scripts/verify_approximation_subspace.py.
      All three sub-tests MUST pass; any failure BLOCKS v3.0 release.

# v0.8.0 Block B gates (ADR-0018 — parallel Strang2D::apply opt-in).
# ---------------------------------------------------------------------------
  - name: STRANG2D_PARALLEL_BIT_EQUAL
    cases: 1                       # 4-thread × 4-N grid covered by sub-cases
    severity: RELEASE_BLOCKING
    gate: "byte-for-byte equality across thread counts"
    purpose: |
      STRANG2D_PARALLEL_BIT_EQUAL (v0.8.0 Block B, ADR-0018):
      For every `(N, τ, thread_count)` in the test grid, the
      `feature = "parallel"` build of `Strang2D::apply(τ, &f)` MUST
      produce a `GridFn2D` whose `values: Vec<f64>` is bit-identical
      (byte-for-byte `==`, including signed-zero, subnormals, and any
      NaN bit-patterns) to the serial v0.7.0 build's output for the
      SAME inputs.

      Test grid:
        N            ∈ {64, 128, 256, 512}        (per axis)
        thread_count ∈ {1, 2, 4, 8}               (controlled via test
                                                    harness; the implementation
                                                    reads `available_parallelism()`
                                                    so the test pins it via a
                                                    private `Strang2D` builder
                                                    OR via a thread-local
                                                    `Cell<Option<usize>>` test
                                                    hook — Engineer chooses).
        operator     = Strang2D<DiffusionChernoff, DiffusionChernoff>
                                                    (canonical v0.5.0 baseline)
                       AND
                       Strang2D<Diffusion4thChernoff, Diffusion4thChernoff>
                                                    (4th-order spatial coverage)
        τ            = T_FINAL / n_steps for n_steps ∈ {1, 4} (one-step + multi-step)
        u_0(x, y)    = exp(-(x² + y²))             (Gaussian, `from_fn`)

      For each `(N, op, n_steps)`: produce serial reference with thread_count=1
      (or `--no-default-features` build, equivalent), then for each
      `thread_count ∈ {2, 4, 8}` produce parallel output and assert
      `serial.values == parallel.values` (Vec PartialEq is bit-wise on f64).

      Failure modes BLOCK v0.8.0 release:
        - Any thread_count produces non-bit-equal output → likely a hidden
          floating-point reduction, work-stealing, or chunk-boundary
          read-after-write race.
        - Non-determinism across runs at SAME thread_count → likely an
          uninitialised buffer or misuse of `MaybeUninit`.

      This gate is the SOLE acceptance criterion for the
      ADR-0018 parallel kernel; without it, "parallel Strang2D" is a
      different mathematical object and v0.5.0 regression bit-equality is
      broken. Cross-ref: tensor.yaml Strang2D `parallel_correctness.bit_equality_contract`.
    test_file: "tests/strang2d_parallel_bit_equal.rs"
    feature_gate: "parallel,slow-tests"
    invariant: |
      // Pseudocode (Engineer translates to proptest harness in
      // tests/strang2d_parallel_bit_equal.rs):
      for &n in &[64usize, 128, 256, 512] {
          let (s_inner_x, s_inner_y) = make_inner_pair(n); // Diffusion + Diffusion4th
          let phi = Strang2D::new(s_inner_x, s_inner_y);
          let f0 = make_gaussian(n);
          for &n_steps in &[1usize, 4] {
              let tau = 0.1 / (n_steps as f64);
              // Serial reference (force thread_count = 1).
              let serial = with_thread_count(1, || phi_iterate(&phi, tau, n_steps, &f0));
              for &k in &[2usize, 4, 8] {
                  let parallel = with_thread_count(k, || phi_iterate(&phi, tau, n_steps, &f0));
                  assert_eq!(serial.values, parallel.values,
                      "STRANG2D_PARALLEL_BIT_EQUAL FAIL: n={n}, n_steps={n_steps}, k={k}");
              }
          }
      }


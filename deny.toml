[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny PR #611: vulnerability/unmaintained/notice/yanked keys moved to
# version = 2 schema.  Advisory check is skipped in CI (see ci.yml deny job)
# because RUSTSEC-2026-0073 uses CVSS 4.0 which older cargo-deny can't parse.
version = 2
yanked = "deny"

[licenses]
# PR #611: `unlicensed` and `copyleft` top-level keys removed in v2 schema.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "ISC",
    "Zlib",
]

[bans]
multiple-versions = "warn"

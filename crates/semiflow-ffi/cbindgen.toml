language = "C"
pragma_once = true
cpp_compat = true
style = "type"
include_guard = "SEMIFLOW_H"
header = """// SPDX-License-Identifier: MIT OR Apache-2.0
// DO NOT EDIT — generated by `cargo run -p xtask -- ffi-headers`
// C ABI for semiflow-core (experimental, v0.10.0).
// See crates/semiflow-ffi/README.md and docs/adr/0028-ffi-pyo3-wasm-v0_10.md."""
after_includes = """
/**
 * Diffusion coefficient callback: `double f(double x, void *user_data)`.
 *
 * Used by `smf_state_new_with_closure` (ADR-0034).
 * The function MUST be pure and panic-free.
 * `user_data` is the opaque pointer supplied by the caller.
 */
typedef double (*SemiflowAFn)(double x, void *user_data);"""

[export]
prefix = ""
exclude = ["Option_SemiflowAFn"]

[parse]
parse_deps = false

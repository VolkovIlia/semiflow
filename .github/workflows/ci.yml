name: CI
# Toolchain note: all jobs use stable. rustfmt.toml was cleaned of nightly-only
# options (imports_granularity/group_imports removed in ADR-0182) so fmt now
# runs on stable. MSRV documented in Cargo.toml rust-version = "1.78" is for
# downstream users; CI pins stable (≥1.85) to keep clap_lex/edition2024 deps
# building correctly — edition 2024 was stabilised in 1.85 (rustc 1.96 on Artix).
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt }
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --release

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.78
      - uses: Swatinem/rust-cache@v2
      # MSRV applies to the core library only. Binding crates (semiflow-ffi,
      # semiflow-py, semiflow-wasm) depend on cbindgen/pyo3/wasm-bindgen which
      # require rustc > 1.78; their own MSRV is gated by those upstreams.
      - run: cargo +1.78 test -p semiflow --lib

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace

  suckless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run -p xtask -- check-lints

  # C-C3 fix: unsafe-scope is fast (exit 0 since allowlist+token-aware fix) and
  # MUST run on every push/PR to catch new unsafe outside the ADR-0019 allowlist.
  unsafe-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Enforce unsafe scope (ADR-0019)
        run: cargo run -p xtask -- check-unsafe-scope

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Skip `advisories`: RUSTSEC-2026-0073 uses CVSS 4.0 which cargo-deny
          # <=0.16 cannot parse, causing a hard DB load error.  Re-enable once
          # upstream fixes the advisory entry or cargo-deny ships CVSS 4.0 support.
          command: check bans licenses sources

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: |
          # 80% floor. Excluded crates have dedicated integration jobs:
          #   semiflow-ffi  → ffi-smoke/ffi-build (C driver exercises extern "C" surface)
          #   semiflow-py   → py-smoke (Python driver)
          #   semiflow-wasm → wasm-test (Node/browser driver)
          #   xtask         → build-only tooling
          cargo llvm-cov --workspace --fail-under-lines 80 \
            --exclude semiflow-ffi \
            --exclude semiflow-py \
            --exclude semiflow-wasm \
            --exclude xtask

  ffi-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p semiflow-ffi --profile release-ffi

  ffi-headers-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- ffi-headers --check

  ffi-smoke:
    needs: ffi-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      # cl.exe requires the MSVC developer environment on Windows.
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - run: cargo run -p xtask -- ffi-smoke

  py-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install maturin
      - run: cargo run -p xtask -- py-build

  py-smoke:
    needs: py-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}" }
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - run: cargo run -p xtask -- py-smoke

  wasm-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with: { version: latest }
      - run: cargo run -p xtask -- wasm-build

  wasm-test-node:
    needs: wasm-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - name: Bootstrap rustup toolchain (macOS ARM workaround)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup show
          cargo --version
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with: { version: latest }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cargo run -p xtask -- wasm-test

  wasm-test-chrome:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with: { version: latest }
      - uses: browser-actions/setup-chrome@v1
        with: { chrome-version: stable }
      - run: cargo run -p xtask -- wasm-test --chrome

  wasm-test-firefox:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with: { version: latest }
      - uses: browser-actions/setup-firefox@v1
        with: { firefox-version: latest }
      - run: cargo run -p xtask -- wasm-test --firefox

  # D3 (v0.13.0): Binary-size gate — checks that all built artefacts are
  # within budget (<500 KB WASM, <1 MB FFI cdylib, <5 MB PyO3 cdylib).
  # Only audits artefacts that are already on disk; runs after all build jobs.
  binary-size-check:
    needs: [wasm-build, ffi-build, py-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      # Restore wasm artefacts from wasm-build job via cache.
      # The wasm-build job and this job share the same Swatinem cache key,
      # so pkg-web/pkg-node are available after cache restore.
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with: { version: latest }
      - name: Build WASM (size profile for measurement)
        run: cargo run -p xtask -- wasm-build --size
      - name: Build FFI cdylib
        run: cargo build -p semiflow-ffi --profile release-ffi
      - name: Report binary sizes
        run: cargo run -p xtask -- binary-size-check

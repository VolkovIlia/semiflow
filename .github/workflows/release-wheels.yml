name: Release Wheels

# Trigger on version tags (v0.10.0, v0.11.0, …) or manual dispatch.
# cibuildwheel is NOT run on every PR — see ci.yml py-build/py-smoke instead.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Default restrictive permissions for the workflow; publish-pypi overrides
# id-token at the job level to enable OIDC Trusted Publishing.
permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Allow the job to attach files to a GitHub Release.
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # cibuildwheel uses the `maturin` build backend declared in pyproject.toml.
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        with:
          package-dir: crates/semiflow-py
          output-dir: dist
        env:
          # Build only CPython 3.10–3.13; skip PyPy and 3.14-dev.
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          # Linux: manylinux_2_28 (glibc 2.28+) for broad compat.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          # Ensure Rust toolchain is available inside cibuildwheel containers.
          CIBW_BEFORE_ALL_LINUX: >
            curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain stable &&
            source $HOME/.cargo/env
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"
          # macOS: no extra setup needed; Rust installed above.
          # Windows: no extra setup needed; dtolnay/rust-toolchain handles it.

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.whl

      # Upload wheels as a workflow artifact so publish-pypi can collect them.
      - name: Upload wheels as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build sdist
        run: |
          pip install maturin
          maturin sdist -m crates/semiflow-py/Cargo.toml -o dist

      - name: Upload sdist as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    # Run only on tag pushes; skip for workflow_dispatch without a tag.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, sdist]
    # OIDC Trusted Publishing requires id-token: write at the job level.
    permissions:
      id-token: write
      contents: read
    # The environment name must match the one configured on PyPI's publisher page.
    environment:
      name: pypi
      url: https://pypi.org/p/semiflow-pde
    steps:
      # Collect all per-platform wheel artifacts + sdist into a single dist/ directory.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Publish to PyPI via OIDC — no token or password required.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
